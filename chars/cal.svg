<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 80 100" xmlns="http://www.w3.org/2000/svg" width="160" height="200">
  <defs>
    <radialGradient id="calG" cx="34%" cy="28%" r="70%">
      <stop offset="0%" stop-color="#F0B080"/>
      <stop offset="100%" stop-color="#602800"/>
    </radialGradient>
    <radialGradient id="calM" cx="30%" cy="24%" r="72%">
      <stop offset="0%" stop-color="#C0D0E8"/>
      <stop offset="100%" stop-color="#283848"/>
    </radialGradient>
  </defs>
  <!-- LEGS (static) -->
  <rect x="24" y="82" width="12" height="16" rx="6" fill="#A05820" stroke="#111" stroke-width="2.5"/>
  <rect x="44" y="82" width="12" height="16" rx="6" fill="#A05820" stroke="#111" stroke-width="2.5"/>
  <ellipse cx="30" cy="97" rx="10" ry="5" fill="#A05820" stroke="#111" stroke-width="2"/>
  <ellipse cx="50" cy="97" rx="10" ry="5" fill="#A05820" stroke="#111" stroke-width="2"/>
  <!-- shadow -->
  <ellipse cx="40" cy="90" rx="24" ry="8" fill="rgba(0,0,0,.18)"/>
  <!-- ARMORED BODY -->
  <ellipse cx="40" cy="78" rx="24" ry="16" fill="url(#calM)" stroke="#111" stroke-width="3"/>
  <ellipse cx="30" cy="69" rx="12" ry="7" fill="rgba(255,255,255,.20)"/>
  <!-- cross emblem -->
  <rect x="38" y="70" width="4" height="12" rx="2" fill="#3878C8" opacity=".85"/>
  <rect x="34" y="74" width="12" height="4" rx="2" fill="#3878C8" opacity=".85"/>
  <!-- ARMS (gauntlets) -->
  <ellipse cx="17" cy="75" rx="13" ry="7" fill="url(#calM)" stroke="#111" stroke-width="2.8" transform="rotate(-18,17,75)"/>
  <ellipse cx="63" cy="75" rx="13" ry="7" fill="url(#calM)" stroke="#111" stroke-width="2.8" transform="rotate(18,63,75)"/>
  <!-- FIRE PLUME -->
  <path d="M26 18 Q18 3 28 0 Q30 12 35 7 Q37 -1 40 0 Q43 7 47 3 Q50 -1 52 8 Q56 4 62 18"
        fill="#FF6010" stroke="#CC3000" stroke-width="2" stroke-linejoin="round"/>
  <path d="M28 18 Q22 6 30 3 Q32 13 36 9 Q38 1 40 2 Q42 9 46 5 Q49 1 52 8 Q56 4 62 18"
        fill="#FF9830" opacity=".70"/>
  <!-- HORSE HEAD -->
  <ellipse cx="40" cy="40" rx="27" ry="28" fill="url(#calG)" stroke="#111" stroke-width="3.5"/>
  <!-- muzzle -->
  <ellipse cx="40" cy="57" rx="19" ry="13" fill="url(#calG)" stroke="#111" stroke-width="3"/>
  <ellipse cx="40" cy="61" rx="15" ry="9"  fill="#F0C090"/>
  <ellipse cx="34" cy="58" rx="6"  ry="3.5" fill="rgba(255,255,255,.38)"/>
  <circle cx="34" cy="63" r="3.5" fill="#602800" stroke="#111" stroke-width="2"/>
  <circle cx="46" cy="63" r="3.5" fill="#602800" stroke="#111" stroke-width="2"/>
  <ellipse cx="28" cy="27" rx="11" ry="7" fill="rgba(255,255,255,.38)" transform="rotate(-18,28,27)"/>
  <!-- METAL HELMET -->
  <ellipse cx="40" cy="19" rx="26" ry="17" fill="url(#calM)" stroke="#111" stroke-width="3.5"/>
  <ellipse cx="28" cy="11" rx="10" ry="6" fill="rgba(255,255,255,.42)" transform="rotate(-15,28,11)"/>
  <!-- visor -->
  <rect x="15" y="26" width="50" height="10" rx="5" fill="#1C2834" stroke="#111" stroke-width="2.5"/>
  <!-- EARS -->
  <ellipse cx="20" cy="14" rx="7" ry="11" fill="url(#calG)" stroke="#111" stroke-width="2.8" transform="rotate(-18,20,14)"/>
  <ellipse cx="60" cy="14" rx="7" ry="11" fill="url(#calG)" stroke="#111" stroke-width="2.8" transform="rotate(18,60,14)"/>
  <!-- EYES (brave) -->
  <circle cx="28" cy="38" r="10.5" fill="white" stroke="#111" stroke-width="3"/>
  <circle cx="52" cy="38" r="10.5" fill="white" stroke="#111" stroke-width="3"/>
  <circle cx="29" cy="39.5" r="6.1" fill="#3A1800"/>
  <circle cx="53" cy="39.5" r="6.1" fill="#3A1800"/>
  <circle cx="29" cy="39.5" r="3.4" fill="#111"/>
  <circle cx="53" cy="39.5" r="3.4" fill="#111"/>
  <circle cx="25.9" cy="36.4" r="2.5" fill="white"/>
  <circle cx="49.9" cy="36.4" r="2.5" fill="white"/>
  <circle cx="31.1" cy="40.6" r="1.4" fill="rgba(255,255,255,.70)"/>
  <circle cx="55.1" cy="40.6" r="1.4" fill="rgba(255,255,255,.70)"/>
  <!-- eyebrows (cocked/determined) -->
  <path d="M18 28 Q28 19 38 24" stroke="#111" stroke-width="4.5" fill="none" stroke-linecap="round"/>
  <path d="M42 25 Q52 20 62 28" stroke="#111" stroke-width="4.5" fill="none" stroke-linecap="round"/>
  <!-- CHEEKS -->
  <circle cx="18" cy="50" r="8" fill="rgba(255,160,100,.48)"/>
  <circle cx="62" cy="50" r="8" fill="rgba(255,160,100,.48)"/>
  <!-- SMIRK -->
  <path d="M26 54 Q37 64 54 55" stroke="#111" stroke-width="3.5" fill="none" stroke-linecap="round"/>
</svg>
