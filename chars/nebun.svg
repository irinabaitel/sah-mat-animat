<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 80 100" xmlns="http://www.w3.org/2000/svg" width="160" height="200">
  <defs>
    <radialGradient id="nebunG" cx="34%" cy="28%" r="70%">
      <stop offset="0%" stop-color="#C0B0FF"/>
