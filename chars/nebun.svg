  <circle cx="31" cy="51.5" r="5.8" fill="#3A1880"/>
  <circle cx="51" cy="51.5" r="5.8" fill="#3A1880"/>
  <circle cx="31" cy="51.5" r="3.2" fill="#111"/>
  <circle cx="51" cy="51.5" r="3.2" fill="#111"/>
  <circle cx="28" cy="48.5" r="2.4" fill="white"/>
  <circle cx="48" cy="48.5" r="2.4" fill="white"/>
  <circle cx="33.2" cy="52.5" r="1.3" fill="rgba(255,255,255,.70)"/>
