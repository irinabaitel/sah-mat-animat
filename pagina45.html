function toRo(san) {
  const map = { K:'R', Q:'D', R:'T', B:'N', N:'C' };
  return san.replace(/[KQRBN]/g, m => map[m]);

function redKingOverlay() {

  for (let r = 0; r < 8; r++)
    for (let f = 0; f < 8; f++) {
      const p = bd[r][f];
      if (p && p.type === 'k' && p.color === 'b') {
        const sq = String.fromCharCode(97 + f) + (8 - r);
        const el = document.querySelector('#board .square-' + sq);
        if (el) el.classList.add('highlight-check');
        return;
      }
    }
}

function playKingStep() {
  if (soundMuted || soundVolume === 0) return;
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const t = ctx.currentTime, v = soundVolume;
    [110, 220, 440].forEach((freq, i) => {
      const osc = ctx.createOscillator(), g = ctx.createGain();
      osc.type = 'sine'; osc.frequency.value = freq;
      g.gain.setValueAtTime(v * 0.3 / (i + 1), t);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.25 + i * 0.05);
      osc.connect(g); g.connect(ctx.destination);
      osc.start(t); osc.stop(t + 0.35);
    });
  } catch(e) {}
}

function spawnPageConfetti(duration) {
  const colors = ['#ff3333','#ff8800','#ffee00','#33cc55','#4499ff','#cc44ff','#ff66bb','#ff99cc','#ffffff'];
  const endTime = Date.now() + duration;
  function batch() {
    if (Date.now() >= endTime) return;
    for (let i = 0; i < 12; i++) {
      const p = document.createElement('div');
      p.className = 'confetti-page';
      const w = 7 + Math.random() * 7, h = w * (0.35 + Math.random() * 0.7);
      p.style.width = w + 'px'; p.style.height = h + 'px';
      p.style.background = colors[Math.floor(Math.random() * colors.length)];
      p.style.left = (Math.random() * 100) + 'vw'; p.style.top = '-14px';
      const fd = window.innerHeight * (0.65 + Math.random() * 0.45);
      p.style.setProperty('--dx', ((Math.random() - 0.5) * 180) + 'px');
      p.style.setProperty('--dy', fd + 'px');
      p.style.setProperty('--rot', (Math.random() * 900 - 450) + 'deg');
      const dur = 1.8 + Math.random() * 2.4;
      p.style.setProperty('--dur', dur + 's');
      document.body.appendChild(p);
      setTimeout(() => p.remove(), dur * 1000 + 200);
    }
    setTimeout(batch, 110);
  }
  batch();
}

function sqCenter(sq) {
  const fi = sq.charCodeAt(0) - 97;
  const rank = parseInt(sq[1]);
  const s = document.getElementById('boardWrapper').offsetWidth / 8;
  return { x: (fi + 0.5) * s, y: (8.5 - rank) * s };
}

function showLastMove(step) {
  const ex = document.getElementById('last-move-svg');
  if (ex) ex.remove();
  if (!lastMoves[step]) return;
  const lm = lastMoves[step];
  const ns = 'http://www.w3.org/2000/svg';
  const bw = document.getElementById('boardWrapper').offsetWidth;
  const svg = document.createElementNS(ns, 'svg');
  svg.id = 'last-move-svg';
  svg.style.cssText = 'position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:8;';
  svg.setAttribute('viewBox', '0 0 ' + bw + ' ' + bw);

  const defs = document.createElementNS(ns, 'defs');
  const marker = document.createElementNS(ns, 'marker');
  marker.setAttribute('id', 'lmar'); marker.setAttribute('markerWidth', '6');
  marker.setAttribute('markerHeight', '6'); marker.setAttribute('refX', '5');
  marker.setAttribute('refY', '3'); marker.setAttribute('orient', 'auto');
  const poly = document.createElementNS(ns, 'polygon');
  poly.setAttribute('points', '0 0, 6 3, 0 6');

  let strokeColor, dashArr = null;
  if (lm.color === 'green')       { strokeColor = '#27ae60'; poly.setAttribute('fill', '#27ae60'); }
  else if (lm.color === 'orange') { strokeColor = '#e67e22'; poly.setAttribute('fill', '#e67e22'); }
  else                            { strokeColor = '#3498db'; poly.setAttribute('fill', '#3498db'); dashArr = '5 3'; }

  marker.appendChild(poly); defs.appendChild(marker); svg.appendChild(defs);

  const f = sqCenter(lm.from), t = sqCenter(lm.to);
  const dx = t.x - f.x, dy = t.y - f.y;
  const len = Math.sqrt(dx * dx + dy * dy);
  const off = (bw / 8) * 0.38;
  const x1 = f.x + (dx / len) * off, y1 = f.y + (dy / len) * off;
  const x2 = t.x - (dx / len) * off, y2 = t.y - (dy / len) * off;

  const line = document.createElementNS(ns, 'line');
  line.setAttribute('x1', x1); line.setAttribute('y1', y1);
  line.setAttribute('x2', x2); line.setAttribute('y2', y2);
  line.setAttribute('stroke', strokeColor); line.setAttribute('stroke-width', '4.5');
  line.setAttribute('opacity', '0.78');
  line.setAttribute('marker-end', 'url(#lmar)');
  if (dashArr) line.setAttribute('stroke-dasharray', dashArr);
  svg.appendChild(line);

  document.getElementById('boardWrapper').appendChild(svg);
}

function computePositions() {
  const chess = new Chess(chapter.startFen);
  const fens = [chess.fen()];
  for (const mv of chapter.sanMoves) {
    if (!chess.move(mv)) { console.error('Mutare invalida:', mv); break; }
    fens.push(chess.fen());
  }
  return fens;
}

    log.appendChild(row);
  }

  // Rows 2+: sanMoves[1] = white move 2, sanMoves[3] = white move 3, ...
  for (let i = 1; i < total; i += 2) {
    const row = document.createElement('div');
    row.className = 'mlog-row';
    const moveNum = Math.floor((i + 1) / 2) + 1;
    const num = document.createElement('span');
    num.className = 'mlog-num';
    num.textContent = moveNum + '.';
    row.appendChild(num);

    const stepW = i + 1;
    const btnW = document.createElement('button');
    let clsW = 'mlog-token mlog-w';
    if (chapter.whiteKingSteps.has(stepW))      clsW += ' king-move';
    else if (chapter.queenMoveSteps.has(stepW)) clsW += ' queen-move';
    btnW.className = clsW;
    btnW.textContent = toRo(chapter.sanMoves[i]);
    btnW.dataset.step = stepW;
    btnW.onclick = () => goToStep(stepW);
    row.appendChild(btnW);

    if (i + 1 < total) {
      const stepB = i + 2;
      const btnB = document.createElement('button');
      btnB.className = 'mlog-token mlog-b';
      btnB.textContent = toRo(chapter.sanMoves[i + 1]);
      btnB.dataset.step = stepB;
      btnB.onclick = () => goToStep(stepB);
      row.appendChild(btnB);
    }
    log.appendChild(row);
  }
}

function goToStep(s) {
  document.querySelectorAll('#board .highlight-check').forEach(el => el.classList.remove('highlight-check'));
  currentStep = s;
  board.position(positions[s], false);
  removeHeart();
  showLastMove(s);
  updateUI();
  if (heartSteps[s]) showHeart(heartSteps[s].sq, heartSteps[s].fast);
  if (s === positions.length - 1) {
    spawnPageConfetti(5000);
    setTimeout(redKingOverlay, 200);
  }
  if (chapter.whiteKingSteps.has(s)) playKingStep();
}

function goFirst() { goToStep(0); }
function goLast()  { goToStep(positions.length - 1); }
function goPrev()  { if (currentStep > 0) goToStep(currentStep - 1); }
function goNext()  { if (currentStep < positions.length - 1) goToStep(currentStep + 1); }

function getMoveLabel(s) {
  if (s === 0) return 'Start';
  if (s === 1) return '1... ' + toRo(chapter.sanMoves[0]);
  const i = s - 1;
  if (i % 2 === 1) {
    // white move
    const moveNum = Math.floor((i + 1) / 2) + 1;
    return moveNum + '. ' + toRo(chapter.sanMoves[i]);
  } else {
    // black move
    const moveNum = i / 2 + 1;
    return moveNum + '... ' + toRo(chapter.sanMoves[i]);
  }
}

function updateUI() {
  const total = positions.length - 1;
  document.getElementById('moveCounter').textContent = getMoveLabel(currentStep);
  document.getElementById('btnFirst').disabled = currentStep === 0;
  document.getElementById('btnPrev').disabled  = currentStep === 0;
  document.getElementById('btnNext').disabled  = currentStep === total;
  document.getElementById('btnLast').disabled  = currentStep === total;

  document.querySelectorAll('.mlog-token').forEach(b =>
    b.classList.toggle('active', parseInt(b.dataset.step) === currentStep));
  const active = document.querySelector('.mlog-token.active');
  if (active) active.scrollIntoView({ block: 'nearest', behavior: 'smooth' });

  const box  = document.getElementById('annotationBox');
  const text = chapter.annotations[currentStep] || '';
  const isMat   = currentStep === total;
  const isKing  = chapter.whiteKingSteps.has(currentStep);
  const isQueen = chapter.queenMoveSteps.has(currentStep);

  if (isMat) {
    box.className = 'annotation-box checkmate';
    box.innerHTML = '<span class="checkmate-badge">&#10003; &#350;AH MAT!</span><br>' + text;
  } else if (isKing) {
    box.className = 'annotation-box king-active';
    box.innerHTML = text;
  } else if (isQueen) {
    box.className = 'annotation-box queen-active';
    box.innerHTML = text;
  } else {
    box.className = 'annotation-box';
    box.innerHTML = text;
  }
}

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight') goNext();
  if (e.key === 'ArrowLeft')  goPrev();
  if (e.key === 'Home')       goFirst();
  if (e.key === 'End')        goLast();
});

buildMovesList();
updateUI();
</script>
<script src="board-utils.js"></script>
</body>
</html>
