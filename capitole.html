<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sah Mat Animat - Dama si Turn vs Rege</title>
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@700;900&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: #F5A96E;
            font-family: 'Nunito', sans-serif;
            padding: 40px 16px;
            min-height: 100vh;
        }

        .page {
            max-width: 860px;
            margin: 0 auto;
            padding: 40px 60px 50px;
            position: relative;
        }

        .corner-piece { position: absolute; width: 80px; height: 80px; }
        .corner-tl { top: 0; left: 0; }
        .corner-tr { top: 0; right: 0; transform: scaleX(-1); }

        h1 {
            font-family: 'Baloo 2', cursive;
            text-align: center;
            font-size: 2.2em;
            font-weight: 900;
            color: #1a3a6b;
            text-transform: uppercase;
            text-shadow: 2px 2px 0px rgba(255,255,255,0.4);
            margin-bottom: 20px;
            margin-top: 10px;
            line-height: 1.25;
        }

        .chapter-tabs {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .tab-btn {
            background: rgba(255,255,255,0.4);
            border: 2px solid #1a3a6b;
            border-radius: 25px;
            padding: 8px 18px;
            font-family: 'Nunito', sans-serif;
            font-weight: 700;
            color: #1a3a6b;
            cursor: pointer;
            font-size: 0.9em;
            transition: all 0.2s;
        }

        .tab-btn.active, .tab-btn:hover {
            background: #1a3a6b;
            color: white;
        }

        .chapter-title {
            text-align: center;
            font-size: 1.2em;
            font-weight: 700;
            color: #1a3a6b;
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        .chapter-subtitle {
            text-align: center;
            color: #1a3a6b;
            font-size: 0.95em;
            margin-bottom: 22px;
            font-style: italic;
        }

        .main-content {
            display: flex;
            gap: 22px;
            align-items: flex-start;
        }

        .board-section {
            flex: 0 0 auto;
        }

        #board { width: 360px; }

        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            margin-top: 14px;
        }

        .ctrl-btn {
            background: #1a3a6b;
            color: white;
            border: none;
            border-radius: 50%;
            width: 46px;
            height: 46px;
            font-size: 1.1em;
            cursor: pointer;
            transition: background 0.2s;
        }

        .ctrl-btn:hover:not(:disabled) { background: #2a5aab; }
        .ctrl-btn:disabled { background: rgba(26,58,107,0.25); cursor: not-allowed; }

        .move-counter {
            background: rgba(255,255,255,0.6);
            border-radius: 20px;
            padding: 5px 14px;
            font-weight: 700;
            color: #1a3a6b;
            font-size: 0.9em;
            min-width: 80px;
            text-align: center;
        }

        .info-section { flex: 1; min-width: 0; }

        .moves-box {
            background: rgba(255,255,255,0.4);
            border-radius: 12px;
            padding: 12px 14px;
            margin-bottom: 12px;
        }

        .moves-box h3 {
            font-size: 0.8em;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #1a3a6b;
            margin-bottom: 10px;
        }

        .moves-list {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            align-items: center;
        }

        .move-number {
            color: rgba(26,58,107,0.5);
            font-size: 0.8em;
            padding: 0 2px;
        }

        .move-token {
            border: 1px solid rgba(26,58,107,0.3);
            border-radius: 6px;
            padding: 4px 9px;
            font-size: 0.92em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.15s;
        }

        .move-token.white-move { background: rgba(255,255,255,0.7); color: #1a3a6b; }
        .move-token.black-move { background: rgba(50,50,50,0.12); color: #333; }
        .move-token.active { background: #1a3a6b !important; color: white !important; border-color: #1a3a6b; }
        .move-token:hover:not(.active) { background: rgba(255,255,255,0.9); }

        .annotation-box {
            background: rgba(255,255,255,0.6);
            border-radius: 12px;
            padding: 16px;
            line-height: 1.65;
            color: #333;
            font-size: 1em;
            min-height: 100px;
            border-left: 4px solid #1a3a6b;
        }

        .annotation-box.checkmate {
            border-left-color: #c0392b;
            background: rgba(255,255,255,0.85);
        }

        .checkmate-badge {
            display: inline-block;
            background: #c0392b;
            color: white;
            padding: 3px 12px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 0.9em;
            margin-bottom: 10px;
        }

        .hint {
            text-align: center;
            color: rgba(26,58,107,0.5);
            font-size: 0.78em;
            margin-top: 10px;
        }

        .nav-buttons {
            display: flex;
            justify-content: space-between;
            gap: 20px;
            margin-top: 28px;
        }

        .nav-btn {
            display: inline-block;
            background: #1a3a6b;
            color: white;
            font-family: 'Baloo 2', cursive;
            font-size: 1.3em;
            padding: 13px 40px;
            border-radius: 50px;
            text-decoration: none;
            transition: all 0.2s;
            box-shadow: 0 5px 20px rgba(26,58,107,0.4);
        }
        .nav-btn:hover { background: #2a5aab; transform: translateY(-3px); }
        .nav-btn.back { background: rgba(26,58,107,0.5); }

        @media (max-width: 680px) {
            .page { padding: 40px 20px 50px; }
            .main-content { flex-direction: column; }
            #board { width: 300px; }
            .board-section { margin: 0 auto; }
            h1 { font-size: 1.8em; }
        }
    </style>
</head>
<body>

<div class="page">
    <img src="pieces/wN.svg" class="corner-piece corner-tl" alt="">
    <img src="pieces/wN.svg" class="corner-piece corner-tr" alt="">

    <div class="chapter-tabs">
        <button class="tab-btn active" onclick="loadChapter(0)">Dam&#259; + Turn 1</button>
        <button class="tab-btn"        onclick="loadChapter(1)">Dam&#259; + Turn 2</button>
        <button class="tab-btn"        onclick="loadChapter(2)">Dam&#259; + Turn 3</button>
    </div>

    <div class="chapter-title"    id="chapterTitle"></div>
    <div class="chapter-subtitle" id="chapterSubtitle"></div>

    <div class="main-content">
        <div class="board-section">
            <div id="board"></div>
            <div class="controls">
                <button class="ctrl-btn" id="btnFirst" onclick="goFirst()" title="Prima pozi&#539;ie">&#9198;</button>
                <button class="ctrl-btn" id="btnPrev"  onclick="goPrev()"  title="&#206;napoi">&#9664;</button>
                <div class="move-counter" id="moveCounter">Start</div>
                <button class="ctrl-btn" id="btnNext"  onclick="goNext()"  title="&#206;nainte">&#9654;</button>
                <button class="ctrl-btn" id="btnLast"  onclick="goLast()"  title="Ultima pozi&#539;ie">&#9197;</button>
            </div>
            <p class="hint">&#8592; &#8594; sau butoanele de mai sus</p>
        </div>

        <div class="info-section">
            <div class="moves-box">
                <h3>Mut&#259;ri</h3>
                <div class="moves-list" id="movesList"></div>
            </div>
            <div class="annotation-box" id="annotationBox"></div>
        </div>
    </div>

    <div class="nav-buttons">
        <a href="pagina10.html" class="nav-btn back">&#9664; &#206;napoi</a>
        <a href="pagina11.html" class="nav-btn">&#206;nainte &#9654;</a>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
<script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>

<script>
// Notatie romana
function toRo(san) {
    const map = { K:'R', Q:'D', R:'T', B:'N', N:'C' };
    return san.replace(/[KQRBN]/g, m => map[m]);
}

const chapters = [
    {
        title:    "Dam\u0103 + Turn \u2014 Exemplul 1",
        subtitle: "Mat \u00een 1 mutare",
        startFen: "7k/6R1/5K2/8/8/8/8/Q7 w - - 0 1",
        sanMoves: ["Qa8#"],
        annotations: [
            "Prive\u015fte tabla! Regele negru e prins \u00een col\u0163. Albul mut\u0103 \u015fi d\u0103 \u015fah mat \u00eentr-o singur\u0103 mutare. \u00cel g\u0103se\u015fti?",
            "Dama se mut\u0103 pe a8 \u015fi d\u0103 \u015fah mat! Regele negru nu are nicio sc\u0103pare \u2014 dama controleaz\u0103 toat\u0103 linia 8, turnul blocheaz\u0103 coloana g \u015fi linia 7, iar regele alb ajut\u0103 la g7."
        ]
    },
    {
        title:    "Dam\u0103 + Turn \u2014 Exemplul 2",
        subtitle: "Mat \u00een 2 mut\u0103ri",
        startFen: "8/8/7k/2Q5/4K3/1R6/8/8 w - - 0 1",
        sanMoves: ["Rg3", "Kh7", "Qh5#"],
        annotations: [
            "Regele negru e la marginea tablei. Albul are un plan \u00een 2 mut\u0103ri. \u00cel g\u0103se\u015fti?",
            "Turnul se mut\u0103 pe coloana g \u015fi \u00eei taie toate sc\u0103p\u0103rile regelui negru \u00een acea direc\u0163ie. Regele nu mai poate fugi dec\u00e2t pe h7!",
            "Regele negru fuge la h7 \u2014 singura mutare posibil\u0103. Acum albul d\u0103 lovitura final\u0103!",
            "Dama vine \u015fi d\u0103 lovitura final\u0103 pe coloana h. Turnul p\u0103ze\u015fte coloana g, dama controleaz\u0103 coloana h. Regele negru nu mai are nicio sc\u0103pare. \u015eah mat!"
        ]
    },
    {
        title:    "Dam\u0103 + Turn \u2014 Exemplul 3",
        subtitle: "Mat \u00een 7 mut\u0103ri \u2014 Regele \u00eempins din centru spre margine",
        startFen: "1R6/8/8/4k3/8/Q7/2K5/8 w - - 0 1",
        sanMoves: ["Qd3","Ke6","Re8+","Kf7","Qe4","Kf6","Qe6+","Kg7","Re7+","Kf8","Qd7","Kg8","Qe8#"],
        annotations: [
            "Regele negru se afl\u0103 \u00een centrul tablei. Albul trebuie s\u0103-l \u00eemping\u0103 spre margine \u015fi s\u0103-l fac\u0103 mat. Urm\u0103re\u015fte cum lucreaz\u0103 dama \u015fi turnul \u00eempreun\u0103!",
            "Dama se mut\u0103 strategic pe d3, t\u0103ind drumul regelui spre c\u00e2mpurile din st\u00e2nga. Regele este for\u0163at s\u0103 se retrag\u0103 spre e6.",
            "Regele negru se mut\u0103 pe e6 \u2014 \u00eencearc\u0103 s\u0103 r\u0103m\u00e2n\u0103 activ, dar spa\u0163iul lui se mic\u015foreaz\u0103!",
            "Turnul d\u0103 \u015fah de pe ultima linie! Regele nu poate r\u0103m\u00e2ne \u015fi fuge la f7 \u2014 dar acum atac\u0103 turnul!",
            "Regele negru fuge la f7 \u015fi atac\u0103 turnul de pe e8. Albul trebuie s\u0103-l apere!",
            "Dama se mut\u0103 pe e4 pentru a ap\u0103ra turnul de pe e8! Sunt pe aceea\u015fi coloan\u0103 e. Regele negru nu poate captura turnul \u015fi alege s\u0103 fug\u0103 spre f6 \u2014 dac\u0103 mergea pe g6 sau g7, albul ar fi c\u00e2\u015ftigat \u015fi mai u\u015for!",
            "Regele negru \u00eencearc\u0103 s\u0103 scape spre f6.",
            "\u015eah! Dama atac\u0103 direct regele, for\u0163\u00e2ndu-l spre col\u0163ul tablei \u2014 g7.",
            "Regele negru fuge la g7 \u2014 prins tot mai mult \u00een col\u0163!",
            "Acum turnul d\u0103 \u015fah! Regele este \u00eempins tot mai aproape de col\u0163 \u2014 la f8.",
            "Regele negru fuge la f8 \u2014 aproape de ultimul col\u0163!",
            "Dama ocup\u0103 d7 \u015fi controleaz\u0103 c\u00e2mpurile cheie. Regele nu are dec\u00e2t o singur\u0103 mutare \u2014 g8!",
            "Regele negru este for\u0163at la g8 \u2014 nu mai are nicio sc\u0103pare!",
            "\u015eah mat! Dama d\u0103 lovitura final\u0103 pe e8. Turnul blocheaz\u0103 linia 7, dama controleaz\u0103 ultima linie. Regele negru nu mai are nicio sc\u0103pare!"
        ]
    }
];

let board = null;
let currentChapter = null;
let positions = [];
let currentStep = 0;

function computePositions(chapter) {
    const chess = new Chess(chapter.startFen);
    const fens = [chess.fen()];
    for (const mv of chapter.sanMoves) {
        if (!chess.move(mv)) { console.error('Mutare invalida:', mv); break; }
        fens.push(chess.fen());
    }
    return fens;
}

function loadChapter(idx) {
    document.querySelectorAll('.tab-btn').forEach((b, i) => b.classList.toggle('active', i === idx));
    currentChapter = chapters[idx];
    positions = computePositions(currentChapter);
    currentStep = 0;

    document.getElementById('chapterTitle').textContent    = currentChapter.title;
    document.getElementById('chapterSubtitle').textContent = currentChapter.subtitle;

    if (board) board.destroy();
    board = Chessboard('board', {
        position: positions[0],
        pieceTheme: 'pieces/{piece}.svg'
    });

    buildMovesList();
    updateUI();
}

function buildMovesList() {
    const container = document.getElementById('movesList');
    container.innerHTML = '';
    currentChapter.sanMoves.forEach((mv, i) => {
        if (i % 2 === 0) {
            const num = document.createElement('span');
            num.className = 'move-number';
            num.textContent = (Math.floor(i / 2) + 1) + '.';
            container.appendChild(num);
        }
        const btn = document.createElement('button');
        btn.className = 'move-token ' + (i % 2 === 0 ? 'white-move' : 'black-move');
        btn.textContent = toRo(mv);
        btn.dataset.step = i + 1;
        btn.onclick = () => goToStep(i + 1);
        container.appendChild(btn);
    });
}

function goToStep(s) {
    currentStep = s;
    board.position(positions[s], false);
    updateUI();
}

function goFirst() { goToStep(0); }
function goLast()  { goToStep(positions.length - 1); }
function goPrev()  { if (currentStep > 0) goToStep(currentStep - 1); }
function goNext()  { if (currentStep < positions.length - 1) goToStep(currentStep + 1); }

function updateUI() {
    const total = positions.length - 1;

    document.getElementById('moveCounter').textContent =
        currentStep === 0 ? 'Start' : currentStep + ' / ' + total;

    document.getElementById('btnFirst').disabled = currentStep === 0;
    document.getElementById('btnPrev').disabled  = currentStep === 0;
    document.getElementById('btnNext').disabled  = currentStep === total;
    document.getElementById('btnLast').disabled  = currentStep === total;

    document.querySelectorAll('.move-token').forEach(b =>
        b.classList.toggle('active', parseInt(b.dataset.step) === currentStep));

    const box  = document.getElementById('annotationBox');
    const text = currentChapter.annotations[currentStep] || '';
    const isMat = currentStep === total;

    box.className = 'annotation-box' + (isMat ? ' checkmate' : '');
    box.innerHTML = isMat
        ? '<span class="checkmate-badge">\u2713 \u015eAH MAT!</span><br>' + text
        : text;
}

document.addEventListener('keydown', e => {
    if (e.key === 'ArrowRight') goNext();
    if (e.key === 'ArrowLeft')  goPrev();
    if (e.key === 'Home')       goFirst();
    if (e.key === 'End')        goLast();
});

loadChapter(0);
</script>
<style>
.hub-btn {
    position: fixed; top: 16px; right: 16px;
    background: #1a3a6b; color: white;
    font-family: "Baloo 2", cursive; font-size: .85em;
    padding: 8px 18px; border-radius: 50px;
    text-decoration: none; box-shadow: 0 3px 12px rgba(26,58,107,.4);
    z-index: 100; transition: background .2s;
}
.hub-btn:hover { background: #2a5aab; }
</style>
<a href="hub.html" class="hub-btn">&#9776; Cuprins</a>
</body>
</html>
