<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Șah Mat Animat</title>
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@700;900&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            width: 100%; height: 100%;
            overflow: hidden;
            background: #000;
        }

        /* ===== VIDEO BACKGROUND ===== */
        #bg-video {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            min-width: 100%;
            min-height: 100%;
            width: auto; height: auto;
            object-fit: cover;
            z-index: 0;
        }

        /* ===== DARK OVERLAY (readability) ===== */
        #overlay {
            position: fixed;
            inset: 0;
            background: radial-gradient(
                ellipse at center,
                rgba(0,0,0,0.25) 0%,
                rgba(0,0,0,0.60) 100%
            );
            z-index: 1;
        }

        /* ===== LOOP FADE (maschează restart-ul) ===== */
        #loop-fade {
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 2;
            pointer-events: none;
            opacity: 0;
            animation: loop-mask 8s linear infinite;
        }

        @keyframes loop-mask {
            0%   { opacity: 0; }
            82%  { opacity: 0; }
            91%  { opacity: 1; }
            100% { opacity: 0; }
        }

        /* ===== CONTENT ===== */
        #content {
            position: fixed;
            inset: 0;
            z-index: 3;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 30px 20px;
        }

        .chess-icon {
            font-size: 3.5em;
            margin-bottom: 10px;
            filter: drop-shadow(0 0 20px rgba(255,200,50,0.8));
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50%       { transform: translateY(-12px); }
        }

        h1 {
            font-family: 'Baloo 2', cursive;
            font-size: clamp(2.8em, 8vw, 6em);
            font-weight: 900;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 4px;
            line-height: 1.1;
            text-shadow:
                0 0 20px rgba(255,180,50,0.9),
                0 0 60px rgba(255,140,0,0.6),
                0 0 120px rgba(255,100,0,0.3),
                2px 3px 0px rgba(0,0,0,0.5);
            margin-bottom: 16px;
            animation: title-pulse 4s ease-in-out infinite;
        }

        @keyframes title-pulse {
            0%, 100% { text-shadow:
                0 0 20px rgba(255,180,50,0.9),
                0 0 60px rgba(255,140,0,0.6),
                0 0 120px rgba(255,100,0,0.3),
                2px 3px 0px rgba(0,0,0,0.5); }
            50% { text-shadow:
                0 0 30px rgba(255,200,80,1),
                0 0 80px rgba(255,160,20,0.8),
                0 0 160px rgba(255,120,0,0.5),
                2px 3px 0px rgba(0,0,0,0.5); }
        }

        .tagline {
            font-family: 'Nunito', sans-serif;
            font-size: clamp(1em, 2.5vw, 1.4em);
            font-weight: 700;
            color: rgba(255,230,180,0.92);
            letter-spacing: 2px;
            text-transform: uppercase;
            text-shadow: 0 0 20px rgba(0,0,0,0.8), 0 2px 4px rgba(0,0,0,0.6);
            margin-bottom: 50px;
        }

        .btn-enter {
            display: inline-block;
            padding: 18px 60px;
            background: linear-gradient(135deg, #e67e22, #f39c12);
            color: white;
            font-family: 'Baloo 2', cursive;
            font-size: clamp(1.1em, 3vw, 1.5em);
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-decoration: none;
            border-radius: 60px;
            box-shadow:
                0 0 30px rgba(230,126,34,0.7),
                0 0 60px rgba(230,126,34,0.3),
                0 6px 20px rgba(0,0,0,0.4);
            transition: all 0.3s ease;
            animation: btn-glow 2.5s ease-in-out infinite;
            border: 2px solid rgba(255,255,255,0.3);
        }

        @keyframes btn-glow {
            0%, 100% { box-shadow: 0 0 30px rgba(230,126,34,0.7), 0 0 60px rgba(230,126,34,0.3), 0 6px 20px rgba(0,0,0,0.4); }
            50%       { box-shadow: 0 0 45px rgba(255,160,50,0.9), 0 0 90px rgba(230,126,34,0.5), 0 6px 20px rgba(0,0,0,0.4); }
        }

        .btn-enter:hover {
            transform: translateY(-4px) scale(1.04);
            box-shadow:
                0 0 50px rgba(255,160,50,1),
                0 0 100px rgba(230,126,34,0.6),
                0 10px 30px rgba(0,0,0,0.5);
        }

        /* ===== PARTICLES (stele) ===== */
        .star {
            position: fixed;
            border-radius: 50%;
            background: white;
            z-index: 2;
            animation: twinkle var(--dur) ease-in-out infinite var(--delay);
            opacity: 0;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0; transform: scale(1); }
            50%       { opacity: var(--bright); transform: scale(1.4); }
        }

        /* ===== WATERMARK VIDEO ===== */
        /* ascunde watermark-ul Veo din colțul dreapta-jos */
        #wm-cover {
            position: fixed;
            bottom: 0; right: 0;
            width: 80px; height: 32px;
            background: #000;
            z-index: 4;
        }
    </style>
</head>
<body>

    <video id="bg-video" autoplay muted loop playsinline>
        <source src="Filme/Video_Generat_Piese_Galactice_Convergente.mp4" type="video/mp4">
    </video>

    <div id="overlay"></div>
    <div id="loop-fade"></div>
    <div id="wm-cover"></div>

    <div id="content">
        <div class="chess-icon">♟</div>
        <h1>Șah Mat Animat</h1>
        <div class="tagline">Aventura ta în lumea șahului începe aici</div>
        <a href="hub_epoci.html" class="btn-enter">Intră în Joc ▶</a>
    </div>

    <script>
const PAGE_ID = 'landing';

/* Generează stele decorative */
(function() {
    const count = 60;
    for (let i = 0; i < count; i++) {
        const s = document.createElement('div');
        s.className = 'star';
        const size = Math.random() * 3 + 1;
        s.style.cssText = `
            width: ${size}px;
            height: ${size}px;
            top: ${Math.random() * 100}%;
            left: ${Math.random() * 100}%;
            --dur: ${2 + Math.random() * 4}s;
            --delay: ${-Math.random() * 6}s;
            --bright: ${0.3 + Math.random() * 0.7};
        `;
        document.body.appendChild(s);
    }
})();
    </script>

</body>
</html>
