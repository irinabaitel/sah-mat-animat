<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Șah Mat Animat</title>
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@700;900&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            width: 100vw; height: 100vh;
            overflow: hidden;
            background: linear-gradient(180deg,
                #6EC6F0 0%, #A8DCF5 40%,
                #A8DCF5 58%, #8CC85A 70%, #6AAE38 100%);
        }

        /* ── nori ── */
        .cloud {
            position: absolute;
            background: rgba(255,255,255,0.82);
            border-radius: 60px;
            pointer-events: none;
        }
        .cloud::before, .cloud::after {
            content: ''; position: absolute;
            background: rgba(255,255,255,0.82);
            border-radius: 50%;
        }
        .cloud::before { width:55%; height:160%; top:-45%; left:12%; }
        .cloud::after  { width:38%; height:130%; top:-30%; right:12%; }
        @keyframes drift { from { left: -220px; } to { left: 110vw; } }

        /* ── piese ── */
        .pc {
            position: absolute;
            width: 72px; height: 84px;
            pointer-events: none;
            will-change: transform, left, top;
        }

        @keyframes wobble {
            0%,100% { transform: rotate(-8deg) scaleY(0.94); }
            50%      { transform: rotate( 8deg) scaleY(1.06); }
        }
        .pc.running { animation: wobble 0.28s ease-in-out infinite; }
        .pc.it-piece { animation: wobble 0.38s ease-in-out infinite; }

        @keyframes tag-pop {
            0%   { transform: scale(1);   opacity: .8; }
            100% { transform: scale(2.8); opacity: 0; }
        }
        .tag-ring {
            position: absolute;
            width: 72px; height: 72px;
            border-radius: 50%;
            border: 4px solid #ff4444;
            animation: tag-pop 0.55s ease-out forwards;
            pointer-events: none;
            z-index: 5;
        }

        /* ── titlu ── */
        .title-wrap {
            position: absolute;
            top: 28px; left: 50%;
            transform: translateX(-50%);
            text-align: center;
            z-index: 30;
            pointer-events: none;
        }
        .title-wrap h1 {
            font-family: 'Baloo 2', cursive;
            font-size: clamp(2em, 5vw, 3.8em);
            color: #1a3a6b;
            text-shadow: 3px 3px 0 rgba(255,255,255,0.65),
                         6px 6px 0 rgba(26,58,107,0.12);
            white-space: nowrap;
            line-height: 1.1;
        }
        .title-wrap .sub {
            font-family: 'Nunito', sans-serif;
            font-size: 1.05em;
            color: #1a3a6b;
            opacity: .75;
            font-style: italic;
        }

        /* ── buton ── */
        .author {
            position: absolute;
            bottom: 108px; left: 50%;
            transform: translateX(-50%);
            z-index: 30;
            color: #1a3a6b;
            font-family: 'Nunito', sans-serif;
            font-weight: 700;
            font-size: .9em;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-shadow: 1px 1px 0 rgba(255,255,255,.6);
            white-space: nowrap;
        }
        .btn-start {
            position: absolute;
            bottom: 40px; left: 50%;
            transform: translateX(-50%);
            z-index: 30;
            background: #1a3a6b;
            color: white;
            font-family: 'Baloo 2', cursive;
            font-size: 1.55em;
            padding: 13px 52px;
            border-radius: 50px;
            text-decoration: none;
            box-shadow: 0 6px 24px rgba(26,58,107,.45);
            transition: all .2s;
            letter-spacing: 1px;
            white-space: nowrap;
        }
        .btn-start:hover {
            background: #2a5aab;
            transform: translateX(-50%) translateY(-4px);
            box-shadow: 0 10px 30px rgba(26,58,107,.5);
        }
    </style>
</head>
<body>

<!-- Nori -->
<div class="cloud" style="width:150px;height:48px;top:7%;animation:drift 32s linear -6s infinite;"></div>
<div class="cloud" style="width:95px; height:32px;top:16%;animation:drift 44s linear -22s infinite;"></div>
<div class="cloud" style="width:190px;height:58px;top:4%;animation:drift 38s linear -14s infinite;"></div>
<div class="cloud" style="width:110px;height:36px;top:22%;animation:drift 50s linear -35s infinite;"></div>

<!-- Titlu -->
<div class="title-wrap">
    <h1>&#9822; &#350;ah Mat Animat</h1>
    <div class="sub">&#206;nva&#539;&#259; &#351;ahul juc&#226;ndu-te!</div>
</div>

<!-- Autor + Buton -->
<div class="author">Irina-Mihaela B&#259;&#539;el</div>
<a href="hub.html" class="btn-start">&#9654; &#206;ncepe!</a>

<script>
/* ───────────────────────────────────────────────
   Piesele ─ date vizuale
─────────────────────────────────────────────── */
const PIECE_DEF = [
    { hat:'♔', name:'Regele',  fill:'#F4C430', stroke:'#B8860B' },
    { hat:'♛', name:'Regina',  fill:'#A56ABD', stroke:'#6C3483' },
    { hat:'♜', name:'Turnul',  fill:'#4A9FD4', stroke:'#1A5276' },
    { hat:'♝', name:'Nebunul', fill:'#4ABD7A', stroke:'#1E8449' },
    { hat:'♞', name:'Calul',   fill:'#E8734A', stroke:'#A93226' },
];

const W = () => window.innerWidth;
const H = () => window.innerHeight;
const SIZE = 72;
const TITLE_SAFE = 140;   // nu intră sub titlu
const BOTTOM_SAFE = 160;  // nu intră pe buton

/* ── generează SVG personaj ── */
function makeSvg(pd, isIt) {
    const f = pd.fill, s = pd.stroke;
    return `<svg viewBox="0 0 72 86" xmlns="http://www.w3.org/2000/svg">
        <!-- umbra -->
        <ellipse cx="36" cy="82" rx="17" ry="5" fill="rgba(0,0,0,0.13)"/>
        <!-- cerc IT -->
        ${isIt ? `<circle cx="36" cy="44" r="35" fill="rgba(255,60,60,0.10)"
            stroke="rgba(255,60,60,0.65)" stroke-width="2.5" stroke-dasharray="5,3"/>` : ''}
        <!-- mâna stânga -->
        <ellipse cx="9"  cy="54" rx="10" ry="6" fill="${f}" stroke="${s}" stroke-width="1.5"
            transform="rotate(-35,9,54)"/>
        <!-- mâna dreapta -->
        <ellipse cx="63" cy="54" rx="10" ry="6" fill="${f}" stroke="${s}" stroke-width="1.5"
            transform="rotate(35,63,54)"/>
        <!-- corp -->
        <ellipse cx="36" cy="59" rx="19" ry="15" fill="${f}" stroke="${s}" stroke-width="1.5"/>
        <!-- gât -->
        <rect x="29" y="41" width="14" height="9" rx="5" fill="${f}" stroke="${s}" stroke-width="1"/>
        <!-- cap -->
        <circle cx="36" cy="31" r="21" fill="${f}" stroke="${s}" stroke-width="1.8"/>
        <!-- ochi fericiți (arcuri) -->
        <path d="M 24 28 Q 27.5 23 31 28" stroke="${s}" stroke-width="2.8"
            fill="none" stroke-linecap="round"/>
        <path d="M 41 28 Q 44.5 23 48 28" stroke="${s}" stroke-width="2.8"
            fill="none" stroke-linecap="round"/>
        <!-- obrăjori -->
        <circle cx="21" cy="34" r="5" fill="rgba(255,160,160,0.45)"/>
        <circle cx="51" cy="34" r="5" fill="rgba(255,160,160,0.45)"/>
        <!-- zâmbet -->
        <path d="M 24 37 Q 36 47 48 37" stroke="${s}" stroke-width="2.2"
            fill="none" stroke-linecap="round"/>
        <!-- piesă (pălărie) -->
        <text x="36" y="13" text-anchor="middle"
            font-size="16" font-family="serif" fill="${s}">${pd.hat}</text>
        <!-- badge IT! -->
        ${isIt ? `<text x="55" y="10" font-size="12" font-weight="900"
            font-family="'Nunito',sans-serif"
            stroke="white" stroke-width="3" paint-order="stroke"
            fill="#cc0000">IT!</text>` : ''}
    </svg>`;
}

/* ── stare joc ── */
let pieces = [];
let itIdx  = 0;
let cooldown = 0;      // frames cât nu poate eticheta
let lastTagged = -1;   // piesa tocmai etichetată (imunitate)

function init() {
    const cx = W() / 2, cy = (H() - TITLE_SAFE - BOTTOM_SAFE) / 2 + TITLE_SAFE;
    PIECE_DEF.forEach((pd, i) => {
        const angle = (i / PIECE_DEF.length) * Math.PI * 2;
        const r = Math.min(W(), H()) * 0.28;
        const el = document.createElement('div');
        el.className = 'pc running';
        el.id = 'pc' + i;
        document.body.appendChild(el);
        const speed = 1.6 + Math.random() * 0.6;
        const va = angle + Math.PI; // pornesc cu viteza înspre interior
        pieces.push({
            el, pd,
            x: cx + Math.cos(angle) * r - SIZE/2,
            y: cy + Math.sin(angle) * r - SIZE/2,
            vx: Math.cos(va) * speed,
            vy: Math.sin(va) * speed,
        });
    });
    itIdx = 0;
    refresh();
    loop();
}

function refresh() {
    pieces.forEach((p, i) => {
        p.el.innerHTML = makeSvg(p.pd, i === itIdx);
        p.el.className = 'pc ' + (i === itIdx ? 'it-piece' : 'running');
    });
}

function dist(a, b) {
    return Math.hypot(a.x - b.x, a.y - b.y);
}

function loop() {
    const w = W(), h = H();
    const maxX = w - SIZE - 10;
    const minY = TITLE_SAFE + 10;
    const maxY = h - BOTTOM_SAFE - SIZE;

    if (cooldown > 0) cooldown--;

    const IT = pieces[itIdx];
    const IT_SPD = 2.0, FLEE_SPD = 2.8;

    /* IT aleargă spre cea mai apropiată piesă */
    let nearest = null, nearestD = Infinity;
    pieces.forEach((p, i) => {
        if (i === itIdx) return;
        const d = dist(IT, p);
        if (d < nearestD) { nearestD = d; nearest = p; }
    });
    if (nearest) {
        const dx = nearest.x - IT.x, dy = nearest.y - IT.y;
        const d = Math.hypot(dx, dy) || 1;
        IT.vx = IT.vx * 0.88 + dx / d * IT_SPD * 0.12;
        IT.vy = IT.vy * 0.88 + dy / d * IT_SPD * 0.12;
        const spd = Math.hypot(IT.vx, IT.vy);
        if (spd > IT_SPD) { IT.vx = IT.vx/spd*IT_SPD; IT.vy = IT.vy/spd*IT_SPD; }
    }

    /* celelalte piese fug */
    pieces.forEach((p, i) => {
        if (i === itIdx) return;
        const dx = p.x - IT.x, dy = p.y - IT.y;
        const d = Math.hypot(dx, dy) || 1;
        const urgency = Math.max(0, (220 - d) / 220);
        p.vx = p.vx * 0.9 + (dx/d * urgency * FLEE_SPD + (Math.random()-.5) * .12) * 0.10;
        p.vy = p.vy * 0.9 + (dy/d * urgency * FLEE_SPD + (Math.random()-.5) * .12) * 0.10;
        const spd = Math.hypot(p.vx, p.vy);
        if (spd > FLEE_SPD) { p.vx = p.vx/spd*FLEE_SPD; p.vy = p.vy/spd*FLEE_SPD; }
    });

    /* mișcă toate piesele + respinge de margini */
    pieces.forEach(p => {
        p.x += p.vx; p.y += p.vy;
        if (p.x < 10)    { p.x = 10;    p.vx =  Math.abs(p.vx) + .5; }
        if (p.x > maxX)  { p.x = maxX;  p.vx = -Math.abs(p.vx) - .5; }
        if (p.y < minY)  { p.y = minY;  p.vy =  Math.abs(p.vy) + .5; }
        if (p.y > maxY)  { p.y = maxY;  p.vy = -Math.abs(p.vy) - .5; }
        p.el.style.left = p.x + 'px';
        p.el.style.top  = p.y + 'px';
    });

    /* verifică etichetare */
    if (cooldown === 0) {
        pieces.forEach((p, i) => {
            if (i === itIdx || i === lastTagged) return;
            if (dist(IT, p) < SIZE * 0.75) {
                /* efect vizual */
                const ring = document.createElement('div');
                ring.className = 'tag-ring';
                ring.style.left = p.x + 'px';
                ring.style.top  = p.y + 'px';
                document.body.appendChild(ring);
                setTimeout(() => ring.remove(), 600);
                /* schimb IT */
                lastTagged = itIdx;
                itIdx = i;
                cooldown = 90;
                refresh();
            }
        });
    }

    requestAnimationFrame(loop);
}

init();
</script>
</body>
</html>
