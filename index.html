<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>&#350;ah Mat Animat</title>
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@700;900&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * { box-sizing:border-box; margin:0; padding:0; }
        body {
            width:100vw; height:100vh; overflow:hidden;
            background: linear-gradient(180deg,
                #5BAEE0 0%, #87CEEB 25%, #C8E8FF 50%,
                #FFE8A8 72%, #FFBE60 88%, #FF9640 100%);
        }
        #sun {
            position:absolute; top:6%; left:12%; width:80px; height:80px; border-radius:50%;
            background: radial-gradient(circle at 40% 38%, #FFFCE0, #FFE040 55%, #FFAA00);
            box-shadow: 0 0 30px #FFE050, 0 0 70px rgba(255,220,40,.45);
            z-index:2; pointer-events:none;
            animation: sunPulse 3s ease-in-out infinite;
        }
        @keyframes sunPulse {
            0%,100%{ box-shadow:0 0 30px #FFE050,0 0 70px rgba(255,220,40,.45) }
            50%    { box-shadow:0 0 40px #FFEE70,0 0 90px rgba(255,220,40,.60) }
        }
        #ground {
            position:absolute; bottom:0; left:0; width:100%; height:130px; z-index:3;
            background: linear-gradient(180deg, #7DD84A 0%, #5AAA28 60%, #3A7A10 100%);
            border-top: 4px solid #A0E060;
        }
        #ground::before {
            content:''; position:absolute; top:0; left:0; width:100%; height:100%;
            background-image:
                radial-gradient(ellipse 28px 18px at 8% 30%, #5BBB25 0%, transparent 60%),
                radial-gradient(ellipse 22px 14px at 18% 55%, #4CAA18 0%, transparent 60%),
                radial-gradient(ellipse 30px 20px at 30% 25%, #68CC30 0%, transparent 60%),
                radial-gradient(ellipse 20px 13px at 45% 60%, #5BBB25 0%, transparent 60%),
                radial-gradient(ellipse 26px 17px at 60% 30%, #4CAA18 0%, transparent 60%),
                radial-gradient(ellipse 24px 16px at 72% 50%, #68CC30 0%, transparent 60%),
                radial-gradient(ellipse 28px 18px at 85% 28%, #5BBB25 0%, transparent 60%),
                radial-gradient(ellipse 20px 13px at 94% 55%, #4CAA18 0%, transparent 60%);
        }
        .pc {
            position:absolute; pointer-events:none;
            will-change:left,top; z-index:15;
        }
        @keyframes bob {
            0%,100%{ transform:rotate(-2deg) scaleY(.98) }
            50%    { transform:rotate(2deg)  scaleY(1.02) }
        }
        .pc svg { animation: bob .38s ease-in-out infinite; display:block; }
        @keyframes tag-pop { 0%{transform:scale(1);opacity:1} 100%{transform:scale(3.5);opacity:0} }
        .tag-ring {
            position:absolute; border-radius:50%; border:4px solid #FF1818;
            animation:tag-pop .5s ease-out forwards; pointer-events:none; z-index:16;
        }
        #terrace-wrap {
            position:absolute; right:0; bottom:88px;
            width:330px; height:400px; z-index:20; pointer-events:none;
        }
        .title-wrap {
            position:absolute; top:16px; left:50%; transform:translateX(-50%);
            text-align:center; z-index:40; pointer-events:none;
        }
        .title-wrap h1 {
            font-family:'Baloo 2',cursive; font-size:clamp(1.8em,4.5vw,3.2em);
            color:#FF6B00;
            text-shadow: 2px 2px 0 #FFEE44, 4px 4px 0 rgba(0,0,0,.15);
            white-space:nowrap;
        }
        .title-wrap .sub {
            font-family:'Nunito',sans-serif; font-size:.9em; color:#CC5500;
            font-weight:700; text-shadow:1px 1px 0 rgba(255,255,255,.6);
        }
        .author {
            position:absolute; bottom:108px; left:50%; transform:translateX(-50%);
            z-index:40; color:#884400; font-family:'Nunito',sans-serif; font-weight:700;
            font-size:.88em; letter-spacing:2px; text-transform:uppercase;
            text-shadow:1px 1px 0 rgba(255,255,255,.5); white-space:nowrap;
        }
        .btn-start {
            position:absolute; bottom:38px; left:50%; transform:translateX(-50%);
            z-index:40; background:#FF8C20; color:white; font-family:'Baloo 2',cursive;
            font-size:1.5em; padding:12px 48px; border-radius:50px; text-decoration:none;
            border:3px solid #CC5500; box-shadow:4px 4px 0 #CC5500;
            transition:all .15s; white-space:nowrap;
        }
        .btn-start:hover { transform:translateX(-50%) translateY(-3px); }
    </style>
</head>

/* ════════════════════════════
   GAME LOOP
════════════════════════════ */
let pieces = [], itIdx = 0, cooldown = 0, lastTagged = -1;

function makeSvg(pd, isIt, idx) {
    const ph = idx % 2 === 0;
    if (pd.type === 'pion')   return makePion(pd, isIt, ph);
    if (pd.type === 'knight') return makeKnight(pd, isIt);
    if (pd.type === 'bishop') return makeBishop(pd, isIt);
    if (pd.type === 'rook')   return makeRook(pd, isIt);
}
function refresh() {
    pieces.forEach((p, i) => { p.el.innerHTML = makeSvg(p.pd, i === itIdx, i); });
}
function dist(a, b) { return Math.hypot(a.x - b.x, a.y - b.y); }

function init() {
    const pw  = window.innerWidth - RIGHT_SAFE;
    const ph2 = window.innerHeight - TITLE_SAFE - BOT_SAFE;
    PIECES.forEach((pd, i) => {
        const el = document.createElement('div');
        el.className = 'pc';
        el.style.cssText = `width:${SW}px;height:${SH}px;`;
        document.body.appendChild(el);
        const ang = (i / PIECES.length) * Math.PI * 2;
        const r   = Math.min(pw, ph2) * 0.28;
        pieces.push({
            el, pd,
            x: pw / 2 + Math.cos(ang) * r - SW / 2,
            y: TITLE_SAFE + ph2 / 2 + Math.sin(ang) * r - SH / 2,
            vx: Math.cos(ang + Math.PI) * 1.8,
            vy: Math.sin(ang + Math.PI) * 1.8,
        });
    });
    refresh();
    requestAnimationFrame(loop);
}

function loop() {
    const w = window.innerWidth, h = window.innerHeight;
    const maxX = w - RIGHT_SAFE - SW - 4;
    const minY = TITLE_SAFE + 4, maxY = h - BOT_SAFE - SH;
    const IT_SPD = 2.0, FL_SPD = 2.8;
    if (cooldown > 0) cooldown--;

    const IT = pieces[itIdx];
    let near = null, nearD = Infinity;
    pieces.forEach((p, i) => {
        if (i !== itIdx) { const d = dist(IT, p); if (d < nearD) { nearD = d; near = p; } }
    });
    if (near) {
        const dx = near.x - IT.x, dy = near.y - IT.y, d = Math.hypot(dx, dy) || 1;
        IT.vx = IT.vx * .88 + dx / d * IT_SPD * .12;
        IT.vy = IT.vy * .88 + dy / d * IT_SPD * .12;
        const sp = Math.hypot(IT.vx, IT.vy);
        if (sp > IT_SPD) { IT.vx = IT.vx / sp * IT_SPD; IT.vy = IT.vy / sp * IT_SPD; }
    }
    pieces.forEach((p, i) => {
        if (i === itIdx) return;
        const dx = p.x - IT.x, dy = p.y - IT.y, d = Math.hypot(dx, dy) || 1;
        const u = Math.max(0, (230 - d) / 230);
        p.vx = p.vx * .9 + (dx / d * u * FL_SPD + (Math.random() - .5) * .1) * .10;
        p.vy = p.vy * .9 + (dy / d * u * FL_SPD + (Math.random() - .5) * .1) * .10;
        const sp = Math.hypot(p.vx, p.vy);
        if (sp > FL_SPD) { p.vx = p.vx / sp * FL_SPD; p.vy = p.vy / sp * FL_SPD; }
    });
    pieces.forEach(p => {
        p.x += p.vx; p.y += p.vy;
        if (p.x < MARGIN) { p.x = MARGIN; p.vx =  Math.abs(p.vx) + .5; }
        if (p.x > maxX)   { p.x = maxX;   p.vx = -Math.abs(p.vx) - .5; }
        if (p.y < minY)   { p.y = minY;   p.vy =  Math.abs(p.vy) + .5; }
        if (p.y > maxY)   { p.y = maxY;   p.vy = -Math.abs(p.vy) - .5; }
        p.el.style.left = p.x + 'px';
        p.el.style.top  = p.y + 'px';
    });
    if (cooldown === 0) {
        pieces.forEach((p, i) => {
            if (i === itIdx || i === lastTagged) return;
            if (dist(IT, p) < SW * .85) {
                const r = document.createElement('div');
                r.className = 'tag-ring';
                r.style.cssText = `left:${p.x}px;top:${p.y}px;width:${SW}px;height:${SW}px;`;
                document.body.appendChild(r);
                setTimeout(() => r.remove(), 550);
                lastTagged = itIdx; itIdx = i; cooldown = 90; refresh();
            }
        });
    }
    requestAnimationFrame(loop);
}

init();
</script>
