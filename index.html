<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Șah Mat Animat — Irina-Mihaela Băițel</title>
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: #F4A47A;
            font-family: 'Segoe UI', Arial, sans-serif;
            padding: 24px 16px;
            min-height: 100vh;
        }

        h1 {
            text-align: center;
            font-size: 2.4em;
            font-weight: 900;
            color: #1a3a6b;
            text-transform: uppercase;
            letter-spacing: 3px;
            text-shadow: 2px 2px 0 rgba(0,0,0,0.1);
            margin-bottom: 4px;
        }

        .author {
            text-align: center;
            color: #1a3a6b;
            font-size: 0.95em;
            margin-bottom: 22px;
            font-style: italic;
        }

        .chapter-tabs {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .tab-btn {
            background: rgba(255,255,255,0.4);
            border: 2px solid #1a3a6b;
            border-radius: 25px;
            padding: 8px 18px;
            font-weight: 700;
            color: #1a3a6b;
            cursor: pointer;
            font-size: 0.9em;
            transition: all 0.2s;
        }

        .tab-btn.active, .tab-btn:hover {
            background: #1a3a6b;
            color: white;
        }

        .chapter-title {
            text-align: center;
            font-size: 1.35em;
            font-weight: 700;
            color: #1a3a6b;
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        .chapter-subtitle {
            text-align: center;
            color: #1a3a6b;
            font-size: 0.95em;
            margin-bottom: 22px;
            font-style: italic;
        }

        .main-content {
            display: flex;
            gap: 22px;
            max-width: 820px;
            margin: 0 auto;
            align-items: flex-start;
        }

        .board-section {
            flex: 0 0 auto;
        }

        #board { width: 360px; }

        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            margin-top: 14px;
        }

        .ctrl-btn {
            background: #1a3a6b;
            color: white;
            border: none;
            border-radius: 50%;
            width: 46px;
            height: 46px;
            font-size: 1.1em;
            cursor: pointer;
            transition: background 0.2s;
        }

        .ctrl-btn:hover:not(:disabled) { background: #2a5aab; }
        .ctrl-btn:disabled { background: rgba(26,58,107,0.25); cursor: not-allowed; }

        .move-counter {
            background: rgba(255,255,255,0.6);
            border-radius: 20px;
            padding: 5px 14px;
            font-weight: 700;
            color: #1a3a6b;
            font-size: 0.9em;
            min-width: 80px;
            text-align: center;
        }

        .info-section { flex: 1; min-width: 0; }

        .moves-box {
            background: rgba(255,255,255,0.4);
            border-radius: 12px;
            padding: 12px 14px;
            margin-bottom: 12px;
        }

        .moves-box h3 {
            font-size: 0.8em;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #1a3a6b;
            margin-bottom: 10px;
        }

        .moves-list {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            align-items: center;
        }

        .move-number {
            color: rgba(26,58,107,0.5);
            font-size: 0.8em;
            padding: 0 2px;
        }

        .move-token {
            border: 1px solid rgba(26,58,107,0.3);
            border-radius: 6px;
            padding: 4px 9px;
            font-size: 0.92em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.15s;
        }

        .move-token.white-move { background: rgba(255,255,255,0.7); color: #1a3a6b; }
        .move-token.black-move { background: rgba(50,50,50,0.12); color: #333; }
        .move-token.active { background: #1a3a6b !important; color: white !important; border-color: #1a3a6b; }
        .move-token:hover:not(.active) { background: rgba(255,255,255,0.9); }

        .annotation-box {
            background: rgba(255,255,255,0.6);
            border-radius: 12px;
            padding: 16px;
            line-height: 1.65;
            color: #333;
            font-size: 1em;
            min-height: 100px;
            border-left: 4px solid #1a3a6b;
        }

        .annotation-box.checkmate {
            border-left-color: #c0392b;
            background: rgba(255,255,255,0.85);
        }

        .checkmate-badge {
            display: inline-block;
            background: #c0392b;
            color: white;
            padding: 3px 12px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 0.9em;
            margin-bottom: 10px;
        }

        .hint {
            text-align: center;
            color: rgba(26,58,107,0.5);
            font-size: 0.78em;
            margin-top: 10px;
        }

        @media (max-width: 680px) {
            .main-content { flex-direction: column; }
            #board { width: 300px; }
            .board-section { margin: 0 auto; }
            h1 { font-size: 1.8em; }
        }
    </style>
</head>
<body>

<h1>Șah Mat Animat</h1>
<p class="author">Irina-Mihaela Băițel</p>

<div class="chapter-tabs">
    <button class="tab-btn active" onclick="loadChapter(0)">Damă + Turn 1</button>
    <button class="tab-btn"        onclick="loadChapter(1)">Damă + Turn 2</button>
    <button class="tab-btn"        onclick="loadChapter(2)">Damă + Turn 3</button>
</div>

<div class="chapter-title"    id="chapterTitle"></div>
<div class="chapter-subtitle" id="chapterSubtitle"></div>

<div class="main-content">
    <div class="board-section">
        <div id="board"></div>
        <div class="controls">
            <button class="ctrl-btn" id="btnFirst" onclick="goFirst()" title="Prima poziție">⏮</button>
            <button class="ctrl-btn" id="btnPrev"  onclick="goPrev()"  title="Înapoi">◀</button>
            <div class="move-counter" id="moveCounter">Start</div>
            <button class="ctrl-btn" id="btnNext"  onclick="goNext()"  title="Înainte">▶</button>
            <button class="ctrl-btn" id="btnLast"  onclick="goLast()"  title="Ultima poziție">⏭</button>
        </div>
        <p class="hint">← → sau butoanele de mai sus</p>
    </div>

    <div class="info-section">
        <div class="moves-box">
            <h3>Mutări</h3>
            <div class="moves-list" id="movesList"></div>
        </div>
        <div class="annotation-box" id="annotationBox"></div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
<script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>

<script>
// Notatie romana
function toRo(san) {
    const map = { K:'R', Q:'D', R:'T', B:'N', N:'C' };
    return san.replace(/[KQRBN]/g, m => map[m]);
}

const chapters = [
    {
        title:    "Damă + Turn — Exemplul 1",
        subtitle: "Mat în 1 mutare",
        startFen: "7k/6R1/5K2/8/8/8/8/Q7 w - - 0 1",
        sanMoves: ["Qa8#"],
        annotations: [
            "Privește tabla! Regele negru e prins în colț. Albul mută și dă șah mat într-o singură mutare. Îl găsești?",
            "Dama se mută pe a8 și dă șah mat! Regele negru nu are nicio scăpare — dama controlează toată linia 8, turnul blochează coloana g și linia 7, iar regele alb ajută la g7."
        ]
    },
    {
        title:    "Damă + Turn — Exemplul 2",
        subtitle: "Mat în 2 mutări",
        startFen: "8/8/7k/2Q5/4K3/1R6/8/8 w - - 0 1",
        sanMoves: ["Rg3", "Kh7", "Qh5#"],
        annotations: [
            "Regele negru e la marginea tablei. Albul are un plan în 2 mutări. Îl găsești?",
            "Turnul se mută pe coloana g și îi taie toate scăpările regelui negru în acea direcție. Regele nu mai poate fugi decât pe h7!",
            "Regele negru fuge la h7 — singura mutare posibilă. Acum albul dă lovitura finală!",
            "Dama vine și dă lovitura finală pe coloana h. Turnul păzește coloana g, dama controlează coloana h. Regele negru nu mai are nicio scăpare. Șah mat!"
        ]
    },
    {
        title:    "Damă + Turn — Exemplul 3",
        subtitle: "Mat în 7 mutări — Regele împins din centru spre margine",
        startFen: "1R6/8/8/4k3/8/Q7/2K5/8 w - - 0 1",
        sanMoves: ["Qd3","Ke6","Re8+","Kf7","Qe4","Kf6","Qe6+","Kg7","Re7+","Kf8","Qd7","Kg8","Qe8#"],
        annotations: [
            "Regele negru se află în centrul tablei. Albul trebuie să-l împingă spre margine și să-l facă mat. Urmărește cum lucrează dama și turnul împreună!",
            "Dama se mută strategic pe d3, tăind drumul regelui spre câmpurile din stânga. Regele este forțat să se retragă spre e6.",
            "Regele negru se mută pe e6 — încearcă să rămână activ, dar spațiul lui se micșorează!",
            "Turnul dă șah de pe ultima linie! Regele nu poate rămâne și fuge la f7 — dar acum atacă turnul!",
            "Regele negru fuge la f7 și atacă turnul de pe e8. Albul trebuie să-l apere!",
            "Dama se mută pe e4 pentru a apăra turnul de pe e8! Sunt pe aceeași coloană e. Regele negru nu poate captura turnul și alege să fugă spre f6 — dacă mergea pe g6 sau g7, albul ar fi câștigat și mai ușor!",
            "Regele negru încearcă să scape spre f6.",
            "Șah! Dama atacă direct regele, forțându-l spre colțul tablei — g7.",
            "Regele negru fuge la g7 — prins tot mai mult în colț!",
            "Acum turnul dă șah! Regele este împins tot mai aproape de colț — la f8.",
            "Regele negru fuge la f8 — aproape de ultimul colț!",
            "Dama ocupă d7 și controlează câmpurile cheie. Regele nu are decât o singură mutare — g8!",
            "Regele negru este forțat la g8 — nu mai are nicio scăpare!",
            "Șah mat! Dama dă lovitura finală pe e8. Turnul blochează linia 7, dama controlează ultima linie. Regele negru nu mai are nicio scăpare!"
        ]
    }
];

let board = null;
let currentChapter = null;
let positions = [];
let currentStep = 0;

function computePositions(chapter) {
    const chess = new Chess(chapter.startFen);
    const fens = [chess.fen()];
    for (const mv of chapter.sanMoves) {
        if (!chess.move(mv)) { console.error('Mutare invalida:', mv); break; }
        fens.push(chess.fen());
    }
    return fens;
}

function loadChapter(idx) {
    document.querySelectorAll('.tab-btn').forEach((b, i) => b.classList.toggle('active', i === idx));
    currentChapter = chapters[idx];
    positions = computePositions(currentChapter);
    currentStep = 0;

    document.getElementById('chapterTitle').textContent    = currentChapter.title;
    document.getElementById('chapterSubtitle').textContent = currentChapter.subtitle;

    if (board) board.destroy();
    board = Chessboard('board', {
        position: positions[0],
        pieceTheme: 'pieces/{piece}.svg'
    });

    buildMovesList();
    updateUI();
}

function buildMovesList() {
    const container = document.getElementById('movesList');
    container.innerHTML = '';
    currentChapter.sanMoves.forEach((mv, i) => {
        if (i % 2 === 0) {
            const num = document.createElement('span');
            num.className = 'move-number';
            num.textContent = (Math.floor(i / 2) + 1) + '.';
            container.appendChild(num);
        }
        const btn = document.createElement('button');
        btn.className = 'move-token ' + (i % 2 === 0 ? 'white-move' : 'black-move');
        btn.textContent = toRo(mv);
        btn.dataset.step = i + 1;
        btn.onclick = () => goToStep(i + 1);
        container.appendChild(btn);
    });
}

function goToStep(s) {
    currentStep = s;
    board.position(positions[s], false);
    updateUI();
}

function goFirst() { goToStep(0); }
function goLast()  { goToStep(positions.length - 1); }
function goPrev()  { if (currentStep > 0) goToStep(currentStep - 1); }
function goNext()  { if (currentStep < positions.length - 1) goToStep(currentStep + 1); }

function updateUI() {
    const total = positions.length - 1;

    document.getElementById('moveCounter').textContent =
        currentStep === 0 ? 'Start' : currentStep + ' / ' + total;

    document.getElementById('btnFirst').disabled = currentStep === 0;
    document.getElementById('btnPrev').disabled  = currentStep === 0;
    document.getElementById('btnNext').disabled  = currentStep === total;
    document.getElementById('btnLast').disabled  = currentStep === total;

    document.querySelectorAll('.move-token').forEach(b =>
        b.classList.toggle('active', parseInt(b.dataset.step) === currentStep));

    const box  = document.getElementById('annotationBox');
    const text = currentChapter.annotations[currentStep] || '';
    const isMat = currentStep === total;

    box.className = 'annotation-box' + (isMat ? ' checkmate' : '');
    box.innerHTML = isMat
        ? '<span class="checkmate-badge">✓ ȘAH MAT!</span><br>' + text
        : text;
}

document.addEventListener('keydown', e => {
    if (e.key === 'ArrowRight') goNext();
    if (e.key === 'ArrowLeft')  goPrev();
    if (e.key === 'Home')       goFirst();
    if (e.key === 'End')        goLast();
});

loadChapter(0);
</script>
</body>
</html>
