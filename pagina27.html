<script>
const PAGE_ID = 'em_msf_dama_prov';
const levels = [
    {
        fen:         '8/8/8/8/4k3/8/8/3QK3 w - - 0 1',
        blackKing:   'e4',
        prevArea:    64,
        prompt:      'Acum e r&#226;ndul t&#259;u! Regele negru vrea s&#259; fug&#259; din centru. Mut&#259; <strong>Regina</strong> astfel &#238;nc&#226;t s&#259; creezi prima cu&#351;c&#259; invizibil&#259;! Trage-o deasupra &#351;i &#238;n st&#226;nga lui.',
        hint:        'Mut&#259; Regina la o s&#259;ritur&#259; de cal fa&#539;&#259; de Regele negru — deasupra &#351;i &#238;n st&#226;nga lui, f&#259;r&#259; s&#259; dai &#351;ah!'
    },
    {
        fen:         '8/8/3Q4/5k2/8/8/8/4K3 w - - 0 1',
        blackKing:   'f5',
        prevArea:    20,
        prompt:      'Cu&#351;ca are <span class="cage-counter">20 p&#259;trate</span>. Regele a fugit la f5. Po&#539;i s&#259; o mai str&#226;ngi? Mut&#259; Regina astfel &#238;nc&#226;t zona portocalie s&#259; devin&#259; mai mic&#259;!',
        hint:        'Regina trebuie s&#259; se mute mai aproape de Rege, tot deasupra &#351;i &#238;n st&#226;nga, f&#259;r&#259; s&#259; dea &#351;ah. &#206;ncearc&#259; e7!'
    },
    {
        fen:         '8/4Q3/8/8/6k1/8/8/4K3 w - - 0 1',
        blackKing:   'g4',
        prevArea:    18,
        prompt:      'Cu&#351;ca are <span class="cage-counter">18 p&#259;trate</span>. Regele a ajuns la g4. Ultima provocare: str&#226;nge cu&#351;ca la mai pu&#539;in de 18 p&#259;trate!',
        hint:        'Mut&#259; Regina mai jos &#351;i mai aproape de Rege. Exist&#259; mai multe r&#259;spunsuri corecte!'
    }
];

let currentLevel   = 0;
let wrongAttempts  = 0;
let advanceTimer   = null;
let lastDropOk     = false;
let board;

/* ===== VALIDATION ===== */
function checkMove(toSq, blackKingSq, prevArea) {
    const qf = toSq.charCodeAt(0) - 97;
    const qr = parseInt(toSq[1]);
    const kf = blackKingSq.charCodeAt(0) - 97;
    const kr = parseInt(blackKingSq[1]);

    // Queen must be left of and above king (cage contains king)
    if (qf >= kf || qr <= kr) return { ok: false, reason: 'position' };

    // No check: same rank / file / diagonal
    if (qf === kf || qr === kr || Math.abs(qf - kf) === Math.abs(qr - kr))
        return { ok: false, reason: 'check' };

    const newArea = (7 - qf) * (qr - 1);
    if (newArea <= 0 || newArea >= prevArea) return { ok: false, reason: 'noshrink' };

    return { ok: true, area: newArea };
}

/* ===== CAGE SVG ===== */
function showCage(toSq, persistent) {
    const existing = document.getElementById('cage-svg');
    if (existing) existing.remove();

    const qf = toSq.charCodeAt(0) - 97;
    const qr = parseInt(toSq[1]);
    const boardEl  = document.getElementById('board-wrap');
    const sq = 45;

    const x = (qf + 1) * sq;
    const y = (8 - (qr - 1)) * sq;
    const w = (7 - qf) * sq;
    const h = (qr - 1) * sq;
    if (w <= 0 || h <= 0) return;
    const pad = 5;

    const ns  = 'http://www.w3.org/2000/svg';
    const svg = document.createElementNS(ns, 'svg');
    svg.id = 'cage-svg';
    svg.setAttribute('viewBox', `0 0 360 360`);

    const outer = document.createElementNS(ns, 'rect');
    outer.setAttribute('x', x + pad); outer.setAttribute('y', y + pad);
    outer.setAttribute('width', w - pad*2); outer.setAttribute('height', h - pad*2);
    outer.setAttribute('rx', '4'); outer.classList.add('cage-outer');

    const inner = document.createElementNS(ns, 'rect');
    inner.setAttribute('x', x + pad + 3); inner.setAttribute('y', y + pad + 3);
    inner.setAttribute('width', w - pad*2 - 6); inner.setAttribute('height', h - pad*2 - 6);
    inner.setAttribute('rx', '3'); inner.classList.add('cage-inner');

    svg.appendChild(outer); svg.appendChild(inner);
    boardEl.appendChild(svg);
    playClank();
}

function dismissCage() {
    const el = document.getElementById('cage-svg');
    if (!el) return;
    el.classList.add('dismiss');
    setTimeout(() => { if (el.parentNode) el.remove(); }, 420);
}

/* ===== HINT SQUARES ===== */
function showHintSquares(blackKingSq, prevArea) {
    clearHintSquares();
    const kf = blackKingSq.charCodeAt(0) - 97;
    const kr = parseInt(blackKingSq[1]);
    const wrap = document.getElementById('board-wrap');
    const sq = 45;

    for (let f = 0; f < kf; f++) {
        for (let r = kr + 1; r <= 8; r++) {
            const name = String.fromCharCode(97 + f) + r;
            const res  = checkMove(name, blackKingSq, prevArea);
            if (res.ok) {
                const div = document.createElement('div');
                div.className = 'hint-sq';
                div.dataset.hint = '1';
                div.style.left = (f * sq) + 'px';
                div.style.top  = ((8 - r) * sq) + 'px';
                wrap.appendChild(div);
            }
        }
    }
}

function clearHintSquares() {
    document.querySelectorAll('.hint-sq').forEach(el => el.remove());
}

/* ===== SOUND ===== */
function playClank() {
    try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const t = ctx.currentTime;
        [160, 310, 520, 860, 1400].forEach((freq, i) => {
            const o = ctx.createOscillator(), g = ctx.createGain();
            o.type = i % 2 === 0 ? 'triangle' : 'sawtooth';
            o.frequency.value = freq;
            o.frequency.exponentialRampToValueAtTime(freq * 0.75, t + 0.5);
            g.gain.setValueAtTime(0.15 / (i * 0.6 + 1), t);
            g.gain.exponentialRampToValueAtTime(0.001, t + 0.55 + i * 0.07);
            o.connect(g); g.connect(ctx.destination);
            o.start(t); o.stop(t + 0.7);
        });
    } catch(e) {}
}

function playWrong() {
    try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const t = ctx.currentTime;
        const o = ctx.createOscillator(), g = ctx.createGain();
        o.type = 'square';
        o.frequency.setValueAtTime(220, t);
        o.frequency.exponentialRampToValueAtTime(110, t + 0.18);
        g.gain.setValueAtTime(0.18, t);
        g.gain.exponentialRampToValueAtTime(0.001, t + 0.22);
        o.connect(g); g.connect(ctx.destination);
        o.start(t); o.stop(t + 0.25);
    } catch(e) {}
}

/* ===== CONFETTI ===== */
function spawnPageConfetti(duration) {
    const colors = ['#ff3333','#ff8800','#ffee00','#33cc55','#4499ff','#cc44ff','#ff66bb','#ff99cc','#ffffff'];
    const endTime = Date.now() + duration;
    function batch() {
        if (Date.now() >= endTime) return;
        for (let i = 0; i < 12; i++) {
            const p = document.createElement('div');
            p.className = 'confetti-page';
            const w = 7 + Math.random() * 7;
            const h = w * (0.35 + Math.random() * 0.7);
            p.style.width  = w + 'px';
            p.style.height = h + 'px';
            p.style.background = colors[Math.floor(Math.random() * colors.length)];
            p.style.left = (Math.random() * 100) + 'vw';
            p.style.top  = '-14px';
            const fallDist = window.innerHeight * (0.65 + Math.random() * 0.45);
            p.style.setProperty('--dx',  ((Math.random() - 0.5) * 180) + 'px');
            p.style.setProperty('--dy',  fallDist + 'px');
            p.style.setProperty('--rot', (Math.random() * 900 - 450) + 'deg');
            const dur = 1.8 + Math.random() * 2.4;
            p.style.setProperty('--dur', dur + 's');
            document.body.appendChild(p);
            setTimeout(() => p.remove(), dur * 1000 + 200);
        }
        setTimeout(batch, 110);
    }
    batch();
}

/* ===== FEEDBACK ===== */
function showFeedback(type, msg) {
    const box = document.getElementById('feedbackBox');
    box.className = 'feedback-box ' + type;
    box.innerHTML = msg;
}

/* ===== LEVEL MANAGEMENT ===== */
function loadLevel(idx) {
    if (advanceTimer) { clearTimeout(advanceTimer); advanceTimer = null; }
    clearHintSquares();
    dismissCage();
    wrongAttempts = 0;

    const lv = levels[idx];
    document.getElementById('challengeBox').innerHTML = lv.prompt;
    document.getElementById('hintBox').style.display = 'none';
    document.getElementById('hintBox').innerHTML = '&#128161; Indiciu: ' + lv.hint;

    const fb = document.getElementById('feedbackBox');
    fb.className = 'feedback-box hidden'; fb.innerHTML = '';

    // Level dots
    for (let i = 0; i < 3; i++) {
        const dot = document.getElementById('dot' + i);
        dot.className = 'level-dot' + (i < idx ? ' done' : i === idx ? ' active' : '');
    }
    document.getElementById('levelLabel').textContent = 'Nivelul ' + (idx + 1) + ' din 3';

    board.position(lv.fen, false);
}

function advanceLevel() {
    currentLevel++;
    if (currentLevel >= levels.length) {
        showVictory();
    } else {
        loadLevel(currentLevel);
    }
}

function showVictory() {
    // Mark all dots done
    for (let i = 0; i < 3; i++)
        document.getElementById('dot' + i).className = 'level-dot done';
    document.getElementById('levelLabel').textContent = 'Completat! ✓';

    document.getElementById('challengeBox').style.display = 'none';
    document.getElementById('feedbackBox').className = 'feedback-box hidden';
    document.getElementById('victoryScreen').classList.add('show');
        spawnPageConfetti(5000);
}

/* ===== BOARD ===== */
function onDragStart(source, piece) {
    // Only white queen is draggable
    return piece === 'wQ';
}

function onDrop(source, target) {
    if (target === 'offboard' || target === source) return 'snapback';

    // Validate with chess.js
    const game = new Chess(levels[currentLevel].fen);
    const mv = game.move({ from: source, to: target, promotion: 'q' });
    if (!mv) return 'snapback';

    const lv  = levels[currentLevel];
    const res = checkMove(target, lv.blackKing, lv.prevArea);

    lastDropOk = false;

    if (!res.ok) {
        playWrong();
        wrongAttempts++;

        let msg;
        if (res.reason === 'check') {
            msg = 'Ups! Nu d&#259;m &#351;ah p&#226;n&#259; la mat! Mai &#238;ncearc&#259; o dat&#259;! &#127985;';
        } else if (res.reason === 'noshrink') {
            msg = 'Ups! Cu&#351;ca nu s-a mic&#351;orat! Pe acolo poate s&#259; fug&#259;. Tai-i drumul altfel! &#127985;';
        } else {
            msg = 'Ups! Pe acolo poate s&#259; fug&#259;. Pune Regina deasupra &#351;i &#238;n st&#226;nga Regelui! &#127985;';
        }
        showFeedback('wrong', msg);

        if (wrongAttempts >= 2) {
            document.getElementById('hintBox').style.display = 'block';
        }
        if (wrongAttempts >= 4) {
            showHintSquares(lv.blackKing, lv.prevArea);
        }

        return 'snapback';
    }

    // Correct move!
    lastDropOk = true;
    clearHintSquares();
    showCage(target, true);
    showFeedback('correct',
        'Bravo! Ai str&#226;ns gratiile! &#128230; Cu&#351;ca acum are <strong>' + res.area + ' p&#259;trate</strong>!');

    advanceTimer = setTimeout(advanceLevel, 2000);
    return; // keep piece on new square
}

function onSnapEnd() {
    if (!lastDropOk) {
        board.position(levels[currentLevel].fen, false);
    }
    lastDropOk = false;
}

board = Chessboard('board', {
    position:    levels[0].fen,
    pieceTheme:  'https://lichess1.org/assets/piece/caliente/{piece}.svg',
    draggable:   true,
    onDragStart: onDragStart,
    onDrop:      onDrop,
    onSnapEnd:   onSnapEnd
});
window.addEventListener('resize', () => board.resize());

loadLevel(0);
</script>
