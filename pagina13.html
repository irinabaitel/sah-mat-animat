<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Două Turnuri vs. Rege — Exemple</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@700;900&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
<link rel="stylesheet" href="master-template.css">
<style>
.lesson-content { display: flex; flex-direction: column; gap: 10px; }

/* tab-uri */
.ex-tabs { display: flex; gap: 6px; flex-wrap: wrap; }
.ex-tab {
  flex: 1; min-width: 80px; padding: 6px 8px; border-radius: var(--radius-sm);
  background: var(--c-surface); border: 2px solid rgba(26,58,107,0.2);
  font-family: var(--font-display); font-size: var(--fs-xs); font-weight: var(--fw-bold);
  color: var(--c-navy); cursor: pointer; transition: all 0.15s; text-align: center;
}
.ex-tab:hover  { background: var(--c-surface-2); }
.ex-tab.active { background: var(--c-navy); color: white; border-color: var(--c-navy); }

/* subtitlu capitol */
.ex-label {
  font-family: var(--font-display); font-size: var(--fs-sm);
  color: var(--c-navy); font-weight: var(--fw-bold); text-align: center;
}

/* mutări */
.moves-box { background: rgba(255,255,255,0.45); border-radius: 12px; padding: 10px 14px; }
.moves-header {
  font-family: var(--font-display); font-size: var(--fs-xs);
  color: var(--c-text-muted); font-weight: 900; letter-spacing: 0.1em;
  text-transform: uppercase; margin-bottom: 6px;
}
.moves-row { display: flex; flex-wrap: wrap; gap: 2px; align-items: baseline; line-height: 2.1; }
.move-num  { color: var(--c-text-muted); font-size: var(--fs-xs); font-weight: 900; min-width: 22px; }
.move-token {
  font-family: var(--font-display); font-size: var(--fs-sm); font-weight: var(--fw-bold);
  color: var(--c-navy); padding: 1px 6px; border-radius: 6px; cursor: pointer;
}
.move-token:hover { background: rgba(26,58,107,0.1); }
.move-token.active { background: var(--c-navy); color: white; border-radius: var(--radius-sm); padding: 1px 10px; }

/* adnotare */
.annotation-box {
  background: rgba(26,58,107,0.07); border: 2px solid rgba(26,58,107,0.13);
  border-radius: 12px; padding: 11px 14px;
  font-size: var(--fs-md); line-height: 1.65; color: var(--c-navy);
  font-weight: var(--fw-bold); min-height: 56px;
}
.annotation-box.checkmate {
  border-color: var(--c-error); background: var(--c-error-bg);
  color: var(--c-error);
}
.checkmate-badge {
  display: inline-block; background: var(--c-error); color: white;
  padding: 2px 10px; border-radius: 20px; font-size: var(--fs-xs);
  font-weight: 900; margin-bottom: 6px;
}

/* butoane navigare pași */
.step-nav { display: flex; gap: 6px; align-items: center; justify-content: center; flex-wrap: wrap; }
.ctrl-btn {
  width: 36px; height: 36px; border-radius: 50%;
  background: var(--c-surface); border: 2px solid rgba(26,58,107,0.2);
  font-size: 0.95em; color: var(--c-navy); cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.15s;
}
.ctrl-btn:hover:not(:disabled) { background: var(--c-surface-2); }
.ctrl-btn:disabled { opacity: 0.35; cursor: default; }
.ctrl-start {
  height: 36px; padding: 0 14px; border-radius: var(--radius-sm);
  background: var(--c-surface); border: 2px solid rgba(26,58,107,0.2);
  font-family: var(--font-display); font-size: var(--fs-xs); font-weight: var(--fw-bold);
  color: var(--c-navy); cursor: pointer; transition: background 0.15s; min-width: 80px; text-align: center;
}
.ctrl-start:hover { background: var(--c-surface-2); }

/* overlay roșu pe rege la mat */
.king-red-ov {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(220,0,0,0.52); z-index: 5; pointer-events: none; border-radius: 3px;
}
</style>
</head>
<body>
<div class="page-wrapper">

  <header class="page-header" role="banner">
    <span class="header-title">Două Turnuri — Exemple</span>
    <div class="header-progress">
      <button id="vol-btn" onclick="toggleVolume()"
              style="background:rgba(255,255,255,0.5);border:none;border-radius:50px;padding:4px 10px;font-size:1.1em;cursor:pointer;">&#128266;</button>
      <span class="lesson-badge">Nivelul III</span>
    </div>
  </header>

  <main class="page-main" role="main">

    <div class="board-col">
      <div class="board-wrapper" id="boardWrapper">
        <div id="board"></div>
      </div>
    </div>

    <div class="panel-col">
      <div class="panel-scroll">
        <div class="lesson-content">

          <h1>Două Turnuri vs. Rege</h1>

          <div class="ex-tabs" id="exTabs">
            <button class="ex-tab active" onclick="loadChapter(0)">T+T 1</button>
            <button class="ex-tab"        onclick="loadChapter(1)">T+T 2</button>
            <button class="ex-tab"        onclick="loadChapter(2)">T+T 3</button>
            <button class="ex-tab"        onclick="loadChapter(3)">&#9888; Regele se apropie</button>
          </div>

          <div class="ex-label" id="exLabel"></div>

          <div class="moves-box">
            <div class="moves-header">Mutări</div>
            <div class="moves-row" id="movesRow"></div>
          </div>

          <div class="annotation-box" id="annotationBox"></div>

          <div class="step-nav">
            <button class="ctrl-btn" id="btnFirst" onclick="goFirst()" title="Prima poziție">&#9198;</button>
            <button class="ctrl-btn" id="btnPrev"  onclick="goPrev()"  title="Înapoi">&#9664;</button>
            <button class="ctrl-start" id="moveCounter">Start</button>
            <button class="ctrl-btn" id="btnNext"  onclick="goNext()"  title="Înainte">&#9654;</button>
            <button class="ctrl-btn" id="btnLast"  onclick="goLast()"  title="Ultima poziție">&#9197;</button>
          </div>

        </div>
      </div>
    </div>

  </main>

  <footer class="page-footer" role="navigation" aria-label="Navigare lecție">
    <a href="pagina12.html" class="nav-btn nav-btn--back">
      <span class="icon">←</span><span class="label">T+T Lecție</span>
    </a>
    <a href="hub.html" class="nav-btn nav-btn--contents">
      <span class="icon">⊞</span><span class="label">Cuprins</span>
    </a>
    <a href="pagina14.html" class="nav-btn nav-btn--forward">
      <span class="icon">→</span><span class="label">Înainte</span>
    </a>
  </footer>

</div>

<script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
<script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
<script>
const sndMove    = new Audio('Sounds/Move.mp3');
const sndCapture = new Audio('Sounds/Capture.mp3');
const sndMate    = new Audio('Sounds/Mate.mp3');
let volumeOn = true;
function playSound(snd) { if (!volumeOn) return; snd.currentTime = 0; snd.play().catch(() => {}); }
function toggleVolume() {
    volumeOn = !volumeOn;
    document.getElementById('vol-btn').textContent = volumeOn ? '🔊' : '🔇';
}

function matedKingSquare(fen) {
    const tmp = new Chess(fen);
    if (!tmp.in_checkmate()) return null;
    const color = tmp.turn();
    const b = tmp.board();
    const files = 'abcdefgh';
    for (let r = 0; r < 8; r++)
        for (let c = 0; c < 8; c++)
            if (b[r][c] && b[r][c].type === 'k' && b[r][c].color === color)
                return files[c] + (8 - r);
    return null;
}
function removeKingOverlay() {
    document.querySelectorAll('.king-red-ov').forEach(e => e.remove());
}
function redKingOverlay() {
    const sq = matedKingSquare(positions[currentStep]);
    if (!sq) return;
    const el = document.querySelector('#board .square-' + sq);
    if (!el) return;
    const ov = document.createElement('div');
    ov.className = 'king-red-ov';
    el.style.position = 'relative';
    el.appendChild(ov);
}
function toRo(san) {
    const map = { K:'R', Q:'D', R:'T', B:'N', N:'C' };
    return san.replace(/[KQRBN]/g, m => map[m]);
}

const chapters = [
    {
        title:    "Două Turnuri — Exemplul 1",
        subtitle: "Mat în 1 mutare",
        startFen: "5r2/6r1/2k5/7K/8/8/8/8 b - - 0 1",
        sanMoves: ["Rh8#"],
        annotations: [
            "Regele alb este prins pe coloana h, cu coloana g blocată de turnul din g7. Găseşti mutarea care dă mat dintr-o singură lovitură?",
            "Şah mat! Turnul din f8 se mută pe h8 — coloana h este blocată de noul turn, coloana g era deja blocată de turnul din g7. Regele alb nu are nicio scăpare!"
        ]
    },
    {
        title:    "Două Turnuri — Exemplul 2",
        subtitle: "Mat în 2 mutări",
        startFen: "5r2/4r3/2k5/8/8/6K1/8/8 b - - 0 1",
        sanMoves: ["Rg7+", "Kh2", "Rh8#"],
        annotations: [
            "Regele alb este pe coloana g. Negrul are un plan în 2 mutări. Îl găseşti?",
            "Turnul din e7 se mută pe g7 şi dă şah! Coloana g este acum blocată — regele alb este forţat să fugă spre coloana h.",
            "Regele alb fuge la h2 — singura direcţie disponibilă. Acum vine lovitura finală!",
            "Şah mat! Turnul din f8 vine pe h8. Coloana h blocată, coloana g blocată — regele nu are nicio scăpare!"
        ]
    },
    {
        title:    "Două Turnuri — Exemplul 3",
        subtitle: "Tehnica scării",
        startFen: "7k/r7/1r6/4K3/8/8/8/8 b - - 0 1",
        sanMoves: ["Ra5+", "Ke4", "Rb4+", "Ke3", "Ra3+", "Ke2", "Rb2+", "Ke1", "Ra1#"],
        annotations: [
            "Regele alb se află pe linia 5. Negrul va folosi tehnica scării pentru a-l împinge spre linia 1. Urmăreşte cum turnurile mută pe rând, aşa cum picioarele păşesc pe rând atunci când urci pe o scară!",
            "Primul turn taie linia 5! Regele alb este în şah şi nu mai poate rămâne pe linia 5.",
            "Regele alb coboară la e4 — forţat spre linia 1.",
            "Al doilea turn taie linia 4! Regele alb este din nou în şah.",
            "Regele coboară la e3.",
            "Primul turn taie linia 3! Rând pe rând, turnurile colaborează perfect.",
            "Regele coboară la e2.",
            "Al doilea turn taie linia 2! Regele este aproape prins.",
            "Regele coboară la e1 — ultima linie!",
            "Şah mat! Primul turn vine pe a1. Linia 1 blocată, linia 2 blocată — regele nu mai are nicio scăpare. Tehnica scării a funcţionat!"
        ]
    },
    {
        title:    "Atenţie! Regele se apropie de turn",
        subtitle: "Cum reacţionăm când regele advers ameninţă un turn",
        startFen: "8/5K2/8/R7/1R6/3k4/8/8 b - - 0 1",
        sanMoves: ["Kc3", "Rh4", "Kb3", "Rg5", "Kc3", "Rg3+", "Kd2", "Rh2+", "Ke1", "Rg1#"],
        annotations: [
            "Regele negru este pe d3 şi se îndreaptă spre turnul de pe b4. Atenţie — trebuie să reacţionăm la timp!",
            "Regele negru s-a mutat pe c3 — ameninţă direct turnul de pe b4! Când regele se apropie de turn trebuie să fim atenţi! Fugim cu turnul departe de rege, dar rămânem pe aceeaşi linie.",
            "Turnul de pe b4 mută la h4 — se îndepărtează de rege, dar rămâne pe linia 4!",
            "Dacă regele advers ne împiedică să păşim cu turnurile pe scăriţa noastră, mutăm scăriţa în siguranţă, departe de atacurile lui.",
            "Şi celălalt turn se mută în siguranţă pe g5!",
            "Acum continuăm să îl forţăm pe rege să ajungă la marginea tablei, aşa cum ne-am propus de la început.",
            "Şah! Scăriţa reintră în funcţiune.",
            "Suntem în siguranţă, urmăm planul iniţial.",
            "Şah...",
            "Şi mat!",
            "Şah mat! Linia 1 blocată, linia 2 blocată — regele nu mai are nicio scăpare!"
        ]
    }
];

let board = null;
let currentChapter = null;
let positions = [];
let currentStep = 0;

function computePositions(chapter) {
    const chess = new Chess(chapter.startFen);
    const fens = [chess.fen()];
    for (const mv of chapter.sanMoves) {
        const result = chess.move(mv);
        if (!result) { console.error('Mutare invalida:', mv); break; }
        fens.push(chess.fen());
    }
    return fens;
}

function loadChapter(idx) {
    document.querySelectorAll('.ex-tab').forEach((b, i) => b.classList.toggle('active', i === idx));
    currentChapter = chapters[idx];
    positions = computePositions(currentChapter);
    currentStep = 0;

    document.getElementById('exLabel').textContent = currentChapter.subtitle;

    if (board) board.destroy();
    board = Chessboard('board', {
        position: positions[0],
        pieceTheme: 'https://lichess1.org/assets/piece/caliente/{piece}.svg'
    });

    buildMovesList();
    updateUI();
}

function buildMovesList() {
    const container = document.getElementById('movesRow');
    container.innerHTML = '';
    const whiteFirst = currentChapter.startFen.split(' ')[1] === 'w';
    currentChapter.sanMoves.forEach((mv, i) => {
        let showNum = false, numText = '';
        if (whiteFirst) {
            if (i % 2 === 0) { showNum = true; numText = (Math.floor(i / 2) + 1) + '.'; }
        } else {
            if (i === 0) { showNum = true; numText = '1...'; }
            else if (i % 2 === 1) { showNum = true; numText = (Math.floor((i + 1) / 2) + 1) + '.'; }
        }
        if (showNum) {
            const num = document.createElement('span');
            num.className = 'move-num';
            num.textContent = numText;
            container.appendChild(num);
        }
        const btn = document.createElement('button');
        btn.className = 'move-token';
        btn.textContent = toRo(mv);
        btn.dataset.step = i + 1;
        btn.onclick = () => goToStep(i + 1);
        container.appendChild(btn);
    });
}

function goToStep(s) {
    const prevStep = currentStep;
    currentStep = s;
    removeKingOverlay();
    board.position(positions[s], false);

    if (s > prevStep) {
        const san = currentChapter.sanMoves[s - 1] || '';
        if (san.includes('#')) {
            setTimeout(function() { playSound(sndMate); redKingOverlay(); }, 200);
        } else if (san.includes('x')) {
            playSound(sndCapture);
        } else {
            playSound(sndMove);
        }
    }

    updateUI();
}

function goFirst() { goToStep(0); }
function goLast()  { goToStep(positions.length - 1); }
function goPrev()  { if (currentStep > 0) goToStep(currentStep - 1); }
function goNext()  { if (currentStep < positions.length - 1) goToStep(currentStep + 1); }

function getMoveLabel(s) {
    if (s === 0) return 'Start';
    const i = s - 1;
    const wf = currentChapter.startFen.split(' ')[1] === 'w';
    const isW = wf ? i % 2 === 0 : i % 2 === 1;
    const n   = wf ? Math.floor(i/2)+1 : Math.floor((i+1)/2)+1;
    return n + (isW ? '. ' : '... ') + toRo(currentChapter.sanMoves[i]);
}

function updateUI() {
    const total = positions.length - 1;

    document.getElementById('moveCounter').textContent = getMoveLabel(currentStep);

    document.getElementById('btnFirst').disabled = currentStep === 0;
    document.getElementById('btnPrev').disabled  = currentStep === 0;
    document.getElementById('btnNext').disabled  = currentStep === total;
    document.getElementById('btnLast').disabled  = currentStep === total;

    document.querySelectorAll('.move-token').forEach(b =>
        b.classList.toggle('active', parseInt(b.dataset.step) === currentStep));

    const box  = document.getElementById('annotationBox');
    const text = currentChapter.annotations[currentStep] || '';
    const isMat = currentStep === total && currentChapter.sanMoves[total - 1] && currentChapter.sanMoves[total - 1].includes('#');

    box.className = 'annotation-box' + (isMat ? ' checkmate' : '');
    box.innerHTML = isMat
        ? '<span class="checkmate-badge">✓ ŞAH MAT!</span><br>' + text
        : text;
}

document.addEventListener('keydown', e => {
    if (e.key === 'ArrowRight') goNext();
    if (e.key === 'ArrowLeft')  goPrev();
    if (e.key === 'Home')       goFirst();
    if (e.key === 'End')        goLast();
});

loadChapter(0);
</script>
<script src="board-utils.js"></script>
</body>
</html>
