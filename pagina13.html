<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Două Turnuri vs. Rege — Exemple</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@700;900&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
<link rel="stylesheet" href="master-template.css">
<style>
.lesson-content { display: flex; flex-direction: column; gap: 10px; }

/* tab-uri */
.ex-tabs { display: flex; gap: 6px; flex-wrap: wrap; }
.ex-tab {
  flex: 1; min-width: 70px; padding: 6px 8px; border-radius: var(--radius-sm);
  background: var(--c-surface); border: 2px solid rgba(26,58,107,0.2);
  font-family: var(--font-display); font-size: var(--fs-xs); font-weight: var(--fw-bold);
  color: var(--c-navy); cursor: pointer; transition: all 0.15s; text-align: center;
}
.ex-tab:hover  { background: var(--c-surface-2); }
.ex-tab.active { background: var(--c-navy); color: white; border-color: var(--c-navy); }

/* subtitlu capitol */
.ex-label {
  font-family: var(--font-display); font-size: var(--fs-sm);
  color: var(--c-navy); font-weight: var(--fw-bold); text-align: center;
}

/* adnotare — înălțime fixă ca să nu sară butoanele */
.annotation-box {
  background: rgba(26,58,107,0.07); border: 2px solid rgba(26,58,107,0.13);
  border-radius: 12px; padding: 11px 14px;
  font-size: var(--fs-md); line-height: 1.65; color: var(--c-navy);
  font-weight: var(--fw-bold);
  min-height: 72px;
}
.annotation-box.checkmate {
  border-color: var(--c-error); background: var(--c-error-bg); color: var(--c-error);
}
.checkmate-badge {
  display: inline-block; background: var(--c-error); color: white;
  padding: 2px 10px; border-radius: 20px; font-size: var(--fs-xs);
  font-weight: 900; margin-bottom: 6px;
}

/* step-nav — fix la baza panel-col (AFARA panel-scroll) */
.step-nav {
  flex-shrink: 0;
  display: flex; gap: 6px; align-items: center; justify-content: center;
  padding: 6px 0;
}
.ctrl-btn {
  width: 36px; height: 36px; border-radius: 50%;
  background: var(--c-surface); border: 2px solid rgba(26,58,107,0.2);
  font-size: 0.95em; color: var(--c-navy); cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.15s;
}
.ctrl-btn:hover:not(:disabled) { background: var(--c-surface-2); }
.ctrl-btn:disabled { opacity: 0.35; cursor: default; }
.ctrl-start {
  height: 36px; padding: 0 14px; border-radius: var(--radius-sm);
  background: var(--c-surface); border: 2px solid rgba(26,58,107,0.2);
  font-family: var(--font-display); font-size: var(--fs-xs); font-weight: var(--fw-bold);
  color: var(--c-navy); cursor: pointer; transition: background 0.15s;
  min-width: 80px; text-align: center;
}
.ctrl-start:hover { background: var(--c-surface-2); }
</style>
</head>
<body>
<div class="page-wrapper">

  <header class="page-header" role="banner">
    <span class="header-title">Două Turnuri — Exemple</span>
    <div class="header-progress">
      <button id="vol-btn" onclick="toggleVolume()"
              style="background:rgba(255,255,255,0.5);border:none;border-radius:50px;padding:4px 10px;font-size:1.1em;cursor:pointer;">&#128266;</button>
      <span class="lesson-badge">Nivelul III</span>
    </div>
  </header>

  <main class="page-main" role="main">

    <div class="board-col">
      <div class="board-wrapper" id="boardWrapper">
        <div id="board"></div>
      </div>
    </div>

    <div class="panel-col">

      <!-- panel-scroll: h1, tab-uri, subtitlu, adnotare, jurnal mutări -->
      <div class="panel-scroll">
        <div class="lesson-content">

          <h1>Două Turnuri vs. Rege</h1>

          <div class="ex-tabs">
            <button class="ex-tab active" onclick="loadChapter(0)">T+T 1</button>
            <button class="ex-tab"        onclick="loadChapter(1)">T+T 2</button>
            <button class="ex-tab"        onclick="loadChapter(2)">T+T 3</button>
            <button class="ex-tab"        onclick="loadChapter(3)">&#9888; Regele se apropie</button>
          </div>

          <div class="ex-label" id="exLabel"></div>

          <div class="annotation-box" id="annotationBox"></div>

          <!-- jurnal mutări vertical, 4 linii vizibile, apare progresiv -->
          <div class="moves-log" id="movesLog"></div>

        </div>
      </div>

      <!-- step-nav FIXAT la baza panel-col, nu se mișcă -->
      <div class="step-nav">
        <button class="ctrl-btn" id="btnFirst" onclick="goFirst()" title="Prima poziție">&#9198;</button>
        <button class="ctrl-btn" id="btnPrev"  onclick="goPrev()"  title="Înapoi">&#9664;</button>
        <button class="ctrl-start" id="moveCounter">Start</button>
        <button class="ctrl-btn" id="btnNext"  onclick="goNext()"  title="Înainte">&#9654;</button>
        <button class="ctrl-btn" id="btnLast"  onclick="goLast()"  title="Ultima poziție">&#9197;</button>
      </div>

    </div>

  </main>

  <footer class="page-footer" role="navigation" aria-label="Navigare lecție">
    <a href="pagina12.html" class="nav-btn nav-btn--back">
      <span class="icon">←</span><span class="label">T+T Lecție</span>
    </a>
    <a href="hub.html" class="nav-btn nav-btn--contents">
      <span class="icon">⊞</span><span class="label">Cuprins</span>
    </a>
    <a href="pagina14.html" class="nav-btn nav-btn--forward">
      <span class="icon">→</span><span class="label">Înainte</span>
    </a>
  </footer>

</div>

<script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
<script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
<script>
const sndMove    = new Audio('Sounds/Move.mp3');
const sndCapture = new Audio('Sounds/Capture.mp3');
const sndMate    = new Audio('Sounds/Mate.mp3');
let volumeOn = true;
function playSound(snd) { if (!volumeOn) return; snd.currentTime = 0; snd.play().catch(() => {}); }
function toggleVolume() {
    volumeOn = !volumeOn;
    document.getElementById('vol-btn').textContent = volumeOn ? '🔊' : '🔇';
}

/* ── Efect mat: highlight-check (sec.6 master-template.css, pattern din pagina5) ── */
function applyHL(sq, cls) {
    const el = document.querySelector('.square-' + sq);
    if (el) el.classList.add(cls);
}
function removeKingOverlay() {
    document.querySelectorAll('.highlight-check').forEach(function(el) {
        el.classList.remove('highlight-check');
    });
}
function matedKingSquare(fen) {
    const tmp = new Chess(fen);
    if (!tmp.in_checkmate()) return null;
    const color = tmp.turn(), b = tmp.board(), files = 'abcdefgh';
    for (let r = 0; r < 8; r++)
        for (let c = 0; c < 8; c++)
            if (b[r][c] && b[r][c].type === 'k' && b[r][c].color === color)
                return files[c] + (8 - r);
    return null;
}
function redKingOverlay(sq) {
    removeKingOverlay();
    applyHL(sq, 'highlight-check');
}

function toRo(san) {
    const map = { K:'R', Q:'D', R:'T', B:'N', N:'C' };
    return san.replace(/[KQRBN]/g, m => map[m]);
}

const chapters = [
    {
        subtitle: "Mat în 1 mutare",
        startFen: "5r2/6r1/2k5/7K/8/8/8/8 b - - 0 1",
        sanMoves: ["Rh8#"],
        annotations: [
            "Regele alb este prins pe coloana h, cu coloana g blocată de turnul din g7. Găsești mutarea care dă mat dintr-o singură lovitură?",
            "Șah mat! Turnul din f8 se mută pe h8 — coloana h este blocată de noul turn, coloana g era deja blocată de turnul din g7. Regele alb nu are nicio scăpare!"
        ]
    },
    {
        subtitle: "Mat în 2 mutări",
        startFen: "5r2/4r3/2k5/8/8/6K1/8/8 b - - 0 1",
        sanMoves: ["Rg7+", "Kh2", "Rh8#"],
        annotations: [
            "Regele alb este pe coloana g. Negrul are un plan în 2 mutări. Îl găsești?",
            "Turnul din e7 se mută pe g7 și dă șah! Coloana g este acum blocată — regele alb este forțat să fugă spre coloana h.",
            "Regele alb fuge la h2 — singura direcție disponibilă. Acum vine lovitura finală!",
            "Șah mat! Turnul din f8 vine pe h8. Coloana h blocată, coloana g blocată — regele nu are nicio scăpare!"
        ]
    },
    {
        subtitle: "Tehnica scării",
        startFen: "7k/r7/1r6/4K3/8/8/8/8 b - - 0 1",
        sanMoves: ["Ra5+", "Ke4", "Rb4+", "Ke3", "Ra3+", "Ke2", "Rb2+", "Ke1", "Ra1#"],
        annotations: [
            "Regele alb se află pe linia 5. Negrul va folosi tehnica scării pentru a-l împinge spre linia 1. Urmărește cum turnurile mută pe rând, așa cum picioarele pășesc pe rând atunci când urci pe o scară!",
            "Primul turn taie linia 5! Regele alb este în șah și nu mai poate rămâne pe linia 5.",
            "Regele alb coboară la e4 — forțat spre linia 1.",
            "Al doilea turn taie linia 4! Regele alb este din nou în șah.",
            "Regele coboară la e3.",
            "Primul turn taie linia 3! Rând pe rând, turnurile colaborează perfect.",
            "Regele coboară la e2.",
            "Al doilea turn taie linia 2! Regele este aproape prins.",
            "Regele coboară la e1 — ultima linie!",
            "Șah mat! Primul turn vine pe a1. Linia 1 blocată, linia 2 blocată — regele nu mai are nicio scăpare. Tehnica scării a funcționat!"
        ]
    },
    {
        subtitle: "Cum reacționăm când regele advers amenință un turn",
        startFen: "8/5K2/8/R7/1R6/3k4/8/8 b - - 0 1",
        sanMoves: ["Kc3", "Rh4", "Kb3", "Rg5", "Kc3", "Rg3+", "Kd2", "Rh2+", "Ke1", "Rg1#"],
        annotations: [
            "Regele negru este pe d3 și se îndreaptă spre turnul de pe b4. Atenție — trebuie să reacționăm la timp!",
            "Regele negru s-a mutat pe c3 — amenință direct turnul de pe b4! Fugim cu turnul departe de rege, dar rămânem pe aceeași linie.",
            "Turnul de pe b4 mută la h4 — se îndepărtează de rege, dar rămâne pe linia 4!",
            "Dacă regele advers ne împiedică să pășim cu turnurile pe scărița noastră, mutăm scărița în siguranță, departe de atacurile lui.",
            "Și celălalt turn se mută în siguranță pe g5!",
            "Acum continuăm să îl forțăm pe rege să ajungă la marginea tablei, așa cum ne-am propus de la început.",
            "Șah! Scărița reintră în funcțiune.",
            "Suntem în siguranță, urmăm planul inițial.",
            "Șah...",
            "Și mat!",
            "Șah mat! Linia 1 blocată, linia 2 blocată — regele nu mai are nicio scăpare!"
        ]
    }
];

let board = null;
let currentChapter = null;
let positions = [];
let currentStep = 0;
const freeChess = new Chess(); /* urmărește poziția curentă pentru jocul liber */

function onDrop(source, target) {
    const move = freeChess.move({ from: source, to: target, promotion: 'q' });
    if (!move) return 'snapback';
    playSound(move.captured ? sndCapture : sndMove);
    board.position(freeChess.fen(), false);
    if (freeChess.game_over()) return;
    setTimeout(function() {
        if (freeChess.game_over()) return;
        const moves = freeChess.moves();
        if (!moves.length) return;
        const m = freeChess.move(moves[Math.floor(Math.random() * moves.length)]);
        if (m) {
            playSound(m.captured ? sndCapture : sndMove);
            board.position(freeChess.fen(), false);
        }
    }, 380);
}

function computePositions(chapter) {
    const chess = new Chess(chapter.startFen);
    const fens = [chess.fen()];
    for (const mv of chapter.sanMoves) {
        const result = chess.move(mv);
        if (!result) { console.error('Mutare invalida:', mv); break; }
        fens.push(chess.fen());
    }
    return fens;
}

function loadChapter(idx) {
    document.querySelectorAll('.ex-tab').forEach((b, i) => b.classList.toggle('active', i === idx));
    currentChapter = chapters[idx];
    positions = computePositions(currentChapter);
    currentStep = 0;
    document.getElementById('exLabel').textContent = currentChapter.subtitle;
    if (board) board.destroy();
    board = Chessboard('board', {
        position: positions[0],
        pieceTheme: 'https://lichess1.org/assets/piece/caliente/{piece}.svg',
        draggable: true,
        onDrop: onDrop
    });
    freeChess.load(positions[0]);
    removeKingOverlay();
    updateUI();
}

/* ── Jurnal mutări progresiv (sec.15 master-template.css) ── */
function rebuildLog() {
    const container = document.getElementById('movesLog');
    container.innerHTML = '';
    const whiteFirst = currentChapter.startFen.split(' ')[1] === 'w';
    for (let i = 0; i < currentStep; i++) {
        const mv = currentChapter.sanMoves[i];
        const isW = whiteFirst ? (i % 2 === 0) : (i % 2 === 1);
        const numN = whiteFirst ? Math.floor(i/2)+1 : Math.floor((i+1)/2)+1;
        const showNum = whiteFirst ? (i % 2 === 0) : (i === 0 || i % 2 === 1);

        const row = document.createElement('div');
        row.className = 'mlog-row ' + (isW ? 'mlog-w' : 'mlog-b');
        row.dataset.step = i + 1;

        const num = document.createElement('span');
        num.className = 'mlog-num';
        if (showNum) {
            num.textContent = numN + (isW ? '.' : '...');
        }
        row.appendChild(num);

        const btn = document.createElement('button');
        btn.className = 'mlog-token' + (i + 1 === currentStep ? ' active' : '');
        btn.textContent = toRo(mv);
        btn.onclick = (function(s) { return function() { goToStep(s); }; })(i + 1);
        row.appendChild(btn);

        container.appendChild(row);
    }
    /* scroll la ultima mutare */
    container.scrollTop = container.scrollHeight;
}

function getMoveLabel(s) {
    if (s === 0) return 'Start';
    const i = s - 1;
    const wf = currentChapter.startFen.split(' ')[1] === 'w';
    const isW = wf ? i % 2 === 0 : i % 2 === 1;
    const n   = wf ? Math.floor(i/2)+1 : Math.floor((i+1)/2)+1;
    return n + (isW ? '. ' : '... ') + toRo(currentChapter.sanMoves[i]);
}

function updateUI() {
    const total = positions.length - 1;

    document.getElementById('moveCounter').textContent = getMoveLabel(currentStep);
    document.getElementById('btnFirst').disabled = currentStep === 0;
    document.getElementById('btnPrev').disabled  = currentStep === 0;
    document.getElementById('btnNext').disabled  = currentStep === total;
    document.getElementById('btnLast').disabled  = currentStep === total;

    const box  = document.getElementById('annotationBox');
    const text = currentChapter.annotations[currentStep] || '';
    const isMat = currentStep === total && currentChapter.sanMoves[total - 1] && currentChapter.sanMoves[total - 1].includes('#');
    box.className = 'annotation-box' + (isMat ? ' checkmate' : '');
    box.innerHTML = isMat ? '<span class="checkmate-badge">✓ ȘAH MAT!</span><br>' + text : text;

    rebuildLog();
}

function goToStep(s) {
    const prevStep = currentStep;
    currentStep = s;
    removeKingOverlay();
    board.position(positions[s], false);
    freeChess.load(positions[s]);

    if (s > prevStep) {
        const san = currentChapter.sanMoves[s - 1] || '';
        if (san.includes('#')) {
            const sq = matedKingSquare(positions[s]);
            setTimeout(function() {
                playSound(sndMate);
                if (sq) redKingOverlay(sq);
            }, 200);
        } else if (san.includes('x')) {
            playSound(sndCapture);
        } else {
            playSound(sndMove);
        }
    }

    updateUI();
}

function goFirst() { goToStep(0); }
function goLast()  { goToStep(positions.length - 1); }
function goPrev()  { if (currentStep > 0) goToStep(currentStep - 1); }
function goNext()  { if (currentStep < positions.length - 1) goToStep(currentStep + 1); }

document.addEventListener('keydown', e => {
    if (e.key === 'ArrowRight') goNext();
    if (e.key === 'ArrowLeft')  goPrev();
    if (e.key === 'Home')       goFirst();
    if (e.key === 'End')        goLast();
});

loadChapter(0);
</script>
<script src="board-utils.js"></script>
</body>
</html>
