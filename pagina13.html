<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sah Mat Animat - Doua Turnuri vs Rege - Exemple</title>
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@700;900&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: #F5A96E;
            font-family: 'Nunito', sans-serif;
            padding: 24px 16px;
            min-height: 100vh;
        }

        .page {
            max-width: 860px;
            margin: 0 auto;
            padding: 40px 60px 50px;
            position: relative;
        }

        .corner-piece { position: absolute; width: 80px; height: 80px; }
        .corner-tl { top: 0; left: 0; }
        .corner-tr { top: 0; right: 0; transform: scaleX(-1); }

        .chapter-tabs {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .tab-btn {
            background: rgba(255,255,255,0.4);
            border: 2px solid #1a3a6b;
            border-radius: 25px;
            padding: 8px 18px;
            font-family: 'Nunito', sans-serif;
            font-weight: 700;
            color: #1a3a6b;
            cursor: pointer;
            font-size: 0.9em;
            transition: all 0.2s;
        }
        .tab-btn.active, .tab-btn:hover {
            background: #1a3a6b;
            color: white;
        }

        .chapter-title {
            text-align: center;
            font-size: 1.2em;
            font-weight: 700;
            color: #1a3a6b;
            text-transform: uppercase;
            margin-bottom: 4px;
        }
        .chapter-subtitle {
            text-align: center;
            color: #1a3a6b;
            font-size: 0.95em;
            margin-bottom: 22px;
            font-style: italic;
        }

        .main-content {
            display: flex;
            gap: 22px;
            align-items: flex-start;
        }

        .board-section { flex: 0 0 auto; }
        #board { width: 360px; }

        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            margin-top: 14px;
        }

        .ctrl-btn {
            background: #1a3a6b;
            color: white;
            border: none;
            border-radius: 50%;
            width: 46px;
            height: 46px;
            font-size: 1.1em;
            cursor: pointer;
            transition: background 0.2s;
        }
        .ctrl-btn:hover:not(:disabled) { background: #2a5aab; }
        .ctrl-btn:disabled { background: rgba(26,58,107,0.25); cursor: not-allowed; }

        .move-counter {
            background: rgba(255,255,255,0.6);
            border-radius: 20px;
            padding: 5px 14px;
            font-weight: 700;
            color: #1a3a6b;
            font-size: 0.9em;
            min-width: 80px;
            text-align: center;
        }

        .info-section { flex: 1; min-width: 0; }

        .moves-box {
            background: rgba(255,255,255,0.4);
            border-radius: 12px;
            padding: 12px 14px;
            margin-bottom: 12px;
        }
        .moves-box h3 {
            font-size: 0.8em;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #1a3a6b;
            margin-bottom: 10px;
        }

        .moves-list {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            align-items: center;
        }

        .move-number { color: rgba(26,58,107,0.5); font-size: 0.8em; padding: 0 2px; }

        .move-token {
            border: 1px solid rgba(26,58,107,0.3);
            border-radius: 6px;
            padding: 4px 9px;
            font-size: 0.92em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.15s;
        }
        .move-token.white-move { background: rgba(255,255,255,0.7); color: #1a3a6b; }
        .move-token.black-move { background: rgba(50,50,50,0.12); color: #333; }
        .move-token.active { background: #1a3a6b !important; color: white !important; border-color: #1a3a6b; }
        .move-token:hover:not(.active) { background: rgba(255,255,255,0.9); }

        .annotation-box {
            background: rgba(255,255,255,0.6);
            border-radius: 12px;
            padding: 16px;
            line-height: 1.65;
            color: #333;
            font-size: 1em;
            min-height: 100px;
            border-left: 4px solid #1a3a6b;
        }
        .annotation-box.checkmate {
            border-left-color: #c0392b;
            background: rgba(255,255,255,0.85);
        }

        .checkmate-badge {
            display: inline-block;
            background: #c0392b;
            color: white;
            padding: 3px 12px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 0.9em;
            margin-bottom: 10px;
        }

        .hint {
            text-align: center;
            color: rgba(26,58,107,0.5);
            font-size: 0.78em;
            margin-top: 10px;
        }

        .nav-buttons { display: flex; justify-content: space-between; gap: 20px; margin-top: 28px; }
        .nav-btn {
            display: inline-block;
            background: #1a3a6b;
            color: white;
            font-family: 'Baloo 2', cursive;
            font-size: 1.3em;
            padding: 13px 40px;
            border-radius: 50px;
            text-decoration: none;
            transition: all 0.2s;
            box-shadow: 0 5px 20px rgba(26,58,107,0.4);
        }
        .nav-btn:hover { background: #2a5aab; transform: translateY(-3px); }
        .nav-btn.back { background: rgba(26,58,107,0.5); }

        @media (max-width: 680px) {
            .page { padding: 40px 20px 50px; }
            .main-content { flex-direction: column; }
            #board { width: 300px; }
            .board-section { margin: 0 auto; }
        }
    </style>
</head>
<body>

<div class="page">
    <img src="pieces/wR.svg" class="corner-piece corner-tl" alt="">
    <img src="pieces/wR.svg" class="corner-piece corner-tr" alt="">

    <div class="chapter-tabs">
        <button class="tab-btn active" onclick="loadChapter(0)">Dou&#259; Turnuri 1</button>
        <button class="tab-btn"        onclick="loadChapter(1)">Dou&#259; Turnuri 2</button>
        <button class="tab-btn"        onclick="loadChapter(2)">Dou&#259; Turnuri 3</button>
    </div>

    <div class="chapter-title"    id="chapterTitle"></div>
    <div class="chapter-subtitle" id="chapterSubtitle"></div>

    <div class="main-content">
        <div class="board-section">
            <div id="board"></div>
            <div class="controls">
                <button class="ctrl-btn" id="btnFirst" onclick="goFirst()" title="Prima pozi&#539;ie">&#9198;</button>
                <button class="ctrl-btn" id="btnPrev"  onclick="goPrev()"  title="&#206;napoi">&#9664;</button>
                <div class="move-counter" id="moveCounter">Start</div>
                <button class="ctrl-btn" id="btnNext"  onclick="goNext()"  title="&#206;nainte">&#9654;</button>
                <button class="ctrl-btn" id="btnLast"  onclick="goLast()"  title="Ultima pozi&#539;ie">&#9197;</button>
            </div>
            <p class="hint">&#8592; &#8594; sau butoanele de mai sus</p>
        </div>

        <div class="info-section">
            <div class="moves-box">
                <h3>Mut&#259;ri</h3>
                <div class="moves-list" id="movesList"></div>
            </div>
            <div class="annotation-box" id="annotationBox"></div>
        </div>
    </div>

    <div class="nav-buttons">
        <a href="pagina12.html" class="nav-btn back">&#9664; &#206;napoi</a>
        <span class="nav-btn" style="opacity:0.35;cursor:default;">&#206;nainte &#9654;</span>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
<script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>

<script>
function toRo(san) {
    const map = { K:'R', Q:'D', R:'T', B:'N', N:'C' };
    return san.replace(/[KQRBN]/g, m => map[m]);
}

const chapters = [
    {
        title:    "Dou\u0103 Turnuri \u2014 Exemplul 1",
        subtitle: "Mat \u00een 1 mutare",
        startFen: "5r2/6r1/2k5/7K/8/8/8/8 b - - 0 1",
        sanMoves: ["Rh8#"],
        annotations: [
            "Regele alb este prins pe coloana h, cu coloana g blocat\u0103 de turnul din g7. G\u0103se\u015fti mutarea care d\u0103 mat dintr-o singur\u0103 lovitur\u0103?",
            "\u015eah mat! Turnul din f8 se mut\u0103 pe h8 \u2014 coloana h este blocat\u0103 de noul turn, coloana g era deja blocat\u0103 de turnul din g7. Regele alb nu are nicio sc\u0103pare!"
        ]
    },
    {
        title:    "Dou\u0103 Turnuri \u2014 Exemplul 2",
        subtitle: "Mat \u00een 2 mut\u0103ri",
        startFen: "5r2/4r3/2k5/8/8/6K1/8/8 b - - 0 1",
        sanMoves: ["Rg7+", "Kh2", "Rh8#"],
        annotations: [
            "Regele alb este pe coloana g. Negrul are un plan \u00een 2 mut\u0103ri. \u00cel g\u0103se\u015fti?",
            "Turnul din e7 se mut\u0103 pe g7 \u015fi d\u0103 \u015fah! Coloana g este acum blocat\u0103 \u2014 regele alb este for\u0163at s\u0103 fug\u0103 spre coloana h.",
            "Regele alb fuge la h2 \u2014 singura direc\u0163ie disponibil\u0103. Acum vine lovitura final\u0103!",
            "\u015eah mat! Turnul din f8 vine pe h8. Coloana h blocat\u0103, coloana g blocat\u0103 \u2014 regele nu are nicio sc\u0103pare!"
        ]
    },
    {
        title:    "Dou\u0103 Turnuri \u2014 Exemplul 3",
        subtitle: "Tehnica sc\u0103rii \u2014 Regele \u00eempins de pe linia 5 pe linia 1",
        startFen: "7k/r7/1r6/4K3/8/8/8/8 b - - 0 1",
        sanMoves: ["Ra5+", "Ke4", "Rb4+", "Ke3", "Ra3+", "Ke2", "Rb2+", "Ke1", "Ra1#"],
        annotations: [
            "Regele alb se afl\u0103 pe linia 5. Negrul va folosi tehnica sc\u0103rii pentru a-l \u00eempinge spre linia 1. Urm\u0103re\u015fte cum turnurile se alterneaz\u0103!",
            "Primul turn taie linia 5! Regele alb este \u00een \u015fah \u015fi nu mai poate r\u0103m\u00e2ne pe linia 5.",
            "Regele alb coboar\u0103 la e4 \u2014 for\u0163at spre linia 1.",
            "Al doilea turn taie linia 4! Regele alb este din nou \u00een \u015fah.",
            "Regele coboar\u0103 la e3.",
            "Primul turn taie linia 3! R\u00e2nd pe r\u00e2nd, turnurile colaboreaz\u0103 perfect.",
            "Regele coboar\u0103 la e2.",
            "Al doilea turn taie linia 2! Regele este aproape prins.",
            "Regele coboar\u0103 la e1 \u2014 ultima linie!",
            "\u015eah mat! Primul turn vine pe a1. Linia 1 blocat\u0103, linia 2 blocat\u0103 \u2014 regele nu mai are nicio sc\u0103pare. Tehnica sc\u0103rii a func\u0163ionat!"
        ]
    }
];

let board = null;
let currentChapter = null;
let positions = [];
let currentStep = 0;

function computePositions(chapter) {
    const chess = new Chess(chapter.startFen);
    const fens = [chess.fen()];
    for (const mv of chapter.sanMoves) {
        const result = chess.move(mv);
        if (!result) { console.error('Mutare invalida:', mv); break; }
        fens.push(chess.fen());
    }
    return fens;
}

function loadChapter(idx) {
    document.querySelectorAll('.tab-btn').forEach((b, i) => b.classList.toggle('active', i === idx));
    currentChapter = chapters[idx];
    positions = computePositions(currentChapter);
    currentStep = 0;

    document.getElementById('chapterTitle').textContent    = currentChapter.title;
    document.getElementById('chapterSubtitle').textContent = currentChapter.subtitle;

    if (board) board.destroy();
    board = Chessboard('board', {
        position: positions[0],
        pieceTheme: 'pieces/{piece}.svg'
    });

    buildMovesList();
    updateUI();
}

function buildMovesList() {
    const container = document.getElementById('movesList');
    container.innerHTML = '';
    currentChapter.sanMoves.forEach((mv, i) => {
        if (i % 2 === 0) {
            const num = document.createElement('span');
            num.className = 'move-number';
            num.textContent = (Math.floor(i / 2) + 1) + '.';
            container.appendChild(num);
        }
        const btn = document.createElement('button');
        btn.className = 'move-token ' + (i % 2 === 0 ? 'black-move' : 'white-move');
        btn.textContent = toRo(mv);
        btn.dataset.step = i + 1;
        btn.onclick = () => goToStep(i + 1);
        container.appendChild(btn);
    });
}

function goToStep(s) {
    currentStep = s;
    board.position(positions[s], false);
    updateUI();
}

function goFirst() { goToStep(0); }
function goLast()  { goToStep(positions.length - 1); }
function goPrev()  { if (currentStep > 0) goToStep(currentStep - 1); }
function goNext()  { if (currentStep < positions.length - 1) goToStep(currentStep + 1); }

function updateUI() {
    const total = positions.length - 1;

    document.getElementById('moveCounter').textContent =
        currentStep === 0 ? 'Start' : currentStep + ' / ' + total;

    document.getElementById('btnFirst').disabled = currentStep === 0;
    document.getElementById('btnPrev').disabled  = currentStep === 0;
    document.getElementById('btnNext').disabled  = currentStep === total;
    document.getElementById('btnLast').disabled  = currentStep === total;

    document.querySelectorAll('.move-token').forEach(b =>
        b.classList.toggle('active', parseInt(b.dataset.step) === currentStep));

    const box  = document.getElementById('annotationBox');
    const text = currentChapter.annotations[currentStep] || '';
    const isMat = currentStep === total;

    box.className = 'annotation-box' + (isMat ? ' checkmate' : '');
    box.innerHTML = isMat
        ? '<span class="checkmate-badge">\u2713 \u015eAH MAT!</span><br>' + text
        : text;
}

document.addEventListener('keydown', e => {
    if (e.key === 'ArrowRight') goNext();
    if (e.key === 'ArrowLeft')  goPrev();
    if (e.key === 'Home')       goFirst();
    if (e.key === 'End')        goLast();
});

loadChapter(0);
</script>
</body>
</html>
