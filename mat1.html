* { box-sizing: border-box; margin: 0; padding: 0; }

#nav { position: sticky; top: 0; background: rgba(245,169,110,0.92); backdrop-filter: blur(8px); display: flex; align-items: center; justify-content: space-between; padding: 10px 20px; z-index: 100; border-bottom: 2px solid rgba(255,255,255,0.4); }

.nav-btn:hover { background: rgba(255,255,255,0.85); }
.nav-title { font-family: 'Baloo 2', cursive; font-size: 0.9em; color: #1a3a6b; text-align: center; }
.nav-badge { background: #1a3a6b; color: white; font-family: 'Baloo 2', cursive; font-size: 0.75em; padding: 3px 12px; border-radius: 20px; text-decoration: none; }

.content { max-width: 520px; margin: 0 auto; padding: 24px 16px 0; display: flex; flex-direction: column; gap: 16px; }

/* Progress card */
.progress-card { background: rgba(255,255,255,0.58); border: 2px solid rgba(255,255,255,0.85); border-radius: 20px; padding: 16px 20px; box-shadow: 0 3px 16px rgba(0,0,0,0.07); }
.progress-header { display: flex; justify-content: space-between; font-family: 'Baloo 2', cursive; font-size: 0.9em; color: #1a3a6b; margin-bottom: 10px; }
.progress-bar-wrap { background: rgba(26,58,107,0.12); border-radius: 50px; height: 12px; overflow: hidden; margin-bottom: 14px; }
.progress-fill { height: 100%; background: linear-gradient(90deg, #27ae60, #2ecc71); border-radius: 50px; transition: width 0.4s ease; }
.dots-wrap { display: flex; flex-wrap: wrap; gap: 6px; }
.dot { width: 22px; height: 22px; border-radius: 50%; background: rgba(26,58,107,0.15); cursor: pointer; transition: all 0.2s; border: 2px solid transparent; font-family: 'Baloo 2', cursive; font-size: 0.55em; color: transparent; display: flex; align-items: center; justify-content: center; }
.dot:hover { background: rgba(26,58,107,0.25); }
.dot.current { border-color: #1a3a6b; background: rgba(26,58,107,0.2); }
.dot.solved { background: #27ae60; }
.dot.solved::after { content: '✓'; color: white; font-size: 0.85em; }
.dot.missed { background: #e74c3c; }
.dot.missed::after { content: '✗'; color: white; font-size: 0.85em; }

/* Puzzle card */
.puzzle-card { background: rgba(255,255,255,0.58); border: 2px solid rgba(255,255,255,0.85); border-radius: 20px; padding: 20px; box-shadow: 0 3px 16px rgba(0,0,0,0.07); display: flex; flex-direction: column; align-items: center; gap: 14px; }

.turn-indicator { font-family: 'Baloo 2', cursive; font-size: 1em; color: #1a3a6b; background: rgba(26,58,107,0.08); border-radius: 50px; padding: 6px 20px; }

#board { width: 380px; max-width: calc(100vw - 72px); }
/* Click-to-move highlight */
#board .square-55d63.sq-selected,
#board .square-55d63.sq-selected { background: rgba(255,214,0,0.55) !important; }
.sq-selected { background: rgba(255,214,0,0.55) !important; }

.feedback { font-family: 'Baloo 2', cursive; font-size: 1.05em; min-height: 32px; text-align: center; padding: 6px 16px; border-radius: 12px; transition: all 0.2s; }
.feedback.correct { background: rgba(39,174,96,0.15); color: #1a7a40; }
.feedback.wrong { background: rgba(231,76,60,0.12); color: #c0392b; }
.feedback.hint { background: rgba(52,152,219,0.12); color: #1a5a8b; }

.puzzle-actions { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
.hint-btn { background: rgba(52,152,219,0.15); border: 2px solid rgba(52,152,219,0.4); border-radius: 50px; padding: 8px 20px; font-family: 'Baloo 2', cursive; font-size: 0.9em; color: #1a5a8b; cursor: pointer; transition: all 0.2s; }
.hint-btn:hover { background: rgba(52,152,219,0.25); }
.next-btn { background: #27ae60; border: none; border-radius: 50px; padding: 8px 24px; font-family: 'Baloo 2', cursive; font-size: 0.95em; color: white; cursor: pointer; box-shadow: 0 4px 12px rgba(39,174,96,0.35); transition: all 0.2s; }
.next-btn:hover { background: #219a52; transform: translateY(-1px); }

.nav-puzzles { display: flex; justify-content: space-between; }
.nav-puzzles button { background: rgba(26,58,107,0.45); border: none; border-radius: 50px; padding: 8px 22px; font-family: 'Baloo 2', cursive; font-size: 0.9em; color: white; cursor: pointer; transition: all 0.2s; }
.nav-puzzles button:hover { background: rgba(26,58,107,0.65); }

.completion { text-align: center; padding: 20px; }
.completion .big-emoji { font-size: 3em; margin-bottom: 12px; display: block; }
.completion h2 { font-family: 'Baloo 2', cursive; font-size: 1.6em; color: #1a3a6b; margin-bottom: 8px; }
.completion p { font-size: 0.95em; color: #2a2a3e; line-height: 1.7; }

@keyframes shake {
  0%,100% { transform: translateX(0); }
  20% { transform: translateX(-6px); }
  40% { transform: translateX(6px); }
  60% { transform: translateX(-4px); }
  80% { transform: translateX(4px); }
}
.shake { animation: shake 0.4s ease; }

#promoOverlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 200; align-items: center; justify-content: center; }
#promoOverlay.active { display: flex; }
.promo-box { background: white; border-radius: 20px; padding: 20px 24px; box-shadow: 0 8px 40px rgba(0,0,0,0.25); text-align: center; }
.promo-box h3 { font-family: 'Baloo 2', cursive; font-size: 1.1em; color: #1a3a6b; margin-bottom: 16px; }
.promo-pieces { display: flex; gap: 10px; }
.promo-piece { width: 72px; height: 72px; cursor: pointer; border-radius: 12px; border: 3px solid transparent; padding: 6px; transition: all 0.15s; background: rgba(26,58,107,0.06); }
.promo-piece:hover { border-color: #1a3a6b; background: rgba(26,58,107,0.12); transform: scale(1.08); }

var currentIdx = 0;
var wrongAttempts = 0;
var solvedPuzzles = new Set();
var attemptedPuzzles = {};
var game, board;
var selectedSquare = null;
var lastDropTime = 0;

function addOrUpdateDot(idx, status) {
  var wrap = document.getElementById('dotsWrap');
  var el = document.getElementById('dot-' + idx);
  if (!el) {
    el = document.createElement('div');
    el.id = 'dot-' + idx;
    el.title = 'Puzzle ' + (idx + 1);
    (function(i) { el.onclick = function() { loadPuzzle(i); }; })(idx);
    wrap.appendChild(el);
  }
  el.className = 'dot ' + (status === 'solved' ? 'solved' : 'missed');
  attemptedPuzzles[idx] = status;
}

function loadPuzzle(idx) {
  currentIdx = idx;
  wrongAttempts = 0;

  var p = puzzles[idx];
  game = new Chess(p.fen);

  var orientation = p.turn === 'w' ? 'white' : 'black';
  var isSolved = solvedPuzzles.has(idx);

  if (board) { board.destroy(); }
  board = Chessboard('board', {
    position: p.fen,
    orientation: orientation,
    draggable: !isSolved,
    pieceTheme: 'https://lichess1.org/assets/piece/caliente/{piece}.svg',
    onDrop: onDrop,
    onSnapEnd: onSnapEnd
  });

  document.getElementById('turnIndicator').textContent =
    p.turn === 'w' ? '⬜ Albul mută — găsește matul în 1!' : '⬛ Negrul mută — găsește matul în 1!';

  var fb = document.getElementById('feedback');
  fb.textContent = isSolved ? '✅ Deja rezolvat!' : '';
  fb.className = 'feedback' + (isSolved ? ' correct' : '');

  document.getElementById('hintBtn').style.display = 'none';
  document.getElementById('nextBtn').style.display = isSolved && idx < puzzles.length - 1 ? 'inline-block' : 'none';

  setTimeout(function() {
    document.getElementById('puzzleCard').scrollIntoView({ behavior: 'smooth', block: 'center' });
  }, 50);
}

var pendingPromo = null;

function isPawnPromotion(source, target) {
  var piece = game.get(source);
  if (!piece || piece.type !== 'p') return false;
  var rank = target.charAt(1);
  return (piece.color === 'w' && rank === '8') || (piece.color === 'b' && rank === '1');
}

function showPromoPanel(color) {
  var c = color === 'w' ? 'w' : 'b';
  var base = 'https://lichess1.org/assets/piece/caliente/';
  document.getElementById('promoQ').src = base + c + 'Q.svg';
  document.getElementById('promoR').src = base + c + 'R.svg';
  document.getElementById('promoB').src = base + c + 'B.svg';
  document.getElementById('promoN').src = base + c + 'N.svg';
  document.getElementById('promoOverlay').classList.add('active');
}

function makePromotion(piece) {
  document.getElementById('promoOverlay').classList.remove('active');
  if (!pendingPromo) return;
  var move = game.move({ from: pendingPromo.source, to: pendingPromo.target, promotion: piece });
  pendingPromo = null;
  if (move === null) { onWrong(); return; }
  board.position(game.fen());
  if (game.in_checkmate()) {
    onSolved();
  } else {
    game.undo();
    board.position(game.fen());
    onWrong();
  }
}

// --- Logica comună de mutare (folosită atât de drag cât și de click) ---
function processMove(source, target) {
  if (source === target) return false;
  if (solvedPuzzles.has(currentIdx)) return false;

  if (isPawnPromotion(source, target)) {
    var test = game.move({ from: source, to: target, promotion: 'q' });
    if (test === null) return false;
    game.undo();
    pendingPromo = { source: source, target: target };
    showPromoPanel(game.turn());
    return true;
  }

  var move = game.move({ from: source, to: target });
  if (move === null) return false;

  board.position(game.fen());
  if (game.in_checkmate()) {
    onSolved();
  } else {
    game.undo();
    board.position(game.fen());
    onWrong();
  }
  return true;
}

function onDrop(source, target) {
  lastDropTime = Date.now();
  clearSelection();
  if (solvedPuzzles.has(currentIdx)) return 'snapback';
  if (source === target) return 'snapback';

  if (isPawnPromotion(source, target)) {
    var test = game.move({ from: source, to: target, promotion: 'q' });
    if (test === null) return 'snapback';
    game.undo();
    pendingPromo = { source: source, target: target };
    showPromoPanel(game.turn());
    return 'snapback';
  }

  var move = game.move({ from: source, to: target });
  if (move === null) return 'snapback';

  if (game.in_checkmate()) {
    onSolved();
  } else {
    game.undo();
    onWrong();
    return 'snapback';
  }
}

function onSnapEnd() {
  board.position(game.fen());
}

// --- Click-to-move ---
function clearSelection() {
  selectedSquare = null;
  document.querySelectorAll('#board .sq-selected').forEach(function(el) {
    el.classList.remove('sq-selected');
  });
}

function selectSquare(square) {
  selectedSquare = square;
  var el = document.querySelector('#board [data-square="' + square + '"]');
  if (el) el.classList.add('sq-selected');
}

document.addEventListener('DOMContentLoaded', function() {
  document.getElementById('board').addEventListener('click', function(e) {
    // Ignora click-urile imediat dupa un drag
    if (Date.now() - lastDropTime < 300) return;
    if (solvedPuzzles.has(currentIdx)) return;

    var squareEl = e.target.closest('[data-square]');
    if (!squareEl) return;
    var square = squareEl.getAttribute('data-square');
    if (!square) return;

    var piece = game.get(square);
    var turn = game.turn();

    if (!selectedSquare) {
      // Selectează piesa dacă e de culoarea corectă
      if (piece && piece.color === turn) {
        selectSquare(square);
      }
    } else {
      if (square === selectedSquare) {
        clearSelection();
        return;
      }
      // Dacă a dat click pe o altă piesă proprie, schimbă selecția
      if (piece && piece.color === turn) {
        clearSelection();
        selectSquare(square);
        return;
      }
      // Încearcă mutarea
      var src = selectedSquare;
      clearSelection();
      processMove(src, square);
    }
  });
});

function onSolved() {
  solvedPuzzles.add(currentIdx);
  addOrUpdateDot(currentIdx, 'solved');

  var fb = document.getElementById('feedback');
  fb.textContent = '✅ Excelent! Mat în 1!';
  fb.className = 'feedback correct';

  var nextBtn = document.getElementById('nextBtn');
  nextBtn.style.display = currentIdx < puzzles.length - 1 ? 'inline-block' : 'none';
  document.getElementById('hintBtn').style.display = 'none';

  if (solvedPuzzles.size === puzzles.length) {
    setTimeout(showCompletion, 800);
  }
}

function onWrong() {
  wrongAttempts++;
  var fb = document.getElementById('feedback');
  fb.textContent = '❌ Nu e mat. Mai încearcă!';
  fb.className = 'feedback wrong';

  // Shake board
  var boardEl = document.getElementById('board');
  boardEl.classList.remove('shake');
  void boardEl.offsetWidth;
  boardEl.classList.add('shake');

  if (wrongAttempts >= 3) {
    document.getElementById('hintBtn').style.display = 'inline-block';
  }
}

function showHint() {
  var p = puzzles[currentIdx];
  var fb = document.getElementById('feedback');
  fb.textContent = '💡 Soluția: ' + p.sol;
  fb.className = 'feedback hint';
  addOrUpdateDot(currentIdx, 'missed');
  document.getElementById('nextBtn').style.display = currentIdx < puzzles.length - 1 ? 'inline-block' : 'none';
}

function nextPuzzle() {
  if (currentIdx < puzzles.length - 1) loadPuzzle(currentIdx + 1);
}

function prevPuzzle() {
  if (currentIdx > 0) loadPuzzle(currentIdx - 1);
}

function showCompletion() {
  var card = document.getElementById('puzzleCard');
  card.innerHTML =
    '<div class="completion">' +
    '<span class="big-emoji">🏆</span>' +
    '<h2>Felicitări! Toate puzzle-urile rezolvate!</h2>' +
    '<p>Ai demonstrat că știi să recunoști matul în 1 din orice poziție.<br>Ești pregătit pentru mat în 2 mutări!</p>' +
    '</div>';
}

loadPuzzle(0);
