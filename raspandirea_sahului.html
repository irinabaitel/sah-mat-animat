<p>În <strong>1885</strong>, la Melbourne, s-a organizat primul Campionat Oficial al Australiei. Câștigătorul a fost <strong>Frederick Karl Esling</strong>. La ediția următoare (Adelaide, <strong>1887</strong>), englezul emigrat <strong>Henry Charlick</strong> (1845–1916) a câștigat — el a devenit celebru și pentru o deschidere agresivă popularizată în anii 1890: <em>1.d4 e5 2.dxe5 d6</em>, cunoscută azi sub numele <strong>Gambitul Blackburne–Hartlaub</strong> (cândva numită și „Gambitul Charlick").</p>

<p>Australia a fost mereu izolată geografic de restul lumii, așa că australienii au fost printre primii care au folosit tehnologia pentru a juca șah la distanță:</p>
<ul>
  <li><strong>Telegraful</strong> (sec. XIX) — meciuri inter-coloniale prin cablu telegrafic</li>
  <li><strong>Radio</strong> (sec. XX) — partide transmise „pe unde scurte" cu Europa</li>
  <li><strong>Internet</strong> (sec. XX–XXI) — printre primii adoptatori ai serverelor de șah online</li>
</ul>

<h4>🏆 Azi: scena modernă</h4>
<p>Australia are azi câțiva Mari Maeștri activi: <strong>Ian Rogers</strong> (multiplu campion național), <strong>Anton Smirnov</strong> (cel mai tânăr GM australian), <strong>Zhao Zong-Yuan</strong>. Olimpiada de Șah aduce echipa australiană la fiecare 2 ani — o călătorie de zeci de mii de kilometri, dar cu un singur scop: <em>Gens una sumus</em>.</p>
<div class="hl-box ok"><em>Gens una sumus</em> — deviza FIDE „suntem o singură familie" — a fost dintotdeauna foarte reală pentru australieni: distanțele uriașe i-au transformat în pionieri ai conexiunilor șahiste globale.</div>` },

  { emoji:'🇪🇺', title:'Europa — leagănul șahului modern',
    body:`
<p>Europa nu e nici locul de naștere al șahului, nici cel al ultimei dominații — dar e <strong>locul unde s-a născut FORMA modernă a jocului</strong>. În <strong>1475</strong>, în Spania și Italia, șahul medieval a primit super-puterile pe care le folosim azi:</p>
<ul>
  <li><strong>Regina</strong> — din cea mai slabă piesă (un pătrățel diagonal) a devenit cea mai puternică (oricâte pătrățele în orice direcție)</li>
  <li><strong>Nebunul</strong> — a renunțat la „săritura de 2" și a primit raza lungă pe diagonală</li>
  <li><strong>Pionul</strong> — a primit pasul dublu la prima mutare (plus „en passant" ca să nu se „strecoare")</li>
  <li><strong>Rocada</strong> — pentru a pune regele rapid la adăpost</li>
</ul>

<h4>🏆 Europa modernă: turnee, școli, campioni</h4>
<p>Tot Europa a dus jocul mai departe:</p>
<ul>
  <li><strong>Londra 1851</strong> — primul turneu internațional, organizat de englezi</li>
  <li><strong>Codul Oficial FIDE 1929</strong> — unificarea regulilor la nivel mondial</li>
  <li><strong>Școala sovietică</strong> (1948–1990): șahul ca politică de stat în URSS — Botvinnik, Tal, Petrosian, Spasski, Karpov, <strong>Kasparov</strong> — peste 40 de ani de dominație</li>
  <li><strong>Norvegia</strong> — <strong>Magnus Carlsen</strong> (campion mondial 2013–2023), cel mai mare ELO din istorie</li>
  <li><strong>Polonia, Olanda, Franța, Germania</strong> — turnee de elită (Wijk aan Zee, Bilbao, Bonn), generații întregi de mari maeștri</li>
</ul>
<div class="hl-box">📖 <strong>Vezi în detaliu:</strong> drumul prin care a intrat șahul în Europa e pe pagina <em>„Din India până în Europa"</em>, iar reformele europene complete sunt pe <em>„Evoluția șahului în Europa"</em>.</div>` },

  { emoji:'🌐', title:'Curiozități și restul lumii',
    body:`
<p>Astăzi șahul se joacă <strong>pe toate continentele și mai mult</strong>. Iată câteva colțuri spectaculoase:</p>

<h4>🏅 Olimpiada de Șah FIDE</h4>
<p>La fiecare 2 ani, peste <strong>180 de țări</strong> trimit echipe la Olimpiada Mondială — de la Mongolia la Vanuatu, din Islanda în Insulele Solomon. E una dintre cele mai mari competiții sportive din lume ca număr de țări participante.</p>

<h4>🐧 Antarctica</h4>
<p>În stațiile de cercetare polare, șahul e una dintre cele mai populare distracții pentru oamenii care petrec ierni lungi în întuneric absolut. McMurdo Station (SUA) și alte baze organizează turnee interne pe parcursul lunilor reci.</p>

<h4>🚀 Spațiul cosmic</h4>
<p>În <strong>2008</strong>, astronautul <strong>Gregory Chamitoff</strong> de pe Stația Spațială Internațională a jucat o partidă completă <strong>contra Pământului</strong> (echipa de control de la NASA). O premieră istorică — verdictul: Pământul a învins!</p>

<h4>💻 Online: explozia digitală</h4>
<p>Cu apariția internetului, șahul a devenit <strong>cel mai jucat joc al planetei</strong>. Doar pe <strong>Chess.com</strong> și <strong>Lichess</strong> sunt împreună <strong>peste 100 de milioane</strong> de jucători activi. Lichess e complet gratuit, fără reclame — făcut de o comunitate de voluntari (la fel ca Stockfish, motorul nostru de antrenament!).</p>

<h4>🌐 De pretutindeni</h4>
<p>Șahul se joacă pe submarine, pe stații Antarctice, în baze militare deșertice, pe nave de croazieră, pe trenuri intercontinentale. E poate cel mai universal joc din istoria omenirii — fără nevoie de limbă comună, doar tabla și piesele.</p>

const list = document.getElementById('accList');
sertare.forEach(function(b, idx) {
  const item = document.createElement('div');
  item.className = 'acc-item';

  const hdr = document.createElement('div');
  hdr.className = 'acc-header';
  hdr.innerHTML = '<span class="acc-emoji">' + b.emoji + '</span>' +
                  '<span class="acc-title">' + b.title + '</span>' +
                  '<span class="acc-chevron">&#9658;</span>';

  const body = document.createElement('div');
  body.className = 'acc-body';
  const inner = document.createElement('div');
  inner.className = 'acc-inner';
  inner.innerHTML = b.body;
  body.appendChild(inner);

  item.appendChild(hdr); item.appendChild(body);
  list.appendChild(item);

  hdr.addEventListener('click', function(){ item.classList.toggle('open'); });
  if (idx === 0) item.classList.add('open');
});
