<style>
/* ── Coloana foto (samurai) ─── */
.page-main { grid-template-columns: 50fr 50fr; }
.map-col {
  display: flex; align-items: center; justify-content: center;
  min-height: 0; min-width: 0;
}
.map-wrap {
  width: 100%;
  max-height: calc(100dvh - var(--header-h) - var(--footer-h) - 2 * var(--gap));
  position: relative;
  border-radius: var(--radius);
  overflow: hidden;
  box-shadow: 0 6px 30px rgba(0,0,0,0.25);
  background: #1c1410;
}
.map-wrap img {
  width: 100%; height: 100%;
  object-fit: cover; display: block;
}
.map-title {
  position: absolute; left: 0; right: 0; top: 0;
  padding: 18px 16px 30px;
  text-align: center;
  background: linear-gradient(180deg, rgba(20,10,5,0.85), rgba(20,10,5,0));
  color: #f3e2bb;
  z-index: 2;
}
.map-title .motto {
  display: block;
  font-family: var(--font-display);
  font-weight: 900;
  font-size: clamp(1.5em, 4.2vw, 2.4em);
  letter-spacing: 1px;
  text-shadow: 0 2px 10px rgba(0,0,0,0.7);
}
.map-title small {
  display: block; margin-top: 3px;
  font-family: var(--font-body); font-weight: 700;
  font-size: var(--fs-sm); color: #fff; opacity: .92;
}
.map-cap {
  position: absolute; left: 0; right: 0; bottom: 0;
  padding: 14px 16px 10px;
  background: linear-gradient(0deg, rgba(20,10,5,0.85), rgba(20,10,5,0));
  color: #fff;
  font-family: var(--font-display);
  font-weight: 700;
  font-size: var(--fs-sm);
  line-height: 1.4;
  text-shadow: 0 1px 4px rgba(0,0,0,0.6);
}

/* ── Sertare (accordion) — ca la chaturanga ────── */
.acc-list { display: flex; flex-direction: column; gap: 6px; }
.acc-item {
  border: 2px solid var(--c-border);
  border-radius: var(--radius);
  overflow: hidden;
  background: var(--c-surface);
  transition: border-color .15s;
  scroll-margin-top: 8px;
}
.acc-item:hover, .acc-item.open { border-color: var(--c-navy); }
.acc-header {
  display: flex; align-items: center; gap: 10px;
  padding: 12px 14px; cursor: pointer; user-select: none;
  transition: background .15s;
}
.acc-item.open .acc-header, .acc-header:hover { background: rgba(26,58,107,.07); }
.acc-num {
  font-family: var(--font-display); font-weight: 900;
  color: #991b1b; font-size: var(--fs-md); min-width: 26px;
}
.acc-title {
  flex: 1;
  font-family: var(--font-display);
  font-weight: 700; color: var(--c-navy);
  font-size: var(--fs-md);
}
.acc-chevron {
  font-size: .7em; color: var(--c-navy);
  transition: transform .22s; display: inline-block;
}
.acc-item.open .acc-chevron { transform: rotate(90deg); }
.acc-body { max-height: 0; overflow: hidden; transition: max-height .4s ease; }
.acc-item.open .acc-body { max-height: 4200px; }
.acc-inner { padding: 4px 16px 14px; }
.acc-inner p {
  font-size: var(--fs-md); line-height: 1.7;
  color: var(--c-text); margin-bottom: .6em;
}
.acc-inner p:last-child { margin-bottom: 0; }
.acc-inner strong { color: var(--c-navy); }
.acc-inner em { color: var(--c-text-muted); }
.acc-inner h4 {
  font-family: var(--font-display); color: #991b1b;
  font-size: 1.02em; margin: .9em 0 .3em;
}

/* Lista pieselor cu kanji + descriere */
.piece-list {
  list-style: none; padding: 0; margin: .4em 0;
  display: flex; flex-direction: column; gap: 8px;
}
.piece-list li {
  display: flex; align-items: flex-start; gap: 12px;
  padding: 10px 12px;
  background: linear-gradient(135deg, #f5e6c8, #fff8e7);
  border-left: 4px solid #991b1b;
  border-radius: 10px;
}
.piece-list .pimg {
  flex: 0 0 auto;
  width: 56px; height: 56px;
  display: block;
  filter: drop-shadow(0 2px 3px rgba(0,0,0,.18));
}
.promo-pair {
  display: flex; align-items: center; justify-content: center;
  gap: 8px; padding: 8px;
  background: linear-gradient(135deg, #fff8e7, #f5e6c8);
  border-radius: 10px;
  margin: 6px 0;
}
.promo-pair img { width: 50px; height: 50px; }
.promo-pair .arrow {
  font-size: 1.6em; color: #991b1b; font-weight: 900;
  margin: 0 4px;
}
.promo-pair .label {
  font-family: var(--font-display); font-weight: 700;
  font-size: .9em; color: var(--c-navy);
  min-width: 80px; text-align: center;
}
.piece-list .pinfo { flex: 1; min-width: 0; }
.piece-list .pname {
  font-family: var(--font-display);
  font-weight: 800; color: var(--c-navy);
  display: block; margin-bottom: 2px;
}
.piece-list .pname em { color: #7a4a2e; font-style: italic; font-size: .92em; }
.piece-list .pdesc {
  font-size: .94em; line-height: 1.5;
  color: var(--c-text);
}

/* Buton mare pentru arena Lishogi */
.play-btn {
  display: block; width: 100%;
  margin-top: 14px;
  padding: 16px 20px;
  background: linear-gradient(135deg, #991b1b, #c0392b);
  color: #fff8e7;
  text-align: center;
  border: none; border-radius: var(--radius);
  font-family: var(--font-display);
  font-weight: 800; font-size: 1.05em;
  cursor: pointer;
  text-decoration: none;
  box-shadow: 0 4px 16px rgba(153,27,27,.35);
  transition: transform .12s, box-shadow .12s;
}
.play-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 22px rgba(153,27,27,.45); }
.play-btn small {
  display: block; margin-top: 4px;
  font-family: var(--font-body); font-weight: 600;
  font-size: .82em; opacity: .92;
}
.play-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
  margin-top: 14px;
}
.play-grid .play-btn {
  margin-top: 0;
  font-size: .96em;
  padding: 14px 12px;
  background: linear-gradient(135deg, #991b1b, #c0392b);
}
.play-grid .play-btn.editor {
  background: linear-gradient(135deg, #355ea8, #4b3fa7);
}
@media (max-width: 540px) {
  .play-grid { grid-template-columns: 1fr; }
}
.play-extra {
  display: block; margin-top: 12px;
  text-align: center;
  color: var(--c-navy);
  font-family: var(--font-display); font-weight: 700;
  font-size: .9em; opacity: .8;
  text-decoration: none;
}
.play-extra:hover { opacity: 1; text-decoration: underline; }

/* ── Overlay tabla Lishogi pe tot ecranul ─────── */
.lishogi-modal {
  position: fixed; inset: 0;
  background: rgba(20,10,5,0.92);
  z-index: 2000;
  display: none;
  flex-direction: column;
  padding: 8px;
}
.lishogi-modal.open { display: flex; }
.lishogi-modal__header {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 14px;
  background: linear-gradient(135deg, #1c1410, #3a2616);
  color: #f3e2bb;
  border-radius: 10px 10px 0 0;
}
.lishogi-modal__title {
  flex: 1;
  font-family: var(--font-display);
  font-weight: 800;
  font-size: 1em;
  line-height: 1.25;
}
.lishogi-modal__close {
  background: rgba(255,255,255,0.18);
  border: 1.5px solid rgba(255,255,255,0.5);
  color: #fff;
  width: 38px; height: 38px;
  border-radius: 50%;
  font-size: 1.1em; font-weight: 800;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
}
.lishogi-modal__close:hover { background: rgba(255,255,255,0.32); }
.lishogi-modal__frame {
  flex: 1;
  background: #fff;
  border-radius: 0 0 10px 10px;
  overflow: hidden;
}
.lishogi-modal__frame iframe {
  width: 100%; height: 100%; border: 0;
}

@media (max-width: 768px), (max-aspect-ratio: 1/1) {
  .page-main { grid-template-columns: 1fr; grid-template-rows: auto 1fr; }
  .map-col { max-height: calc((100dvh - var(--header-h) - var(--footer-h) - 16px) * 0.40); }
  .map-wrap { max-height: calc((100dvh - var(--header-h) - var(--footer-h) - 16px) * 0.40); }
  .lishogi-modal__title { font-size: .9em; }
}
</style>

<script>
const sertare = [

  { num:'1.', emoji:'🏺', title:'Povestea',
    body:`
<p>În călătoria noastră prin Asia ajungem în <strong>Japonia</strong>. Aici, acum aproximativ <strong>1000 de ani</strong>, generalii și samuraii au transformat șahul venit din China într-un joc complet unic, numit <strong>Shogi</strong> (将棋) — care înseamnă literalmente <em>„Jocul Generalilor"</em>.</p>
<p>Pregătește-te: în Shogi regulile sunt mult mai <strong>dinamice</strong> decât la șah, iar bătăliile durează până la <strong>ultima piesă</strong>!</p>` },

  { num:'2.', emoji:'🎴', title:'Tabla și piesele — fără culori, doar formă!',
    body:`
<p>Prima surpriză pentru un detectiv de șah: tabla de Shogi e puțin mai mare (<strong>9 × 9</strong> pătrate) și <strong>toate piesele au aceeași culoare</strong> — culoarea naturală a lemnului!</p>
<p>Piesele au formă de <strong>vârf de săgeată</strong> și pe ele sunt scrise caractere japoneze (<em>kanji</em>).</p>
<div class="hl-box">🕵️ <strong>Cum știi care e a ta și care e a adversarului?</strong> Foarte simplu: piesele tale au <strong>vârful îndreptat spre tabăra adversă</strong>, iar ale lui — spre tine!</div>` },

  { num:'3.', emoji:'⚔️', title:'Cele 8 piese și cum mută',
    body:`
<p>Iată armata. Folosim aici <strong>setul „International"</strong> de pe Lishogi — cu pictograme în loc de kanji, mai prietenos pentru copii. (Pe Lishogi poți schimba setul în „Setări" dacă vrei să vezi kanji-urile reale.)</p>
<ul class="piece-list">
  <li>
    <img class="pimg" src="img/shogi/king.svg" alt="Rege (Ōshō)">
    <div class="pinfo">
      <span class="pname">Ōshō — Regele <em>(王)</em></span>
      <span class="pdesc">Ca regele nostru: <strong>1 pas în orice direcție</strong>. Dacă moare, ai pierdut!</span>
    </div>
  </li>
  <li>
    <img class="pimg" src="img/shogi/rook.svg" alt="Turn (Hisha)">
    <div class="pinfo">
      <span class="pname">Hisha — Turnul <em>(飛)</em></span>
      <span class="pdesc">Ca turnul nostru: linie dreaptă <strong>oricâte pătrate</strong>. Cea mai puternică piesă a tablei.</span>
    </div>
  </li>
  <li>
    <img class="pimg" src="img/shogi/bishop.svg" alt="Nebun (Kaku)">
    <div class="pinfo">
      <span class="pname">Kaku — Nebunul <em>(角)</em></span>
      <span class="pdesc">Ca nebunul nostru: pe diagonală <strong>oricâte pătrate</strong>.</span>
    </div>
  </li>
  <li>
    <img class="pimg" src="img/shogi/gold.svg" alt="General de Aur (Kin)">
    <div class="pinfo">
      <span class="pname">Kin — Generalul de Aur <em>(金)</em></span>
      <span class="pdesc">Mută <strong>1 pas în 6 direcții</strong> — orice direcție, MAI PUȚIN diagonalele în spate. Garda de corp a regelui!</span>
    </div>
  </li>
  <li>
    <img class="pimg" src="img/shogi/silver.svg" alt="General de Argint (Gin)">
    <div class="pinfo">
      <span class="pname">Gin — Generalul de Argint <em>(銀)</em></span>
      <span class="pdesc">Mută <strong>1 pas înainte sau 1 pas pe oricare din cele 4 diagonale</strong> (5 câmpuri totale).</span>
    </div>
  </li>
  <li>
    <img class="pimg" src="img/shogi/knight.svg" alt="Cal (Keima)">
    <div class="pinfo">
      <span class="pname">Keima — Calul <em>(桂)</em></span>
      <span class="pdesc">Mută în „L", dar <strong>doar înainte</strong> (2 câmpuri posibile). Nu poate merge în lateral sau înapoi ca la șahul nostru!</span>
    </div>
  </li>
  <li>
    <img class="pimg" src="img/shogi/lance.svg" alt="Lăncier (Kyōsha)">
    <div class="pinfo">
      <span class="pname">Kyōsha — Lăncierul <em>(香)</em></span>
      <span class="pdesc">Mută <strong>doar înainte în linie dreaptă</strong>, oricâte pătrate vrea. Un turn care nu știe să meargă în spate sau în lateral.</span>
    </div>
  </li>
  <li>
    <img class="pimg" src="img/shogi/pawn.svg" alt="Pion (Fuhyō)">
    <div class="pinfo">
      <span class="pname">Fuhyō — Pionul <em>(歩)</em></span>
      <span class="pdesc">Mută <strong>1 pas înainte și capturează tot înainte</strong> (NU pe diagonală, ca la șah!).</span>
    </div>
  </li>
</ul>
<p style="opacity:.8;font-size:.92em;"><em>Fiecare jucător are: 1 rege, 1 turn, 1 nebun, 2 generali de aur, 2 generali de argint, 2 cai, 2 lăncieri, 9 pioni — total 20 de piese.</em></p>` },

  { num:'4.', emoji:'🌪️', title:'Regula magică: parașutarea pieselor!',
    body:`
<p>Aici e <strong>marea diferență</strong> față de orice șah din lume!</p>
<p>La șahul clasic, când capturezi o piesă, o pui pe masă și gata. La Shogi, <strong>piesa capturată devine PRIZONIERA ta de război</strong>. O ții lângă tablă, într-o zonă numită <em>komadai</em>.</p>
<p>În loc să muți o piesă de pe tablă, când îți vine rândul, poți alege să <strong>„parașutezi" o piesă capturată</strong> pe orice pătrat gol — dar întoarsă cu <strong>vârful spre adversar</strong>! Piesa s-a transformat instant într-un <strong>Ninja</strong> care luptă acum pentru armata ta!</p>
<div class="hl-box ok">🎯 <strong>De ce e genial?</strong> În Shogi <strong>nu prea există remiză</strong> și nicio armată nu rămâne fără piese — pentru că piesele „mor și învie" la fiecare schimb! Jocul e plin de răsturnări de situație până în ultima secundă.</div>` },

  { num:'5.', emoji:'🎖️', title:'Promovarea — toată lumea capătă super-puteri!',
    body:`

<p>Tabla are o zonă specială numită <strong>„Tabăra Adversă"</strong> — ultimele <strong>3 linii</strong> de sus. Când o piesă de-a ta pășește în această zonă (sau pleacă din ea), o întorci pur și simplu <strong>invers</strong>. Pe spatele piesei e scris un alt caracter cu <strong>cerneală roșie</strong> — și piesa ta a promovat!</p>

<h4>📋 Cine ce devine după promovare:</h4>
<div class="promo-pair">
  <img src="img/shogi/rook.svg" alt="Turn">
  <span class="label">Turn</span>
  <span class="arrow">⟶</span>
  <img src="img/shogi/dragon.svg" alt="Dragon">
  <span class="label">Dragon 🐲<br><small>+ 1 pas pe diagonală</small></span>
</div>
<div class="promo-pair">
  <img src="img/shogi/bishop.svg" alt="Nebun">
  <span class="label">Nebun</span>
  <span class="arrow">⟶</span>
  <img src="img/shogi/horse.svg" alt="Cal-Dragon">
  <span class="label">Cal-Dragon 🐎<br><small>+ 1 pas drept</small></span>
</div>
<div class="promo-pair">
  <img src="img/shogi/silver.svg" alt="Argint">
  <span class="label">Argint</span>
  <span class="arrow">⟶</span>
  <img src="img/shogi/promotedsilver.svg" alt="Aur">
  <span class="label">Aur 🥇</span>
</div>
<div class="promo-pair">
  <img src="img/shogi/knight.svg" alt="Cal">
  <span class="label">Cal</span>
  <span class="arrow">⟶</span>
  <img src="img/shogi/promotedknight.svg" alt="Aur">
  <span class="label">Aur 🥇</span>
</div>
<div class="promo-pair">
  <img src="img/shogi/lance.svg" alt="Lăncier">
  <span class="label">Lăncier</span>
  <span class="arrow">⟶</span>
  <img src="img/shogi/promotedlance.svg" alt="Aur">
  <span class="label">Aur 🥇</span>
</div>
<div class="promo-pair">
  <img src="img/shogi/pawn.svg" alt="Pion">
  <span class="label">Pion</span>
  <span class="arrow">⟶</span>
  <img src="img/shogi/tokin.svg" alt="Tokin">
  <span class="label">Tokin 🥇<br><small>(pion de aur)</small></span>
</div>
<p style="margin-top:10px;"><strong>NU promovează:</strong> <img src="img/shogi/king.svg" alt="Rege" style="width:24px;height:24px;vertical-align:middle;"> Regele și <img src="img/shogi/gold.svg" alt="Aur" style="width:24px;height:24px;vertical-align:middle;"> Aurul — aurul e deja la nivel maxim!</p>
<p>👉 Foarte multe piese ajung „de aur" — de-aia jocul are atâta dinamism!</p>` },

  { num:'6.', emoji:'🚫', title:'Cele 3 reguli interzise',
    body:`
<p>Pentru că parașutarea pieselor e o super-putere, samuraii au inventat <strong>3 restricții stricte</strong> ca jocul să rămână corect:</p>

<h4>1. Nifu (二歩) — „Dublul Pion"</h4>
<p>NU ai voie să parașutezi un pion pe o coloană unde ai <strong>deja un alt pion nepromovat</strong>. Un singur pion-pe-coloană la un moment dat!</p>

<h4>2. Fără piese fără mutări</h4>
<p>NU ai voie să parașutezi:</p>
<ul>
  <li>un <strong>pion</strong> sau un <strong>lăncier</strong> pe ultima linie (n-ar mai avea mutare înainte!)</li>
  <li>un <strong>cal</strong> pe ultimele două linii</li>
</ul>
<p>Piesele în Shogi <strong>nu au voie să stea degeaba</strong>.</p>

<h4>3. Uchifuzume (打ち歩詰め) — „Mat cu pionul din mână"</h4>

const list = document.getElementById('accList');
sertare.forEach(function(b, idx) {
  const item = document.createElement('div');
  item.className = 'acc-item';

  const hdr = document.createElement('div');
  hdr.className = 'acc-header';
  hdr.innerHTML = '<span class="acc-num">' + b.num + '</span>' +
                  '<span class="acc-title">' + b.emoji + ' ' + b.title + '</span>' +
                  '<span class="acc-chevron">&#9658;</span>';

  const body = document.createElement('div');
  body.className = 'acc-body';
  const inner = document.createElement('div');
  inner.className = 'acc-inner';
  inner.innerHTML = b.body;
  body.appendChild(inner);

  item.appendChild(hdr); item.appendChild(body);
  list.appendChild(item);

  hdr.addEventListener('click', function(){ item.classList.toggle('open'); });
  if (idx === 0) item.classList.add('open');
});

/* ── Lishogi modal cu iframe ───────────────────── */
const modal     = document.getElementById('lishogiModal');
const modalIfr  = document.getElementById('lishogiFrame');
const modalClose= document.getElementById('lishogiClose');

const lishogiUrls = {
  learn:   'https://lishogi.org/learn',
  ai:      'https://lishogi.org/',
  puzzles: 'https://lishogi.org/training',
  editor:  'https://lishogi.org/editor'
};

function openLishogi(url) {
  modalIfr.src = url;
  modal.classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeLishogi() {
  modal.classList.remove('open');
  modalIfr.src = ''; // oprește jocul/sunetul când închidem
  document.body.style.overflow = '';
}
// delegare pentru butoanele cu data-mode
document.addEventListener('click', function(e){
  const btn = e.target.closest('.play-btn[data-mode]');
  if (!btn) return;
  e.preventDefault();
  const mode = btn.dataset.mode || 'learn';
  openLishogi(lishogiUrls[mode] || lishogiUrls.learn);
});
modalClose.addEventListener('click', closeLishogi);
modal.addEventListener('click', function(e){
  if (e.target === modal) closeLishogi();
});
document.addEventListener('keydown', function(e){
  if (e.key === 'Escape' && modal.classList.contains('open')) closeLishogi();
});
</script>
