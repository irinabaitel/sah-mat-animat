  <style>

    /* ── Acordeon epocă ── */
    .era-block { margin-bottom: 10px; border-radius: var(--radius); overflow: hidden; }

    .era-btn {
      width: 100%; display: flex; align-items: center; gap: 12px;
      padding: 14px 18px;
      background: var(--c-surface-2); color: var(--c-navy);
      border: 2px solid var(--c-border); cursor: pointer; text-align: left;
      font-family: var(--font-display); transition: background 0.2s;
      border-radius: var(--radius);
    }
    .era-btn[aria-expanded="true"] {
      border-radius: var(--radius) var(--radius) 0 0;
      background: var(--c-navy); color: #fff; border-color: var(--c-navy);
    }
    .era-btn:not([aria-expanded="true"]):hover { background: var(--c-surface); }
    .era-code {
      width: 36px; height: 36px; border-radius: 8px;
      background: rgba(26,58,107,0.08);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.2rem; flex-shrink: 0;
    }
    .era-btn[aria-expanded="true"] .era-code { background: rgba(255,255,255,0.15); }
    .era-titles { flex: 1; }
    .era-name { font-size: 1rem; font-weight: 700; display: block; line-height: 1.2; }
    .era-range { font-size: 0.72rem; opacity: 0.65; display: block; margin-top: 1px; }
    .era-count {
      font-size: 0.7rem; background: rgba(26,58,107,0.1);
      color: var(--c-navy);
      padding: 2px 9px; border-radius: 12px; flex-shrink: 0;
    }
    .era-btn[aria-expanded="true"] .era-count { background: rgba(255,255,255,0.18); color: #fff; }
    .era-arrow { font-size: 0.7rem; opacity: 0.6; transition: transform 0.3s; flex-shrink: 0; }
    .era-btn[aria-expanded="true"] .era-arrow { transform: rotate(180deg); opacity: 0.8; }

    /* ── Panou epocă ── */
    .era-panel {
      display: none; background: var(--c-surface);
      border-radius: 0 0 var(--radius) var(--radius);
      padding: 16px; border: 2px solid var(--c-border); border-top: none;
    }
    .era-panel.open { display: block; }
    .era-why {
      font-size: 0.84rem; color: var(--c-navy); font-style: italic;
      background: rgba(255,255,255,0.6); border-radius: 8px;
      padding: 9px 13px; margin-bottom: 14px;
      border-left: 3px solid var(--c-navy);
    }

    /* ── Layout jucător (paginat) ── */
    .player-wrap {
      display: grid; grid-template-columns: 200px 1fr;
      gap: 16px; align-items: start;
    }
    .photo-panel {
      background: var(--c-surface-2); border-radius: var(--radius);
      border: 2px solid var(--c-border);
      padding: 14px; text-align: center;
      position: sticky; top: 16px;
    }
    .photo-frame {
      width: 100%; aspect-ratio: 3/4;
      border-radius: 10px; overflow: hidden;
      background: rgba(26,58,107,0.06);
      border: 1px solid var(--c-border);
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 10px;
    }
    .photo-frame img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .no-photo { font-size: 3rem; opacity: 0.18; }
    .photo-name { font-size: 0.9rem; font-weight: 800; color: var(--c-navy); line-height: 1.3; margin-bottom: 5px; min-height: 2.6em; }
    .photo-crown {
      display: inline-block; font-size: 0.66rem; font-weight: 700;
      background: #fff3cd; color: #c8860a;
      border: 1px solid rgba(200,134,10,0.4);
      border-radius: 12px; padding: 1px 8px; margin-bottom: 4px;
    }
    .photo-num { font-size: 0.66rem; color: rgba(26,58,107,0.5); }

    .info-panel { display: flex; flex-direction: column; gap: 8px; }
    .info-row {
      background: var(--c-surface-2); border: 1px solid var(--c-border);
      border-radius: 10px; padding: 10px 13px;
    }
    .info-row-label {
      font-size: 0.63rem; font-weight: 800; text-transform: uppercase;
      letter-spacing: 1px; color: rgba(26,58,107,0.5); margin-bottom: 2px;
    }
    .info-row-val { font-size: 0.86rem; font-weight: 600; color: var(--c-navy); line-height: 1.4; min-height: 1.4em; }
    .info-text {
      background: var(--c-surface-2); border: 1px solid var(--c-border);
      border-radius: 10px; padding: 12px 14px;
    }
    .info-text-label {
      font-size: 0.63rem; font-weight: 800; text-transform: uppercase;
      letter-spacing: 1px; color: rgba(26,58,107,0.5); margin-bottom: 5px;
    }
    .info-text-body {
      font-size: 0.86rem; color: var(--c-text); line-height: 1.7;
      max-height: 110px; overflow-y: auto;
      scrollbar-width: thin; scrollbar-color: rgba(26,58,107,0.3) transparent;
    }
    .info-text-body::-webkit-scrollbar { width: 4px; }
    .info-text-body::-webkit-scrollbar-thumb { background: rgba(26,58,107,0.3); border-radius: 4px; }
    .anecdote-box {
      background: rgba(26,58,107,0.05);
      border: 1px solid var(--c-border); border-left: 3px solid var(--c-navy);
      border-radius: 10px; padding: 12px 14px;
    }
    .anecdote-body {
      font-size: 0.84rem; color: var(--c-text); font-style: italic; line-height: 1.75;
      max-height: 96px; overflow-y: auto;
      scrollbar-width: thin; scrollbar-color: rgba(26,58,107,0.3) transparent;
    }
    .anecdote-body::-webkit-scrollbar { width: 4px; }
    .anecdote-body::-webkit-scrollbar-thumb { background: rgba(26,58,107,0.3); border-radius: 4px; }
    .anecdote-body::before { content: '💬  '; font-style: normal; }

    /* ── Navigare jucători (← →) ── */
    .player-nav {
      display: flex; align-items: center; justify-content: space-between;
      margin-top: 12px; gap: 8px;
    }
    .pnav-btn {
      background: var(--c-navy); color: #fff; border: none;
      border-radius: 20px; padding: 8px 18px;
      font-family: var(--font-display); font-size: 0.86rem; font-weight: 700;
      cursor: pointer; transition: background 0.18s; min-width: 100px;
    }
    .pnav-btn:hover:not(:disabled) { background: #2a5aab; }
    .pnav-btn:disabled { opacity: 0.28; cursor: not-allowed; }
    .pnav-center { text-align: center; flex: 1; }
    .pnav-counter { font-size: 0.78rem; color: var(--c-navy); font-weight: 700; }
    .pnav-dots { display: flex; gap: 5px; justify-content: center; flex-wrap: wrap; margin-top: 4px; }
    .dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: rgba(26,58,107,0.22); cursor: pointer;
      border: none; transition: all 0.2s; padding: 0;
    }
    .dot.active { width: 18px; border-radius: 4px; background: var(--c-navy); }

    /* ── Lista campioni mondiali ── */
    .champ-list { display: flex; flex-direction: column; gap: 12px; }
    .champ-item {
      display: grid; grid-template-columns: 110px 1fr;
      gap: 14px; align-items: start;
      background: var(--c-surface-2); border: 2px solid var(--c-border);
      border-radius: var(--radius); padding: 14px;
    }
    .champ-item-photo {
      border-radius: 8px; overflow: hidden;
      aspect-ratio: 3/4; background: rgba(26,58,107,0.06);
      border: 1px solid var(--c-border);
      display: flex; align-items: center; justify-content: center;
    }
    .champ-item-photo img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .champ-item-no-photo { font-size: 2rem; opacity: 0.18; }
    .champ-item-info { display: flex; flex-direction: column; gap: 6px; }
    .champ-item-name {
      font-family: var(--font-display); font-size: 1rem; font-weight: 900;
      color: var(--c-navy); line-height: 1.2;
    }
    .champ-item-crown {
      display: inline-block; font-size: 0.62rem; font-weight: 700;
      background: #fff3cd; color: #c8860a;
      border: 1px solid rgba(200,134,10,0.4);
      border-radius: 10px; padding: 1px 7px; margin-left: 6px;
      vertical-align: middle;
    }
    .champ-item-years {
      font-size: 0.78rem; font-weight: 700; color: #c8860a;
    }
    .champ-item-country { font-size: 0.78rem; color: rgba(26,58,107,0.6); }
    .champ-item-fame {
      font-size: 0.82rem; color: var(--c-text); line-height: 1.65;
      border-top: 1px solid var(--c-border); padding-top: 6px; margin-top: 2px;
    }

    .player-links { display:flex; flex-direction:column; gap:5px; }
    .player-links a {
      font-size:0.82rem; font-weight:700; color:var(--c-navy);
      background:var(--c-surface-2); border:1px solid var(--c-border);
      border-radius:8px; padding:7px 12px; text-decoration:none;
      transition:background 0.15s;
    }
    .player-links a:hover { background:var(--c-navy); color:#fff; }

    @media (max-width: 620px) {
      .player-wrap { grid-template-columns: 1fr; }
      .photo-panel { position: static; }
      .champ-item { grid-template-columns: 80px 1fr; }
    }
  </style>

   prof:"Jurnalist de șah",
   fame:"Steinitz a fost PRIMUL Campion Mondial Oficial de Șah (1886–1894) și părintele teoriei șahului pozițional modern. A arătat că șahul are legi — centrul, structura pionilor, avantajele mici acumulate pas cu pas. A schimbat totul.",
   anec:"În ultimii ani ai vieții, Steinitz a înnebunit și credea că poate juca șah cu Dumnezeu prin telefon, dându-i acestuia un cal avans. A murit sărac la New York în 1900 — o ironie tristă a istoriei."},

  {id:12,era:"clasic",champ:false,name:"Mikhail Chigorin",years:"1850 – 1908",country:"Rusia (Gatchina)",
   img:"https://upload.wikimedia.org/wikipedia/commons/thumb/f/f3/Mikhail_Chigorin.jpg/220px-Mikhail_Chigorin.jpg",
   prof:"Funcționar, ulterior jurnalist de șah",
   fame:"Chigorin a fost cel mai mare jucător rus al sec. XIX și fondatorul școlii ruse de șah. A pierdut dramatic două meciuri pentru titlul mondial cu Steinitz. Apărarea Chigorin se mai joacă și azi.",
   anec:"În meciul din 1892, Chigorin juca ultima partidă cu albele într-o poziție câștigătoare — când a comis o gafă teribilă și a pierdut meciul. Sala a rămas încremenită."},

  {id:13,era:"clasic",champ:true,name:"Emanuel Lasker",years:"1868 – 1941",country:"Germania",
   img:"https://upload.wikimedia.org/wikipedia/commons/thumb/5/5e/Emanuel_Lasker_portrait.jpg/220px-Emanuel_Lasker_portrait.jpg",
   prof:"Matematician și filosof (doctor în matematică)",
   fame:"Lasker a deținut titlul de Campion Mondial timp de 27 de ani (1894–1921) — cel mai lung record din istoria șahului! Era un psiholog desăvârșit la tablă: studia fiecare adversar și îl bătea cu propriile slăbiciuni.",
   anec:"Albert Einstein i-a scris prefața cărții de șah a lui Lasker și a spus că el era 'una dintre cele mai fascinante personalități pe care le-am cunoscut vreodată'. Lasker câștiga partide cu psihologia, nu doar cu calculul."},

  {id:14,era:"clasic",champ:false,name:"Géza Maróczy",years:"1870 – 1951",country:"Ungaria (Szeged)",
   img:"https://upload.wikimedia.org/wikipedia/commons/thumb/e/e9/Geza_Maroczy.jpg/220px-Geza_Maroczy.jpg",
   prof:"Inginer",
   fame:"Maróczy a fost unul dintre cei mai puternici jucători ai perioadei 1895–1910. Cutia Maróczy — o formație de pioni la c4 și e4 contra Apărării Siciliene — îi poartă numele și este una dintre cele mai studiate structuri din șahul modern.",
   anec:"La 70 de ani, Maróczy a condus o partidă de corespondență pentru compatrioți deportați în lagăre sovietice. Șahul ca formă de rezistență și solidaritate umană."},

  {id:15,era:"clasic",champ:false,name:"Siegbert Tarrasch",years:"1862 – 1934",country:"Germania (Breslau)",
   img:"https://upload.wikimedia.org/wikipedia/commons/thumb/6/6b/Siegbert_Tarrasch.jpg/220px-Siegbert_Tarrasch.jpg",
   prof:"Medic (doctor în medicină)",
   fame:"Dr. Tarrasch a câștigat turneele de la Breslau, Manchester, Dresden, Leipzig și Viena — și tot n-a reușit să fie campion mondial! A fost cel mai influent profesor de șah al epocii. Deschiderea Tarrasch îi poartă numele.",
   anec:"Tarrasch a refuzat meciul pentru titlul mondial cu Steinitz în 1892–1893 pentru că era prea ocupat cu pacienții. Ironia e că meseria care l-a ținut departe de coroana mondială i-a adus și respectul generațiilor."},

  {id:16,era:"clasic",champ:false,name:"Harry Nelson Pillsbury",years:"1872 – 1906",country:"SUA (Massachusetts)",
   img:"https://upload.wikimedia.org/wikipedia/commons/thumb/5/5b/Harry_Nelson_Pillsbury.jpg/220px-Harry_Nelson_Pillsbury.jpg",
   prof:"Șahist profesionist",
   fame:"Pillsbury a câștigat turneul de la Hastings 1895 la PRIMA sa participare internațională, terminând înaintea lui Steinitz, Chigorin și Tarrasch. A murit tânăr, la 33 de ani.",
   anec:"Pillsbury a dat simultane la orb cu până la 22 de table. La o demonstrație, i-au dat o listă de 30 de cuvinte complicate pe care le-a memorat instant și le-a recitat la final. Memoria sa era fenomenală."},

  {id:17,era:"clasic",champ:false,name:"Carl Schlechter",years:"1874 – 1918",country:"Austria (Viena)",
   img:"https://upload.wikimedia.org/wikipedia/commons/thumb/7/7b/Carl_Schlechter.jpg/220px-Carl_Schlechter.jpg",
   prof:"Șahist profesionist și editor",
   fame:"Schlechter era poreclit Remizierul — juca atât de solid încât aproape că nu pierdea niciodată. În 1910 a jucat meciul pentru titlul mondial cu Lasker și a obținut egalitate 5-5, la un pas de a deveni campion.",
   anec:"Regulile meciului din 1910 cereau 2 puncte avans față de campion. Schlechter, conducând 5-4, a trebuit să joace riscant în ultima partidă, a pierdut-o și meciul s-a terminat 5-5. O regulă l-a costat coroana mondială."},

  {id:18,era:"clasic",champ:false,name:"Akiba Rubinstein",years:"1882 – 1961",country:"Polonia",
   img:"https://upload.wikimedia.org/wikipedia/commons/thumb/8/8e/Akiba_Rubinstein.jpg/220px-Akiba_Rubinstein.jpg",
   prof:"Șahist profesionist",
   fame:"Rubinstein este considerat unul dintre cei mai mari jucători care nu au câștigat niciodată titlul mondial. Finalurile sale de turnee sunt studiate și azi ca modele perfecte. Varianta Rubinstein din Apărarea Franceză îi poartă numele.",
   anec:"Rubinstein suferea de agorafobie severă și se ascundea în colțuri la turnee. Dar odată ce se așeza la tablă, parcă o altă personalitate îl cuprinea — calculul său era de o profunzime aproape imposibilă."},

  {id:19,era:"clasic",champ:false,name:"Aron Nimzowitsch",years:"1886 – 1935",country:"Letonia — Germania și Danemarca",
   img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/45/Aaron_Nimzowitsch.jpg/220px-Aaron_Nimzowitsch.jpg",
   prof:"Scriitor și teoretician de șah",
   fame:"Nimzowitsch a scris Mein System (1925) — una dintre cele mai influente cărți din istoria șahului. A creat școala hipermodernistă. Apărarea Nimzo-Indiană și alte concepte îi poartă numele.",
   anec:"Nimzowitsch era faimos pentru temperamentul exploziv. Într-un incident atestat de contemporani, după o mutare slabă a adversarului, s-ar fi ridicat strigând: 'De ce trebuie să pierd față de un idiot?!' — replică devenită legendară."},

  {id:20,era:"clasic",champ:true,name:"José Raúl Capablanca",years:"1888 – 1942",country:"Cuba",
   img:"https://upload.wikimedia.org/wikipedia/commons/thumb/5/5e/Capablanca.jpg/220px-Capablanca.jpg",
   prof:"Diplomat (atașat la Ministerul de Externe al Cubei)",
   fame:"Capablanca a fost Campion Mondial (1921–1927), unul dintre cei mai talentați jucători naturali din istoria șahului. Era renumit pentru finalurile perfecte și claritatea cu care vedea jocul. Mulți l-au numit Mașina de Șah.",
   anec:"Capablanca a învățat să joace șah la 4 ani, observând cum juca tatăl lui și corectându-i o mutare greșită! La 13 ani l-a bătut pe campionul Cubei, Juan Corzo, într-un meci oficial."},

  {id:21,era:"clasic",champ:true,name:"Alexander Alekhine",years:"1892 – 1946",country:"Rusia — cetățean francez",
   img:"https://upload.wikimedia.org/wikipedia/commons/thumb/e/e8/Alexander_Alekhine_1935.jpg/220px-Alexander_Alekhine_1935.jpg",
   prof:"Jurist (avocat, investigator criminal)",
   fame:"Alekhine a câștigat titlul mondial în 1927 și este singurul campion care a murit cu titlul. Renumit pentru atacuri extrem de complexe și sacrificiale. Apărarea Alekhine (1.e4 Nf6) îi poartă numele.",
   anec:"În 1933, Alekhine a jucat 32 de partide simultan la orb la Chicago — câștigând 19, remizând 9 și pierzând 4. Evenimentul a durat 12 ore și a fost relatat de presa americană ca un mister al minții umane."},

  {id:22,era:"clasic",champ:false,name:"Efim Bogoljubov",years:"1889 – 1952",country:"Ucraina — activ în Germania",
   img:"https://upload.wikimedia.org/wikipedia/commons/thumb/7/7e/Bogoljubow.jpg/220px-Bogoljubow.jpg",
   prof:"Șahist profesionist",
   fame:"Bogoljubov a câștigat turnee importante în anii 20 și a jucat de două ori pentru titlul mondial cu Alekhine (1929, 1934), pierzând ambele. Apărarea Bogoljubov-Indiană îi poartă numele.",
   anec:'Bogoljubov este celebru pentru replica: "Când joc cu albul, câștig pentru că am albul; când joc cu negrul, câștig pentru că sunt Bogoljubov!" Confirmată de contemporani ca perfect reprezentativă pentru personalitatea sa.'},

  {id:23,era:"clasic",champ:true,name:"Max Euwe",years:"1901 – 1981",country:"Olanda",
   img:"https://upload.wikimedia.org/wikipedia/commons/thumb/2/2d/Max_Euwe.jpg/220px-Max_Euwe.jpg",
   prof:"Profesor de matematică (doctor în matematică)",
   fame:"Euwe este singurul amator care a câștigat vreodată titlul mondial de șah, în 1935, bătând-ul pe Alekhine! A predat matematică în timp ce era campion mondial. Ulterior a fost președinte al FIDE (1970–1978).",
   anec:"În timpul campionatului mondial din 1935, Euwe continua să predea lecții de matematică elevilor între runde. Regele Olandei i-a acordat onoruri speciale după victorie. Un profesor de matematică câștigase titlul mondial de șah!"},

  {id:24,era:"clasic",champ:false,name:"Reuben Fine",years:"1914 – 1993",country:"SUA (New York)",img:null,
   prof:"Psiholog (doctor în psihologie, psihanalist)",
   fame:"Fine a fost unul dintre cei mai puternici jucători americani ai anilor 1930–1940. A scris Basic Chess Endings (1941), carte de referință. Și-a abandonat complet cariera de șahist pentru a deveni psiholog.",
   anec:"Fine a fost invitat la Meciul Mondial din 1948 (după moartea lui Alekhine), dar a REFUZAT — prefera studiile de psihologie. A renunțat voluntar la o șansă reală la titlul mondial pentru știință."},

  {id:25,era:"clasic",champ:false,name:"Samuel Reshevsky",years:"1911 – 1992",country:"Polonia — emigrat în SUA",img:null,
   prof:"Contabil",
   fame:"Reshevsky a câștigat campionatul SUA de 8 ori. A rămas faimos pentru talentul de prodigie — la 8 ani juca cu adulți prin toată Europa. A combinat toată viața cariera de contabil cu șahul la cel mai înalt nivel.",
   anec:"La vârsta de 8 ani, Reshevsky a dat o simultană la Paris în fața a 20 de adulți, câștigând toate partidele. Fotografiile — un copilaș pe un scaun înalt, gândindu-se la șah — au înconjurat lumea."},

  {id:26,era:"clasic",champ:false,name:"Miguel Najdorf",years:"1910 – 1997",country:"Polonia — emigrat în Argentina",
   img:"https://upload.wikimedia.org/wikipedia/commons/thumb/8/8e/Miguel_Najdorf.jpg/220px-Miguel_Najdorf.jpg",
   prof:"Om de afaceri (firmă de asigurări în Argentina)",
   fame:"Najdorf a emigrat în Argentina după Holocaust, întreaga sa familie pierzând în Război. A creat Varianta Najdorf a Apărării Siciliene (5...a6) — una dintre cele mai jucate variante din șahul modern.",
   anec:"În 1947, Najdorf a organizat o simultană la orb cu 45 de adversari. Scopul său adevărat: să ajungă în ziare în toată lumea, sperând că frații săi din Europa vor citi știrea. Nu știa că ei nu mai trăiau."},

  {id:27,era:"clasic",champ:true,name:"Mikhail Botvinnik",years:"1911 – 1995",country:"URSS (Rusia)",
   img:"https://upload.wikimedia.org/wikipedia/commons/thumb/7/7f/Botvinnik.jpg/220px-Botvinnik.jpg",
   prof:"Inginer electrician (doctor în inginerie)",
   fame:"Botvinnik a fost campion mondial de trei ori (1948–1957, 1958–1960, 1961–1963) și fondatorul școlii sovietice de șah. A format generații de campioni, inclusiv Karpov și Kasparov.",
   anec:"Botvinnik fuma deliberat în antrenament ca să se obișnuiască cu fumul adversarilor. Punea muzică tare în cameră ca să-și antreneze concentrarea. Un om de știință al șahului."},

  {id:28,era:"clasic",champ:false,name:"Paul Keres",years:"1916 – 1975",country:"Estonia",
   img:"https://upload.wikimedia.org/wikipedia/commons/thumb/7/7a/Paul_Keres.jpg/220px-Paul_Keres.jpg",
   prof:"Șahist profesionist",
   fame:"Keres a fost supranumit Eternul Secund: de patru ori la rând pe locul 2 în Turneul Candidaților (1953, 1956, 1959, 1962), niciodată campion mondial. Eroul național absolut al șahului estonian.",
   anec:"Estonia l-a comemorat pe Keres pe bancnota de 5 krooni în 1991. Este unul dintre puținii sportivi din lume apăruți pe o bancnotă națională — omagiul suprem."},

  {id:29,era:"clasic",champ:false,name:"David Bronstein",years:"1924 – 2006",country:"URSS (Ucraina)",img:null,
   prof:"Scriitor de șah și antrenor",
   fame:"Bronstein a jucat meciul pentru titlul mondial în 1951 împotriva lui Botvinnik, terminând 12-12. Cartea sa despre Turneul de la Zurich 1953 este considerată una dintre cele mai bune cărți de șah scrise vreodată.",
   anec:'Bronstein conducea 11.5-9.5 și nu mai avea nevoie decât de un punct din 5 partide. A pierdut două. Meciul a terminat 12-12. Bronstein a spus mai târziu că "presiunile externe" ar fi putut juca un rol — fără a intra în detalii.'},

  {id:30,era:"clasic",champ:true,name:"Vasily Smyslov",years:"1921 – 2010",country:"URSS (Rusia)",
   img:"https://upload.wikimedia.org/wikipedia/commons/thumb/9/96/Smyslov.jpg/220px-Smyslov.jpg",
   prof:"Bariton (cântăreț de operă)",
   fame:"Smyslov a fost campion mondial în 1957–1958, renumit pentru stilul armonios și maestria în finaluri. A participat la Turneul Candidaților timp de 4 decenii. Și mai era bariton — cântăreț de operă de meserie!",
   anec:"Smyslov a auditionat la Teatrul Bolșoi în tinerețe, terminând pe locul doi. A continuat să cânte în concerte private toată viața. La un banchet din anii 80, a cântat arii de operă spre surprinderea tuturor."},

  {id:31,era:"clasic",champ:false,name:"Efim Geller",years:"1925 – 1998",country:"URSS (Ucraina)",img:null,
   prof:"Șahist profesionist",
   fame:"Geller a câștigat campionatul URSS de două ori și era expert în Apărarea Regală Indiana. Are ceva unic: un record pozitiv față de Bobby Fischer — mai mult decât orice alt jucător al epocii.",
   anec:"Geller l-a bătut pe Fischer de 5 ori în partide individuale. Fischer, care domina aproape pe toată lumea, recunoștea că Geller era unul dintre puținii adversari care îi înțelegea cu adevărat planurile."},

  {id:32,era:"clasic",champ:true,name:"Mikhail Tal",years:"1936 – 1992",country:"URSS (Letonia — Riga)",
   img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/42/Mikhail_Tal_1961.jpg/220px-Mikhail_Tal_1961.jpg",
   prof:"Jurnalist de șah",
   fame:"Tal — Vrăjitorul din Riga — a fost campion mondial în 1960–1961 și probabil cel mai spectaculos jucător din toată istoria șahului. Sacrificii de piese pe care nimeni nu le putea calcula, atacuri de o complexitate amețitoare.",
   anec:"Tal era faimos pentru privirea hipnotică la tablă care îi intimida pe adversari. Portisch a declarat că nu putea să se uite în ochii lui Tal. Tal însuși a confirmat că folosea conștient acest efect psihologic."},

  {id:33,era:"clasic",champ:false,name:"Lev Polugaevsky",years:"1934 – 1995",country:"URSS (Rusia)",img:null,
   prof:"Șahist profesionist",
   fame:"Polugaevsky a creat Varianta Polugaevsky din Apărarea Siciliană — una dintre cele mai complexe linii din teoria modernă. A participat la mai multe Turnee ale Candidaților.",
   anec:"Polugaevsky a scris o carte întreagă dedicată unei singure variante pe care o crease: Grandmaster Preparation. Zeci de ani de analiză personală. Considerată și azi o capodoperă a profunzimii analitice."},

  {id:34,era:"clasic",champ:true,name:"Tigran Petrosian",years:"1929 – 1984",country:"URSS (Armenia)",
   img:"https://upload.wikimedia.org/wikipedia/commons/thumb/e/e6/Tigran_Petrosian.jpg/220px-Tigran_Petrosian.jpg",
   prof:"Editor al revistei de șah '64'",
   fame:"Iron Tigran — campion mondial 1963–1969. Maestrul absolut al apărării preventive: elimina pericolele ÎNAINTE ca adversarul să le creeze. Câștiga partide în care adversarul nici nu înțelegea când a pierdut.",
   anec:"Petrosian era surd parțial și purta aparat auditiv. În partide tensionate, scotea aparatul, izolându-se complet de zgomot. Concentrarea sa devenea atunci totală."},

  {id:35,era:"clasic",champ:false,name:"Bent Larsen",years:"1935 – 2010",country:"Danemarca",img:null,
   prof:"Șahist profesionist și autor",
   fame:"Larsen a fost cel mai puternic jucător occidental al anilor 1960–1970, cu excepția lui Fischer. Pionier în deschideri originale (Deschiderea Larsen: 1.b3). Nu accepta niciodată remize ușoare.",
   anec:"La meciul Candidaților din 1971, Larsen a pierdut cu 0-6 față de Fischer — scor nemaivăzut la nivel de elită. A comentat sportiv că Fischer jucase la un nivel pur și simplu inalienabil."},

  {id:36,era:"clasic",champ:true,name:"Boris Spassky",years:"1937 – prezent",country:"URSS — cetățean francez",
   img:"https://upload.wikimedia.org/wikipedia/commons/thumb/9/90/Boris_Spassky_1974.jpg/220px-Boris_Spassky_1974.jpg",
   prof:"Șahist profesionist",
   fame:"Spassky a fost campion mondial în 1969–1972 și este faimos pentru Meciul Secolului de la Reykjavik (1972) cu Bobby Fischer. Jucător universal, capabil să joace în orice stil.",
   anec:"La meciul din 1972, după ce Fischer a câștigat partida a 6-a spectaculos, Spassky s-a ridicat și a aplaudat alături de public. Gestul de sportivitate față de adversarul care îl necăjise enorm a rămas în istoria sportului."},

  {id:37,era:"clasic",champ:false,name:"Viktor Korchnoi",years:"1931 – 2016",country:"URSS — cetățean elvețian",img:null,
   prof:"Șahist profesionist",
   fame:"Korchnoi — Viktor cel Groaznic — a jucat de două ori pentru titlul mondial (1978, 1981) împotriva lui Karpov. A defectat din URSS în 1976. Combativitate extremă și longevitate excepțională.",
   anec:"La meciul din 1978, Korchnoi juca știind că fiul său era reținut în URSS. Tabăra sovietică a adus un parapsiholog care se uita fix spre Korchnoi. Meciul a durat 5 luni — un duel politico-sportiv unic."},

  {id:38,era:"clasic",champ:true,name:"Bobby Fischer",years:"1943 – 2008",country:"SUA",
   img:"https://upload.wikimedia.org/wikipedia/commons/thumb/d/d6/Bobby_Fischer_1960_in_Leipzig_vor_dem_Kandidatenturnier_%28cropped%29.jpg/220px-Bobby_Fischer_1960_in_Leipzig_vor_dem_Kandidatenturnier_%28cropped%29.jpg",
   prof:"Șahist profesionist (de la vârste fragede)",
   fame:"Fischer a fost campion mondial (1972–1975) și mulți îl consideră cel mai mare șahist din toate timpurile. Mare Maestru la 15 ani. A câștigat 12 partide consecutive la nivel de elită în 1971 — performanță nemaivăzută.",
   anec:"La Turneul Candidaților din 1971, Fischer l-a bătut pe Taimanov 6-0, apoi pe Larsen 6-0 — 12 victorii consecutive fără nicio remiză împotriva unor jucători top 10 mondial. Niciun alt jucător nu a mai realizat asta."},

  {id:39,era:"clasic",champ:false,name:"Lajos Portisch",years:"1937 – prezent",country:"Ungaria",img:null,
   prof:"Șahist profesionist",
   fame:"Portisch a fost cel mai bun jucător ungar din toate timpurile, unul dintre cei mai constanți jucători de top timp de 4 decenii. A participat la 8 Turnee ale Candidaților — un record de longevitate.",
   anec:"Portisch a participat la Turneul Candidaților în 8 ediții diferite fără să câștige titlul mondial. Câți jucători din lume pot spune că au concurat la cel mai înalt nivel timp de 40 de ani?"},

  {id:40,era:"clasic",champ:true,name:"Anatoly Karpov",years:"1951 – prezent",country:"URSS / Rusia",
   img:"https://upload.wikimedia.org/wikipedia/commons/thumb/3/3a/Karpov-1982.jpg/440px-Karpov-1982.jpg",
   prof:"Șahist profesionist; politician; activist UNICEF",
   fame:"Karpov a câștigat titlul mondial în 1975 (Fischer a refuzat să joace) și l-a apărat în trei meciuri epice cu Kasparov. Era un jucător de o precizie aproape mecanică, adunând avantaje mici și transformându-le în victorii.",
   anec:"Meciul din 1984 cu Kasparov a durat 48 de partide și 5 luni! Karpov conducea 5-0. FIDE l-a oprit controversat fără câștigător. Kasparov a acuzat public că oprirea l-a salvat pe Karpov."},

  {id:41,era:"clasic",champ:false,name:"Jan Timman",years:"1951 – prezent",country:"Olanda",img:null,
   prof:"Șahist profesionist; scriitor; redactor New in Chess",
   fame:"Timman a fost cel mai puternic jucător occidental al anilor 80, locul 2 mondial în FIDE. A jucat meciul pentru titlul FIDE în 1993 cu Karpov. Stil atacant și creativ.",
   anec:"În 1993, FIDE i-a desemnat pe Karpov și Timman să joace pentru titlul FIDE, după ce Kasparov și Short fondaseră PCA. Timp de un deceniu lumea șahului a avut doi campioni mondiali — situație de neînțeles pentru publicul larg."},

  {id:42,era:"clasic",champ:true,name:"Garry Kasparov",years:"1963 – prezent",country:"URSS / Rusia",
   img:"https://upload.wikimedia.org/wikipedia/commons/thumb/b/b4/Garry_Kasparov_in_2012.jpg/440px-Garry_Kasparov_in_2012.jpg",
   prof:"Șahist profesionist (retras 2005); scriitor; activist politic",
   fame:"Kasparov a devenit cel mai tânăr Campion Mondial în 1985, la 22 de ani. A fost numărul 1 mondial timp de 20 de ani consecutivi. Meciul din 1997 cu calculatorul Deep Blue este unul dintre cele mai mediatizate din istoria sportului.",
   anec:"În 1997, Kasparov a abandonat o poziție în care putea forța remiză — șocat de mutarea neașteptată a lui Deep Blue. A sugerat intervenție umană, IBM a negat. A pierdut meciul 2.5-3.5. Momentul în care calculatorul a depășit campionul mondial."},

  // ── ERA COMPUTERELOR ──

function proxyImg(p) {
  return LOCAL_IMGS[p.id] || null;
}

function photoHTML(p) {
  var src = proxyImg(p);
  if (!src) return '<div class="no-photo">♛</div>';
  return '<img src="' + src + '" alt="' + p.name + '" loading="lazy" onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'flex\'">'
       + '<div class="no-photo" style="display:none">♛</div>';
}

// ── UPDATE CARD ───────────────────────────────────────────────────────
function updateCard(era) {
  var players = byEra(era);
  var idx = state[era];
  var p = players[idx];
  var total = players.length;

  document.getElementById('photo-' + era).innerHTML = photoHTML(p);
  document.getElementById('name-' + era).textContent = p.name;

  var crown = document.getElementById('crown-' + era);
  crown.style.display = p.champ ? 'inline-block' : 'none';

  document.getElementById('pnum-' + era).textContent = '#' + p.id + ' din ' + P.length;
  document.getElementById('years-' + era).textContent = p.years;
  document.getElementById('country-' + era).textContent = p.country;
  document.getElementById('prof-' + era).textContent = p.prof;
  document.getElementById('fame-' + era).textContent = p.fame;
  document.getElementById('anec-' + era).textContent = p.anec;
  var linksEl = document.getElementById('links-' + era);
  if (linksEl) {
    if (p.links && p.links.length) {
      linksEl.innerHTML = p.links.map(function(l) {
        return '<a href="' + l.url + '" target="_blank" rel="noopener">' + l.label + '</a>';
      }).join('');
      linksEl.style.display = 'flex';
    } else {
      linksEl.style.display = 'none';
    }
  }

  document.getElementById('prev-' + era).disabled = (idx === 0);
  document.getElementById('next-' + era).disabled = (idx === total - 1);
  document.getElementById('counter-' + era).textContent = (idx + 1) + ' din ' + total;

  var dots = document.querySelectorAll('#dots-' + era + ' .dot');
  dots.forEach(function(d, i) { d.classList.toggle('active', i === idx); });
}

function navigate(era, dir) {
  var players = byEra(era);
  var next = state[era] + dir;
  if (next < 0 || next >= players.length) return;
  state[era] = next;
  updateCard(era);
}

function goTo(era, idx) {
  state[era] = idx;
  updateCard(era);
}

// ── ACCORDION ────────────────────────────────────────────────────────
function toggleEra(id) {
  var panel = document.getElementById('panel-' + id);
  var btn   = document.getElementById('btn-' + id);
  var open  = panel.classList.contains('open');
  panel.classList.toggle('open', !open);
  btn.setAttribute('aria-expanded', String(!open));
}

// ── RENDER EPOCE (paginat) ────────────────────────────────────────────
function dotsHTML(era) {
  var players = byEra(era);
  var html = '';
  players.forEach(function(_, i) {
    html += '<button class="dot" onclick="goTo(\'' + era + '\',' + i + ')" title="Jucătorul ' + (i+1) + '"></button>';
  });
  return html;
}

function renderEra(era) {
  var players = byEra(era);
  var m = ERAS.find(function(e) { return e.id === era; });
  return '<div class="era-block">'
    + '<button class="era-btn" id="btn-' + era + '" aria-expanded="false" onclick="toggleEra(\'' + era + '\')">'
    + '<span class="era-code">' + m.icon + '</span>'
    + '<span class="era-titles"><span class="era-name">' + m.name + '</span><span class="era-range">' + m.range + '</span></span>'
    + '<span class="era-count">' + players.length + ' jucători</span>'
    + '<span class="era-arrow">▼</span>'
    + '</button>'
    + '<div class="era-panel" id="panel-' + era + '">'
    + '<p class="era-why">' + m.why + '</p>'
    + '<div class="player-wrap">'
    + '<div class="photo-panel">'

    + '<div class="photo-name" id="name-' + era + '"></div>'
    + '<div id="crown-' + era + '" class="photo-crown">♔ Campion Mondial</div>'

    + '<div class="info-row"><div class="info-row-label">🌍 Origine</div><div class="info-row-val" id="country-' + era + '"></div></div>'
    + '<div class="info-row"><div class="info-row-label">💼 Meseria</div><div class="info-row-val" id="prof-' + era + '"></div></div>'
    + '<div class="info-text"><div class="info-text-label">♟ Ce l-a făcut faimos</div><div class="info-text-body" id="fame-' + era + '"></div></div>'
    + '<div class="anecdote-box"><div class="info-text-label">💬 O poveste adevărată</div><div class="anecdote-body" id="anec-' + era + '"></div></div>'
    + '<div class="player-links" id="links-' + era + '" style="display:none"></div>'

// ── RENDER CAMPIONI MONDIALI (lista verticală) ─────────────────────────
function renderChampions() {
  var champions = P.filter(function(p) { return p.champ; });
  var items = champions.map(function(p) {
    var cy = CHAMP_YEARS[p.name] || '';
    var photoEl = p.img
      ? '<img src="' + proxyImg(p) + '" alt="' + p.name + '" loading="lazy" onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'flex\'">'
        + '<div class="champ-item-no-photo" style="display:none">♛</div>'
      : '<div class="champ-item-no-photo">♛</div>';
    return '<div class="champ-item">'
      + '<div class="champ-item-photo">' + photoEl + '</div>'
      + '<div class="champ-item-info">'
      + '<div class="champ-item-name">' + p.name + '<span class="champ-item-crown">♔ Campion Mondial</span></div>'
      + (cy ? '<div class="champ-item-years">♔ ' + cy + '</div>' : '')
      + '<div class="champ-item-country">🌍 ' + p.country + '</div>'
      + '<div class="champ-item-fame">' + p.fame + '</div>'
      + '</div>'
      + '</div>';
  }).join('');

  return '<div class="era-block">'
    + '<button class="era-btn" id="btn-campioni" aria-expanded="false" onclick="toggleEra(\'campioni\')">'
    + '<span class="era-code">👑</span>'
    + '<span class="era-titles"><span class="era-name">Campionii Mondiali</span><span class="era-range">Toți campionii — în ordine cronologică</span></span>'
    + '<span class="era-count">' + champions.length + ' campioni</span>'
    + '<span class="era-arrow">▼</span>'
    + '</button>'
    + '<div class="era-panel" id="panel-campioni">'
    + '<p class="era-why">Toți campionii mondiali oficiali de șah, de la Wilhelm Steinitz (1886) până în prezent. Fiecare a lăsat o urmă distinctă în istoria jocului.</p>'
    + '<div class="champ-list">' + items + '</div>'
    + '</div>'
    + '</div>';
}
