  <style>

    /* ── Acordeon epocă ── */
    .era-block { margin-bottom: 10px; border-radius: var(--radius); overflow: hidden; }

    .era-btn {
      width: 100%; display: flex; align-items: center; gap: 12px;
      padding: 14px 18px;
      background: var(--c-surface-2); color: var(--c-navy);
      border: 2px solid var(--c-border); cursor: pointer; text-align: left;
      font-family: var(--font-display); transition: background 0.2s;
      border-radius: var(--radius);
    }
    .era-btn[aria-expanded="true"] {
      border-radius: var(--radius) var(--radius) 0 0;
      background: var(--c-navy); color: #fff; border-color: var(--c-navy);
    }
    .era-btn:not([aria-expanded="true"]):hover { background: var(--c-surface); }
    .era-code {
      width: 36px; height: 36px; border-radius: 8px;
      background: rgba(26,58,107,0.08);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.2rem; flex-shrink: 0;
    }
    .era-btn[aria-expanded="true"] .era-code { background: rgba(255,255,255,0.15); }
    .era-titles { flex: 1; }
    .era-name { font-size: 1rem; font-weight: 700; display: block; line-height: 1.2; }
    .era-range { font-size: 0.72rem; opacity: 0.65; display: block; margin-top: 1px; }
    .era-count {
      font-size: 0.7rem; background: rgba(26,58,107,0.1);
      color: var(--c-navy);
      padding: 2px 9px; border-radius: 12px; flex-shrink: 0;
    }
    .era-btn[aria-expanded="true"] .era-count { background: rgba(255,255,255,0.18); color: #fff; }
    .era-arrow { font-size: 0.7rem; opacity: 0.6; transition: transform 0.3s; flex-shrink: 0; }
    .era-btn[aria-expanded="true"] .era-arrow { transform: rotate(180deg); opacity: 0.8; }

    /* ── Panou epocă ── */
    .era-panel {
      display: none; background: var(--c-surface);
      border-radius: 0 0 var(--radius) var(--radius);
      padding: 16px; border: 2px solid var(--c-border); border-top: none;
    }
    .era-panel.open { display: block; }
    .era-why {
      font-size: 0.84rem; color: var(--c-navy); font-style: italic;
      background: rgba(255,255,255,0.6); border-radius: 8px;
      padding: 9px 13px; margin-bottom: 14px;
      border-left: 3px solid var(--c-navy);
    }

    /* ── Override layout: poza mare în loc de tablă, panou text mai lat ── */
    .page-main { grid-template-columns: 35fr 65fr; }
    .board-wrapper { aspect-ratio: auto !important; width: 100% !important; height: 100% !important; box-shadow: none !important; border-radius: 0 !important; background: transparent !important; }
    .board-col { align-items: stretch !important; }

    .big-photo-card {
      width: 100%; height: 100%;
      display: flex; flex-direction: column; gap: 12px;
      background: var(--c-surface); border: 2px solid var(--c-border);
      border-radius: var(--radius); padding: 16px;
      align-items: center; text-align: center;
      overflow: hidden;
    }
    .big-photo-frame {
      flex: 1; min-height: 0; width: 100%;
      border-radius: 12px; overflow: hidden;
      background: rgba(26,58,107,0.06);
      border: 1px solid var(--c-border);
      display: flex; align-items: center; justify-content: center;
    }
    .big-photo-frame img { width: 100%; height: 100%; object-fit: contain; display: block; }
    .big-photo-placeholder {
      color: rgba(26,58,107,0.45); font-size: 0.95rem; font-weight: 600;
      line-height: 1.5; padding: 20px;
    }
    .big-photo-placeholder span { font-size: 2rem; opacity: 0.5; display: block; margin-top: 8px; }
    .big-photo-name {
      font-family: var(--font-display); font-size: 1.2rem; font-weight: 900;
      color: var(--c-navy); line-height: 1.25; min-height: 1.25em;

    .big-photo-meta {
      display: flex; gap: 10px; align-items: center; justify-content: center; flex-wrap: wrap;
    }
    .big-photo-crown {
      font-size: 0.74rem; font-weight: 700;
      background: #fff3cd; color: #c8860a;
      border: 1px solid rgba(200,134,10,0.4);
      border-radius: 14px; padding: 3px 11px;
    }
    .big-photo-num { font-size: 0.78rem; color: rgba(26,58,107,0.55); font-weight: 600; }

    /* ── Layout jucător (panou dreapta) ── */
    .player-wrap {
      display: flex; flex-direction: column; gap: 10px;
    }

    .info-panel { display: flex; flex-direction: column; gap: 8px; }
    .info-row {
      background: var(--c-surface-2); border: 1px solid var(--c-border);
      border-radius: 10px; padding: 10px 13px;
    }
    .info-row-label {
      font-size: 0.63rem; font-weight: 800; text-transform: uppercase;
      letter-spacing: 1px; color: rgba(26,58,107,0.5); margin-bottom: 2px;

    .info-row-val { font-size: 0.86rem; font-weight: 600; color: var(--c-navy); line-height: 1.4; min-height: 1.4em; }
    .info-text {
      background: var(--c-surface-2); border: 1px solid var(--c-border);
      border-radius: 10px; padding: 12px 14px;
    }
    .info-text-label {
      font-size: 0.63rem; font-weight: 800; text-transform: uppercase;
      letter-spacing: 1px; color: rgba(26,58,107,0.5); margin-bottom: 5px;
    }
    .info-text-body {
      font-size: 0.92rem; color: var(--c-text); line-height: 1.7;
    }
    .anecdote-box {
      background: rgba(26,58,107,0.05);
      border: 1px solid var(--c-border); border-left: 3px solid var(--c-navy);
      border-radius: 10px; padding: 12px 14px;
    }
    .anecdote-body {
      font-size: 0.9rem; color: var(--c-text); font-style: italic; line-height: 1.75;
    }
    .anecdote-body::before { content: '💬  '; font-style: normal; }

    /* ── Navigare jucători (← →) ── */
    .player-nav {
      display: flex; align-items: center; justify-content: space-between;
      margin-top: 10px; gap: 8px; flex-shrink: 0;
    }
    .pnav-btn {
      background: var(--c-navy); color: #fff; border: none;
      border-radius: 20px; padding: 8px 18px;
      font-family: var(--font-display); font-size: 0.86rem; font-weight: 700;
      cursor: pointer; transition: background 0.18s; min-width: 100px;
    }
    .pnav-btn:hover:not(:disabled) { background: #2a5aab; }
    .pnav-btn:disabled { opacity: 0.28; cursor: not-allowed; }
    .pnav-btn.pnav-btn-back-to-eras { background: #c8860a; }
    .pnav-btn.pnav-btn-back-to-eras:hover { background: #b07608; }
    .pnav-center { text-align: center; flex: 1; }
    .pnav-counter { font-size: 0.78rem; color: var(--c-navy); font-weight: 700; }
    .pnav-dots { display: flex; gap: 5px; justify-content: center; flex-wrap: wrap; margin-top: 4px; }
    .dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: rgba(26,58,107,0.22); cursor: pointer;
      border: none; transition: all 0.2s; padding: 0;
    }
    .dot.active { width: 18px; border-radius: 4px; background: var(--c-navy); }

    /* ── Lista campioni mondiali ── */
    .champ-list { display: flex; flex-direction: column; gap: 12px; }
    .champ-item {
      display: grid; grid-template-columns: 110px 1fr;
      gap: 14px; align-items: start;
      background: var(--c-surface-2); border: 2px solid var(--c-border);
      border-radius: var(--radius); padding: 14px;
    }
    .champ-item-photo {
      border-radius: 8px; overflow: hidden;
      aspect-ratio: 3/4; background: rgba(26,58,107,0.06);
      border: 1px solid var(--c-border);
      display: flex; align-items: center; justify-content: center;
    }
    .champ-item-photo img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .champ-item-no-photo { font-size: 2rem; opacity: 0.18; }
    .champ-item-info { display: flex; flex-direction: column; gap: 6px; }
    .champ-item-name {
      font-family: var(--font-display); font-size: 1rem; font-weight: 900;
      color: var(--c-navy); line-height: 1.2;
    }
    .champ-item-crown {
      display: inline-block; font-size: 0.62rem; font-weight: 700;
      background: #fff3cd; color: #c8860a;
      border: 1px solid rgba(200,134,10,0.4);
      border-radius: 10px; padding: 1px 7px; margin-left: 6px;
      vertical-align: middle;
    }
    .champ-item-years {
      font-size: 0.78rem; font-weight: 700; color: #c8860a;
    }
    .champ-item-country { font-size: 0.78rem; color: rgba(26,58,107,0.6); }
    .champ-item-fame {
      font-size: 0.82rem; color: var(--c-text); line-height: 1.65;
      border-top: 1px solid var(--c-border); padding-top: 6px; margin-top: 2px;
    }

    .player-links { display:flex; flex-direction:column; gap:5px; }
    .player-links a {
      font-size:0.82rem; font-weight:700; color:var(--c-navy);
      background:var(--c-surface-2); border:1px solid var(--c-border);
      border-radius:8px; padding:7px 12px; text-decoration:none;
      transition:background 0.15s;
    }
    .player-links a:hover { background:var(--c-navy); color:#fff; }

    @media (max-width: 620px) {
      .champ-item { grid-template-columns: 80px 1fr; }
    }
  </style>

const P = [
  // ── ÎNAINTE DE CAMPIONATUL MONDIAL ──
  {id:1,era:"vechi",champ:false,name:"Abu Bakr al-Suli",years:"~880 – 946",country:"Califatul Abbasid (Bagdad)",img:null,
   prof:"Poet și secretar la curtea califilor abbasizi",
   peak:"A scris Kitab al-Shatranj — primul mare manual de șah/shatranj din istorie",
   style:"Pozițional și răbdător — a creat primele studii sistematice de finaluri",
   fame:"Al-Suli a fost cel mai puternic jucător de shatranj (strămoșul șahului) din lumea arabă medievală — și unul dintre marii cărturari ai epocii sale. A trăit la curtea califilor abbasizi din Bagdad — al-Muktafi, al-Muqtadir și al-Radi — fiind în același timp poet, muzician și expert în gastronomie. A scris Kitab al-Shatranj (Cartea Șahului), o lucrare care a sistematizat deschideri, mijlocul de joc și finaluri pentru prima dată în istorie. A inventat și mansubat (probleme de șah) atât de elegante, încât unele se studiază și azi. A fost tutorul prințului care a devenit califul al-Radi — protecția lui i-a asigurat un loc de cinste la curte. După moartea acestuia a căzut în dizgrație și a murit sărac, ascuns în Basra. Reputația lui a fost atât de mare încât, șase secole după moarte, expresia „joacă mai bine decât al-Suli\" era cel mai mare compliment pe care îl putea primi un jucător arab.",
   anec:"Într-o zi, califul al-Muktafi l-a chemat la palat să-l înfrunte pe campionul curții, un jucător numit al-Mawardi. Al-Suli era considerat un outsider — nimeni nu credea că un cărturar mai tânăr îl poate bate. A câștigat dezinvolt, în fața întregii curți, iar califul a fost atât de impresionat încât l-a numit imediat la curte ca jucător personal. Mai mult, al-Suli a continuat să-l învingă chiar și pe calif — act remarcabil de curaj la curtea abbasidă, unde nimeni nu îndrăznea să-l umilească pe stăpân. Califul, în loc să se supere, i-a acordat privilegiul rar de a juca cu oricine din palat."},

  {id:2,era:"vechi",champ:false,name:"Ruy López de Segura",years:"~1530 – ~1580",country:"Spania (Zafra, Extremadura)",img:null,
   prof:"Preot catolic",
   peak:"A scris în 1561 prima carte sistematică de teorie a șahului din Spania",
   style:"Strategic și calculat — a transformat șahul din distracție în știință",
   fame:"Preotul Ruy López a fost cel mai important teoretician al șahului din secolul al XVI-lea. În 1559 a vizitat Roma cu o delegație ecleziastică, unde a descoperit școala italiană de șah și a învins maeștrii locali. A scris în 1561 „Libro de la invención liberal y arte del juego del axedrez\", prima carte sistematică de teorie tipărită în Spania. La curtea regelui Filip al II-lea era considerat cel mai bun jucător spaniol — monarhul i-a oferit un beneficiu eclesiastic și un lanț de aur. Deschiderea Ruy López (1.e4 e5 2.Cf3 Cc6 3.Nb5), cunoscută și ca Gambitul Spaniol, îi poartă numele și este și azi una dintre cele mai jucate deschideri din lume. În 1575 a fost învins într-un meci dramatic la curte de italianul Leonardo da Cutri, sub privirile regelui — primul mare meci internațional din istoria șahului.",
   anec:"În cartea din 1561, Ruy López sfătuia jucătorii să plaseze tabla astfel încât soarele să bată în ochii adversarului! Dacă asta nu era posibil, recomanda să se stea cu spatele la lumină, ca opozantul să fie deranjat de strălucire. Tot el sfătuia jucătorii să mănânce ușor înainte de partidă și să nu bea vin. Psihologia în șah are o istorie de 500 de ani — și începe cu un preot din Extremadura."},

  {id:3,era:"vechi",champ:false,name:"Gioachino Greco",years:"1600 – 1634",country:"Italia (Celico, Calabria)",img:null,
   prof:"Primul jucător profesionist din istorie — trăia exclusiv din șah",

   fame:"Greco — supranumit „Il Calabrese\" după regiunea natală — a fost primul mare aventurier al șahului și primul om din istorie care a trăit exclusiv din acest joc. Născut într-un sat mic din Calabria, a plecat de tânăr prin Europa, jucând în casele nobililor din Lyon, Roma, Paris, Madrid, Bruxelles și Londra. Manuscrisele lui, scrise pentru cei care îl angajau, conțineau zeci de mini-partide didactice cu sacrificii, capcane și combinații-șablon. „Matul lui Greco\" și alte tipare clasice îi poartă numele și azi. Stilul lui era exuberant: prefera sacrificiul spectaculos în locul jocului prudent — o estetică ce a marcat șahul timp de două secole. La aproximativ 1623, regele Carol I al Angliei l-a invitat la curte; mai târziu Greco a plecat în Indiile de Vest, unde a murit la doar 34 de ani, în Caraibe.",
   anec:"Greco și-a vândut analizele nobililor europeni la prețuri mari — fiecare manuscris valora cât salariul anual al unui funcționar. A trăit, practic, ca un antreprenor al șahului cu 400 de ani înainte ca asta să devină normal. A murit bogat în Indiile de Vest la doar 34 de ani, lăsându-și moștenirea unui ordin iezuit. Manuscrisele lui au fost recopiate atât de des încât, două secole mai târziu, jucătorii încă învățau șah după partidele lui — fără să-l fi văzut vreodată."},

  {id:4,era:"vechi",champ:false,name:"François-André Danican Philidor",years:"1726 – 1795",country:"Franța (Dreux)",
   img:"https://upload.wikimedia.org/wikipedia/commons/thumb/8/8d/Philidor.jpg/440px-Philidor.jpg",

   style:"Pozițional, bazat pe pioni — cu 200 de ani înaintea timpului său",
   fame:"Philidor a fost considerat cel mai bun jucător din lume timp de 50 de ani — și totuși, pentru el șahul era doar un hobby! Meseria lui adevărată era muzica: a compus peste 20 de opere, fiind unul dintre părinții genului opéra comique francez. A învățat șahul la 14 ani de la matematicianul Légall de Kermeur la Café de la Régence din Paris. În 1749 a publicat „Analyse du jeu des Échecs\", o lucrare revoluționară în care a formulat principiul care a schimbat șahul pentru totdeauna: „pionii sunt sufletul șahului\". Vreme de aproape jumătate de secol nimeni nu l-a putut bate într-un meci serios. La 57 de ani, la Londra în 1783, a jucat 3 partide simultan la orb — fără să vadă tablele — câștigând două și remizând una. Era atât de respectat încât intrarea lui într-o cafenea era întâmpinată ca a unui monarh. A murit în exil la Londra în 1795, după ce Revoluția Franceză l-a declarat suspect din cauza simpatiilor regaliste.",
   anec:"La Londra în 1783, Philidor a jucat 3 partide simultan la orb — fără să vadă tablele, anunțând mutările verbal. Publicul a rămas fără cuvinte: nimeni nu mai văzuse așa ceva. Presa londoneză a scris că performanța părea supranaturală, iar Royal Academy of Music a organizat o cină oficială în onoarea lui. Astăzi performanța pare modestă (recordul mondial e peste 50 de table), dar la 1783 a fost considerată un miracol — și a inspirat generații de jucători orbi."},

  {id:5,era:"vechi",champ:false,name:"Louis-Charles de La Bourdonnais",years:"1795 – 1840",country:"Franța",img:null,

   peak:"Seria celor 85 de partide cu McDonnell în 1834 — primul mare meci al șahului modern",
   style:"Combinativ, agresiv — atac direct asupra regelui",
   fame:"La Bourdonnais s-a născut pe insula Réunion (Oceanul Indian) într-o familie aristocrată ruinată de Revoluția Franceză. A venit la Paris și a devenit elevul lui Deschapelles, considerat cel mai bun jucător francez după Philidor. A condus Café de la Régence, centrul mondial al șahului în acea epocă. În 1834 a disputat la Londra o serie de 6 meciuri cu britanicul Alexander McDonnell — în total 85 de partide, cel mai mare eveniment de șah documentat al secolului. La Bourdonnais a câștigat clar (45 victorii, 27 înfrângeri, 13 remize) și a fost considerat de facto cel mai puternic jucător din lume. În 1836 a fondat „Le Palamède\", primul ziar de șah din istorie. Și-a pierdut averea într-o investiție în canale și a trăit ultimii ani din partidele jucate pe bani.",
   anec:"La Bourdonnais a murit în sărăcie la Londra în 1840, la doar 45 de ani, dintr-un atac cerebral. Comunitatea de șah britanică a organizat o colectă ca să-l poată înmormânta demn la cimitirul Kensal Green — chiar lângă mormântul lui Philidor. A fost un omagiu emoționant făcut de un adversar învins față de omul care-i bătuse pe toți englezii. Doi mari rivali din două țări, înmormântați unul lângă altul — o pagină rară de fair-play."},

  {id:6,era:"vechi",champ:false,name:"Howard Staunton",years:"1810 – 1874",country:"Anglia",
   img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4d/Howard_Staunton_1856.jpg/440px-Howard_Staunton_1856.jpg",

   peak:"A organizat primul mare turneu internațional din istorie (Londra, 1851); piesele Staunton devin standardul mondial",
   style:"Strategic și pozițional — pionier al studiului sistematic",
   fame:"Staunton, fiu nelegitim al unui conte englez, și-a luat numele după personajul lui Walter Scott — o reinventare tipică pentru epoca victoriană. A fost cel mai bun jucător din lume între 1843 și 1851, după ce l-a învins clar pe campionul francez Saint-Amant la Paris (11-6-4) — meci considerat neoficial pentru titlul mondial. În 1847 a publicat „The Chess-Player's Handbook\", bestsellerul șahului în secolul XIX. În 1851 a organizat primul mare turneu internațional din istorie, la Londra — Anderssen l-a câștigat, iar Staunton însuși a terminat doar al patrulea. Tot el a impus în 1849 modelul de piese „Staunton\", care este și azi standardul oficial al FIDE. În paralel, era critic literar respectat și a editat ediția Routledge a operelor lui Shakespeare. A murit la 64 de ani, la Londra, lovit de un atac de cord în timp ce lucra la un studiu Shakespearean.",
   anec:"Staunton a evitat cu orice preț meciul cu Paul Morphy în 1858, invocând mereu că e prea ocupat cu editarea operelor lui Shakespeare. Inițial Morphy a venit special din SUA în Anglia pentru această întâlnire; Staunton a temporizat luni de zile, apoi a refuzat definitiv. Toată lumea știa că se temea să piardă în fața tânărului american. Refuzul i-a pătat reputația pentru totdeauna — chiar și azi, când îi auzi numele, mulți spun „cel care a fugit de Morphy\"."},

  {id:7,era:"vechi",champ:false,name:"Adolf Anderssen",years:"1818 – 1879",country:"Germania (Breslau)",
   img:"https://upload.wikimedia.org/wikipedia/commons/thumb/0/0e/Adolf_Anderssen.jpg/220px-Adolf_Anderssen.jpg",
   prof:"Profesor de matematică",
   peak:"A câștigat primul mare turneu internațional din lume (Londra, 1851)",
   style:"Romantic și combinativ — sacrificii spectaculoase pentru atac",
   fameHTML:'Profesorul Anderssen a fost cel mai bun jucător din lume în deceniile 1850–1860 și emblema „șahului romantic\" — epoca sacrificiilor și a atacurilor frumoase. S-a născut la Breslau (azi Wrocław, Polonia) și a predat matematică toată viața la Friedrichs-Gymnasium. A învățat șahul la 9 ani dintr-o carte, fără profesor. În 1851 a câștigat surprinzător turneul de la Londra organizat de Staunton — devenind primul „campion al lumii\" neoficial. Tot în acel an a jucat <a href="https://en.wikipedia.org/wiki/Immortal_Game" target="_blank" rel="noopener" style="color:var(--c-navy);font-weight:700;">Partida Nemuritoare</a> împotriva lui Kieseritzky — un atac în care a sacrificat ambele ture, nebunul și dama, dând mat. În 1856 a creat <a href="https://en.wikipedia.org/wiki/Evergreen_Game" target="_blank" rel="noopener" style="color:var(--c-navy);font-weight:700;">Partida Veșnică</a> împotriva lui Dufresne — la fel de spectaculoasă. În 1858 a pierdut meciul cu Morphy (2-7), dar l-a recunoscut public ca fiind cel mai bun. În 1866 a pierdut și meciul cu Steinitz (6-8) — astfel ștafeta a trecut la o nouă generație.',
   anec:"La Londra 1851, Anderssen a venit ca un outsider total — nimeni nu-l știa, era doar un profesor modest dintr-o provincie. A câștigat turneul învingându-i pe Kieseritzky și Staunton însuși, și s-a întors acasă ca cel mai faimos jucător din lume. A doua zi s-a dus să predea matematică la clasă, ca și cum nimic nu s-ar fi întâmplat. Elevii lui au aflat din ziare că profesorul lor de algebră tocmai cucerise titlul mondial neoficial — și au început să-i ceară să le explice „Partida Nemuritoare\" în loc de lecția de geometrie."},

  {id:8,era:"vechi",champ:false,name:"Paul Morphy",years:"1837 – 1884",country:"SUA (New Orleans, Louisiana)",
   img:"https://upload.wikimedia.org/wikipedia/commons/thumb/8/85/Paul_Morphy_-_1857.jpg/220px-Paul_Morphy_-_1857.jpg",
   prof:"Avocat (a absolvit dreptul, dar nu a profesat niciodată)",
   peak:"Turneul european din 1858 — i-a învins pe toți cei mai buni jucători din lume",
   style:"Tactic, intuitiv, rapid — atac direct cu piesele dezvoltate la maximum",
   fame:"Paul Morphy a fost un fenomen: la 20 de ani a bătut toți cei mai buni jucători din lume, iar la 22 ani s-a retras definitiv din șah. Născut într-o familie creolă bogată din New Orleans, a învățat șahul la 8 ani urmărindu-și unchiul, iar la 12 ani l-a învins pe maestrul european Johann Löwenthal aflat în vizită în Louisiana. A absolvit dreptul la Universitatea din Louisiana, dar era prea tânăr ca să profeseze. În 1857 a câștigat Primul Congres American de Șah la New York. În 1858 a făcut turul Europei: i-a învins pe Anderssen (7-2), Harrwitz (5-2), Löwenthal și toți campionii continentului. Staunton a refuzat meciul cu el — un blot pe cariera englezului. La 22 de ani s-a întors în SUA și pur și simplu s-a oprit din jucat — nimeni nu știe exact de ce. A încercat să practice dreptul fără succes (clienții voiau autografe, nu consultații), iar în ultimii ani a căzut în paranoia și izolare. A murit la 47 de ani în baia casei familiale. Bobby Fischer îl considera cel mai mare jucător din toată istoria.",
   anec:"La Paris, în 1858, Morphy a jucat simultan la orb împotriva a 8 jucători puternici — câștigând 6 și remizând 2. Stătea cu spatele la cele 8 mese, ținând în minte toate pozițiile, și anunța fiecare mutare verbal. Partida a durat 10 ore fără pauză; presa a relatat că la sfârșit Morphy era proaspăt și politicos, în timp ce mulți spectatori adormiseră. Sala era încremenită: nimeni nu mai văzuse o asemenea demonstrație. A doua zi, Morphy și-a continuat plimbarea prin Paris ca și cum nimic nu s-ar fi întâmplat."},

  {id:9,era:"vechi",champ:false,name:"Szymon Winawer",years:"1838 – 1920",country:"Polonia (Varșovia)",

   prof:"Negustor de cherestea",
   peak:"Locul 1 împărțit la marele turneu Paris 1878 — în fața celor mai buni jucători din lume",
   style:"Solid și defensiv — maestru al pozițiilor închise și al apărărilor neașteptate",
   fame:"Winawer s-a născut într-o familie evreiască din Varșovia și a descoperit șahul abia ca adult, la peste 25 de ani. Profesia lui principală era comerțul cu cherestea — firma familiei avea afaceri în toată Polonia rusească și Germania. A jucat în 12 turnee internaționale între 1867 și 1901, întotdeauna ca amator pasionat. La Paris 1867 a terminat al doilea, surprinzând lumea șahului. La Paris 1878 a câștigat turneul împreună cu Zukertort, iar la Nuremberg 1883 a împărțit locul 1 cu Blackburne. Varianta Winawer a Apărării Franceze (1.e4 e6 2.d4 d5 3.Cc3 Nb4) îi poartă numele și e una dintre cele mai populare apărări negre și azi, jucată regulat la cel mai înalt nivel. A reprezentat Polonia în mediile internaționale și a fost unul dintre primii mari ambasadori ai șahului polonez în Europa Occidentală.",
   anec:"La turneul de la Paris din 1867, Winawer a terminat pe locul 2-3 (împărțit cu Steinitz), în fața unor jucători profesioniști care trăiau exclusiv din șah — el, un simplu negustor venit pentru distracție. Nu vorbea bine franceza și aducea cu el doar o valiză mică, fără asistent. După ultima rundă, organizatorii i-au înmânat premiul cu o cerere: „Vă rugăm să jucați mai mult, sunteți prea bun pentru a sta în Varșovia.\" El a zâmbit politicos și a plecat înapoi la cherestea."},

  {id:10,era:"vechi",champ:false,name:"Johannes Zukertort",years:"1842 – 1888",country:"Prusia — activ în Anglia",
   img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Johannes_Zukertort.jpg/220px-Johannes_Zukertort.jpg",

   style:"Combinativ și energic — calcul tactic excepțional, atacuri spectaculoase",
   fame:"Zukertort a fost una dintre cele mai fascinante figuri ale șahului din secolul XIX — un poliglot care vorbea 9 limbi, medic militar și mare jucător. S-a născut în Polonia într-o familie convertită la creștinism și a studiat medicina la Universitatea din Breslau, unde l-a avut profesor pe însuși Adolf Anderssen — viitorul lui mentor în șah. A luptat în armata prusiană în două războaie (Austro-Prusian 1866 și Franco-Prusian 1870), fiind decorat pentru curaj. În 1872 s-a mutat la Londra și a devenit jurnalist de șah. La turneul de la Londra din 1883 a câștigat strălucit, terminând cu trei puncte avans față de Steinitz însuși — performanță considerată miraculoasă. Acest rezultat a dus direct la primul meci oficial pentru titlul mondial, jucat în 1886 la New York, St. Louis și New Orleans. A pierdut acel meci în fața lui Steinitz (5-10-5), epuizat fizic și moral. A murit doi ani mai târziu, brusc, la doar 46 de ani.",
   anec:"La turneul de la Londra din 1883, Zukertort a câștigat primele 22 de partide aproape fără greșeală — un record uluitor care a impresionat lumea șahului. Pe 19 iunie 1888, în timp ce juca o partidă rapidă la cafeneaua Simpson's-in-the-Strand din Londra, a căzut din scaun lovit de un atac cerebral. A murit câteva ore mai târziu la spital, fără să recapete cunoștința. A fost înmormântat la cimitirul Brompton, iar comunitatea de șah din Londra a strâns bani pentru un mormânt impresionant — există și azi."},

  {id:11,era:"clasic",champ:true,name:"Wilhelm Steinitz",years:"1836 – 1900",country:"Boemia — mai târziu SUA",
   img:"https://upload.wikimedia.org/wikipedia/commons/thumb/5/50/Wilhelm_Steinitz.jpg/220px-Wilhelm_Steinitz.jpg",
   prof:"Jurnalist de șah",
   peak:"A devenit primul Campion Mondial Oficial în 1886, învingându-l pe Zukertort",
   style:"Pozițional teoretic — acumulare de mici avantaje, transformând șahul într-o știință",
   fame:"Steinitz a fost PRIMUL Campion Mondial Oficial de Șah (1886–1894) și părintele teoriei șahului pozițional modern. S-a născut într-o familie evreiască săracă la Praga, a învățat șah la Café Kuh din Viena și s-a stabilit la Londra ca jurnalist de șah. Până la 35 de ani era un atacant tipic „romantic\", dar apoi a schimbat radical: a formulat principii — controlul centrului, structura pionilor, mobilitatea pieselor, slăbiciunile permanente — și a arătat că o partidă se câștigă acumulând mici avantaje, nu prin sacrificii spectaculoase. În 1886, la 50 de ani, l-a învins pe Zukertort într-un meci jucat la New York, Saint Louis și New Orleans (12½-7½) — primul meci oficial pentru titlul mondial. A apărat titlul de 4 ori (Chigorin de două ori, Gunsberg, Lasker). A pierdut titlul în 1894 contra unui Lasker mai tânăr cu 32 de ani și revanșa în 1896-97. Ultimii ani au fost marcați de paranoia și sărăcie.",
   anec:"În ultimii ani, mintea lui Steinitz a cedat. A fost internat în spitalul de boli mintale Manhattan State Hospital, unde le spunea medicilor că poate juca șah cu Dumnezeu prin telefon — și că Îi dă chiar avans un cal, ca să fie un joc cinstit. Le mai spunea că poate muta piesele cu electricitatea creierului. Omul care transformase șahul într-o știință riguroasă a murit cu mintea cufundată în divinitate, sărac, la New York, în 1900. Comunitatea de șah din America i-a strâns bani pentru o înmormântare decentă."},

  {id:12,era:"clasic",champ:false,name:"Mikhail Chigorin",years:"1850 – 1908",country:"Rusia (Gatchina)",
   img:"https://upload.wikimedia.org/wikipedia/commons/thumb/f/f3/Mikhail_Chigorin.jpg/220px-Mikhail_Chigorin.jpg",
   prof:"Funcționar, ulterior jurnalist de șah",
   peak:"A forțat două meciuri pentru titlul mondial cu Steinitz (Habana 1889 și 1892)",
   style:"Romantic și dinamic — contraatac viu, jocul cailor și sacrificii intuitive",
   fame:"Chigorin a fost cel mai mare jucător rus al secolului al XIX-lea și părintele școlii ruse de șah. Născut la Gatchina, lângă Sankt Petersburg, a învățat șah relativ târziu (~16 ani), într-un orfelinat. A trăit din funcționăriat până când succesul la Café Dominique l-a făcut profesionist. A fondat în 1876 prima revistă rusă de șah, „Şahmatnîi Lîstok\". Spre deosebire de Steinitz, Chigorin refuza dogmele poziționale rigide — credea în energia pieselor, în calul mai prețios decât nebunul, în contraatacul activ. Această filosofie a influențat profund pe Alehin, Botvinnik și întreaga școală sovietică. A jucat două meciuri pentru titlul mondial cu Steinitz, ambele la Havana (1889 și 1892), pierzând ambele. Apărarea Chigorin (1.d4 d5 2.c4 Nc6) îi poartă numele și se joacă și azi. A murit sărac la Lublin, de diabet, în 1908.",
   anec:"În partida 23 a meciului de la Habana 1892, Chigorin avea albul într-o poziție câștigătoare clară. Mai avea de făcut o singură mutare logică (Rxb7) pentru a obține remiza din partida finală și a forța prelungirea meciului. În schimb, sub presiunea momentului, a jucat 32.Bb4?? — o gafă atât de elementară încât pierdea imediat o figură. Steinitz a câștigat partida și meciul. Sala din Habana a rămas încremenită; martorii spun că Chigorin a privit tabla un minut întreg fără să clipească. Era poate cel mai aproape în istorie ca Rusia să cucerească titlul mondial cu 56 de ani înaintea lui Botvinnik."},

  {id:13,era:"clasic",champ:true,name:"Emanuel Lasker",years:"1868 – 1941",country:"Germania",
   img:"https://upload.wikimedia.org/wikipedia/commons/thumb/5/5e/Emanuel_Lasker_portrait.jpg/220px-Emanuel_Lasker_portrait.jpg",
   prof:"Matematician și filosof (doctor în matematică)",
   peak:"27 de ani Campion Mondial neîntrerupt (1894–1921) — recordul absolut al istoriei",
   style:"Psihologic și pragmatic — alegea mutări care îi puneau pe adversari în disconfort",
   fameHTML:'Lasker a deținut titlul de Campion Mondial timp de 27 de ani (1894–1921) — cel mai lung record din istoria șahului. Născut într-o familie evreiască din Berlinchen (azi Polonia), a făcut doctorat în matematică la Erlangen — un rezultat al său (<a href="https://en.wikipedia.org/wiki/Lasker_ring" target="_blank" rel="noopener" style="color:var(--c-navy);font-weight:700;">inelele Lasker</a>) e studiat și azi în algebra comutativă. A fost prieten cu Albert Einstein, cu care discuta despre relativitate și filosofie. A câștigat titlul în 1894 la 25 de ani împotriva lui Steinitz (10-5) și l-a apărat de cinci ori: contra Steinitz (revanșa), Marshall, Tarrasch, Schlechter și Janowski. A pierdut în 1921 la Habana contra Capablanca. Era un psiholog la tablă — alegea uneori a doua sau a treia cea mai bună mutare, doar ca să-l deranjeze pe adversar. La 67 de ani s-a clasat al treilea la Moscova 1935, învingându-i pe câțiva tineri campioni. A fugit din Germania nazistă în 1933, a trăit în URSS, apoi New York, unde a murit sărac în 1941.',
   anec:"În 1910, Lasker juca pentru titlul mondial cu Carl Schlechter (un meci scurt de doar 10 partide). La intrarea în ultima partidă era cu un punct dezavantaj — pierdea titlul dacă remiza. Schlechter avea negrul și ar fi trebuit doar să joace solid. În schimb, austriacul a căutat câștigul, a riscat totul și a pierdut într-un final dramatic. Lasker a salvat titlul printr-o partidă pe care el însuși a numit-o „cea mai grea din viața mea\". Albert Einstein, care l-a cunoscut bine, l-a descris ca „una dintre cele mai fascinante personalități pe care le-am întâlnit vreodată\"."},

  {id:14,era:"clasic",champ:false,name:"Géza Maróczy",years:"1870 – 1951",country:"Ungaria (Szeged)",
   img:"https://upload.wikimedia.org/wikipedia/commons/thumb/e/e9/Geza_Maroczy.jpg/220px-Geza_Maroczy.jpg",
   prof:"Inginer",
   peak:"Top 3 mondial 1900–1908, cu 3 victorii la Monte Carlo (1902, 1903, 1904)",
   style:"Solid și pozițional — finaluri impecabile cu turn și dame",
   fame:"Maróczy a fost unul dintre cei mai puternici jucători ai perioadei 1895–1910 și principalul rival al lui Lasker între cei doi. Născut la Szeged în Ungaria, a studiat ingineria mecanică — o profesie rară pentru un mare jucător de șah al epocii. A izbucnit pe scena internațională la Hastings 1895, unde a împărțit locurile inferioare cu nume precum Pillsbury și Tarrasch. A câștigat Monte Carlo de trei ori (1902, 1903, 1904) și a fost considerat al doilea cel mai puternic din lume după Lasker. Un meci pentru titlul mondial cu Lasker era programat pentru 1906, dar a fost anulat din motive financiare — una dintre marile tragedii ale șahului, căci mulți istorici cred că Maróczy avea șanse reale. Cutia Maróczy (o formație de pioni la c4 și e4 contra Apărării Siciliene) îi poartă numele și e una dintre cele mai studiate structuri pozitionale. A fost antrenorul Verei Menchik, prima campioană mondială feminină. După Primul Război Mondial a condus echipa maghiară la olimpiade.",
   anec:"La aproape 70 de ani, în plin Război Mondial, Maróczy a aflat că un grup de prieteni de șah maghiari fusese deportat în lagăre sovietice. Le-a propus o partidă de corespondență de echipă — cu un singur set de mutări care călătorea pe drumuri lungi prin Crucea Roșie. Partida n-a fost terminată niciodată — unii dintre prizonieri au murit înainte. Dar gestul a rămas: șahul ca formă de rezistență și solidaritate umană, peste sârmă ghimpată și tăceri impuse. Maróczy a fost cunoscut toată viața pentru blândețe și fair-play."},

  {id:15,era:"clasic",champ:false,name:"Siegbert Tarrasch",years:"1862 – 1934",country:"Germania (Breslau)",
   img:"https://upload.wikimedia.org/wikipedia/commons/thumb/6/6b/Siegbert_Tarrasch.jpg/220px-Siegbert_Tarrasch.jpg",
   prof:"Medic (doctor în medicină)",
   peak:"5 turnee internaționale majore câștigate consecutiv între 1888 și 1894",
   style:"Clasic dogmatic — controlul centrului, libertatea pieselor, evitarea pionilor dubli",
   fame:"Dr. Siegbert Tarrasch a fost cel mai influent profesor de șah al epocii sale și „Praeceptor Germaniae\" — profesorul Germaniei. Născut la Breslau (azi Wrocław) într-o familie evreiască, a studiat medicina la Halle și a practicat ca medic la Nürnberg toată viața. Între 1888 și 1894 a câștigat 5 turnee internaționale majore consecutiv — Breslau, Manchester, Dresden, Leipzig și Viena. A scris cărți populare de o claritate didactică rar întâlnită, printre care „Die moderne Schachpartie\" și „Das Schachspiel\", care au format generații întregi. Sistemele Tarrasch din Apărarea Slavă și din Gambitul Damei îi poartă numele. A fost dogmatic în convingerile poziționale — „pionii dubli sunt o slăbiciune!\", „nebunul e mai bun decât calul\" — și a stârnit reacția hipermodernilor (Nimzowitsch, Réti), care i-au demonstrat că dogmele au excepții. În 1908 a jucat meciul pentru titlul mondial cu Lasker la Düsseldorf-München și a pierdut clar (3-8).",
   anec:"Tarrasch a refuzat meciul pentru titlul mondial cu Steinitz în 1892, când avea ocazia, pentru că era prea ocupat cu cabinetul medical din Nürnberg. „Pacienții mei nu pot aștepta\", a spus el. Decizia l-a costat poate cariera de campion mondial — dar i-a adus respectul pentru integritate profesională. Mai târziu, când Nimzowitsch i-a publicat cărțile contrastante și l-a numit ironic „profesorul dogmatic\", Tarrasch a răspuns: „Înainte de mijlocul jocului, zeii au pus deschiderea\". O replică elegantă, dar generația tânără îi descoperea deja limitele."},

  {id:16,era:"clasic",champ:false,name:"Harry Nelson Pillsbury",years:"1872 – 1906",country:"SUA (Massachusetts)",

   fame:"Pillsbury a câștigat turneul de la Hastings 1895 la PRIMA sa participare internațională, terminând înaintea lui Steinitz, Chigorin și Tarrasch. A murit tânăr, la 33 de ani.",
   anec:"Pillsbury a dat simultane la orb cu până la 22 de table. La o demonstrație, i-au dat o listă de 30 de cuvinte complicate pe care le-a memorat instant și le-a recitat la final. Memoria sa era fenomenală."},

  {id:17,era:"clasic",champ:false,name:"Carl Schlechter",years:"1874 – 1918",country:"Austria (Viena)",
   img:"https://upload.wikimedia.org/wikipedia/commons/thumb/7/7b/Carl_Schlechter.jpg/220px-Carl_Schlechter.jpg",
   prof:"Șahist profesionist și editor",
   fame:"Schlechter era poreclit Remizierul — juca atât de solid încât aproape că nu pierdea niciodată. În 1910 a jucat meciul pentru titlul mondial cu Lasker și a obținut egalitate 5-5, la un pas de a deveni campion.",
   anec:"Regulile meciului din 1910 cereau 2 puncte avans față de campion. Schlechter, conducând 5-4, a trebuit să joace riscant în ultima partidă, a pierdut-o și meciul s-a terminat 5-5. O regulă l-a costat coroana mondială."},

  {id:18,era:"clasic",champ:false,name:"Akiba Rubinstein",years:"1882 – 1961",country:"Polonia",
   img:"https://upload.wikimedia.org/wikipedia/commons/thumb/8/8e/Akiba_Rubinstein.jpg/220px-Akiba_Rubinstein.jpg",
   prof:"Șahist profesionist",
   fame:"Rubinstein este considerat unul dintre cei mai mari jucători care nu au câștigat niciodată titlul mondial. Finalurile sale de turnee sunt studiate și azi ca modele perfecte. Varianta Rubinstein din Apărarea Franceză îi poartă numele.",
   anec:"Rubinstein suferea de agorafobie severă și se ascundea în colțuri la turnee. Dar odată ce se așeza la tablă, parcă o altă personalitate îl cuprinea — calculul său era de o profunzime aproape imposibilă."},

  {id:19,era:"clasic",champ:false,name:"Aron Nimzowitsch",years:"1886 – 1935",country:"Letonia — Germania și Danemarca",
   img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/45/Aaron_Nimzowitsch.jpg/220px-Aaron_Nimzowitsch.jpg",
   prof:"Scriitor și teoretician de șah",
   fame:"Nimzowitsch a scris Mein System (1925) — una dintre cele mai influente cărți din istoria șahului. A creat școala hipermodernistă. Apărarea Nimzo-Indiană și alte concepte îi poartă numele.",
   anec:"Nimzowitsch era faimos pentru temperamentul exploziv. Într-un incident atestat de contemporani, după o mutare slabă a adversarului, s-ar fi ridicat strigând: 'De ce trebuie să pierd față de un idiot?!' — replică devenită legendară."},

  {id:20,era:"clasic",champ:true,name:"José Raúl Capablanca",years:"1888 – 1942",country:"Cuba",
   img:"https://upload.wikimedia.org/wikipedia/commons/thumb/5/5e/Capablanca.jpg/220px-Capablanca.jpg",
   prof:"Diplomat (atașat la Ministerul de Externe al Cubei)",
   peak:"A devenit Campion Mondial în 1921, învingându-l pe Lasker la Havana fără să piardă nicio partidă",
   style:"Pozițional cristalin, maestru absolut al finalurilor — câștiga părând că abia se gândește",
   fame:"Capablanca a fost al treilea Campion Mondial de Șah (1921–1927) și, pentru mulți, cel mai mare talent înnăscut din toată istoria jocului. S-a născut la Havana și a învățat șahul la doar 4 ani, observându-și tatăl jucând în salon. La 13 ani l-a învins pe campionul oficial al Cubei, Juan Corzo, într-un meci de 13 partide — o senzație care a făcut înconjurul lumii. La 20 de ani îl bătea pe campionul SUA, Frank Marshall, cu un scor zdrobitor (8-1). În 1921, la Havana, i-a luat titlul mondial lui Emanuel Lasker fără să piardă nici măcar o partidă din meci. Stilul lui era de o claritate uluitoare: vedea finalurile cu o precizie aproape matematică, fără să calculeze îndelung — adversarii spuneau că pare să joace ghicind. Între 1916 și 1924 a pierdut o singură partidă în 8 ani de turnee — un record care încă uimește. Pe 7 martie 1942, în timp ce urmărea o partidă la Manhattan Chess Club din New York, a suferit un atac cerebral și a murit a doua zi la spital, la doar 53 de ani.",
   anec:"Capablanca a învățat să joace șah la doar 4 ani — privindu-și tatăl jucând. Într-o zi a oprit jocul și i-a arătat tatălui că făcuse o mutare ilegală cu calul. Tatăl, uimit că băiețelul observase regula, l-a invitat la masă și a pierdut! De atunci nu s-a mai oprit din jucat. La 13 ani l-a învins pe campionul oficial al Cubei, Juan Corzo, într-un meci de 13 partide jucat în cluburile din Havana — un copil care a devenit peste noapte cel mai discutat nume din șahul mondial."},

  {id:21,era:"clasic",champ:true,name:"Alexander Alekhine",years:"1892 – 1946",country:"Rusia — cetățean francez",
   img:"https://upload.wikimedia.org/wikipedia/commons/thumb/e/e8/Alexander_Alekhine_1935.jpg/220px-Alexander_Alekhine_1935.jpg",
   prof:"Jurist (avocat, investigator criminal)",
   fame:"Alekhine a câștigat titlul mondial în 1927 și este singurul campion care a murit cu titlul. Renumit pentru atacuri extrem de complexe și sacrificiale. Apărarea Alekhine (1.e4 Nf6) îi poartă numele.",
   anec:"În 1933, Alekhine a jucat 32 de partide simultan la orb la Chicago — câștigând 19, remizând 9 și pierzând 4. Evenimentul a durat 12 ore și a fost relatat de presa americană ca un mister al minții umane."},

  {id:22,era:"clasic",champ:false,name:"Efim Bogoljubov",years:"1889 – 1952",country:"Ucraina — activ în Germania",
   img:"https://upload.wikimedia.org/wikipedia/commons/thumb/7/7e/Bogoljubow.jpg/220px-Bogoljubow.jpg",
   prof:"Șahist profesionist",
   fame:"Bogoljubov a câștigat turnee importante în anii 20 și a jucat de două ori pentru titlul mondial cu Alekhine (1929, 1934), pierzând ambele. Apărarea Bogoljubov-Indiană îi poartă numele.",
   anec:'Bogoljubov este celebru pentru replica: "Când joc cu albul, câștig pentru că am albul; când joc cu negrul, câștig pentru că sunt Bogoljubov!" Confirmată de contemporani ca perfect reprezentativă pentru personalitatea sa.'},

  {id:23,era:"clasic",champ:true,name:"Max Euwe",years:"1901 – 1981",country:"Olanda",
   img:"https://upload.wikimedia.org/wikipedia/commons/thumb/2/2d/Max_Euwe.jpg/220px-Max_Euwe.jpg",
   prof:"Profesor de matematică (doctor în matematică)",
   fame:"Euwe este singurul amator care a câștigat vreodată titlul mondial de șah, în 1935, bătând-ul pe Alekhine! A predat matematică în timp ce era campion mondial. Ulterior a fost președinte al FIDE (1970–1978).",
   anec:"În timpul campionatului mondial din 1935, Euwe continua să predea lecții de matematică elevilor între runde. Regele Olandei i-a acordat onoruri speciale după victorie. Un profesor de matematică câștigase titlul mondial de șah!"},

  {id:24,era:"clasic",champ:false,name:"Reuben Fine",years:"1914 – 1993",country:"SUA (New York)",img:null,
   prof:"Psiholog (doctor în psihologie, psihanalist)",
   fame:"Fine a fost unul dintre cei mai puternici jucători americani ai anilor 1930–1940. A scris Basic Chess Endings (1941), carte de referință. Și-a abandonat complet cariera de șahist pentru a deveni psiholog.",
   anec:"Fine a fost invitat la Meciul Mondial din 1948 (după moartea lui Alekhine), dar a REFUZAT — prefera studiile de psihologie. A renunțat voluntar la o șansă reală la titlul mondial pentru știință."},

  {id:25,era:"clasic",champ:false,name:"Samuel Reshevsky",years:"1911 – 1992",country:"Polonia — emigrat în SUA",img:null,
   prof:"Contabil",
   fame:"Reshevsky a câștigat campionatul SUA de 8 ori. A rămas faimos pentru talentul de prodigie — la 8 ani juca cu adulți prin toată Europa. A combinat toată viața cariera de contabil cu șahul la cel mai înalt nivel.",
   anec:"La vârsta de 8 ani, Reshevsky a dat o simultană la Paris în fața a 20 de adulți, câștigând toate partidele. Fotografiile — un copilaș pe un scaun înalt, gândindu-se la șah — au înconjurat lumea."},

  {id:26,era:"clasic",champ:false,name:"Miguel Najdorf",years:"1910 – 1997",country:"Polonia — emigrat în Argentina",
   img:"https://upload.wikimedia.org/wikipedia/commons/thumb/8/8e/Miguel_Najdorf.jpg/220px-Miguel_Najdorf.jpg",
   prof:"Om de afaceri (firmă de asigurări în Argentina)",
   fame:"Najdorf a emigrat în Argentina după Holocaust, întreaga sa familie pierzând în Război. A creat Varianta Najdorf a Apărării Siciliene (5...a6) — una dintre cele mai jucate variante din șahul modern.",
   anec:"În 1947, Najdorf a organizat o simultană la orb cu 45 de adversari. Scopul său adevărat: să ajungă în ziare în toată lumea, sperând că frații săi din Europa vor citi știrea. Nu știa că ei nu mai trăiau."},

  {id:27,era:"clasic",champ:true,name:"Mikhail Botvinnik",years:"1911 – 1995",country:"URSS (Rusia)",
   img:"https://upload.wikimedia.org/wikipedia/commons/thumb/7/7f/Botvinnik.jpg/220px-Botvinnik.jpg",
   prof:"Inginer electrician (doctor în inginerie)",
   fame:"Botvinnik a fost campion mondial de trei ori (1948–1957, 1958–1960, 1961–1963) și fondatorul școlii sovietice de șah. A format generații de campioni, inclusiv Karpov și Kasparov.",
   anec:"Botvinnik fuma deliberat în antrenament ca să se obișnuiască cu fumul adversarilor. Punea muzică tare în cameră ca să-și antreneze concentrarea. Un om de știință al șahului."},

  {id:28,era:"clasic",champ:false,name:"Paul Keres",years:"1916 – 1975",country:"Estonia",
   img:"https://upload.wikimedia.org/wikipedia/commons/thumb/7/7a/Paul_Keres.jpg/220px-Paul_Keres.jpg",
   prof:"Șahist profesionist",
   fame:"Keres a fost supranumit Eternul Secund: de patru ori la rând pe locul 2 în Turneul Candidaților (1953, 1956, 1959, 1962), niciodată campion mondial. Eroul național absolut al șahului estonian.",
   anec:"Estonia l-a comemorat pe Keres pe bancnota de 5 krooni în 1991. Este unul dintre puținii sportivi din lume apăruți pe o bancnotă națională — omagiul suprem."},

  {id:29,era:"clasic",champ:false,name:"David Bronstein",years:"1924 – 2006",country:"URSS (Ucraina)",img:null,
   prof:"Scriitor de șah și antrenor",
   fame:"Bronstein a jucat meciul pentru titlul mondial în 1951 împotriva lui Botvinnik, terminând 12-12. Cartea sa despre Turneul de la Zurich 1953 este considerată una dintre cele mai bune cărți de șah scrise vreodată.",
   anec:'Bronstein conducea 11.5-9.5 și nu mai avea nevoie decât de un punct din 5 partide. A pierdut două. Meciul a terminat 12-12. Bronstein a spus mai târziu că "presiunile externe" ar fi putut juca un rol — fără a intra în detalii.'},

  {id:30,era:"clasic",champ:true,name:"Vasily Smyslov",years:"1921 – 2010",country:"URSS (Rusia)",
   img:"https://upload.wikimedia.org/wikipedia/commons/thumb/9/96/Smyslov.jpg/220px-Smyslov.jpg",
   prof:"Bariton (cântăreț de operă)",
   fame:"Smyslov a fost campion mondial în 1957–1958, renumit pentru stilul armonios și maestria în finaluri. A participat la Turneul Candidaților timp de 4 decenii. Și mai era bariton — cântăreț de operă de meserie!",
   anec:"Smyslov a auditionat la Teatrul Bolșoi în tinerețe, terminând pe locul doi. A continuat să cânte în concerte private toată viața. La un banchet din anii 80, a cântat arii de operă spre surprinderea tuturor."},

  {id:31,era:"clasic",champ:false,name:"Efim Geller",years:"1925 – 1998",country:"URSS (Ucraina)",img:null,
   prof:"Șahist profesionist",
   fame:"Geller a câștigat campionatul URSS de două ori și era expert în Apărarea Regală Indiana. Are ceva unic: un record pozitiv față de Bobby Fischer — mai mult decât orice alt jucător al epocii.",
   anec:"Geller l-a bătut pe Fischer de 5 ori în partide individuale. Fischer, care domina aproape pe toată lumea, recunoștea că Geller era unul dintre puținii adversari care îi înțelegea cu adevărat planurile."},

  {id:32,era:"clasic",champ:true,name:"Mikhail Tal",years:"1936 – 1992",country:"URSS (Letonia — Riga)",
   img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/42/Mikhail_Tal_1961.jpg/220px-Mikhail_Tal_1961.jpg",
   prof:"Jurnalist de șah",
   fame:"Tal — Vrăjitorul din Riga — a fost campion mondial în 1960–1961 și probabil cel mai spectaculos jucător din toată istoria șahului. Sacrificii de piese pe care nimeni nu le putea calcula, atacuri de o complexitate amețitoare.",
   anec:"Tal era faimos pentru privirea hipnotică la tablă care îi intimida pe adversari. Portisch a declarat că nu putea să se uite în ochii lui Tal. Tal însuși a confirmat că folosea conștient acest efect psihologic."},

  {id:33,era:"clasic",champ:false,name:"Lev Polugaevsky",years:"1934 – 1995",country:"URSS (Rusia)",img:null,
   prof:"Șahist profesionist",
   fame:"Polugaevsky a creat Varianta Polugaevsky din Apărarea Siciliană — una dintre cele mai complexe linii din teoria modernă. A participat la mai multe Turnee ale Candidaților.",
   anec:"Polugaevsky a scris o carte întreagă dedicată unei singure variante pe care o crease: Grandmaster Preparation. Zeci de ani de analiză personală. Considerată și azi o capodoperă a profunzimii analitice."},

  {id:34,era:"clasic",champ:true,name:"Tigran Petrosian",years:"1929 – 1984",country:"URSS (Armenia)",
   img:"https://upload.wikimedia.org/wikipedia/commons/thumb/e/e6/Tigran_Petrosian.jpg/220px-Tigran_Petrosian.jpg",
   prof:"Editor al revistei de șah '64'",
   fame:"Iron Tigran — campion mondial 1963–1969. Maestrul absolut al apărării preventive: elimina pericolele ÎNAINTE ca adversarul să le creeze. Câștiga partide în care adversarul nici nu înțelegea când a pierdut.",
   anec:"Petrosian era surd parțial și purta aparat auditiv. În partide tensionate, scotea aparatul, izolându-se complet de zgomot. Concentrarea sa devenea atunci totală."},

  {id:35,era:"clasic",champ:false,name:"Bent Larsen",years:"1935 – 2010",country:"Danemarca",img:null,
   prof:"Șahist profesionist și autor",
   fame:"Larsen a fost cel mai puternic jucător occidental al anilor 1960–1970, cu excepția lui Fischer. Pionier în deschideri originale (Deschiderea Larsen: 1.b3). Nu accepta niciodată remize ușoare.",
   anec:"La meciul Candidaților din 1971, Larsen a pierdut cu 0-6 față de Fischer — scor nemaivăzut la nivel de elită. A comentat sportiv că Fischer jucase la un nivel pur și simplu inalienabil."},

  {id:36,era:"clasic",champ:true,name:"Boris Spassky",years:"1937 – prezent",country:"URSS — cetățean francez",
   img:"https://upload.wikimedia.org/wikipedia/commons/thumb/9/90/Boris_Spassky_1974.jpg/220px-Boris_Spassky_1974.jpg",
   prof:"Șahist profesionist",
   fame:"Spassky a fost campion mondial în 1969–1972 și este faimos pentru Meciul Secolului de la Reykjavik (1972) cu Bobby Fischer. Jucător universal, capabil să joace în orice stil.",
   anec:"La meciul din 1972, după ce Fischer a câștigat partida a 6-a spectaculos, Spassky s-a ridicat și a aplaudat alături de public. Gestul de sportivitate față de adversarul care îl necăjise enorm a rămas în istoria sportului."},

  {id:37,era:"clasic",champ:false,name:"Viktor Korchnoi",years:"1931 – 2016",country:"URSS — cetățean elvețian",img:null,
   prof:"Șahist profesionist",
   fame:"Korchnoi — Viktor cel Groaznic — a jucat de două ori pentru titlul mondial (1978, 1981) împotriva lui Karpov. A defectat din URSS în 1976. Combativitate extremă și longevitate excepțională.",
   anec:"La meciul din 1978, Korchnoi juca știind că fiul său era reținut în URSS. Tabăra sovietică a adus un parapsiholog care se uita fix spre Korchnoi. Meciul a durat 5 luni — un duel politico-sportiv unic."},

  {id:38,era:"clasic",champ:true,name:"Bobby Fischer",years:"1943 – 2008",country:"SUA",
   img:"https://upload.wikimedia.org/wikipedia/commons/thumb/d/d6/Bobby_Fischer_1960_in_Leipzig_vor_dem_Kandidatenturnier_%28cropped%29.jpg/220px-Bobby_Fischer_1960_in_Leipzig_vor_dem_Kandidatenturnier_%28cropped%29.jpg",
   prof:"Șahist profesionist (de la vârste fragede)",
   fame:"Fischer a fost campion mondial (1972–1975) și mulți îl consideră cel mai mare șahist din toate timpurile. Mare Maestru la 15 ani. A câștigat 12 partide consecutive la nivel de elită în 1971 — performanță nemaivăzută.",
   anec:"La Turneul Candidaților din 1971, Fischer l-a bătut pe Taimanov 6-0, apoi pe Larsen 6-0 — 12 victorii consecutive fără nicio remiză împotriva unor jucători top 10 mondial. Niciun alt jucător nu a mai realizat asta."},

  {id:39,era:"clasic",champ:false,name:"Lajos Portisch",years:"1937 – prezent",country:"Ungaria",img:null,
   prof:"Șahist profesionist",
   fame:"Portisch a fost cel mai bun jucător ungar din toate timpurile, unul dintre cei mai constanți jucători de top timp de 4 decenii. A participat la 8 Turnee ale Candidaților — un record de longevitate.",
   anec:"Portisch a participat la Turneul Candidaților în 8 ediții diferite fără să câștige titlul mondial. Câți jucători din lume pot spune că au concurat la cel mai înalt nivel timp de 40 de ani?"},

  {id:40,era:"clasic",champ:true,name:"Anatoly Karpov",years:"1951 – prezent",country:"URSS / Rusia",
   img:"https://upload.wikimedia.org/wikipedia/commons/thumb/3/3a/Karpov-1982.jpg/440px-Karpov-1982.jpg",
   prof:"Șahist profesionist; politician; activist UNICEF",
   fame:"Karpov a câștigat titlul mondial în 1975 (Fischer a refuzat să joace) și l-a apărat în trei meciuri epice cu Kasparov. Era un jucător de o precizie aproape mecanică, adunând avantaje mici și transformându-le în victorii.",
   anec:"Meciul din 1984 cu Kasparov a durat 48 de partide și 5 luni! Karpov conducea 5-0. FIDE l-a oprit controversat fără câștigător. Kasparov a acuzat public că oprirea l-a salvat pe Karpov."},

  {id:41,era:"clasic",champ:false,name:"Jan Timman",years:"1951 – prezent",country:"Olanda",img:null,
   prof:"Șahist profesionist; scriitor; redactor New in Chess",
   fame:"Timman a fost cel mai puternic jucător occidental al anilor 80, locul 2 mondial în FIDE. A jucat meciul pentru titlul FIDE în 1993 cu Karpov. Stil atacant și creativ.",
   anec:"În 1993, FIDE i-a desemnat pe Karpov și Timman să joace pentru titlul FIDE, după ce Kasparov și Short fondaseră PCA. Timp de un deceniu lumea șahului a avut doi campioni mondiali — situație de neînțeles pentru publicul larg."},

  {id:42,era:"clasic",champ:true,name:"Garry Kasparov",years:"1963 – prezent",country:"URSS / Rusia",
   img:"https://upload.wikimedia.org/wikipedia/commons/thumb/b/b4/Garry_Kasparov_in_2012.jpg/440px-Garry_Kasparov_in_2012.jpg",
   prof:"Șahist profesionist (retras 2005); scriitor; activist politic",
   fame:"Kasparov a devenit cel mai tânăr Campion Mondial în 1985, la 22 de ani. A fost numărul 1 mondial timp de 20 de ani consecutivi. Meciul din 1997 cu calculatorul Deep Blue este unul dintre cele mai mediatizate din istoria sportului.",
   anec:"În 1997, Kasparov a abandonat o poziție în care putea forța remiză — șocat de mutarea neașteptată a lui Deep Blue. A sugerat intervenție umană, IBM a negat. A pierdut meciul 2.5-3.5. Momentul în care calculatorul a depășit campionul mondial."},

  // ── ERA COMPUTERELOR ──
  {id:43,era:"modern",champ:false,name:"Vasyl Ivanchuk",years:"1969 – prezent",country:"Ucraina",
   img:"https://upload.wikimedia.org/wikipedia/commons/thumb/7/72/Ivanchuk_Vasyl_2008_01.jpg/440px-Ivanchuk_Vasyl_2008_01.jpg",
   prof:"Șahist profesionist",
   fame:"Ivanchuk — Chucky — este unul dintre cei mai talentați și imprevizibili jucători din istoria șahului. A atins locul 2 mondial în 1991. Un geniu capricios — când e în formă, bate pe oricine.",
   anec:"La Olimpiada din 1992, după ce a pierdut partida decisivă cu Gelfand, Ivanchuk a ieșit în fugă din sală, plângând. A ilustrat perfect ce înseamnă să trăiești șahul cu toată intensitatea emoțională."},

  {id:44,era:"modern",champ:true,name:"Viswanathan Anand",years:"1969 – prezent",country:"India",
   img:"https://upload.wikimedia.org/wikipedia/commons/thumb/b/b9/Viswanathan_Anand_in_2020.jpg/440px-Viswanathan_Anand_in_2020.jpg",
   prof:"Șahist profesionist; ambasador cultural al Indiei",
   fame:"Anand — Tigrul din Madras — a fost campion mondial de 5 ori și primul Mare Maestru indian. Cel mai rapid calculator uman din istoria șahului. A transformat India într-o putere mondială a șahului.",
   anec:"La Campionatul Mondial din 2014 de la Sochi, Anand a ajuns cu bagajele blocate la Frankfurt, pierzând zile de pregătire. A câștigat totuși 3 partide împotriva lui Carlsen — cel mai bun rezultat al oricărui contracandidant."},

  {id:45,era:"modern",champ:true,name:"Vladimir Kramnik",years:"1975 – prezent",country:"Rusia",
   img:"https://upload.wikimedia.org/wikipedia/commons/thumb/9/9e/Kramnik-Corus2007.jpg/440px-Kramnik-Corus2007.jpg",
   prof:"Șahist profesionist (retras din clasic în 2019)",
   fame:"Kramnik l-a detronat pe Kasparov în 2000 — una dintre cele mai mari surprize din istoria șahului. A reunit titlurile mondiale în 2006. A inventat Berlinul ca armă împotriva Deschiderii Ruy López.",
   anec:"Kramnik a ales Apărarea Berlineză — considerată inferioară la acea vreme. Kasparov nu a câștigat nicio partidă cu albele în tot meciul. Berlinul a explodat ca popularitate peste noapte."},

  {id:46,era:"modern",champ:true,name:"Veselin Topalov",years:"1975 – prezent",country:"Bulgaria",
   img:"https://upload.wikimedia.org/wikipedia/commons/thumb/7/7e/Veselin_Topalov_2012.jpg/440px-Veselin_Topalov_2012.jpg",

function proxyImg(p) {
  return LOCAL_IMGS[p.id] || null;
}

function photoHTML(p) {
  var src = proxyImg(p);
  if (!src) return '<div class="no-photo">♛</div>';
  return '<img src="' + src + '" alt="' + p.name + '" loading="lazy" onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'flex\'">'
       + '<div class="no-photo" style="display:none">♛</div>';
}

function setBigPhoto(p) {
  document.getElementById('bigPhotoFrame').innerHTML = photoHTML(p);
  document.getElementById('bigPhotoName').textContent = p.name;
  document.getElementById('bigPhotoCrown').style.display = p.champ ? 'inline-block' : 'none';
  document.getElementById('bigPhotoNum').textContent = '#' + p.id + ' din ' + P.length;
}

// ── UPDATE CARD ───────────────────────────────────────────────────────
function updateCard(era) {
  var players = byEra(era);
  var idx = state[era];
  var p = players[idx];
  var total = players.length;

  setBigPhoto(p);

  document.getElementById('years-' + era).textContent = p.years;
  document.getElementById('country-' + era).textContent = p.country;
  document.getElementById('prof-' + era).textContent = p.prof;

  var peakRow = document.getElementById('peakrow-' + era);
  if (p.peak) { document.getElementById('peak-' + era).textContent = p.peak; peakRow.style.display = ''; }
  else { peakRow.style.display = 'none'; }

  var styleRow = document.getElementById('stylerow-' + era);
  if (p.style) { document.getElementById('style-' + era).textContent = p.style; styleRow.style.display = ''; }
  else { styleRow.style.display = 'none'; }

  var fameEl = document.getElementById('fame-' + era);
  if (p.fameHTML) { fameEl.innerHTML = p.fameHTML; }
  else { fameEl.textContent = p.fame; }
  document.getElementById('anec-' + era).textContent = p.anec;
  var linksEl = document.getElementById('links-' + era);
  if (linksEl) {
    if (p.links && p.links.length) {
      linksEl.innerHTML = p.links.map(function(l) {
        return '<a href="' + l.url + '" target="_blank" rel="noopener">' + l.label + '</a>';
      }).join('');
      linksEl.style.display = 'flex';
    } else {
      linksEl.style.display = 'none';
    }
  }

  document.getElementById('prev-' + era).disabled = (idx === 0);
  var nextBtn = document.getElementById('next-' + era);
  if (idx === total - 1) {
    nextBtn.disabled = false;
    nextBtn.innerHTML = '↑ Toate epocile';
    nextBtn.classList.add('pnav-btn-back-to-eras');
  } else {
    nextBtn.disabled = false;
    nextBtn.innerHTML = 'Următor →';
    nextBtn.classList.remove('pnav-btn-back-to-eras');
  }
  document.getElementById('counter-' + era).textContent = (idx + 1) + ' din ' + total;

  var dots = document.querySelectorAll('#dots-' + era + ' .dot');
  dots.forEach(function(d, i) { d.classList.toggle('active', i === idx); });
}

function navigate(era, dir) {
  var players = byEra(era);
  var next = state[era] + dir;
  if (next < 0) return;
  if (next >= players.length) {
    // Ultimul jucător: închide sertarul curent și du userul înapoi la lista de epoci
    var panel = document.getElementById('panel-' + era);
    var btn   = document.getElementById('btn-' + era);
    if (panel && panel.classList.contains('open')) {
      panel.classList.remove('open');
      btn.setAttribute('aria-expanded', 'false');
    }
    btn.scrollIntoView({ behavior: 'smooth', block: 'start' });
    return;
  }
  state[era] = next;
  updateCard(era);
}

function goTo(era, idx) {
  state[era] = idx;
  updateCard(era);
}

// ── ACCORDION ────────────────────────────────────────────────────────
function toggleEra(id) {
  var panel = document.getElementById('panel-' + id);
  var btn   = document.getElementById('btn-' + id);
  var open  = panel.classList.contains('open');
  panel.classList.toggle('open', !open);
  btn.setAttribute('aria-expanded', String(!open));
  if (!open && id !== 'campioni') updateCard(id);
}

// ── RENDER EPOCE (paginat) ────────────────────────────────────────────
function dotsHTML(era) {
  var players = byEra(era);
  var html = '';
  players.forEach(function(_, i) {
    html += '<button class="dot" onclick="goTo(\'' + era + '\',' + i + ')" title="Jucătorul ' + (i+1) + '"></button>';
  });
  return html;
}

function renderEra(era) {
  var players = byEra(era);

    + '<button class="era-btn" id="btn-' + era + '" aria-expanded="false" onclick="toggleEra(\'' + era + '\')">'
    + '<span class="era-code">' + m.icon + '</span>'
    + '<span class="era-titles"><span class="era-name">' + m.name + '</span><span class="era-range">' + m.range + '</span></span>'
    + '<span class="era-count">' + players.length + ' jucători</span>'
    + '<span class="era-arrow">▼</span>'
    + '</button>'
    + '<div class="era-panel" id="panel-' + era + '">'
    + '<p class="era-why">' + m.why + '</p>'
    + '<div class="player-wrap">'
    + '<div class="info-panel">'
    + '<div class="info-row"><div class="info-row-label">📅 Perioadă de viață</div><div class="info-row-val" id="years-' + era + '"></div></div>'

    + '<div class="info-row" id="peakrow-' + era + '"><div class="info-row-label">🏆 Cea mai mare realizare</div><div class="info-row-val" id="peak-' + era + '"></div></div>'
    + '<div class="info-row" id="stylerow-' + era + '"><div class="info-row-label">🎯 Stil de joc</div><div class="info-row-val" id="style-' + era + '"></div></div>'
    + '</div>'
    + '<div class="info-text"><div class="info-text-label">♟ Ce l-a făcut faimos</div><div class="info-text-body" id="fame-' + era + '"></div></div>'
    + '<div class="anecdote-box"><div class="info-text-label">💬 O poveste adevărată</div><div class="anecdote-body" id="anec-' + era + '"></div></div>'
    + '<div class="player-links" id="links-' + era + '" style="display:none"></div>'
    + '<div class="player-nav">'
    + '<button class="pnav-btn" id="prev-' + era + '" onclick="navigate(\'' + era + '\',-1)">← Anterior</button>'
    + '<div class="pnav-center"><div class="pnav-counter" id="counter-' + era + '"></div>'
    + '<div class="pnav-dots" id="dots-' + era + '">' + dotsHTML(era) + '</div></div>'
    + '<button class="pnav-btn" id="next-' + era + '" onclick="navigate(\'' + era + '\',1)">Următor →</button>'
    + '</div>'
    + '</div>'
    + '</div>'
    + '</div>'
    + '</div>';
}

// ── RENDER CAMPIONI MONDIALI (lista verticală) ─────────────────────────
function renderChampions() {
  var champions = P.filter(function(p) { return p.champ; });
  var items = champions.map(function(p) {
    var cy = CHAMP_YEARS[p.name] || '';
    var photoEl = p.img
      ? '<img src="' + proxyImg(p) + '" alt="' + p.name + '" loading="lazy" onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'flex\'">'
        + '<div class="champ-item-no-photo" style="display:none">♛</div>'
      : '<div class="champ-item-no-photo">♛</div>';
    return '<div class="champ-item">'
      + '<div class="champ-item-photo">' + photoEl + '</div>'
      + '<div class="champ-item-info">'
      + '<div class="champ-item-name">' + p.name + '<span class="champ-item-crown">♔ Campion Mondial</span></div>'
      + (cy ? '<div class="champ-item-years">♔ ' + cy + '</div>' : '')
      + '<div class="champ-item-country">🌍 ' + p.country + '</div>'
      + '<div class="champ-item-fame">' + p.fame + '</div>'
      + '</div>'
      + '</div>';
  }).join('');

  return '<div class="era-block">'
    + '<button class="era-btn" id="btn-campioni" aria-expanded="false" onclick="toggleEra(\'campioni\')">'
    + '<span class="era-code">👑</span>'
    + '<span class="era-titles"><span class="era-name">Campionii Mondiali</span><span class="era-range">Toți campionii — în ordine cronologică</span></span>'
    + '<span class="era-count">' + champions.length + ' campioni</span>'
    + '<span class="era-arrow">▼</span>'
    + '</button>'
    + '<div class="era-panel" id="panel-campioni">'
    + '<p class="era-why">Toți campionii mondiali oficiali de șah, de la Wilhelm Steinitz (1886) până în prezent. Fiecare a lăsat o urmă distinctă în istoria jocului.</p>'
    + '<div class="champ-list">' + items + '</div>'
    + '</div>'
    + '</div>';
}

// ── INIT ─────────────────────────────────────────────────────────────
