<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Șah Mat Animat – Exercițiu: Doi Nebuni vs. Rege</title>
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@700;900&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: #F5A96E;
            font-family: 'Nunito', sans-serif;
            padding: 24px 16px;
            min-height: 100vh;
        }
        .page {
            max-width: 820px;
            margin: 0 auto;
            padding: 40px 44px 50px;
            position: relative;
        }
        h1 {
            font-family: 'Baloo 2', cursive;
            font-size: 2em;
            color: #1a3a6b;
            text-transform: uppercase;
            margin-bottom: 8px;
            margin-top: 10px;
            text-shadow: 2px 2px 0px rgba(255,255,255,0.4);
            text-align: center;
            line-height: 1.2;
        }
        .subtitle {
            text-align: center;
            color: #1a1a1a;
            font-size: 1.05em;
            margin-bottom: 22px;
            line-height: 1.6;
        }

        /* ===== LAYOUT ===== */
        .main-content {
            display: flex;
            gap: 24px;
            align-items: flex-start;
            justify-content: center;
        }
        #board-wrap {
            position: relative;
            display: inline-block;
            width: min(380px, calc(100vw - 40px));
            height: min(380px, calc(100vw - 40px));
        }
        #board { width: 100%; }
        .right-section { flex: 1; min-width: 0; max-width: 300px; }

        /* ===== STATUS BOX ===== */
        .status-box {
            background: rgba(255,255,255,0.65);
            border-radius: 14px;
            padding: 16px 18px;
            font-size: 1.02em;
            line-height: 1.7;
            color: #1a1a1a;
            border-left: 5px solid #1a3a6b;
            margin-bottom: 14px;
            min-height: 72px;
        }
        .status-box.thinking { border-left-color: #e67e22; }
        .status-box.check    { border-left-color: #e74c3c; }
        .status-box.mat      { border-left-color: #27ae60; background: rgba(39,174,96,0.15); }
        .status-box.pat      { border-left-color: #e74c3c; background: rgba(231,76,60,0.15); }

        /* ===== MOVE COUNTER ===== */
        .move-counter {
            text-align: center;
            font-family: 'Baloo 2', cursive;
            font-size: 1.3em;
            color: #1a3a6b;
            margin-bottom: 14px;
        }

        /* ===== BUTTONS ===== */
        .btn-row { display: flex; gap: 10px; margin-bottom: 14px; }
        .action-btn {
            flex: 1;
            background: #1a3a6b;
            color: white;
            border: none;
            border-radius: 50px;
            font-family: 'Baloo 2', cursive;
            font-size: 1em;
            padding: 10px 14px;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 3px 10px rgba(26,58,107,0.3);
        }
        .action-btn:hover { background: #2a5aab; transform: translateY(-2px); }
        .action-btn.hint  { background: #e67e22; }
        .action-btn.hint:hover { background: #d35400; }
        .action-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        /* ===== HINT BOX ===== */
        .hint-box {
            background: rgba(255,255,255,0.55);
            border-radius: 10px;
            padding: 12px 16px;
            font-size: 0.95em;
            color: #1a1a1a;
            border-left: 4px solid #e67e22;
            display: none;
            margin-bottom: 14px;
        }

        /* ===== CHAR GALLERY ===== */
        .char-gallery {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            gap: 20px;
            margin-top: 28px;
        }
        .char-img {
            height: 85px;
            width: auto;
            mix-blend-mode: multiply;
        }

        /* ===== CHARACTER ANIMATIONS ===== */
        @keyframes char-bounce {
            0%,100% { transform: translateY(0); }
            40%      { transform: translateY(-18px); }
        }
        @keyframes char-shake {
            0%,100% { transform: translateX(0); }
            20%     { transform: translateX(-8px) rotate(-5deg); }
            40%     { transform: translateX(8px)  rotate(5deg); }
            60%     { transform: translateX(-6px) rotate(-3deg); }
            80%     { transform: translateX(6px)  rotate(3deg); }
        }
        @keyframes char-dance {
            0%,100% { transform: translateY(0)    rotate(0deg); }
            25%     { transform: translateY(-16px) rotate(-12deg); }
            75%     { transform: translateY(-16px) rotate(12deg); }
        }
        @keyframes char-fall {
            0%   { transform: translateY(0) rotate(0deg); opacity: 1; }
            60%  { transform: translateY(10px) rotate(80deg); opacity: 0.8; }
            100% { transform: translateY(30px) rotate(90deg); opacity: 0.3; }
        }
        @keyframes char-worried {
            0%,100% { transform: translateY(0) rotate(0); }
            30%     { transform: translateY(-5px) rotate(-4deg); }
            70%     { transform: translateY(-5px) rotate(4deg); }
        }
        @keyframes char-wobble {
            0%,100% { transform: rotate(0); }
            25%     { transform: rotate(-8deg) translateX(-4px); }
            75%     { transform: rotate(8deg)  translateX(4px); }
        }
        .anim-bounce  { animation: char-bounce  0.6s ease-in-out; }
        .anim-shake   { animation: char-shake   0.6s ease-in-out; }
        .anim-dance   { animation: char-dance   0.8s ease-in-out infinite; }
        .anim-fall    { animation: char-fall    0.8s ease-in-out forwards; }
        .anim-worried { animation: char-worried 1.2s ease-in-out infinite; }
        .anim-wobble  { animation: char-wobble  1.0s ease-in-out infinite; }

        /* ===== NAV ===== */
        .nav-buttons { display: flex; justify-content: space-between; gap: 20px; margin-top: 30px; }
        .nav-btn {
            display: inline-block;
            background: #1a3a6b;
            color: white;
            font-family: 'Baloo 2', cursive;
            font-size: 1.3em;
            padding: 13px 40px;
            border-radius: 50px;
            text-decoration: none;
            transition: all 0.2s;
            box-shadow: 0 5px 20px rgba(26,58,107,0.4);
        }
        .nav-btn:hover { background: #2a5aab; transform: translateY(-3px); }
        .nav-btn.back  { background: rgba(26,58,107,0.5); }

        /* ===== CONFETTI ===== */
        .confetti-particle {
            position: fixed;
            width: 8px; height: 8px;
            border-radius: 2px;
            pointer-events: none;
            z-index: 9999;
            animation: confetti-fly 1.0s ease-out forwards;
        }
        @keyframes confetti-fly {
            0%   { transform: translate(0,0) rotate(0deg); opacity: 1; }
            100% { transform: translate(var(--dx), var(--dy)) rotate(var(--rot)); opacity: 0; }
        }

        /* ===== THINKING DOTS ===== */
        @keyframes dots { 0%{content:'.';} 33%{content:'..';} 66%{content:'...';} 100%{content:'';} }
        .dots::after { content: ''; animation: dots 1.2s steps(3,end) infinite; }

        @media (max-width: 640px) {
            .main-content { flex-direction: column; align-items: center; }
            .right-section { max-width: 100%; width: 100%; }
            .page { padding: 40px 20px 50px; }
        }
    </style>
</head>
<body>
<div class="page">

    <!-- Corner pieces -->
    <div style="position:absolute;top:0;left:0;display:flex;gap:2px;align-items:flex-end;">
        <img src="piese_sah/rega 1.jpg"  style="height:95px;width:auto;mix-blend-mode:multiply;" alt="">
        <img src="piese_sah/nebun 1.png" style="height:110px;width:auto;mix-blend-mode:multiply;" alt="">
    </div>
    <img src="piese_sah/rege 2.png" style="position:absolute;top:0;right:0;height:105px;width:auto;mix-blend-mode:multiply;" alt="">

    <h1>Exerci&#539;iu: Doi Nebuni vs. Rege</h1>
    <p class="subtitle">Este momentul s&#259; verifici c&#226;t de bine ai &#238;n&#539;eles cum pot nebunii s&#259; &#238;l &#238;nving&#259; pe regele advers.</p>

    <div class="main-content">
        <div>
            <div id="board-wrap">
                <div id="board"></div>
            </div>
        </div>

        <div class="right-section">
            <div class="status-box" id="statusBox">
                Mut&#259; piesele albe! Conduce regele negru spre un col&#539;.
            </div>

            <div class="move-counter">
                Mutarea: <strong><span id="moveCount">0</span></strong>
            </div>

            <div class="btn-row">
                <button class="action-btn hint" id="hintBtn" onclick="showHint()">&#128161; Indiciu</button>
                <button class="action-btn" onclick="resetGame()">&#8635; Restart</button>
            </div>

            <div class="hint-box" id="hintBox"></div>
        </div>

    <!-- Character gallery -->
    <div class="char-gallery">
        <img id="char-b1" src="piese_sah/nebun 1.png" class="char-img" alt="">
        <img id="char-wk" src="piese_sah/rega 1.jpg"  class="char-img" alt="">
        <img id="char-bk" src="piese_sah/rege 2.png"  class="char-img" alt="">
        <img id="char-b2" src="piese_sah/nebun 1.png" class="char-img" alt="">
    </div>

    <div class="nav-buttons">
        <a href="pagina21.html" class="nav-btn back">&#9664; &#206;napoi</a>
        <a href="pagina22.html" class="nav-btn">&#206;nainte &#9654;</a>
    </div>

</div>

<script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
<script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>

<script>
/* ===== CHARACTER ANIMATIONS ===== */
function animChar(id, anim, duration) {
    const el = document.getElementById(id);
    if (!el) return;
    const all = ['anim-bounce','anim-shake','anim-worried','anim-wobble','anim-dance','anim-fall'];
    all.forEach(c => el.classList.remove(c));
    void el.offsetWidth;
    if (!anim) return;
    el.classList.add('anim-' + anim);
    if (duration > 0) setTimeout(() => el.classList.remove('anim-' + anim), duration);
}
function resetCharAnims() {
    ['char-b1','char-wk','char-bk','char-b2'].forEach(id => animChar(id, null));
}

/* ===== STOCKFISH ===== */
let stockfish;
let sfReady    = false;
let sfCallback = null;

function initStockfish() {
    try {
        const code = `importScripts('https://cdnjs.cloudflare.com/ajax/libs/stockfish.js/10.0.2/stockfish.js')`;
        const blob  = new Blob([code], { type: 'application/javascript' });
        stockfish   = new Worker(URL.createObjectURL(blob));
    } catch(e) {
        try { stockfish = new Worker('stockfish.js'); } catch(e2) {
            console.warn('Stockfish indisponibil — se folosește mișcare aleatorie.');
        }
    }
    if (!stockfish) return;

    stockfish.onmessage = function(e) {
        const line = e.data;
        if (line === 'uciok') {
            stockfish.postMessage('setoption name Skill Level value 20');
            stockfish.postMessage('isready');
        }
        if (line === 'readyok') { sfReady = true; }
        if (line.startsWith('bestmove')) {
            const move = line.split(' ')[1];
            if (sfCallback) { sfCallback(move); sfCallback = null; }
        }
    };
    stockfish.postMessage('uci');
}

function askStockfish(fen, depth, callback) {
    sfCallback = callback;
    const ask = () => {
        stockfish.postMessage('stop');
        stockfish.postMessage('position fen ' + fen);
        stockfish.postMessage('go depth ' + depth);
    };
    if (sfReady) { ask(); }
    else { const iv = setInterval(() => { if (sfReady) { clearInterval(iv); ask(); } }, 80); }
}

/* Fallback: pick the legal move that maximises black king's distance from corners */
function fallbackBlackMove() {
    const moves = chess.moves({ verbose: true });
    if (!moves.length) return null;
    let best = moves[0], bestScore = -Infinity;
    const files = 'abcdefgh';
    for (const mv of moves) {
        chess.move(mv);
        let score = 0;
        for (let f = 0; f < 8; f++) {
            for (let r = 1; r <= 8; r++) {
                const p = chess.get(files[f] + r);
                if (p && p.type === 'k' && p.color === 'b') {
                    // Maximize distance from nearest corner
                    score = Math.min(f, 7-f) + Math.min(r-1, 8-r);
                }
            }
        }
        chess.undo();
        if (score > bestScore) { bestScore = score; best = mv; }
    }
    return best.from + best.to;
}

/* ===== GAME STATE ===== */
const START_FEN = '8/8/3k4/8/3K4/8/2B2B2/8 w - - 0 1';
let chess     = new Chess(START_FEN);
let board;
let gameOver  = false;
let moveCount = 0;

function setStatus(msg, cls) {
    const box = document.getElementById('statusBox');
    box.className = 'status-box' + (cls ? ' ' + cls : '');
    box.innerHTML = msg;
}
function updateMoveCount() {
    document.getElementById('moveCount').textContent = moveCount;
}

/* React based on black king position */
function reactToBlackKing() {
    const files = 'abcdefgh';
    for (let f = 0; f < 8; f++) {
        for (let r = 1; r <= 8; r++) {
            const p = chess.get(files[f] + r);
            if (p && p.type === 'k' && p.color === 'b') {
                const onEdge   = (f===0||f===7||r===1||r===8);
                const inCorner = (f===0||f===7) && (r===1||r===8);
                if (inCorner)    animChar('char-bk', 'shake',   -1);
                else if (onEdge) animChar('char-bk', 'worried', -1);
                else             animChar('char-bk', null);
                return;
            }
        }
    }
}

/* Confetti */
function spawnConfetti() {
    const colors = ['#ff3333','#ff8800','#ffee00','#33cc55','#4499ff','#cc44ff','#ff66bb'];
    const cx = window.innerWidth/2, cy = window.innerHeight/2;
    for (let i = 0; i < 36; i++) {
        const p = document.createElement('div');
        p.className = 'confetti-particle';
        p.style.background = colors[i % colors.length];
        p.style.left = cx+'px'; p.style.top = cy+'px';
        const angle = (Math.PI*2*i/36) + Math.random()*0.3;
        const dist  = 80 + Math.random()*160;
        p.style.setProperty('--dx', `${Math.cos(angle)*dist}px`);
        p.style.setProperty('--dy', `${Math.sin(angle)*dist}px`);
        p.style.setProperty('--rot', `${Math.random()*720-360}deg`);
        document.body.appendChild(p);
        setTimeout(() => p.remove(), 1100);
    }
}

/* Apply black's response (UCI move like 'd6e6') */
function applyBlackMove(uciMove) {
    if (gameOver) return;
    if (!uciMove || uciMove === '(none)') return;

    const mv = chess.move({ from: uciMove.slice(0,2), to: uciMove.slice(2,4), promotion:'q' });
    if (!mv) return;

    board.position(chess.fen());   // animated

    if (chess.in_draw()) {
        gameOver = true;
        setStatus('&#9888;&#65039; Remiz&#259;! Reseteaz&#259; &#351;i &#238;ncerc&#259; din nou!', 'pat');
        animChar('char-b1', 'shake', 900);
        animChar('char-b2', 'shake', 900);
        return;
    }

    reactToBlackKing();

    if (chess.in_check()) {
        setStatus('&#9889; <strong>&#350;ah!</strong> Regele e &#238;n &#351;ah &#8212; &#238;mpinge-l spre col&#539;!', 'check');
    } else {
        setStatus('Mut&#259; piesele albe! Continu&#259; s&#259; str&#226;ngi spa&#539;iul.', '');
    }
    document.getElementById('hintBtn').disabled = false;
}

/* ===== BOARD INTERACTION ===== */
function onDragStart(source, piece) {
    if (gameOver) return false;
    if (chess.turn() !== 'w') return false;
    if (!piece.startsWith('w')) return false;
    return true;
}

function onDrop(source, target) {
    if (target === 'offboard' || target === source) return 'snapback';

    const mv = chess.move({ from: source, to: target, promotion: 'q' });
    if (!mv) return 'snapback';

    moveCount++;
    updateMoveCount();
    document.getElementById('hintBox').style.display = 'none';
    document.getElementById('hintBtn').disabled = true;
    board.position(chess.fen(), false);

    /* Stalemate — white just moved but black has no legal moves and is not in check */
    if (chess.in_stalemate()) {
        gameOver = true;
        setStatus('&#9888;&#65039; <strong>PAT!</strong> Regele negru n-are mutare &#8212; Remiz&#259;! Ai grij&#259; s&#259; nu dai pat!', 'pat');
        animChar('char-b1', 'shake', 900);
        animChar('char-b2', 'shake', 900);
        animChar('char-wk', 'shake', 900);
        return;
    }

    /* Checkmate */
    if (chess.in_checkmate()) {
        gameOver = true;
        setTimeout(() => {
            spawnConfetti();
            setTimeout(spawnConfetti, 500);
            setTimeout(spawnConfetti, 1000);
            animChar('char-b1', 'dance', -1);
            animChar('char-b2', 'dance', -1);
            animChar('char-wk', 'dance', -1);
            animChar('char-bk', 'fall',  -1);
            setStatus(
                '&#127881; <strong>&#350;ah Mat!</strong> Bravo! Ai &#238;nv&#259;&#539;at matul cu doi nebuni!<br>'
                + '&#128081; Rezolvat &#238;n <strong>' + moveCount + ' mut&#259;ri</strong>!'
                + '<br><button style="margin-top:10px;padding:8px 20px;background:#1a3a6b;color:white;border:none;border-radius:50px;font-family:\'Baloo 2\',cursive;font-size:1em;cursor:pointer;" onclick="resetGame()">&#8635; &#206;ncearc&#259; din nou</button>',
                'mat'
            );
        }, 300);
        return;
    }

    if (chess.in_draw()) {
        gameOver = true;
        setStatus('Remiz&#259;! Reseteaz&#259; &#351;i &#238;ncerc&#259; din nou!', 'pat');
        return;
    }

    /* Animate bishops on white's turn */
    animChar('char-b1', 'bounce', 600);
    setTimeout(() => animChar('char-b2', 'bounce', 600), 180);

    /* Ask Stockfish (or fallback) for black's response */
    setStatus('<span class="dots">M&#259; g&#226;ndesc</span>', 'thinking');
    if (stockfish) {
        askStockfish(chess.fen(), 12, applyBlackMove);
    } else {
        setTimeout(() => applyBlackMove(fallbackBlackMove()), 500);
    }
}

function onSnapEnd() {
    board.position(chess.fen(), false);
}

/* ===== HINT ===== */
function showHint() {
    if (gameOver || chess.turn() !== 'w') return;
    const hintBox = document.getElementById('hintBox');
    hintBox.innerHTML = '&#128161; Calculez<span class="dots"></span>';
    hintBox.style.display = 'block';

    const gotHint = (uciMove) => {
        if (!uciMove || uciMove === '(none)') {
            hintBox.textContent = 'Nicio mutare disponibil&#259;.';
            return;
        }
        const ch2 = new Chess(chess.fen());
        const mv  = ch2.move({ from: uciMove.slice(0,2), to: uciMove.slice(2,4) });
        hintBox.innerHTML = '&#128161; Indiciu: <strong>' + (mv ? mv.san : uciMove) + '</strong>';
    };

    if (stockfish) {
        askStockfish(chess.fen(), 15, gotHint);
    } else {
        const mv = fallbackBlackMove(); // fallback gives black move; adapt for white
        hintBox.innerHTML = '&#128161; Indiciu nu e disponibil offline &#8212; instalare Stockfish necesar&#259;.';
    }
}

/* ===== RESET ===== */
function resetGame() {
    if (stockfish) stockfish.postMessage('stop');
    chess     = new Chess(START_FEN);
    gameOver  = false;
    moveCount = 0;
    updateMoveCount();
    board.position(START_FEN, false);
    document.getElementById('hintBox').style.display = 'none';
    document.getElementById('hintBtn').disabled = false;
    resetCharAnims();
    setStatus('Mut&#259; piesele albe! Conduce regele negru spre un col&#539;.', '');
}

/* ===== INIT ===== */
board = Chessboard('board', {
    position:    START_FEN,
    pieceTheme:  'pieces/{piece}.svg',
    draggable:   true,
    onDragStart: onDragStart,
    onDrop:      onDrop,
    onSnapEnd:   onSnapEnd
});
window.addEventListener('resize', () => board.resize());
initStockfish();
</script>
