<html lang="ro">
<head>
  <meta charset="UTF-8">

  <title>Lecția 5 — Atacul, Captura și Apărarea</title>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@700;900&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
  <link rel="stylesheet" href="master-template.css">
  <style>

    /* ── SLIDE NAV ──────────────────────────────────────── */
    .slide-nav {
      display: flex; align-items: center; gap: 8px;
      flex-shrink: 0; padding: 4px 0;
    }
    .slide-nav-btn {
      width: 38px; height: 38px; border-radius: 50%;
      border: 2px solid rgba(26,58,107,0.3);
      background: rgba(255,255,255,0.6);
      font-family: var(--font-display); font-size: 1rem;
      color: var(--c-navy); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: background .15s;
    }
    .slide-nav-btn:hover:not(:disabled) { background: rgba(26,58,107,0.15); }
    .slide-nav-btn:disabled { opacity: 0.3; cursor: default; }

    /* ── DOTS ───────────────────────────────────────────── */
    .slide-dots {
      display: flex; gap: 7px; align-items: center;
      flex-wrap: wrap; justify-content: center; flex: 1;
    }
    .slide-dot {
      width: 9px; height: 9px; border-radius: 50%;
      background: rgba(26,58,107,0.15);
      cursor: pointer; transition: all .2s;
    }
    .slide-dot.done  { background: rgba(26,58,107,0.38); }
    .slide-dot.active {
      background: var(--c-navy); transform: scale(1.3);
      box-shadow: 0 0 0 2px rgba(26,58,107,0.2);
    }

    /* ── PANEL TEXT & TITLES ───────────────────────────── */
    .slide-badge {
      display: inline-block;
      background: rgba(26,58,107,0.09);
      border: 1.5px solid rgba(26,58,107,0.2);
      border-radius: 20px; padding: 4px 18px;
      font-family: var(--font-display); font-size: 1.25rem;
      font-weight: 700;
      color: var(--c-navy); margin-bottom: 8px;
    }
    /* Exercise badge — warm amber to signal section change */
    .slide-badge.ex {
      background: rgba(200,110,0,0.13);
      border-color: rgba(200,110,0,0.35);
      color: #7a3e00;
    }
    .slide-title {
      font-family: var(--font-display);
      font-size: 1.15rem; color: var(--c-navy);
      margin-bottom: 10px; line-height: 1.3;
    }
    /* Exercise slide title — bigger & bolder transition signal */
    .slide-title.ex {
      font-size: 1.4rem;
      border-bottom: 3px solid rgba(200,110,0,0.35);
      padding-bottom: 8px; margin-bottom: 12px;
    }

    /* Base text size matches pagina3 */
    .panel-scroll p,
    .panel-scroll li,
    .slide-text { font-size: 1.05rem; line-height: 1.75; color: #2a2a3e; }

    .slide-text p { margin-bottom: 8px; }
    .slide-text p:last-child { margin-bottom: 0; }

    /* ── DEFENSE TYPE HEADER ────────────────────────────── */
    .def-type-hdr {
      display: flex; align-items: flex-start; gap: 12px;
      background: rgba(26,58,107,0.06);
      border-left: 4px solid var(--c-navy);
      border-radius: 0 12px 12px 0;
      padding: 10px 14px; margin-bottom: 14px;
    }
    .def-type-icon { font-size: 1.8em; flex-shrink: 0; }
    .def-type-name {
      font-family: var(--font-display); font-size: 1.15rem;
      color: var(--c-navy); font-weight: 700; line-height: 1.2;
    }
    .def-type-desc { font-size: 0.97rem; color: #2a2a3e; margin-top: 3px; line-height: 1.55; }

    /* ── OVERVIEW CARDS ─────────────────────────────────── */
    .overview-card {
      display: flex; align-items: flex-start; gap: 12px;
      padding: 10px 14px; margin-bottom: 8px;
      background: rgba(255,255,255,0.55);
      border: 1.5px solid rgba(26,58,107,0.15);
      border-radius: 12px;
    }
    .ov-icon { font-size: 1.5em; flex-shrink: 0; }
    .ov-title {
      font-family: var(--font-display); font-size: 1rem;
      color: var(--c-navy); font-weight: 700; line-height: 1.2;
    }
    .ov-desc { font-size: 0.97rem; color: #2a2a3e; margin-top: 3px; line-height: 1.55; }

    /* ── HIGHLIGHT BOX ──────────────────────────────────── */
    .h-box {
      background: rgba(26,58,107,0.08);
      border-left: 4px solid var(--c-navy);
      border-radius: 0 12px 12px 0;
      padding: 12px 16px; font-size: 1.02rem; line-height: 1.7;
      margin-top: 12px;
    }
    .h-box.warn { background: rgba(200,80,0,0.09); border-left-color: #c05000; }
    .h-box.warn strong { color: #8b3000; }
    .h-box.ok   { background: rgba(40,160,80,0.1);  border-left-color: #28a050; color: #1a4a2a; }
    .h-box.gold { background: rgba(180,130,0,0.09); border-left-color: #b08000; }
    .h-box.gold strong { color: #705000; }

    /* ── ACTION BUTTONS ─────────────────────────────────── */
    .slide-actions { margin-top: 12px; display: flex; flex-direction: column; gap: 8px; }
    .act-row { display: flex; gap: 8px; flex-wrap: wrap; }
    .act-btn {
      padding: 9px 20px; border-radius: 50px;
      border: 2px solid rgba(26,58,107,0.4);
      background: rgba(255,255,255,0.7);
      font-family: var(--font-display); font-size: 0.9rem;
      color: var(--c-navy); cursor: pointer; transition: all .18s;
      white-space: nowrap;
    }
    .act-btn:hover:not(:disabled) { background: var(--c-navy); color: white; }
    .act-btn:disabled { opacity: 0.4; cursor: default; }
    .act-btn.red  { border-color: rgba(200,50,30,0.5); color: #8b1a00; }
    .act-btn.red:hover:not(:disabled)  { background: rgba(200,50,30,0.12); color: #8b1a00; }
    .act-btn.blue { border-color: rgba(40,80,200,0.5); color: #1a3a8b; }
    .act-btn.blue:hover:not(:disabled) { background: rgba(40,80,200,0.10); color: #1a3a8b; }
    .act-btn.green { border-color: rgba(40,160,80,0.5); color: #1a6035; }
    .act-btn.green:hover:not(:disabled){ background: rgba(40,160,80,0.10); color: #1a6035; }

    /* ── COUNTER (header) ───────────────────────────────── */
    .slide-counter {
      font-family: var(--font-display); font-size: 0.82rem;
      color: var(--c-navy); white-space: nowrap;
    }

    /* ── ARROW ANIMATION ────────────────────────────────── */
    @keyframes drawArrow {
      from { stroke-dashoffset: var(--arrow-len, 300); }
      to   { stroke-dashoffset: 0; }
    }

    /* ── TOUCH ──────────────────────────────────────────── */
    #boardWrapper { touch-action: none; -webkit-touch-callout: none; }

    /* drag hint */
    .drag-hint { font-size: 0.82rem; color: rgba(26,26,46,0.5); text-align: center; margin-top: 4px; }
  </style>
</head>

  draggable:   true,
  onDragStart: onDragStart,
  onDrop:      onDrop,
});

function debounce(fn, d) {
  let t;
  return (...a) => { clearTimeout(t); t = setTimeout(() => fn(...a), d); };
}
window.addEventListener('resize', debounce(() => {
  board.resize();
  redrawCurrentArrows();
}, 150));

/* ═══════════════════════════════════════════════════════════════
   DRAG HANDLERS
   ═══════════════════════════════════════════════════════════════ */
function onDragStart(src, piece) {
  const s = SLIDES[currentSlide];
  if (s.type !== 'exercise' || exAnswered) return false;
  return true;
}

function onDrop(src, tgt) {
  const s = SLIDES[currentSlide];
  if (s.type !== 'exercise' || exAnswered) return 'snapback';
  if (src === tgt) return 'snapback';

  if (src === s.from && tgt === s.to) {
    exAnswered = true;
    setTimeout(() => {
      board.position(s.resultPos);
      clearArrows();
      showFeedback(s.fb, 'success');
    }, 300);
  } else {
    showFeedback('❌ Nu e captura corectă — urmărește săgeata și mută piesa atacatoare!', 'error');
    setTimeout(clearFeedback, 2200);
    return 'snapback';
  }
}

/* ═══════════════════════════════════════════════════════════════
   LOAD SLIDE
   ═══════════════════════════════════════════════════════════════ */
function loadSlide(idx) {
  currentSlide = idx;
  defShown     = false;
  exAnswered   = false;

  const s   = SLIDES[idx];
  const isEx = s.type === 'exercise';

  document.getElementById('counterText').textContent = `${idx + 1} / ${SLIDES.length}`;

  /* badge & title */
  const badge = document.getElementById('slideBadge');
  badge.textContent = s.section;
  badge.className   = 'slide-badge' + (isEx ? ' ex' : '');

  const titleEl = document.getElementById('slideTitle');
  titleEl.textContent = s.title;
  titleEl.className   = 'slide-title' + (isEx ? ' ex' : '');

  /* nav */
  document.getElementById('prevBtn').disabled = (idx === 0);
  document.getElementById('nextBtn').disabled = (idx === SLIDES.length - 1);

  updateDots(idx);
  clearFeedback();
  document.getElementById('panelScroll').scrollTop = 0;

  if      (s.type === 'demo')     loadDemo(s);
  else if (s.type === 'info')     loadInfo(s);
  else if (s.type === 'defense')  loadDefense(s);
  else if (s.type === 'exercise') loadExercise(s);
}

/* ═══════════════════════════════════════════════════════════════
   NAVIGATION
   ═══════════════════════════════════════════════════════════════ */
function prevSlide() { if (currentSlide > 0) loadSlide(currentSlide - 1); }
function nextSlide() { if (currentSlide < SLIDES.length - 1) loadSlide(currentSlide + 1); }

/* Section groupings for dots */
const SECTIONS = (() => {
  const secs = [];
  SLIDES.forEach((s, i) => {
    const last = secs[secs.length - 1];
    if (!last || last.section !== s.section)
      secs.push({ section: s.section, start: i, count: 1 });
    else
      last.count++;
  });
  return secs;
})();

function updateDots(idx) {
  const sec = SECTIONS.find(s => idx >= s.start && idx < s.start + s.count);
  if (!sec) return;
  let html = '';
  for (let i = 0; i < sec.count; i++) {
    const si  = sec.start + i;
    const cls = si < idx ? 'done' : si === idx ? 'active' : '';
    html += `<div class="slide-dot ${cls}" onclick="loadSlide(${si})" title="Diapozitiv ${si+1}"></div>`;
  }
  document.getElementById('slideDots').innerHTML = html;
}

/* ═══════════════════════════════════════════════════════════════
   ARROWS  (SVG animated — stil pagina3)
   ═══════════════════════════════════════════════════════════════ */
function clearArrows() {
  const el = document.getElementById('board');
  if (el) { const s = el.querySelector('.ls5-svg'); if (s) s.remove(); }
}

function drawArrows(arrows) {
  if (!arrows || !arrows.length) return;
  const boardEl = document.getElementById('board');
  if (!boardEl) return;
  clearArrows();

  const size = boardEl.offsetWidth;
  const sq   = size / 8;

  function ctr(name) {
    const col = 'abcdefgh'.indexOf(name[0]);
    const row = parseInt(name[1]) - 1;
    return { x: col * sq + sq / 2, y: (7 - row) * sq + sq / 2 };
  }

  const NS  = 'http://www.w3.org/2000/svg';
  const svg = document.createElementNS(NS, 'svg');
  svg.setAttribute('class', 'ls5-svg');
  svg.style.cssText =
    'position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:20;';

  const defs = document.createElementNS(NS, 'defs');
  svg.appendChild(defs);

  const lw = 4;   /* fix ca în pagina3 — stroke-width="4" */

  arrows.forEach((arr, i) => {
    const color    = arr.color || 'rgba(200,30,30,0.85)';
    const markerId = `m${i}`;

    /* vârf cu crestătură — același path ca pagina3 */
    const marker = document.createElementNS(NS, 'marker');
    marker.setAttribute('id', markerId);
    marker.setAttribute('markerWidth',  '10');
    marker.setAttribute('markerHeight', '7');
    marker.setAttribute('refX', '8');
    marker.setAttribute('refY', '3.5');
    marker.setAttribute('orient', 'auto');
    const mp = document.createElementNS(NS, 'path');
    mp.setAttribute('d', 'M0,0 L9,3.5 L0,7 L2.5,3.5 Z');
    mp.setAttribute('fill', color);
    marker.appendChild(mp);
    defs.appendChild(marker);

    /* line */
    const f  = ctr(arr.from), t = ctr(arr.to);
    const dx = t.x - f.x, dy = t.y - f.y;
    const len = Math.sqrt(dx * dx + dy * dy);
    if (len < 1) return;
    const ux = dx / len, uy = dy / len;

    const x1 = f.x + ux * sq * 0.30;
    const y1 = f.y + uy * sq * 0.30;
    const x2 = t.x - ux * sq * 0.38;
    const y2 = t.y - uy * sq * 0.38;
    const dashLen = Math.sqrt((x2-x1)**2 + (y2-y1)**2) + 30;

    const line = document.createElementNS(NS, 'line');
    line.setAttribute('x1', x1); line.setAttribute('y1', y1);
    line.setAttribute('x2', x2); line.setAttribute('y2', y2);
    line.setAttribute('stroke', color);
    line.setAttribute('stroke-width', lw);
    line.setAttribute('stroke-linecap', 'round');
    line.setAttribute('stroke-linejoin', 'round');
    line.setAttribute('marker-end', `url(#${markerId})`);
    line.setAttribute('stroke-dasharray', dashLen);
    line.setAttribute('stroke-dashoffset', dashLen);
    line.style.animation = 'drawArrow 0.45s ease-out forwards';
    svg.appendChild(line);
  });

  boardEl.style.position = 'relative';
  boardEl.appendChild(svg);
}

function redrawCurrentArrows() {
  const s = SLIDES[currentSlide];
  if (!s) return;
  if      (s.type === 'demo')     drawArrows(DEMO_INIT_ARR);
  else if (s.type === 'info')     drawArrows(s.arrows);
  else if (s.type === 'defense')  drawArrows(defShown ? s.defArrows : s.atkArrows);
  else if (s.type === 'exercise' && !exAnswered) drawArrows(s.arrows);
}

   ═══════════════════════════════════════════════════════════════ */
function showFeedback(msg, type) {
  const bar = document.getElementById('feedbackBar');
  bar.className   = 'feedback-bar ' + type;
  bar.textContent = msg;
}
function clearFeedback() {
  const bar = document.getElementById('feedbackBar');
  bar.className   = 'feedback-bar';
  bar.textContent = '';
}

/* ═══════════════════════════════════════════════════════════════
   INIT
   ═══════════════════════════════════════════════════════════════ */
$(document).ready(function () { loadSlide(0); });
</script>
