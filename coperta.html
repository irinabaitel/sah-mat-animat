<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Șah Mat Animat</title>
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@700;900&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            min-height: 100vh;
            background: linear-gradient(160deg, #87CEEB 0%, #B8E4F9 40%, #F4A47A 100%);
            font-family: 'Nunito', sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* Piese plutitoare în fundal */
        .floating-piece {
            position: fixed;
            width: 60px;
            height: 60px;
            opacity: 0.6;
            animation: float linear infinite;
            pointer-events: none;
            user-select: none;
        }

        .floating-piece img {
            width: 100%;
            height: 100%;
        }

        @keyframes float {
            0%   { transform: translateY(110vh) rotate(0deg); }
            100% { transform: translateY(-20vh) rotate(360deg); }
        }

        /* Nori */
        .cloud {
            position: fixed;
            background: white;
            border-radius: 50px;
            opacity: 0.7;
            animation: drift linear infinite;
        }
        .cloud::before, .cloud::after {
            content: '';
            position: absolute;
            background: white;
            border-radius: 50%;
        }
        .cloud::before { width: 60%; height: 150%; top: -40%; left: 10%; }
        .cloud::after  { width: 40%; height: 120%; top: -30%; right: 10%; }

        @keyframes drift {
            0%   { transform: translateX(-200px); }
            100% { transform: translateX(110vw); }
        }

        /* Card central */
        .cover-card {
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            border: 3px solid rgba(255,255,255,0.5);
            padding: 40px 50px;
            text-align: center;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.15);
            position: relative;
            z-index: 10;
            animation: fadeIn 1s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .author {
            font-size: 1em;
            font-weight: 700;
            color: #1a3a6b;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 15px;
        }

        .chess-decoration {
            font-size: 2.5em;
            margin-bottom: 10px;
            animation: bounce 2s ease-in-out infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50%       { transform: translateY(-10px); }
        }

        h1 {
            font-family: 'Baloo 2', cursive;
            font-size: 4em;
            color: #1a3a6b;
            line-height: 1.1;
            text-shadow: 3px 3px 0px rgba(255,255,255,0.5),
                         5px 5px 0px rgba(26,58,107,0.2);
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 1em;
            color: #1a3a6b;
            opacity: 0.8;
            margin-bottom: 30px;
            font-style: italic;
        }

        .cover-image {
            width: 100%;
            max-width: 420px;
            border-radius: 20px;
            margin: 0 auto 25px;
            display: block;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            animation: float-img 4s ease-in-out infinite;
        }

        @keyframes float-img {
            0%, 100% { transform: translateY(0); }
            50%       { transform: translateY(-8px); }
        }

        .btn-start {
            display: inline-block;
            background: #1a3a6b;
            color: white;
            font-family: 'Baloo 2', cursive;
            font-size: 1.4em;
            padding: 14px 40px;
            border-radius: 50px;
            border: none;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.2s;
            box-shadow: 0 5px 20px rgba(26,58,107,0.4);
            letter-spacing: 1px;
        }

        .btn-start:hover {
            background: #2a5aab;
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(26,58,107,0.5);
        }

        .stars {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle ease-in-out infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.2; transform: scale(1); }
            50%       { opacity: 0.8; transform: scale(1.5); }
        }
    </style>
</head>
<body>

    <!-- Stele -->
    <div class="stars" id="stars"></div>

    <!-- Nori -->
    <div class="cloud" style="width:120px;height:40px;top:10%;animation-duration:25s;animation-delay:-5s;"></div>
    <div class="cloud" style="width:80px;height:28px;top:20%;animation-duration:35s;animation-delay:-15s;"></div>
    <div class="cloud" style="width:150px;height:50px;top:5%;animation-duration:40s;animation-delay:-25s;"></div>

    <!-- Piese plutitoare caliente -->
    <div class="floating-piece" style="left:3%;animation-duration:12s;animation-delay:0s;"><img src="pieces/wQ.svg"></div>
    <div class="floating-piece" style="left:12%;animation-duration:18s;animation-delay:-3s;"><img src="pieces/bK.svg"></div>
    <div class="floating-piece" style="left:22%;animation-duration:15s;animation-delay:-7s;"><img src="pieces/wN.svg"></div>
    <div class="floating-piece" style="left:35%;animation-duration:20s;animation-delay:-10s;"><img src="pieces/bQ.svg"></div>
    <div class="floating-piece" style="left:48%;animation-duration:14s;animation-delay:-2s;"><img src="pieces/wR.svg"></div>
    <div class="floating-piece" style="left:60%;animation-duration:17s;animation-delay:-8s;"><img src="pieces/bN.svg"></div>
    <div class="floating-piece" style="left:72%;animation-duration:22s;animation-delay:-5s;"><img src="pieces/wB.svg"></div>
    <div class="floating-piece" style="left:82%;animation-duration:16s;animation-delay:-1s;"><img src="pieces/bR.svg"></div>
    <div class="floating-piece" style="left:92%;animation-duration:19s;animation-delay:-9s;"><img src="pieces/wP.svg"></div>
    <div class="floating-piece" style="left:8%;animation-duration:25s;animation-delay:-14s;"><img src="pieces/bB.svg"></div>
    <div class="floating-piece" style="left:55%;animation-duration:23s;animation-delay:-6s;"><img src="pieces/wK.svg"></div>
    <div class="floating-piece" style="left:40%;animation-duration:21s;animation-delay:-11s;"><img src="pieces/bP.svg"></div>

    <!-- Card principal -->
    <div class="cover-card">
        <div class="author">Irina-Mihaela Băițel</div>

        <div class="chess-decoration">
            <img src="pieces/wK.svg" style="width:45px;height:45px;">
            <img src="pieces/wQ.svg" style="width:45px;height:45px;">
            <img src="pieces/wR.svg" style="width:45px;height:45px;">
        </div>

        <h1>Șah Mat Animat</h1>


        <!-- Ilustrație copii -->
        <img src="3D kidss playing chess in park.jpg" alt="Copii jucând șah" class="cover-image">

        <a href="pagina1.html" class="btn-start">▶ Începe!</a>
    </div>

    <script>
        // Generează stele
        const starsEl = document.getElementById('stars');
        for (let i = 0; i < 30; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            const size = Math.random() * 4 + 2;
            star.style.cssText = `
                width: ${size}px; height: ${size}px;
                top: ${Math.random() * 100}%;
                left: ${Math.random() * 100}%;
                animation-duration: ${2 + Math.random() * 3}s;
                animation-delay: ${-Math.random() * 3}s;
            `;
            starsEl.appendChild(star);
        }
    </script>
</body>
</html>
