    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            width: 100vw; height: 100vh; overflow: hidden;
            background: linear-gradient(180deg, #5BB8F5 0%, #8BCFF5 38%, #A8E0A0 62%, #5AAE35 85%, #3A8A20 100%);
        }
        @keyframes drift { from { left: -220px; } to { left: 110vw; } }
        .cloud { position: absolute; background: rgba(255,255,255,0.85); border-radius: 60px; pointer-events: none; }
        .cloud::before, .cloud::after { content:''; position:absolute; background:rgba(255,255,255,0.85); border-radius:50%; }
        .cloud::before { width:55%; height:165%; top:-48%; left:12%; }
        .cloud::after  { width:38%; height:130%; top:-32%; right:12%; }
        .pc { position:absolute; width:70px; height:108px; pointer-events:none; will-change:left,top; }
        @keyframes bob { 0%,100%{transform:rotate(-5deg) scaleY(.96)} 50%{transform:rotate(5deg) scaleY(1.04)} }
        .pc svg { animation: bob .35s ease-in-out infinite; }
        @keyframes tag-pop { 0%{transform:scale(1);opacity:.9} 100%{transform:scale(3);opacity:0} }
        .tag-ring { position:absolute; width:70px; height:70px; border-radius:50%; border:4px solid #ff3333; animation:tag-pop .5s ease-out forwards; pointer-events:none; z-index:5; }
        .title-wrap { position:absolute; top:22px; left:50%; transform:translateX(-50%); text-align:center; z-index:30; pointer-events:none; }
        .title-wrap h1 { font-family:'Baloo 2',cursive; font-size:clamp(1.8em,4.5vw,3.4em); color:#1a3a6b; text-shadow:3px 3px 0 rgba(255,255,255,.65),5px 5px 0 rgba(26,58,107,.1); white-space:nowrap; }
        .title-wrap .sub { font-family:'Nunito',sans-serif; font-size:.95em; color:#1a3a6b; opacity:.7; font-style:italic; }
        .author { position:absolute; bottom:106px; left:50%; transform:translateX(-50%); z-index:30; color:#1a3a6b; font-family:'Nunito',sans-serif; font-weight:700; font-size:.88em; letter-spacing:2px; text-transform:uppercase; text-shadow:1px 1px 0 rgba(255,255,255,.6); white-space:nowrap; }
        .btn-start { position:absolute; bottom:38px; left:50%; transform:translateX(-50%); z-index:30; background:#1a3a6b; color:white; font-family:'Baloo 2',cursive; font-size:1.5em; padding:12px 50px; border-radius:50px; text-decoration:none; box-shadow:0 6px 24px rgba(26,58,107,.45); transition:all .2s; letter-spacing:1px; white-space:nowrap; }
        .btn-start:hover { background:#2a5aab; transform:translateX(-50%) translateY(-4px); }
        #tree-scene { position:absolute; right:10px; bottom:70px; width:290px; height:400px; z-index:2; }
    </style>
</head>

<script>
/* ── Piece definitions ── */
const PIECES = [
    { type:'pawn',   fill:'#F5DEB3', sh:'#8B6914', hi:'#FFFAEE', lc:'#D4A860', name:'Pion 1'   },
    { type:'pawn',   fill:'#EED5A0', sh:'#7A5810', hi:'#FFF5DC', lc:'#C89850', name:'Pion 2'   },
    { type:'knight', fill:'#C4793F', sh:'#5C2E00', hi:'#E8A870', lc:'#A05828', name:'Calul'    },
    { type:'bishop', fill:'#9B7FD4', sh:'#4A2880', hi:'#C0A8FF', lc:'#7B5FBF', name:'Nebunul'  },
    { type:'rook',   fill:'#A0A8B8', sh:'#404858', hi:'#D8E0F0', lc:'#707888', name:'Turnul'   },
];

/* ── SMIL legs helper ── */
function legs(lc, sh, phase) {
    const [a1, a2] = phase ? [22, -22] : [-22, 22];
    const d = 0.42;
    return `
    <g><animateTransform attributeName="transform" type="rotate"
        values="${a1} 22 76;${a2} 22 76;${a1} 22 76" dur="${d}s" repeatCount="indefinite"/>
        <rect x="16" y="76" width="12" height="26" rx="6" fill="${lc}"/>
        <rect x="22" y="76" width="5"  height="26" rx="3" fill="${sh}" opacity=".22"/>
        <ellipse cx="27" cy="100" rx="9" ry="5" fill="${lc}"/>
    </g>
    <g><animateTransform attributeName="transform" type="rotate"
        values="${a2} 48 76;${a1} 48 76;${a2} 48 76" dur="${d}s" repeatCount="indefinite"/>
        <rect x="42" y="76" width="12" height="26" rx="6" fill="${lc}"/>
        <rect x="42" y="76" width="5"  height="26" rx="3" fill="rgba(255,255,255,.18)"/>
        <ellipse cx="43" cy="100" rx="9" ry="5" fill="${lc}"/>
    </g>`;
}

/* ── face helper ── */
function face(cx, cy, r, sc) {
    const lx = cx - r*.35, rx2 = cx + r*.35, ey = cy - r*.08, ea = r*.22;
    return `
    <path d="M${lx-ea} ${ey+2} Q${lx} ${ey-r*.22} ${lx+ea} ${ey+2}"
        stroke="${sc}" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <path d="M${rx2-ea} ${ey+2} Q${rx2} ${ey-r*.22} ${rx2+ea} ${ey+2}"
        stroke="${sc}" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <circle cx="${lx+1}"  cy="${ey+r*.22}" r="${r*.22}" fill="rgba(255,150,150,.45)"/>
    <circle cx="${rx2-1}" cy="${ey+r*.22}" r="${r*.22}" fill="rgba(255,150,150,.45)"/>
    <path d="M${cx-r*.38} ${cy+r*.16} Q${cx} ${cy+r*.48} ${cx+r*.38} ${cy+r*.16}"
        stroke="${sc}" stroke-width="2" fill="none" stroke-linecap="round"/>`;
}

/* ── IT badge ── */
function it(isIt) {
    return isIt ? `<circle cx="35" cy="50" r="37" fill="rgba(255,50,50,.10)"
        stroke="rgba(255,50,50,.60)" stroke-width="2.5" stroke-dasharray="5,3"/>
    <text x="57" y="10" font-size="12" font-weight="900" font-family="Nunito,sans-serif"
        stroke="white" stroke-width="3" paint-order="stroke" fill="#cc0000">IT!</text>` : '';
}

/* ── SVG: PAWN ── */
function makePawn(pd, isIt, phase) {
    const {fill:f, sh:s, hi:h, lc} = pd;
    return `<svg viewBox="0 0 70 108" xmlns="http://www.w3.org/2000/svg">
    ${it(isIt)}
    ${legs(lc, s, phase)}
    <ellipse cx="35" cy="80" rx="22" ry="7" fill="rgba(0,0,0,.10)"/>
    <rect x="13" y="62" width="44" height="16" rx="6" fill="${f}"/>
    <ellipse cx="35" cy="62" rx="22" ry="6" fill="${h}"/>
    <ellipse cx="47" cy="70" rx="10" ry="7" fill="${s}" opacity=".22"/>
    <ellipse cx="11" cy="62" rx="10" ry="6" fill="${f}" transform="rotate(-28,11,62)"/>
    <ellipse cx="59" cy="62" rx="10" ry="6" fill="${f}" transform="rotate(28,59,62)"/>
    <rect x="25" y="46" width="20" height="18" rx="6" fill="${f}"/>
    <rect x="39" y="46" width="6"  height="18" rx="3" fill="${s}" opacity=".22"/>
    <rect x="25" y="46" width="6"  height="18" rx="3" fill="${h}" opacity=".42"/>
    <circle cx="35" cy="26" r="22" fill="${f}"/>
    <ellipse cx="46" cy="36" rx="17" ry="13" fill="${s}" opacity=".24"/>
    <ellipse cx="26" cy="17" rx="13" ry="9"  fill="${h}" opacity=".55"/>
    <circle  cx="24" cy="16" r="4.5" fill="white" opacity=".42"/>
    ${face(35, 26, 22, s)}
    </svg>`;
}

/* ── SVG: KNIGHT ── */
function makeKnight(pd, isIt) {
    const {fill:f, sh:s, hi:h, lc} = pd;
    return `<svg viewBox="0 0 70 108" xmlns="http://www.w3.org/2000/svg">
    ${it(isIt)}
    ${legs(lc, s, true)}
    <ellipse cx="35" cy="80" rx="20" ry="7" fill="rgba(0,0,0,.10)"/>
    <rect x="15" y="62" width="40" height="16" rx="8" fill="${f}"/>
    <ellipse cx="35" cy="62" rx="20" ry="6" fill="${h}"/>
    <ellipse cx="10" cy="65" rx="10" ry="6" fill="${f}" transform="rotate(-22,10,65)"/>
    <ellipse cx="60" cy="65" rx="10" ry="6" fill="${f}" transform="rotate(22,60,65)"/>
    <path d="M26,62 Q22,46 28,31 Q34,18 46,14 Q54,12 56,20 Q58,28 52,36 Q46,44 40,52 Q34,58 35,62Z"
        fill="${f}" stroke="${s}" stroke-width="1.5"/>
    <path d="M30,58 Q26,48 30,37" stroke="${h}" stroke-width="4" fill="none" opacity=".45" stroke-linecap="round"/>
    <path d="M46,48 Q52,40 52,30" stroke="${s}" stroke-width="3" fill="none" opacity=".18" stroke-linecap="round"/>
    <path d="M28,32 Q22,26 24,18 Q26,12 31,15" fill="${s}" opacity=".4"/>
    <path d="M30,40 Q24,35 26,28" stroke="${s}" stroke-width="4" fill="none" opacity=".35" stroke-linecap="round"/>
    <circle cx="47" cy="22" r="5.5" fill="white"/>
    <circle cx="48" cy="22" r="3.5" fill="${s}"/>
    <circle cx="49" cy="21" r="1.5" fill="white" opacity=".85"/>
    <ellipse cx="53" cy="32" rx="3" ry="2" fill="${s}" opacity=".5" transform="rotate(30,53,32)"/>
    <circle cx="42" cy="28" r="5" fill="rgba(255,150,100,.35)"/>
    <polygon points="32,16 27,7 37,12" fill="${f}" stroke="${s}" stroke-width="1"/>
    <path d="M44,14 Q52,12 56,20" stroke="${hi}" stroke-width="2" fill="none" opacity=".3"/>
    </svg>`.replace('${hi}', h);
}

/* ── SVG: BISHOP ── */
function makeBishop(pd, isIt) {
    const {fill:f, sh:s, hi:h, lc} = pd;
    return `<svg viewBox="0 0 70 108" xmlns="http://www.w3.org/2000/svg">
    ${it(isIt)}
    ${legs(lc, s, false)}
    <ellipse cx="35" cy="80" rx="22" ry="7" fill="rgba(0,0,0,.10)"/>
    <rect x="13" y="62" width="44" height="18" rx="6" fill="${f}"/>
    <ellipse cx="35" cy="62" rx="22" ry="6" fill="${h}"/>
    <ellipse cx="47" cy="70" rx="11" ry="7" fill="${s}" opacity=".2"/>
    <ellipse cx="11" cy="67" rx="10" ry="6" fill="${f}" transform="rotate(-25,11,67)"/>
    <ellipse cx="59" cy="67" rx="10" ry="6" fill="${f}" transform="rotate(25,59,67)"/>
    <path d="M22,62 Q20,48 24,36 Q28,24 35,20 Q42,24 46,36 Q50,48 48,62Z"
        fill="${f}" stroke="${s}" stroke-width="1.5"/>
    <path d="M26,60 Q24,50 26,40" stroke="${h}" stroke-width="4" fill="none" opacity=".38" stroke-linecap="round"/>
    <path d="M44,60 Q46,50 44,40" stroke="${s}" stroke-width="3" fill="none" opacity=".18" stroke-linecap="round"/>
    <rect x="32" y="44" width="6" height="12" rx="2" fill="${s}" opacity=".45"/>
    <rect x="28" y="48" width="14" height="5"  rx="2" fill="${s}" opacity=".45"/>
    <circle cx="35" cy="30" r="14" fill="${f}"/>
    <ellipse cx="42" cy="37" rx="10" ry="8" fill="${s}" opacity=".22"/>
    <ellipse cx="28" cy="23" rx="9"  ry="6" fill="${h}" opacity=".55"/>
    <path d="M23,26 Q26,11 35,5 Q44,11 47,26" fill="${f}" stroke="${s}" stroke-width="1.5"/>
    <path d="M27,22 Q29,11 35,7" stroke="${h}" stroke-width="3" fill="none" opacity=".42" stroke-linecap="round"/>
    <path d="M43,22 Q41,11 35,7" stroke="${s}" stroke-width="2" fill="none" opacity=".18" stroke-linecap="round"/>
    <rect x="23" y="25" width="24" height="5" rx="2" fill="${s}" opacity=".38"/>
    ${face(35, 30, 14, s)}
    </svg>`;
}

/* ── SVG: ROOK ── */
function makeRook(pd, isIt) {
    const {fill:f, sh:s, hi:h, lc} = pd;
    return `<svg viewBox="0 0 70 108" xmlns="http://www.w3.org/2000/svg">
    ${it(isIt)}
    ${legs(lc, s, true)}
    <ellipse cx="35" cy="80" rx="22" ry="7" fill="rgba(0,0,0,.10)"/>
    <rect x="13" y="64" width="44" height="16" rx="5" fill="${f}"/>
    <ellipse cx="35" cy="64" rx="22" ry="6" fill="${h}"/>
    <rect x="43" y="64" width="14" height="16" rx="4" fill="${s}" opacity=".18"/>
    <ellipse cx="11" cy="68" rx="10" ry="6" fill="${f}" transform="rotate(-20,11,68)"/>
    <ellipse cx="59" cy="68" rx="10" ry="6" fill="${f}" transform="rotate(20,59,68)"/>
    <rect x="18" y="28" width="34" height="38" rx="4" fill="${f}" stroke="${s}" stroke-width="1.5"/>
    <rect x="30" y="28" width="8"  height="38" fill="${h}" opacity=".22"/>
    <rect x="42" y="28" width="10" height="38" rx="3" fill="${s}" opacity=".16"/>
    <rect x="18" y="16" width="10" height="16" rx="2" fill="${f}" stroke="${s}" stroke-width="1.5"/>
    <rect x="30" y="16" width="10" height="16" rx="2" fill="${f}" stroke="${s}" stroke-width="1.5"/>
    <rect x="42" y="16" width="10" height="16" rx="2" fill="${f}" stroke="${s}" stroke-width="1.5"/>
    <rect x="19" y="17" width="4" height="11" rx="1" fill="${h}" opacity=".38"/>
    <rect x="31" y="17" width="4" height="11" rx="1" fill="${h}" opacity=".38"/>
    <rect x="43" y="17" width="4" height="11" rx="1" fill="${h}" opacity=".38"/>
    <rect x="22" y="37" width="26" height="20" rx="4" fill="rgba(50,80,160,.18)" stroke="${s}" stroke-width="1.2"/>

    <circle cx="41" cy="45" r="4.5" fill="white"/>
    <circle cx="30" cy="45" r="2.8" fill="${s}"/>
    <circle cx="42" cy="45" r="2.8" fill="${s}"/>
    <circle cx="31" cy="44" r="1.1" fill="white" opacity=".85"/>
    <circle cx="43" cy="44" r="1.1" fill="white" opacity=".85"/>

    <circle cx="43" cy="51" r="4" fill="rgba(150,200,255,.4)"/>
    <path d="M27 53 Q35 60 43 53" stroke="${s}" stroke-width="2" fill="none" stroke-linecap="round"/>
    </svg>`;
}

/* ── GAME ── */
const SW = 70, SH = 108, MARGIN = 30;
const TITLE_SAFE = 130, BOT_SAFE = 165, RIGHT_SAFE = 305;
let pieces = [], itIdx = 0, cooldown = 0, lastTagged = -1;

function makeSvg(pd, isIt, idx) {
    const ph = idx % 2 === 0;
    if (pd.type === 'pawn')   return makePawn(pd, isIt, ph);
    if (pd.type === 'knight') return makeKnight(pd, isIt);
    if (pd.type === 'bishop') return makeBishop(pd, isIt);
    if (pd.type === 'rook')   return makeRook(pd, isIt);
    return makePawn(pd, isIt, ph);
}

function refresh() {
    pieces.forEach((p, i) => p.el.innerHTML = makeSvg(p.pd, i === itIdx, i));
}

function dist(a, b) { return Math.hypot(a.x - b.x, a.y - b.y); }

function init() {
    const pw = window.innerWidth - RIGHT_SAFE;
    const ph2 = window.innerHeight - TITLE_SAFE - BOT_SAFE;
    PIECES.forEach((pd, i) => {
        const el = document.createElement('div');
        el.className = 'pc';
        document.body.appendChild(el);
        const ang = (i / PIECES.length) * Math.PI * 2;
        const r = Math.min(pw, ph2) * 0.28;
        pieces.push({ el, pd, i,
            x: pw/2 + Math.cos(ang)*r - SW/2,
            y: TITLE_SAFE + ph2/2 + Math.sin(ang)*r - SH/2,
            vx: Math.cos(ang + Math.PI) * 1.8,
            vy: Math.sin(ang + Math.PI) * 1.8,
        });
    });
    refresh();
    requestAnimationFrame(loop);
}

function loop() {
    const w = window.innerWidth, h = window.innerHeight;
    const maxX = w - RIGHT_SAFE - SW - 5;
    const minY = TITLE_SAFE + 5, maxY = h - BOT_SAFE - SH;
    const IT_SPD = 2.0, FL_SPD = 2.8;
    if (cooldown > 0) cooldown--;

    const IT = pieces[itIdx];
    let near = null, nearD = Infinity;
    pieces.forEach((p, i) => { if (i !== itIdx) { const d = dist(IT, p); if (d < nearD) { nearD = d; near = p; } } });
    if (near) {
        const dx = near.x - IT.x, dy = near.y - IT.y, d = Math.hypot(dx, dy) || 1;
        IT.vx = IT.vx*.88 + dx/d*IT_SPD*.12; IT.vy = IT.vy*.88 + dy/d*IT_SPD*.12;
        const sp = Math.hypot(IT.vx, IT.vy); if (sp > IT_SPD) { IT.vx = IT.vx/sp*IT_SPD; IT.vy = IT.vy/sp*IT_SPD; }
    }
    pieces.forEach((p, i) => {
        if (i === itIdx) return;
        const dx = p.x - IT.x, dy = p.y - IT.y, d = Math.hypot(dx, dy) || 1;
        const u = Math.max(0, (220-d)/220);
        p.vx = p.vx*.9 + (dx/d*u*FL_SPD + (Math.random()-.5)*.1)*.10;
        p.vy = p.vy*.9 + (dy/d*u*FL_SPD + (Math.random()-.5)*.1)*.10;
        const sp = Math.hypot(p.vx, p.vy); if (sp > FL_SPD) { p.vx = p.vx/sp*FL_SPD; p.vy = p.vy/sp*FL_SPD; }
    });
    pieces.forEach(p => {
        p.x += p.vx; p.y += p.vy;
        if (p.x < MARGIN) { p.x = MARGIN; p.vx = Math.abs(p.vx)+.5; }
        if (p.x > maxX)   { p.x = maxX;   p.vx = -Math.abs(p.vx)-.5; }
        if (p.y < minY)   { p.y = minY;   p.vy = Math.abs(p.vy)+.5; }
        if (p.y > maxY)   { p.y = maxY;   p.vy = -Math.abs(p.vy)-.5; }
        p.el.style.left = p.x + 'px'; p.el.style.top = p.y + 'px';
    });
    if (cooldown === 0) {
        pieces.forEach((p, i) => {
            if (i === itIdx || i === lastTagged) return;
            if (dist(IT, p) < SW*.75) {
                const r = document.createElement('div'); r.className = 'tag-ring';
                r.style.left = p.x+'px'; r.style.top = p.y+'px';
                document.body.appendChild(r); setTimeout(() => r.remove(), 550);
                lastTagged = itIdx; itIdx = i; cooldown = 90; refresh();
            }
        });
    }
    requestAnimationFrame(loop);
}

init();
</script>
