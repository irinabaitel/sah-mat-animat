<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Șah Mat Animat – Exerciții</title>
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@700;900&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            min-height: 100vh;
            background: #F5A96E;
            font-family: 'Nunito', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px 60px;
        }

        .page {
            max-width: 820px;
            width: 100%;
            padding: 40px 44px 50px;
            position: relative;
        }

        .corner-piece { position: absolute; width: 70px; height: 70px; }
        .corner-tl { top: 0; left: 0; }
        .corner-tr { top: 0; right: 0; transform: scaleX(-1); }

        h1 {
            font-family: 'Baloo 2', cursive;
            font-size: 2.2em;
            color: #1a3a6b;
            text-transform: uppercase;
            margin-bottom: 6px;
            margin-top: 10px;
            text-shadow: 2px 2px 0px rgba(255,255,255,0.4);
            text-align: center;
        }

        .page-subtitle {
            text-align: center;
            color: #1a3a6b;
            font-style: italic;
            font-size: 1.05em;
            margin-bottom: 28px;
            opacity: 0.8;
        }

        /* ── Progress dots ── */
        .progress {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 24px;
        }
        .dot {
            width: 14px; height: 14px;
            border-radius: 50%;
            background: rgba(26,58,107,0.2);
            transition: all 0.3s;
        }
        .dot.done  { background: #27ae60; }
        .dot.active { background: #1a3a6b; transform: scale(1.3); }

        /* ── Puzzle layout ── */
        .puzzle-wrap {
            display: grid;
            grid-template-columns: 320px 1fr;
            gap: 28px;
            align-items: start;
        }

        .board-col {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .puzzle-label {
            font-family: 'Baloo 2', cursive;
            font-size: 1em;
            font-weight: 900;
            color: #1a3a6b;
            text-align: center;
        }

        #board { width: 320px; }

        /* ── Side panel ── */
        .side-panel {
            display: flex;
            flex-direction: column;
            gap: 14px;
            padding-top: 30px;
        }

        .turn-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(255,255,255,0.55);
            border-radius: 50px;
            padding: 6px 16px;
            font-family: 'Baloo 2', cursive;
            font-size: 1em;
            font-weight: 900;
            color: #1a3a6b;
            width: fit-content;
        }
        .turn-dot {
            width: 14px; height: 14px;
            border-radius: 50%;
            background: #eee;
            border: 2px solid #999;
        }
        .turn-dot.white { background: #fff; border-color: #333; }

        .msg-box {
            background: rgba(255,255,255,0.55);
            border: 2px solid rgba(26,58,107,0.15);
            border-radius: 14px;
            padding: 14px 16px;
            font-size: 1.08em;
            font-weight: 700;
            color: #1a3a6b;
            line-height: 1.55;
            min-height: 60px;
            transition: all 0.3s;
        }
        .msg-box.correct {
            background: rgba(39,174,96,0.18);
            border-color: #27ae60;
            color: #1a5c30;
        }
        .msg-box.wrong {
            background: rgba(192,57,43,0.12);
            border-color: #c0392b;
            color: #7b1a10;
        }

        .hint-box {
            background: rgba(255,220,50,0.3);
            border: 2px solid rgba(255,180,0,0.4);
            border-radius: 14px;
            padding: 10px 14px;
            font-size: 0.95em;
            color: #5a4000;
            font-style: italic;
            display: none;
        }

        .btn-primary {
            font-family: 'Baloo 2', cursive;
            font-size: 1.1em;
            padding: 11px 24px;
            border-radius: 50px;
            border: none;
            cursor: pointer;
            background: #1a3a6b;
            color: white;
            box-shadow: 0 4px 14px rgba(0,0,0,0.2);
            transition: all 0.2s;
            display: none;
        }
        .btn-primary:hover { background: #2a5aab; transform: translateY(-2px); }

        .btn-secondary {
            font-family: 'Baloo 2', cursive;
            font-size: 0.95em;
            padding: 8px 18px;
            border-radius: 50px;
            border: 2px solid rgba(26,58,107,0.4);
            background: transparent;
            color: #1a3a6b;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-secondary:hover { background: rgba(26,58,107,0.08); }

        /* ── Solved screen ── */
        .solved-screen {
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 18px;
            text-align: center;
            padding: 40px 20px;
            background: rgba(255,255,255,0.4);
            border-radius: 20px;
            margin-top: 20px;
        }
        .solved-screen.show { display: flex; }
        .solved-emoji { font-size: 4em; }
        .solved-title {
            font-family: 'Baloo 2', cursive;
            font-size: 1.8em;
            color: #1a3a6b;
        }
        .solved-desc {
            font-size: 1.1em;
            color: #333;
            max-width: 400px;
        }

        /* ── Nav buttons ── */
        .nav-buttons { display: flex; justify-content: space-between; gap: 20px; margin-top: 24px; }
        .nav-btn {
            display: inline-block;
            background: #1a3a6b;
            color: white;
            font-family: 'Baloo 2', cursive;
            font-size: 1.2em;
            padding: 12px 36px;
            border-radius: 50px;
            text-decoration: none;
            transition: all 0.2s;
            box-shadow: 0 5px 20px rgba(26,58,107,0.4);
        }
        .nav-btn:hover { background: #2a5aab; transform: translateY(-3px); }
        .nav-btn.back { background: rgba(26,58,107,0.5); }

        /* ── Board shake animation ── */
        @keyframes shake {
            0%,100% { transform: translateX(0); }
            20% { transform: translateX(-6px); }
            40% { transform: translateX(6px); }
            60% { transform: translateX(-4px); }
            80% { transform: translateX(4px); }
        }
        .shake { animation: shake 0.35s ease; }

        /* ── Confetti-like flash ── */
        @keyframes solveFlash {
            0% { box-shadow: 0 0 0 0 rgba(39,174,96,0.5); }
            50% { box-shadow: 0 0 0 16px rgba(39,174,96,0); }
            100% { box-shadow: 0 0 0 0 rgba(39,174,96,0); }
        }
        .solve-flash { animation: solveFlash 0.6s ease; }
    </style>
</head>
<body>
<div class="page">

    <img src="pieces/wK.svg" class="corner-piece corner-tl" alt="">
    <img src="pieces/bK.svg" class="corner-piece corner-tr" alt="">

    <h1>Găsește Matul!</h1>
    <p class="page-subtitle">Mută piesa corectă — albul dă mat într-o singură mutare</p>

    <!-- Progress -->
    <div class="progress" id="progressDots"></div>

    <!-- Puzzle area -->
    <div class="puzzle-wrap" id="puzzleArea">
        <div class="board-col">
            <div class="puzzle-label" id="puzzleLabel">Puzzle 1 din 3</div>
            <div id="board"></div>
        </div>
        <div class="side-panel">
            <div class="turn-badge">
                <div class="turn-dot white"></div>
                Albul mută
            </div>
            <div class="msg-box" id="msgBox">Trage piesa pe câmpul corect pentru a da mat!</div>
            <div class="hint-box" id="hintBox"></div>
            <button class="btn-primary" id="btnNext" onclick="nextPuzzle()">Puzzle următor ▶</button>
            <button class="btn-secondary" onclick="resetCurrent()">↺ Încearcă din nou</button>
        </div>
    </div>

    <!-- All solved screen -->
    <div class="solved-screen" id="solvedScreen">
        <div class="solved-emoji">🏆</div>
        <div class="solved-title">Felicitări!</div>
        <div class="solved-desc">Ai rezolvat toate cele 3 puzzle-uri! Ești pe drumul cel bun spre a deveni un mare jucător de șah.</div>
        <button class="btn-primary" style="display:block" onclick="restartAll()">↺ Reîncepe de la început</button>
    </div>

    <div class="nav-buttons">
        <a href="hub.html" class="nav-btn back">&#9664; Cuprins</a>
        <a href="pagina5.html" class="nav-btn">&#128218; Lecția Matul</a>
    </div>

</div>

<script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
<script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
<script>
    // ── Puzzle definitions ──────────────────────────────────────────────────
    var PUZZLES = [
        {
            fen:         '6k1/5ppp/8/8/8/8/5PPP/3R2K1 w - - 0 1',
            solution:    { from: 'd1', to: 'd8' },
            label:       'Puzzle 1 din 3',
            successMsg:  '✓ Rd8# — Turnul controlează întreaga ultimă linie. Mat!',
            hint:        '💡 Gândește-te unde poate merge turnul ca să controleze toată linia 8...',
            orientation: 'white'
        },
        {
            fen:         '6k1/5ppp/8/8/8/5Q2/5PPP/6K1 w - - 0 1',
            solution:    { from: 'f3', to: 'a8' },
            label:       'Puzzle 2 din 3',
            successMsg:  '✓ Da8# — Regina vine pe diagonală și controlează toată linia 8. Mat!',
            hint:        '💡 Regina poate merge și pe diagonală — urmărește diagonala care duce spre ultima linie...',
            orientation: 'white'
        },
        {
            fen:         '4r1k1/5ppp/8/8/8/8/5PPP/4R1K1 w - - 0 1',
            solution:    { from: 'e1', to: 'e8' },
            label:       'Puzzle 3 din 3',
            successMsg:  '✓ Txe8# — Capturi turnul advers și dai mat pe linia 8. Mat!',
            hint:        '💡 Uneori trebuie să capturezi o piesă pentru a elibera linia de mat...',
            orientation: 'white'
        }
    ];

    // ── State ───────────────────────────────────────────────────────────────
    var currentIdx = 0;
    var wrongAttempts = 0;
    var puzzleSolved = false;
    var game, board;

    // ── Init ────────────────────────────────────────────────────────────────
    function buildDots() {
        var el = document.getElementById('progressDots');
        el.innerHTML = '';
        PUZZLES.forEach(function(_, i) {
            var d = document.createElement('div');
            d.className = 'dot' + (i < currentIdx ? ' done' : i === currentIdx ? ' active' : '');
            el.appendChild(d);
        });
    }

    function loadPuzzle(idx) {
        currentIdx = idx;
        wrongAttempts = 0;
        puzzleSolved = false;
        var p = PUZZLES[idx];

        game = new Chess(p.fen);

        if (board) board.destroy();
        board = Chessboard('board', {
            draggable:   true,
            position:    p.fen,
            pieceTheme:  'pieces/{piece}.svg',
            orientation: p.orientation,
            onDragStart: onDragStart,
            onDrop:      onDrop,
            onSnapEnd:   onSnapEnd
        });

        document.getElementById('puzzleLabel').textContent = p.label;
        setMsg('Trage piesa pe câmpul corect pentru a da mat!', '');
        document.getElementById('hintBox').style.display = 'none';
        document.getElementById('btnNext').style.display = 'none';
        buildDots();
    }

    function setMsg(text, type) {
        var el = document.getElementById('msgBox');
        el.textContent = text;
        el.className = 'msg-box' + (type ? ' ' + type : '');
    }

    // ── Chess.js callbacks ──────────────────────────────────────────────────
    function onDragStart(source, piece) {
        if (puzzleSolved) return false;
        if (game.game_over()) return false;
        // Only allow moving white pieces
        if (piece.search(/^b/) !== -1) return false;
        return true;
    }

    function onDrop(source, target) {
        // Try the move in chess.js (validates legality)
        var move = game.move({ from: source, to: target, promotion: 'q' });

        // Illegal move → snap back
        if (move === null) return 'snapback';

        var sol = PUZZLES[currentIdx].solution;

        if (source === sol.from && target === sol.to) {
            // ✓ Correct solution move
            puzzleSolved = true;
            setMsg(PUZZLES[currentIdx].successMsg, 'correct');
            document.getElementById('hintBox').style.display = 'none';

            // Flash the board green
            setTimeout(function() {
                document.getElementById('board').classList.add('solve-flash');
            }, 100);

            // Show "next" button (or finish if last)
            setTimeout(function() {
                if (currentIdx < PUZZLES.length - 1) {
                    document.getElementById('btnNext').style.display = 'block';
                    document.getElementById('btnNext').textContent = 'Puzzle următor ▶';
                } else {
                    document.getElementById('btnNext').style.display = 'block';
                    document.getElementById('btnNext').textContent = '🏆 Vezi rezultatul';
                }
            }, 700);

        } else {
            // ✗ Wrong move → undo and snap back
            game.undo();
            wrongAttempts++;

            setMsg('✗ Nu este mutarea corectă. Mai încearcă!', 'wrong');

            // Show hint after 2 wrong attempts
            if (wrongAttempts >= 2) {
                var hintEl = document.getElementById('hintBox');
                hintEl.textContent = PUZZLES[currentIdx].hint;
                hintEl.style.display = 'block';
            }

            // Shake effect
            var boardEl = document.getElementById('board');
            boardEl.classList.remove('shake');
            void boardEl.offsetWidth; // reflow to restart animation
            boardEl.classList.add('shake');
            setTimeout(function() { boardEl.classList.remove('shake'); }, 400);

            return 'snapback';
        }
    }

    function onSnapEnd() {
        board.position(game.fen());
    }

    // ── Controls ─────────────────────────────────────────────────────────────
    function nextPuzzle() {
        if (currentIdx < PUZZLES.length - 1) {
            loadPuzzle(currentIdx + 1);
        } else {
            // All done
            document.getElementById('puzzleArea').style.display = 'none';
            var screen = document.getElementById('solvedScreen');
            screen.classList.add('show');
            // Mark all dots done
            document.querySelectorAll('.dot').forEach(function(d) {
                d.className = 'dot done';
            });
        }
    }

    function resetCurrent() {
        loadPuzzle(currentIdx);
    }

    function restartAll() {
        document.getElementById('solvedScreen').classList.remove('show');
        document.getElementById('puzzleArea').style.display = 'grid';
        loadPuzzle(0);
    }

    // ── Start ─────────────────────────────────────────────────────────────────
    loadPuzzle(0);
</script>
<style>
.hub-btn {
    position: fixed; top: 16px; right: 16px;
    background: #1a3a6b; color: white;
    font-family: "Baloo 2", cursive; font-size: .85em;
    padding: 8px 18px; border-radius: 50px;
    text-decoration: none; box-shadow: 0 3px 12px rgba(26,58,107,.4);
    z-index: 100; transition: background .2s;
}
.hub-btn:hover { background: #2a5aab; }
</style>
<a href="hub.html" class="hub-btn">&#9776; Cuprins</a>
</body>
</html>
