/* ── Tabla statică de shatranj ─────────────────────────── */
/* Container query: aflăm dimensiunile board-wrapper-ului */
.board-wrapper {
  container-type: size;
  container-name: bw;
}

.shatranj-board {
  /* Tabla = un pătrat cu latura = MINIMUL dintre lățimea și înălțimea containerului,
     ca să rămână pătrată indiferent de forma containerului. */
  width:  min(100cqw, 100cqh);
  height: min(100cqw, 100cqh);
  margin: auto;
  display: grid;
  grid-template-columns: repeat(8, 1fr);
  grid-template-rows:    repeat(8, 1fr);
  background: #5a3a1c;
}
.csq {
  aspect-ratio: 1 / 1;
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
}
/* Tabla MONOCROMĂ — toate căsuțele aceeași culoare (lemn deschis).
   Shatranj-ul arab NU avea pătrate alternative alb-negru: modelul
   bicolor a apărut abia în Europa, sec. XI–XIII. Iar X-urile vechi
   de pe ashtapada au DISPĂRUT cu totul la arabi — de aceea tabla
   de shatranj e complet curată, fără niciun marcaj. */
.csq.light, .csq.dark { background: #e8d4a0; }

/* Linii subtile de delimitare între căsuțe, ca pe o tablă desenată */
.csq {
  box-shadow:
    inset -1px 0 0 rgba(90, 58, 28, .35),
    inset 0 -1px 0 rgba(90, 58, 28, .35);
}

/* object-fit: contain păstrează proporțiile PNG-ului și încadrează în pătrat. */
.csq img {
  position: relative;
  z-index: 2;
  object-fit: contain;
  pointer-events: none;
  width: 78%;
  height: 78%;
}
/* Ierarhie vizuală — piesele „importante" sunt mai mari pe tablă */
.csq img.p-shah   { width: 96%; height: 96%; }
.csq img.p-firzan { width: 90%; height: 90%; }

.csq img.p-fil    { width: 84%; height: 84%; }
.csq img.p-asb    { width: 82%; height: 82%; }
.csq img.p-baidaq { width: 72%; height: 72%; }

<script>
/* ── Construiește tabla statică ───────────────────────────
   Ca în chaturanga, shah și firzan NU sunt simetrici pe ambele
   rânduri. Albul: firzan pe d1, shah pe e1. Negrul: shah pe d8,
   firzan pe e8. Așa regii nu sunt vis-à-vis, ci pe coloane alăturate —
   o particularitate moștenită din chaturanga. Tabla NU are X-uri:
   arabii le-au eliminat odată cu zarurile. */
const back_w = ['rukh','asb','fil','firzan','shah','fil','asb','rukh'];
const back_b = ['rukh','asb','fil','shah','firzan','fil','asb','rukh'];
const cols = ['a','b','c','d','e','f','g','h'];
const board = document.getElementById('shBoard');
for (let r = 8; r >= 1; r--) {
  for (let c = 0; c < 8; c++) {
    const sq = cols[c] + r;
    const isLight = (c + r) % 2 === 1;
    const div = document.createElement('div');
    div.className = 'csq ' + (isLight ? 'light' : 'dark');
    let piece = null;
    if      (r === 1) piece = back_w[c] + '_w';
    else if (r === 2) piece = 'baidaq_w';
    else if (r === 7) piece = 'baidaq_b';
    else if (r === 8) piece = back_b[c] + '_b';
    if (piece) {
      const img = document.createElement('img');
      img.src = 'img/shatranj/' + piece + '.png?t=' + Date.now();
      img.alt = piece.replace('_',' ');
      img.className = 'p-' + piece.split('_')[0];
      div.appendChild(img);
    }
    board.appendChild(div);
  }
}

<p>Îți amintești de <strong>chaturanga</strong>, jocul indian cu elefanți și care de luptă? Ei bine, jocul nostru nu a stat pe loc. A pornit la drum — un drum lung de sute de ani și mii de kilometri.</p>

<p>Prima oprire: <strong>Persia</strong> (țara care azi se numește Iran). Acolo trăia, acum aproape <strong>1500 de ani</strong>, un rege pe nume <strong>Khosrow</strong>. Se spune că i-a venit în dar, tocmai din India, o tablă cu <strong>16 piese din smarald și 16 din rubin</strong> — dar fără nicio explicație cum se joacă! Înțeleptul curții, vizirul <strong>Bozorgmehr</strong>, s-a gândit zile întregi și a descoperit singur regulile. Toată lumea a rămas uimită.</p>

<p>Tabla de shatranj are tot <strong>8 rânduri și 8 coloane</strong>, ca tabla de șah de azi. Dar dacă o compari cu tabla de chaturanga, observi ceva: <strong>au dispărut X-urile!</strong> 🔍</p>

<p>E o particularitate veche, moștenită tocmai din chaturanga. Mult mai târziu, în Europa, lumea a „îndreptat" așezarea — și de-aia azi regele stă fix în fața regelui. Dar pe vremea perșilor și a arabilor, regii și sfetnicii stăteau pe <strong>coloane vecine</strong>, nu unul în fața celuilalt. 🤴</p>

<p>Multe piese mută la fel ca la chaturanga și ca la șahul de azi: <strong>rukh</strong> aleargă pe linii drepte, <strong>asb</strong> sare în L, <strong>shah</strong> face un pas în orice direcție.</p>

  { num: '6.', title: 'Călătorie în timp: Legenda completă pentru cititori pasionați', bodyHTML: `
<p style="opacity:.85;"><em>Povestea lungă, pentru cine vrea să știe tot. Numerele mici, ca <sup>[1]</sup>, sunt indicii — le găsești explicate în sertarul „Pentru Detectivi".</em></p>

<p><strong>📜 Capitolul I — Solul venit din India</strong></p>
<p>Poetul persan Firdausi a strâns, într-o carte uriașă scrisă acum o mie de ani, o <strong>legendă</strong> despre cum ar fi ajuns jocul în Persia <sup>[2]</sup> — o poveste frumoasă, nu o cronică sigură. La curtea marelui rege <strong>Khosrow</strong> a sosit un sol din India, cu daruri scumpe și cu o tablă tăiată în pătrate, plină de piese de fildeș. Solul a venit cu o provocare: <em>„Dacă înțelepții voștri ghicesc singuri regulile acestui joc, India vă va plăti tribut. Dacă nu — voi ne veți plăti nouă."</em></p>
<p>Nimeni nu pricepea nimic. Atunci s-a ridicat înțeleptul vizir <strong>Bozorgmehr</strong>. A privit tabla o zi și o noapte și, până în zori, a <strong>dezlegat singur toate regulile</strong>. Iar ca răspuns, persanii au trimis înapoi în India un joc inventat de ei — <strong>nardul</strong> (strămoșul jocului de table) — și i-au provocat la rândul lor. Așa a început, spune legenda, o adevărată întrecere a minților între două imperii <sup>[2]</sup><sup>[1]</sup>.</p>

<p><strong>🔤 Capitolul II — Cum a devenit chaturanga „shatranj"</strong></p>
<p>Cuvintele călătoresc și ele, și se schimbă pe drum, ca niște pietre rostogolite de râu. Indianul <em>chaturanga</em> a devenit, în gura persanilor, <em>chatrang</em>; iar când jocul a ajuns la arabi, care nu aveau sunetele „ch" și „g", a devenit <strong>shatranj</strong> <sup>[1]</sup>. La fel s-au schimbat și piesele: <em>raja</em> (regele) a devenit <strong>shah</strong>, iar <em>mantri</em> (sfetnicul) a devenit <strong>firzan</strong>, vizirul. Iar strigătul cu care se încheia partida — <strong>„shah mat!"</strong> — se traduce <em>„regele e încolțit, fără scăpare"</em>, nu <em>„regele e mort"</em>, așa cum alții susțin (cărturarii încă se ceartă pe înțelesul exact). În plus, în Persia regii nu se omorau pe câmpul de luptă, ci erau doar <strong>capturați cu respect</strong>. De acolo vine cuvântul nostru de azi: <strong>șah-mat</strong> <sup>[5]</sup>.</p>

<p><strong>🏛️ Capitolul III — Epoca de aur de la Bagdad</strong></p>
<p>Cea mai frumoasă vârstă a shatranjului a fost la <strong>Bagdad</strong>, în vremea în care orașul avea o uriașă „Casă a Înțelepciunii", unde se traduceau și se scriau cărți din toată lumea. Acolo a trăit <strong>al-Adli</strong>, un maestru care, în secolul al IX-lea, a scris <strong>unul dintre primele mari tratate de șah</strong> din lume <sup>[3]</sup>. Tot el a strâns și a pus pe hârtie ceva ce rezolvi și tu astăzi: <strong>mansubat</strong> — primele <strong>probleme de șah</strong>, mici ghicitori pe tablă, „dă mat în 3 mutări". Au peste o mie de ani și încă ne pun mintea la încercare.</p>

<p><strong>👑 Capitolul IV — as-Suli, jucătorul fără egal</strong></p>
<p>După al-Adli a venit un jucător atât de mare încât numele lui era pomenit: când cineva juca minunat, arabii spuneau <em>„joacă precum <strong>as-Suli</strong>"</em>. El era maestru la curtea califului și scria cărți de șah <sup>[4]</sup>; tocmai Murray a fost cel care a strâns această vorbă din manuscrise și a povestit cum o problemă lăsată de el a rămas nedezlegată aproape <strong>o mie de ani</strong>, până în vremurile noastre <sup>[1]</sup>. Un campion care a dat mat… peste veacuri.</p>

<p><strong>🔍 Capitolul V — Cărțile pierdute și detectivul Murray</strong></p>
<p>Aproape toate aceste cărți vechi s-au pierdut. Cum mai știm atunci ce scria în ele? Pentru că alți autori le-au <strong>copiat și citat</strong>, iar istoricul englez, <strong>H. J. R. Murray</strong>, a adunat în 1913 cioburile risipite prin sute de manuscrise arabe și persane și a <strong>reconstituit</strong> tratatele lui al-Adli și ale lui as-Suli <sup>[1]</sup><sup>[5]</sup>. E ca și cum ai reface un vas spart din zeci de cioburi găsite prin case diferite. Vrei să vezi „dosarul"? Deschide sertarul următor. 👇</p>
