  {
    num: '1.',
    title: 'Povestea jocului',
    bodyHTML: `
<p>Ai cunoscut chaturanga din India și shatranj din Persia. Acum mergem tocmai în <strong>China</strong>, ca să vedem un alt văr al șahului: <strong>xiangqi</strong> (se citește cam „șiang-ci"). E poate cel mai jucat joc de tablă din China — în parcuri, pe stradă, bunici și copii deopotrivă.</p>

<p>Numele lui ascunde o ghicitoare. Cuvântul chinezesc <strong>象</strong> (<em>xiàng</em>) înseamnă în același timp <strong>„elefant"</strong> și <strong>„imagine"</strong>. Așa că „xiangqi" poate însemna fie <em>„jocul-elefant"</em>, fie <em>„jocul-imagine"</em>. Nici savanții nu s-au pus de acord care a fost sensul de la început. Tu ce crezi? 🐘🤔</p>

<p>Tabla nu e un câmp gol — e o <strong>hartă de poveste</strong>. La mijloc curge un <strong>râu</strong>, iar pe el scrie <em>„Râul Chu, Hotarul Han"</em>. Asta amintește de un război adevărat de acum peste 2000 de ani, dintre două armate: cea <strong>roșie</strong> (Han, a lui Liu Bang) și cea <strong>neagră</strong> (Chu, a lui Xiang Yu).</p>

<p>O legendă spune că un general genial, <strong>Han Xin</strong>, ar fi inventat jocul ca soldaților lui să nu le mai fie dor de casă în timpul iernii. E o poveste frumoasă — dar doar o legendă, nu s-a întâmplat chiar așa. 🎖️</p>

<p>Adevărul, după cercetători: xiangqi e foarte vechi (atestat clar acum vreo <strong>1200 de ani</strong>) și a căpătat forma de azi puțin mai târziu, când i s-a adăugat o piesă pe care <strong>niciun alt șah din lume nu o are: tunul</strong>. Despre el, mai încolo. 💥</p>

<p>Xiangqi, șahul nostru, shatranjul și chaturanga sunt <strong>veri din aceeași mare familie de jocuri</strong>. Rădăcina e probabil tot în India — dar exact cum a călătorit ideea până în China, savanții încă se ceartă.</p>
`
  },
  {
    num: '2.',
    title: 'Tabla și piesele',
    bodyHTML: `
<p>Aici e marea surpriză: la xiangqi piesele <strong>NU stau în pătrate</strong>, ci pe <strong>colțurile liniilor</strong> (pe „puncte", la intersecții). Tabla are <strong>9 linii verticale și 10 orizontale</strong>.</p>

<p>🌊 <strong>Râul</strong> taie tabla în două, la mijloc. Unele piese nu au voie să-l treacă!</p>

<p>🏯 <strong>Palatul</strong> e un pătrat mic de 3×3, cu un X desenat în el, la fiecare capăt. <strong>Generalul și cele 2 gărzi nu au voie să IASĂ din palat</strong> — niciodată. Dar atenție: <strong>piesele adversarului POT intra</strong> în palat ca să atace! Restricția e doar pentru general și gărzi (și pentru elefant, care nu trece râul).</p>

<p>Cele două armate sunt <strong>roșie</strong> și <strong>neagră</strong> (roșul mută primul). În China, fiecare piesă are pe ea un caracter chinezesc — dar fiindcă noi nu citim chineza, pe discurile noastre ai și un <strong>desen</strong> care îți spune imediat ce piesă e. 😊</p>

  <li><img src="img/xiangqi/A_r.png?t=2" alt="sfetnic"><span><strong>Sfetnicul</strong> (×2) — garda de corp; merge doar pe diagonalele palatului.</span></li>
  <li><img src="img/xiangqi/E_r.png?t=2" alt="elefant"><span><strong>Elefantul</strong> (×2) — înțeleptul; nu trece niciodată râul.</span></li>
  <li><img src="img/xiangqi/H_r.png?t=2" alt="cal"><span><strong>Calul</strong> (×2) — sare în L, dar poate fi împiedicat.</span></li>

</ul>

`
  },
  { num: '3.', title: 'Mutări și capturi', bodyHTML: `
<p>Multe piese par cunoscute: <strong>carul</strong> aleargă pe linii drepte (ca tura), <strong>generalul</strong> face un pas. Dar xiangqi are trei lucruri pe care <strong>niciun alt șah nu le are</strong>:</p>

  <li>⚔️ <strong>Soldatul</strong> capturează <strong>exact cum merge</strong> — drept înainte (și lateral după râu), <strong>nu pe diagonală</strong> ca pionul de la șah.</li>
  <li>🐴 <strong>Calul poate fi blocat</strong>: merge un pas drept apoi unul pe diagonală; dacă fix lângă el, pe pasul drept, e o piesă, nu poate porni acolo („piciorul calului").</li>

` },
  { num: '4.', title: 'Cine câștigă și cum', bodyHTML: `
<p>Scopul e <strong>să-l prinzi pe generalul advers</strong>. Sunt câteva feluri:</p>

<p>🏆 <strong>1. Șah mat</strong></p>
<p>Dacă generalul advers e atacat și nu mai poate scăpa — ai câștigat, exact ca la șahul de azi.</p>

<p>🏆 <strong>2. Adversarul rămâne fără mutări</strong></p>
<p>Surpriză! La xiangqi, dacă adversarul <strong>nu mai poate muta nimic</strong> (chiar dacă generalul lui nu e atacat) — <strong>tot tu câștigi</strong>. (La șahul modern asta e remiză; la xiangqi, ca la chaturanga, înseamnă pierdere pentru cel blocat.)</p>

<p>🏆 <strong>3. Regula generalilor care nu se privesc</strong></p>
<p>Cei doi generali <strong>nu au voie să stea față în față</strong> pe aceeași linie, dacă între ei nu e nicio piesă. Ar fi ca și cum și-ar „zbura" privirea unul spre altul. Mutarea care ar lăsa asta este interzisă.</p>

<div class="hl-box" style="margin-top: 14px;">
🌟 <strong>Soldatul:</strong> nu se promovează niciodată (nu există regină aici!). Dar are un secret: cât e pe partea lui, merge doar înainte; <strong>după ce trece râul</strong>, poate merge și în lateral — devine mai curajos. Înapoi nu se întoarce niciodată.
</div>
` },
  { num: '5.', title: 'Tactici', bodyHTML: `
<p>La xiangqi, vedeta tacticilor e <strong>tunul</strong> — fiindcă lovește sărind peste o piesă, poate ataca pe neașteptate, de departe.</p>
<ul>
  <li>💥 <strong>Tunul pe afet</strong> — pui un tun în spatele unei piese (a ta sau a adversarului), care devine „ecran". Dintr-odată tunul amenință tot ce e de cealaltă parte.</li>
  <li>🐴 <strong>Calul care nu poate fi prins</strong> — dacă ții calul liber (fără piese care să-i blocheze piciorul), el face furculițe ca la șah.</li>
  <li>🚗 <strong>Carul la atac</strong> — carul e cea mai tare piesă; pe o linie liberă e de neoprit.</li>
</ul>
<p style="text-align:center; margin-top: 14px;">

<p style="font-size:.92em; opacity:.8; text-align:center; margin-top:4px;"><em>(3 tactici, cu derulare pas cu pas)</em></p>

  { num: '6.', title: 'Călătorie în timp: Legenda completă pentru cititori pasionați', bodyHTML: `
<p style="opacity:.85;"><em>Povestea lungă, pentru cine vrea să știe tot. Numerele mici, ca <sup>[1]</sup>, sunt indicii — le găsești explicate în sertarul „Pentru Detectivi".</em></p>

<p><strong>🌊 Capitolul I — Râul de pe tablă</strong></p>
<p>Privește tabla de xiangqi: la mijloc, o dungă goală pe care stau patru semne vechi: <strong>„Râul Chu, Hotarul Han"</strong>. Acel râu nu e o invenție pentru frumusețe — amintește de un <strong>război adevărat</strong>. Acum peste 2200 de ani, după ce s-a prăbușit primul împărat al Chinei, doi conducători s-au luptat pentru tot imperiul: <strong>Xiang Yu</strong>, stăpânul ținutului Chu, și <strong>Liu Bang</strong>, stăpânul ținutului Han. Cei doi chiar și-au împărțit, o vreme, lumea de-a lungul unui râu <sup>[1]</sup><sup>[4]</sup>. Pe tabla ta, când îți treci soldatul peste râu, treci linia dintre două imperii.</p>

<p><strong>🥶 Capitolul II — Generalul Han Xin și soldații plictisiți</strong></p>
<p>O legendă dragă chinezilor spune că marele general <strong>Han Xin</strong>, în iarna grea dinaintea unei bătălii, și-a văzut soldații triști și fără vlagă în tabără. Ca să le țină mintea trează și inima caldă, le-ar fi <strong>inventat un joc</strong> care semăna cu însăși bătălia ce-i aștepta — cu generali, cu care, cu cai și tunuri. Cercetătorul David H. Li adună această poveste și o leagă de Han Xin în cartea lui despre originile șahului <sup>[1]</sup>. Legendă? Poate. Dar e o legendă care spune ceva adevărat: jocul ăsta s-a născut din gândul la război.</p>

<p><strong>✨ Capitolul III — Un joc cu stele?</strong></p>
<p>Alți cercetători cred că rădăcinile sunt și mai vechi și mai ciudate. Marele istoric al științei chineze, <strong>Joseph Needham</strong>, a scris că la început ar fi existat un <strong>„joc de imagini"</strong> (<em>xiang xi</em>) folosit nu pentru distracție, ci pentru a <strong>citi cerul și soarta</strong> — un fel de tablă pe care piesele înfățișau soarele, luna și stelele <sup>[3]</sup><sup>[4]</sup>. Cuvântul <em>xiang</em> din „xiangqi" poate să însemne și „elefant", și „imagine, simbol". Așa că nimeni nu e sigur: e jocul „jocul elefantului" sau „jocul imaginilor cerești"? Mister nedezlegat!</p>

<p><strong>📏 Capitolul IV — De ce piesele stau pe colțuri de linii</strong></p>
<p>La șahul nostru piesele stau <em>în</em> pătrate; la xiangqi stau pe <strong>colțurile</strong> liniilor, ca niște străjeri la răspântii. Generalul nu are voie să iasă din „palatul" lui de 3 pe 3, iar soldatul devine mai puternic abia după ce trece râul. <strong>Tunul</strong> — piesa care lovește sărind peste altă piesă — se pare că a apărut <strong>mai târziu</strong> decât celelalte, cândva prin vremea când chinezii foloseau deja praful de pușcă <sup>[2]</sup><sup>[4]</sup>. De-asta tunul nu are frate la chaturanga: e o invenție pur chinezească.</p>

<p><strong>👨‍👩‍👧 Capitolul V — Frați, nu strămoși</strong></p>
<p>Atenție la o capcană: xiangqi <strong>nu este părintele</strong> șahului nostru, și nici copilul lui. E mai degrabă un <strong>văr</strong>. Cei mai mulți istorici cred că șahul a pornit din chaturanga indiană; despre xiangqi, părerile se împart. <strong>David H. Li</strong> crede că xiangqi s-a născut chiar în China, de sine stătător <sup>[1]</sup>. <strong>Murray</strong>, în schimb, era convins că șahul a pornit din India și a călătorit spre răsărit, până în China <sup>[2]</sup>. Iar sinteza modernă a lui <strong>Cazaux &amp; Knowlton</strong> cântărește aceste păreri și înclină spre o origine indiană care s-a schimbat mult pe fiecare meleag — dar recunoaște cinstit că discuția nu e încheiată <sup>[4]</sup>. Ce e sigur: toate aceste jocuri sunt rude — o familie mare, răspândită peste tot pământul.</p>

<p><strong>🔍 Capitolul VI — Când detectivii nu sunt de acord</strong></p>
<p>Iar asta e partea cea mai frumoasă a științei: uneori nici cei mai deștepți oameni nu știu sigur, și <strong>recunosc cinstit</strong> că nu știu. Chiar și <strong>Murray</strong> a lăsat semne de întrebare acolo unde dovezile nu-i ajungeau <sup>[2]</sup>. Despre nașterea xiangqi încă se discută. Un detectiv bun nu se preface că are toate răspunsurile — spune ce e dovedit, ce e legendă și ce rămâne mister. Vrei „dosarul" complet? Deschide sertarul următor. 👇</p>

<div class="hl-box ok" style="margin-top: 12px;">
🕵️ <strong>Curios de tot?</strong> Fiecare număr din poveste duce la o carte adevărată. Le găsești toate în <strong>„Pentru Detectivi: Surse și Bibliografie"</strong>.
</div>
` },
  { num: '7.', title: 'Pentru Detectivi: Surse și Bibliografie', bodyHTML: `
<p>Un detectiv adevărat nu crede o poveste doar pentru că sună frumos — caută <strong>dovezi</strong>. Iată cărțile din care am cules legenda. <strong>Numărul</strong> din față se potrivește cu cel din text: vezi <sup>[1]</sup> în poveste, cauți [1] aici.</p>

<p><strong>[1]</strong> &nbsp;Li, David H. — <em>The Genealogy of Chess</em>. Premier Publishing, 1998. <span style="opacity:.72;">Urmărește originile xiangqi și leagă legenda inventării de generalul Han Xin și de războiul Chu–Han.</span></p>

<p><strong>[2]</strong> &nbsp;Murray, H. J. R. — <em>A History of Chess</em>. Oxford University Press, 1913. <span style="opacity:.72;">Lucrarea de căpătâi a istoriei șahului; are un capitol despre șahul chinezesc și legăturile lui.</span></p>

<p><strong>[3]</strong> &nbsp;Needham, Joseph — <em>Science and Civilisation in China</em>, vol. 4. Cambridge University Press. <span style="opacity:.72;">Propune ipoteza că la origine a stat un „joc de imagini" cu rost astronomic și divinatoriu.</span></p>

<p><strong>[4]</strong> &nbsp;Cazaux, Jean-Louis &amp; Knowlton, Rick — <em>A World of Chess: Its Development and Variations through Centuries and Civilizations</em>. McFarland, 2017. <span style="opacity:.72;">Sinteză modernă; compară xiangqi cu chaturanga și discută ipoteza unei rădăcini comune.</span></p>

<div class="hl-box" style="margin-top: 12px;">
📚 <strong>De ce mai multe surse?</strong> Pentru că la xiangqi nici savanții nu sunt de acord! Tocmai de aceea citim mai mulți autori și spunem cinstit unde se ceartă între ei. Așa lucrează istoricii: ca detectivii care notează și ce nu se potrivește.

  body.className = 'acc-body';
  const inner = document.createElement('div');
  inner.className = 'acc-inner';
  inner.innerHTML = b.bodyHTML;
  body.appendChild(inner);
  item.appendChild(hdr);
  item.appendChild(body);
  list.appendChild(item);
  hdr.addEventListener('click', function () { item.classList.toggle('open'); });
});
