<script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
<script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
<script src="board-utils.js"></script>
<script>
const CACHE_BUST = '?t=' + Date.now();
const COLS = ['a','b','c','d','e','f','g','h'];
const IMG = 'img/chaturanga/';
const NAMES = { K:'raja', Q:'mantri', R:'ratha', B:'gaja', N:'ashva', P:'padati' };

let pos = {}, turn = 'w', history = [], captures = { w:[], b:[] }, gameOver = false;
let lastFrom = null, lastTo = null, selectedSq = null;
let timeLimit = 600, timeLeft = { w:600, b:600 }, firstMoveMade = false, lastTick = 0;

function initialPosition() {
  return {
    a1:'wR', b1:'wN', c1:'wB', d1:'wQ', e1:'wK', f1:'wB', g1:'wN', h1:'wR',
    a2:'wP', b2:'wP', c2:'wP', d2:'wP', e2:'wP', f2:'wP', g2:'wP', h2:'wP',
    a7:'bP', b7:'bP', c7:'bP', d7:'bP', e7:'bP', f7:'bP', g7:'bP', h7:'bP',
    a8:'bR', b8:'bN', c8:'bB', d8:'bK', e8:'bQ', f8:'bB', g8:'bN', h8:'bR'
  };
}
const board = Chessboard('board', {
  position: initialPosition(), orientation: 'white', showNotation: true,
  pieceTheme: IMG + '{piece}.png' + CACHE_BUST,
  draggable: true, onDragStart: handleDragStart, onDrop: handleDrop, onSnapEnd: handleSnapEnd
});
$(window).resize(() => board.resize());

function sqCR(s){ return { c: COLS.indexOf(s[0]), r: parseInt(s[1]) }; }
function crSq(c,r){ return COLS[c]+r; }
function inB(c,r){ return c>=0&&c<8&&r>=1&&r<=8; }

/* Reguli chaturanga (Murray) — identice cu arena */
function legalMoves(s, position) {
  const pc = position[s]; if (!pc) return [];
  const col = pc[0], t = pc[1], { c, r } = sqCR(s), m = [];
  const tryAdd=(nc,nr)=>{ if(!inB(nc,nr))return; const tp=position[crSq(nc,nr)]; if(!tp||tp[0]!==col) m.push(crSq(nc,nr)); };
  const trySlide=(dc,dr)=>{ let nc=c+dc,nr=r+dr; while(inB(nc,nr)){ const tp=position[crSq(nc,nr)]; if(tp){ if(tp[0]!==col) m.push(crSq(nc,nr)); return;} m.push(crSq(nc,nr)); nc+=dc; nr+=dr; } };
  if (t==='K'){ for(let dc=-1;dc<=1;dc++) for(let dr=-1;dr<=1;dr++){ if(dc===0&&dr===0)continue; tryAdd(c+dc,r+dr);} }
  else if (t==='Q'){ [[-1,-1],[-1,1],[1,-1],[1,1]].forEach(([dc,dr])=>tryAdd(c+dc,r+dr)); }
  else if (t==='B'){ [[-2,-2],[-2,2],[2,-2],[2,2]].forEach(([dc,dr])=>tryAdd(c+dc,r+dr)); }
  else if (t==='N'){ [[-2,-1],[-2,1],[-1,-2],[-1,2],[1,-2],[1,2],[2,-1],[2,1]].forEach(([dc,dr])=>tryAdd(c+dc,r+dr)); }
  else if (t==='R'){ [[1,0],[-1,0],[0,1],[0,-1]].forEach(([dc,dr])=>trySlide(dc,dr)); }
  else if (t==='P'){ const dir=(col==='w')?1:-1, nr=r+dir;
    if(inB(c,nr)&&!position[crSq(c,nr)]) m.push(crSq(c,nr));
    [-1,1].forEach(dc=>{ const nc=c+dc; if(inB(nc,nr)){ const tp=position[crSq(nc,nr)]; if(tp&&tp[0]!==col) m.push(crSq(nc,nr)); } }); }
  return m;
}
/* Promovare istorică (Murray, A History of Chess, 1913):
   padati NU se face regină (regina nu exista). Se transformă în piesa
   COLOANEI pe care ajunge — și DOAR dacă piesa acelei coloane i-a fost
   deja capturată; altfel așteaptă pe ultima linie. */
function promoTypeForCol(col){
  if(col==='a'||col==='h') return 'R'; /* coloana carului  */
  if(col==='b'||col==='g') return 'N'; /* coloana calului  */
  if(col==='c'||col==='f') return 'B'; /* coloana elefantului */
  return 'Q';                          /* d,e = raja & mantri -> mantri */
}
/* piesele pierdute de o tabără (capturate de adversar):
   piesele albe capturate sunt în captures.b, cele negre în captures.w */
function hasLost(color,T){
  const lost = (color==='w') ? captures.b : captures.w;
  return lost.indexOf(color+T) !== -1;
}
/* promovează orice padati care aștepta pe ultima linie și acum are voie */
function resolveWaiting(){
  const autos=[];
  for(const sq in pos){
    const pc=pos[sq]; if(!pc||pc[1]!=='P') continue;
    const lastR=(pc[0]==='w')?8:1;
    if(parseInt(sq[1])!==lastR) continue;
    const T=promoTypeForCol(sq[0]);
    if(hasLost(pc[0],T)){ const np=pc[0]+T; pos[sq]=np; autos.push({sq,from:pc,to:np}); }
  }
  return autos;
}
function applyMove(from,to){
  const piece=pos[from]; if(!piece) return null;
  const captured=pos[to]||null; delete pos[from];
  if(captured) (captured[0]==='b'?captures.w:captures.b).push(captured);
  let placed=piece, waiting=false, promoType=null;
  if(piece[1]==='P'){
    const tr=parseInt(to[1]);
    if((piece[0]==='w'&&tr===8)||(piece[0]==='b'&&tr===1)){
      promoType=promoTypeForCol(to[0]);
      if(hasLost(piece[0],promoType)) placed=piece[0]+promoType;
      else waiting=true; /* a ajuns la capăt, dar așteaptă */
    }
  }
  pos[to]=placed;
  const entry={from,to,piece,placed,captured,prevTurn:turn};
  history.push(entry);
  const autos=resolveWaiting();
  if(autos.length) entry.autoPromos=autos;
  turn=(turn==='w')?'b':'w'; lastFrom=from; lastTo=to;
  return {piece,captured,placed,waiting,promoType,autoPromos:autos};
}
function gameStatus(){
  const all=Object.values(pos);
  if(!all.includes('wK')) return {over:true,winner:'b',reason:'Raja albă a fost capturată'};
  if(!all.includes('bK')) return {over:true,winner:'w',reason:'Raja neagră a fost capturată'};
  const w=all.filter(p=>p[0]==='w').length, b=all.filter(p=>p[0]==='b').length;
  if(w===1&&b>1) return {over:true,winner:'b',reason:'Rajă goală — Albul a rămas singur cu raja'};
  if(b===1&&w>1) return {over:true,winner:'w',reason:'Rajă goală — Negrul a rămas singur cu raja'};
  let any=false;
  for(const s in pos){ if(pos[s][0]!==turn) continue; if(legalMoves(s,pos).length>0){any=true;break;} }
  if(!any) return {over:true,winner:(turn==='w'?'b':'w'),reason:(turn==='w'?'Albul e blocat':'Negrul e blocat')+' — fără mutări legale (la chaturanga, asta înseamnă pierdere!)'};
  return {over:false};
}

function clearHL(){ COLS.forEach(c=>{ for(let r=1;r<=8;r++) $('.square-'+c+r).removeClass('sq-move sq-piece sq-capture sq-last'); }); }
function showLast(){ if(lastFrom)$('.square-'+lastFrom).addClass('sq-last'); if(lastTo)$('.square-'+lastTo).addClass('sq-last'); }
function showMovesFor(s){ clearHL(); showLast(); $('.square-'+s).addClass('sq-piece'); legalMoves(s,pos).forEach(x=>{ if(pos[x])$('.square-'+x).addClass('sq-capture'); else $('.square-'+x).addClass('sq-move'); }); }
function setSelected(s){ selectedSq=s; showMovesFor(s); }
function clearSelected(){ selectedSq=null; clearHL(); showLast(); }

function whoTxt(c){ return c==='w' ? '🟡 Jucătorul 1 (Alb)' : '⚫ Jucătorul 2 (Negru)'; }

function handleDragStart(source,piece){ if(gameOver) return false; if(piece[0]!==turn) return false; selectedSq=null; showMovesFor(source); return true; }
function handleDrop(source,target){
  if(target==='offboard'){ clearHL(); showLast(); return 'snapback'; }
  if(gameOver){ clearHL(); showLast(); return 'snapback'; }
  if(pos[source]&&pos[source][0]!==turn){ clearHL(); showLast(); return 'snapback'; }
  if(!legalMoves(source,pos).includes(target)){ clearHL(); showLast(); return 'snapback'; }
  const res=applyMove(source,target); startTimer(); afterMove(res);
}
function handleSnapEnd(){ board.position(pos,false); clearHL(); showLast(); }
function handleSquareClick(sq){
  if(gameOver) return;
  const piece=pos[sq];
  if(selectedSq){
    if(legalMoves(selectedSq,pos).includes(sq)){
      const res=applyMove(selectedSq,sq); selectedSq=null;
      board.position(pos,false); clearHL(); showLast(); startTimer(); afterMove(res); return;
    }
    if(piece&&piece[0]===turn) setSelected(sq); else clearSelected();
  } else { if(piece&&piece[0]===turn) setSelected(sq); }
}
$(document).on('click','#board .square-55d63',function(){ const sq=$(this).attr('data-square'); if(sq) handleSquareClick(sq); });

function afterMove(res){
  renderCaptures(); renderClocks();
  const gs=gameStatus();
  if(gs.over){ gameOver=true; showWinModal(gs.winner,gs.reason); return; }
  let msg='▶️ Rândul: '+whoTxt(turn)+'.';
  if(res && res.captured) msg='⚔️ '+whoTxt(res.piece[0])+' a capturat '+NAMES[res.captured[1]]+'! '+msg;
  if(res && res.waiting) msg+=' ⏳ Padati a ajuns la capăt pe coloana lui ('+NAMES[res.promoType]+'), dar așteaptă: se va transforma abia după ce '+whoTxt(res.piece[0])+' pierde un '+NAMES[res.promoType]+'.';
  else if(res && res.placed!==res.piece) msg+=' 🌟 Padati promovat la '+NAMES[res.placed[1]]+'!';
  if(res && res.autoPromos) res.autoPromos.forEach(ap=>{ msg+=' 🌟 Un padati care aștepta s-a trezit '+NAMES[ap.to[1]]+'!'; });
  setStatus(msg, res&&res.captured?'ok':'');
}
function setStatus(html,kind){ const sb=document.getElementById('statusBox'); sb.className='status-box'+(kind?' '+kind:''); sb.innerHTML=html; }
function renderCaptures(){
  document.getElementById('captBlack').innerHTML=captures.w.map(p=>'<img src="'+IMG+p+'.png'+CACHE_BUST+'">').join('');
  document.getElementById('captWhite').innerHTML=captures.b.map(p=>'<img src="'+IMG+p+'.png'+CACHE_BUST+'">').join('');
}
function showWinModal(winner,reason){
  document.getElementById('modalTitle').textContent='🏆 '+(winner==='w'?'Jucătorul 1 (Alb)':'Jucătorul 2 (Negru)')+' a câștigat!';
  document.getElementById('modalText').innerHTML=reason+'.';
  document.getElementById('modal').classList.add('show');
}
function hideModal(){ document.getElementById('modal').classList.remove('show'); }

function fmt(s){ if(timeLimit===0) return '∞'; const m=Math.floor(s/60),x=s%60; return m+':'+(x<10?'0'+x:x); }
function renderClocks(){
  document.getElementById('timeP1').textContent=fmt(timeLeft.w);
  document.getElementById('timeP2').textContent=fmt(timeLeft.b);
  const p1=document.getElementById('clepP1'), p2=document.getElementById('clepP2');
  p1.classList.toggle('active', turn==='w'&&!gameOver);
  p2.classList.toggle('active', turn==='b'&&!gameOver);
  if(timeLimit===0){ p1.classList.add('unlim'); p2.classList.add('unlim'); }
  else { p1.classList.remove('unlim'); p2.classList.remove('unlim');
    p1.classList.toggle('low',timeLeft.w<30); p2.classList.toggle('low',timeLeft.b<30); }
}
function gameLoop(){
  if(gameOver) return;
  const now=Date.now();
  if(firstMoveMade&&timeLimit>0&&now-lastTick>=1000){
    lastTick=now; timeLeft[turn]=Math.max(0,timeLeft[turn]-1); renderClocks();
    if(timeLeft[turn]===0){ gameOver=true; const w=(turn==='w')?'Jucătorul 2 (Negru)':'Jucătorul 1 (Alb)';
      document.getElementById('modalTitle').textContent='⏰ Timp expirat';
      document.getElementById('modalText').innerHTML=w+' a câștigat — adversarul a rămas fără timp.';
      document.getElementById('modal').classList.add('show'); }
  }
}
setInterval(gameLoop,250);
function startTimer(){ if(firstMoveMade||timeLimit===0) return; firstMoveMade=true; lastTick=Date.now(); }
function onTimeChange(){ timeLimit=parseInt(document.getElementById('timeSelect').value); timeLeft={w:timeLimit,b:timeLimit}; firstMoveMade=false; renderClocks(); }

function flipBoard(){ board.orientation(board.orientation()==='white'?'black':'white'); board.position(pos,false); clearHL(); showLast(); }

function resetGame(){
  pos=initialPosition(); turn='w'; history=[]; captures={w:[],b:[]};
  gameOver=false; lastFrom=null; lastTo=null; selectedSq=null;
  firstMoveMade=false; timeLeft={w:timeLimit,b:timeLimit};
  clearHL(); board.position(pos,false);
  setStatus('🟡 Rândul Jucătorului 1 (Alb). Atinge piesa, apoi unde să meargă.','');
  renderCaptures(); renderClocks();
}
function undoMove(){
  if(gameOver||!history.length) return;
  const h=history.pop();
  if(h.autoPromos) h.autoPromos.forEach(ap=>{ if(pos[ap.sq]===ap.to) pos[ap.sq]=ap.from; });
  delete pos[h.to]; pos[h.from]=h.piece;
  if(h.captured) pos[h.to]=h.captured;
  turn=h.prevTurn;
  if(h.captured){ const lst=(h.captured[0]==='b')?captures.w:captures.b; const i=lst.lastIndexOf(h.captured); if(i!==-1) lst.splice(i,1); }
  lastFrom=history.length?history[history.length-1].from:null;
  lastTo=history.length?history[history.length-1].to:null;
  selectedSq=null; clearHL(); board.position(pos,true);
  setStatus('↶ Mutare anulată. ▶️ Rândul: '+whoTxt(turn)+'.','');
  renderCaptures(); renderClocks();
}

/* INIT (cu resetGame) */
onTimeChange();
resetGame();
setTimeout(()=>board.resize(),100);
</script>
