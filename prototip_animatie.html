<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prototip Animație Personaje</title>
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@700;900&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: #F5A96E;
            font-family: 'Nunito', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 30px 20px;
            gap: 28px;
        }
        h1 {
            font-family: 'Baloo 2', cursive;
            color: #1a3a6b;
            font-size: 2em;
            text-shadow: 2px 2px 0 rgba(255,255,255,0.4);
            text-align: center;
        }
        .note {
            color: #1a3a6b;
            font-size: 0.92em;
            text-align: center;
            max-width: 560px;
            line-height: 1.6;
            opacity: 0.85;
        }

        /* ===== STAGE ===== */
        .stage {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            background: rgba(255,255,255,0.22);
            border-radius: 24px;
            padding: 24px 30px 16px;
        }
        .row-label {
            width: 100%;
            font-family: 'Baloo 2', cursive;
            font-size: 0.95em;
            color: #1a3a6b;
            font-weight: 900;
            text-transform: uppercase;
            margin-bottom: 4px;
            text-align: center;
        }
        .divider {
            width: 100%;
            height: 2px;
            background: rgba(26,58,107,0.15);
            margin: 8px 0;
        }

        /* ===== CHARACTER ===== */
        .char-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            cursor: pointer;
        }
        .char-wrap:hover .char-img { filter: drop-shadow(0 4px 10px rgba(26,58,107,0.5)); }

        .char-img {
            height: 110px;
            width: auto;
            mix-blend-mode: multiply;
            /* Default transform-origin at feet for most animations */
            transform-origin: 50% 95%;
            transition: filter 0.2s;
        }
        .char-label {
            font-family: 'Baloo 2', cursive;
            font-size: 0.78em;
            color: #1a3a6b;
            font-weight: 900;
            text-transform: uppercase;
        }

        /* ====================================================
           ANIMATIONS — corpo inteiro, transform-origin calibrat
        ==================================================== */

        /* IDLE: respirație ușoară + balans */
        @keyframes idle-sway {
            0%,100% { transform: rotate(0deg) scaleY(1); }
            25%     { transform: rotate(-2deg) scaleY(1.02); }
            75%     { transform: rotate(2deg) scaleY(1.02); }
        }
        .anim-idle { animation: idle-sway 3s ease-in-out infinite; }

        /* BOUNCE: salt vesel */
        @keyframes bounce {
            0%,100% { transform: translateY(0)   scaleX(1)    scaleY(1); }
            30%     { transform: translateY(-22px) scaleX(0.92) scaleY(1.08); }
            60%     { transform: translateY(-10px) scaleX(1)    scaleY(1); }
            80%     { transform: translateY(-3px); }
        }
        .anim-bounce { animation: bounce 0.7s ease-in-out; }

        /* DANCE: dans energic cu balans */
        @keyframes dance {
            0%,100% { transform: rotate(-12deg) translateY(0); }
            25%     { transform: rotate(0deg)   translateY(-18px) scaleX(1.05); }
            50%     { transform: rotate(12deg)  translateY(0); }
            75%     { transform: rotate(0deg)   translateY(-12px) scaleX(0.95); }
        }
        .anim-dance { animation: dance 0.55s ease-in-out infinite; }

        /* WAVE: se apleacă spre stânga-dreapta (simulare salut) */
        @keyframes wave {
            0%,100% { transform: rotate(0deg); }
            20%     { transform: rotate(-8deg) translateY(-5px); }
            40%     { transform: rotate(8deg)  translateY(-8px); }
            60%     { transform: rotate(-5deg) translateY(-4px); }
            80%     { transform: rotate(5deg)  translateY(-3px); }
        }
        .anim-wave { animation: wave 0.7s ease-in-out infinite; }

        /* WORRIED: tremur cap + corp */
        @keyframes worried {
            0%,100% { transform: translateX(0) rotate(0); }
            15%     { transform: translateX(-7px) rotate(-5deg); }
            35%     { transform: translateX(7px)  rotate(5deg); }
            55%     { transform: translateX(-5px) rotate(-3deg); }
            75%     { transform: translateX(5px)  rotate(3deg); }
        }
        .anim-worried { animation: worried 0.45s ease-in-out infinite; }

        /* SHAKE: greșeală */
        @keyframes shake {
            0%,100% { transform: translateX(0); }
            20%     { transform: translateX(-10px); }
            40%     { transform: translateX(10px); }
            60%     { transform: translateX(-7px); }
            80%     { transform: translateX(7px); }
        }
        .anim-shake { animation: shake 0.5s ease-in-out; }

        /* FALL: cade lateral */
        @keyframes fall {
            0%   { transform: rotate(0deg)   translateX(0)    opacity: 1; }
            20%  { transform: rotate(15deg)  translateX(5px); }
            100% { transform: rotate(95deg)  translateX(60px) translateY(10px); opacity: 0.15; }
        }
        .anim-fall { animation: fall 0.9s ease-in forwards; }

        /* CELEBRATE: sări + strălucire */
        @keyframes celebrate {
            0%,100% { transform: translateY(0)    rotate(0deg)   scale(1); filter: brightness(1); }
            20%     { transform: translateY(-28px) rotate(-8deg)  scale(1.08); filter: brightness(1.3); }
            50%     { transform: translateY(-20px) rotate(8deg)   scale(1.05); filter: brightness(1.2); }
            70%     { transform: translateY(-15px) rotate(-5deg)  scale(1.06); }
        }
        .anim-celebrate { animation: celebrate 0.6s ease-in-out infinite; }

        /* ===== BUTTON PANEL ===== */
        .btn-panel {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
        }
        .anim-btn {
            background: #1a3a6b;
            color: white;
            border: none;
            border-radius: 50px;
            font-family: 'Baloo 2', cursive;
            font-size: 1em;
            padding: 10px 22px;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 12px rgba(26,58,107,0.3);
        }
        .anim-btn:hover  { background: #2a5aab; transform: translateY(-2px); }
        .anim-btn.active { background: #e67e22; }

        /* Click ripple on char */
        .char-wrap:active .char-img { transform: scale(0.93); }
    </style>
</head>
<body>

<h1>Personaje Animate ♟️</h1>

<div class="stage">
    <div class="row-label">⬜ Alb</div>

    <div class="char-wrap" onclick="bounceOne(this)">
        <img class="char-img" src="piese_sah/rega 1.jpg" alt="Rege Alb">
        <div class="char-label">Rege</div>
    </div>
    <div class="char-wrap" onclick="bounceOne(this)">
        <img class="char-img" src="piese_sah/regina 1.png" alt="Regină Albă">
        <div class="char-label">Regină</div>
    </div>
    <div class="char-wrap" onclick="bounceOne(this)">
        <img class="char-img" src="piese_sah/nebun 1.png" alt="Nebun Alb">
        <div class="char-label">Nebun</div>
    </div>
    <div class="char-wrap" onclick="bounceOne(this)">
        <img class="char-img" src="piese_sah/cal 1.png" alt="Cal Alb">
        <div class="char-label">Cal</div>
    </div>
    <div class="char-wrap" onclick="bounceOne(this)">
        <img class="char-img" src="piese_sah/turn 1.png" alt="Turn Alb">
        <div class="char-label">Turn</div>
    </div>
    <div class="char-wrap" onclick="bounceOne(this)">
        <img class="char-img" src="piese_sah/pion 1.png" alt="Pion Alb">
        <div class="char-label">Pion</div>
    </div>

    <div class="divider"></div>
    <div class="row-label">⬛ Negru</div>

    <div class="char-wrap" onclick="bounceOne(this)">
        <img class="char-img" src="piese_sah/rege 2.png" alt="Rege Negru">
        <div class="char-label">Rege</div>
    </div>
    <div class="char-wrap" onclick="bounceOne(this)">
        <img class="char-img" src="piese_sah/regina 2.png" alt="Regină Neagră">
        <div class="char-label">Regină</div>
    </div>
    <div class="char-wrap" onclick="bounceOne(this)">
        <img class="char-img" src="piese_sah/nebun 2.png" alt="Nebun Negru">
        <div class="char-label">Nebun</div>
    </div>
    <div class="char-wrap" onclick="bounceOne(this)">
        <img class="char-img" src="piese_sah/cal negru.png" alt="Cal Negru">
        <div class="char-label">Cal</div>
    </div>
    <div class="char-wrap" onclick="bounceOne(this)">
        <img class="char-img" src="piese_sah/tura neagra.png" alt="Turn Negru">
        <div class="char-label">Turn</div>
    </div>
    <div class="char-wrap" onclick="bounceOne(this)">
        <img class="char-img" src="piese_sah/pion_medieval_negru.jpg" alt="Pion Negru">
        <div class="char-label">Pion</div>
    </div>
</div>

<!-- ANIMATION BUTTONS -->
<div class="btn-panel">
    <button class="anim-btn active" onclick="setAll('idle')">😌 Idle</button>
    <button class="anim-btn"        onclick="setAll('dance')">💃 Dans</button>
    <button class="anim-btn"        onclick="setAll('wave')">👋 Salut</button>
    <button class="anim-btn"        onclick="setAll('worried')">😰 Îngrijorat</button>
    <button class="anim-btn"        onclick="setAll('shake')">❌ Greșeală</button>
    <button class="anim-btn"        onclick="setAll('celebrate')">🏆 Victorie</button>
    <button class="anim-btn"        onclick="setAll('fall')">💀 Cade</button>
</div>

<p class="note">
    Click pe orice personaj pentru un salt individual.<br>
    Animațiile folosesc imaginile reale — fără tăieturi, fără artefacte.
</p>

<script>
const ANIMS = ['idle','dance','wave','worried','shake','celebrate','fall'];
let currentAnim = 'idle';
let autoTimer = null;

function allImgs() {
    return document.querySelectorAll('.char-img');
}

function setAnim(img, anim) {
    ANIMS.forEach(a => img.classList.remove('anim-' + a));
    void img.offsetWidth; // restart
    if (anim !== 'none') img.classList.add('anim-' + anim);

    // One-shot animations: remove class after completion
    if (anim === 'shake' || anim === 'bounce') {
        setTimeout(() => {
            img.classList.remove('anim-' + anim);
            img.classList.add('anim-idle');
        }, anim === 'bounce' ? 700 : 550);
    }
    if (anim === 'fall') {
        setTimeout(() => {
            img.classList.remove('anim-fall');
            void img.offsetWidth;
            img.classList.add('anim-idle');
        }, 2200);
    }
}

function setAll(anim) {
    currentAnim = anim;
    document.querySelectorAll('.anim-btn').forEach((btn, i) => {
        btn.classList.toggle('active', ANIMS[i] === anim);
    });
    allImgs().forEach((img, idx) => {
        // Stagger the start slightly for a wave effect
        setTimeout(() => setAnim(img, anim), idx * 40);
    });
}

function bounceOne(wrap) {
    const img = wrap.querySelector('.char-img');
    ANIMS.forEach(a => img.classList.remove('anim-' + a));
    void img.offsetWidth;
    img.classList.add('anim-bounce');
    setTimeout(() => {
        img.classList.remove('anim-bounce');
        img.classList.add('anim-' + currentAnim);
    }, 750);
}

// Start with idle
setAll('idle');

// Auto demo after 2s
const demo = [
    { anim:'idle',      ms:2000 },
    { anim:'wave',      ms:2000 },
    { anim:'idle',      ms:800  },
    { anim:'celebrate', ms:2500 },
    { anim:'worried',   ms:1800 },
    { anim:'shake',     ms:1200 },
    { anim:'dance',     ms:2500 },
    { anim:'fall',      ms:2500 },
];
let di = 0;
function runDemo() {
    const step = demo[di++ % demo.length];
    setAll(step.anim);
    autoTimer = setTimeout(runDemo, step.ms);
}
autoTimer = setTimeout(runDemo, 2500);

// Click on any character = stop demo + bounce
document.querySelectorAll('.char-wrap').forEach(wrap => {
    wrap.addEventListener('click', () => {
        if (autoTimer) { clearTimeout(autoTimer); autoTimer = null; }
    });
});
</script>
</body>
</html>
