<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Antrenament Șah — Cufărul cu Șah</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@700;900&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.css">
<style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #F5A96E; font-family: 'Nunito', sans-serif; color: #1a1a2e; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
    #top-nav { background: rgba(245,169,110,0.92); display: flex; align-items: center; justify-content: space-between; padding: 5px 20px; border-bottom: 1px solid rgba(255,255,255,0.3); }
    .tnav-btn { background: rgba(255,255,255,0.5); border-radius: 50px; padding: 4px 12px; font-family: 'Baloo 2', cursive; font-size: 0.8em; font-weight: 700; color: #1a3a6b; text-decoration: none; }
    .main-layout { flex: 1; display: flex; justify-content: center; align-items: center; gap: 20px; padding: 10px; }
    .board-section { display: flex; flex-direction: column; align-items: center; gap: 8px; }
    #board { width: 440px; height: 440px; box-shadow: 0 5px 25px rgba(0,0,0,0.25); }
    .piece-palette-horiz { display: flex; gap: 8px; padding: 6px; background: rgba(255,255,255,0.2); border-radius: 12px; }
    .strip-piece { width: 40px; cursor: pointer; border: 2px solid transparent; transition: 0.2s; border-radius: 4px; }
    .strip-piece.pal-active { border-color: #1a3a6b; background: rgba(255,255,255,0.4); transform: scale(1.1); }
    .panel { width: 310px; display: flex; flex-direction: column; gap: 8px; }
    .card { background: rgba(255,255,255,0.35); border-radius: 14px; padding: 10px; border: 1px solid rgba(255,255,255,0.5); }
    .card-title { font-family: 'Baloo 2', cursive; font-size: 0.7em; text-transform: uppercase; color: #1a3a6b; margin-bottom: 4px; }
    #move-list { height: 90px; overflow-y: auto; font-size: 0.85em; background: rgba(255,255,255,0.2); padding: 8px; border-radius: 8px; line-height: 1.8; }
    .move-link { cursor: pointer; padding: 2px 4px; border-radius: 4px; color: #1a3a6b; font-weight: 700; }
    .move-link:hover { background: #1a3a6b; color: white; }
    .current-history-move { background: #e67e22 !important; color: white !important; }
    .history-controls { display: flex; justify-content: center; gap: 5px; margin-top: 5px; }
    .h-btn { background: #1a3a6b; color: white; border: none; padding: 3px 10px; border-radius: 6px; cursor: pointer; font-size: 0.85em; }
    #game-msg { font-family: 'Baloo 2'; font-weight: 700; text-align: center; color: #1a3a6b; min-height: 1.2em; }
    .tog-row { display: flex; gap: 3px; flex-wrap: wrap; }
    .tog { flex: 1; padding: 5px; border-radius: 8px; border: 1px solid rgba(26,58,107,0.2); background: white; cursor: pointer; font-weight: 700; font-size: 0.75em; }
    .tog.active-w { background: #1a3a6b !important; color: white !important; }
    .level-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px; }
    .lv { padding: 4px; font-size: 0.8em; border-radius: 6px; border: 1px solid #1a3a6b; cursor: pointer; font-family: 'Baloo 2'; font-weight: 900; text-align: center; background: rgba(255,255,255,0.5); }
    .lv.active { background: #1a3a6b; color: white; }
    .clock-row { display: flex; gap: 6px; margin-top: 5px; }
    .clk-box { flex: 1; text-align: center; background: rgba(255,255,255,0.4); border-radius: 10px; padding: 6px; border: 2px solid transparent; }
    .clk-box.active { border-color: #e67e22; background: white; }
    .clk-val { font-family: 'Baloo 2'; font-size: 1.3em; color: #1a3a6b; font-weight: 900; }
    .btn { width: 100%; padding: 8px; border-radius: 10px; border: none; font-family: 'Baloo 2', cursive; font-weight: 900; font-size: 0.85em; cursor: pointer; }
    .btn-clear { background: #c0392b; color: white; margin-bottom: 3px; }
    .btn-pos { background: rgba(255,255,255,0.6); color: #1a3a6b; margin-bottom: 3px; }
    .btn-play { background: #1a3a6b; color: white; font-size: 1.1em; padding: 12px; margin-top: 4px; }
    .btn-stop { background: #e67e22 !important; color: white !important; display: none; }
    .highlight-robot { box-shadow: inset 0 0 3px 3px yellow; }
    .premove-square { background: rgba(255, 165, 0, 0.5) !important; }
    #board-wrap { position: relative; display: inline-block; }
    #touch-overlay { display: none; position: absolute; top: 0; left: 0; right: 0; bottom: 0; z-index: 50; touch-action: none; cursor: pointer; }
    
    .danger-check img {
      background: radial-gradient(circle, rgba(255, 0, 0, 0.9) 0%, rgba(255, 0, 0, 0) 70%) !important;
      filter: drop-shadow(0 0 10px red) !important;
      border-radius: 50% !important;
    }

    .cf { position: absolute; z-index: 9999; pointer-events: none; animation: fall var(--dur) linear forwards; }
    @keyframes fall { to { transform: translate(var(--dx), var(--dy)) rotate(var(--rot)); opacity: 0; } }

    #promotion-dialog {
        display: none; position: fixed; top: 50%; left: 50%; 
        transform: translate(-50%, -50%); background: white; 
        padding: 20px; border-radius: 15px; box-shadow: 0 0 30px rgba(0,0,0,0.5); 
        z-index: 10000; text-align: center;
    }
</style>
</head>
<body>

<nav id="top-nav">
    <a href="index.html" class="tnav-btn">🏠 Acasă</a>
    <div style="font-family: 'Baloo 2'; color: #1a3a6b; font-weight: 900; font-size: 1.1em;">ANTRENAMENT ȘI ANALIZĂ</div>
    <div></div>
</nav>

<div class="main-layout">
    <div class="board-section">
        <div class="piece-palette-horiz" id="black-pal">
            <img class="strip-piece" data-piece="bK" src="https://lichess1.org/assets/piece/caliente/bK.svg" onclick="selPiece('bK')">
            <img class="strip-piece" data-piece="bQ" src="https://lichess1.org/assets/piece/caliente/bQ.svg" onclick="selPiece('bQ')">
            <img class="strip-piece" data-piece="bR" src="https://lichess1.org/assets/piece/caliente/bR.svg" onclick="selPiece('bR')">
            <img class="strip-piece" data-piece="bB" src="https://lichess1.org/assets/piece/caliente/bB.svg" onclick="selPiece('bB')">
            <img class="strip-piece" data-piece="bN" src="https://lichess1.org/assets/piece/caliente/bN.svg" onclick="selPiece('bN')">
            <img class="strip-piece" data-piece="bP" src="https://lichess1.org/assets/piece/caliente/bP.svg" onclick="selPiece('bP')">
        </div>
        <div id="board-wrap">
            <div id="board"></div>
            <div id="touch-overlay"></div>
        </div>
        <div class="piece-palette-horiz" id="white-pal">
            <img class="strip-piece" data-piece="wK" src="https://lichess1.org/assets/piece/caliente/wK.svg" onclick="selPiece('wK')">
            <img class="strip-piece" data-piece="wQ" src="https://lichess1.org/assets/piece/caliente/wQ.svg" onclick="selPiece('wQ')">
            <img class="strip-piece" data-piece="wR" src="https://lichess1.org/assets/piece/caliente/wR.svg" onclick="selPiece('wR')">
            <img class="strip-piece" data-piece="wB" src="https://lichess1.org/assets/piece/caliente/wB.svg" onclick="selPiece('wB')">
            <img class="strip-piece" data-piece="wN" src="https://lichess1.org/assets/piece/caliente/wN.svg" onclick="selPiece('wN')">
            <img class="strip-piece" data-piece="wP" src="https://lichess1.org/assets/piece/caliente/wP.svg" onclick="selPiece('wP')">
        </div>
    </div>

    <div class="panel">
        <div id="game-msg">Pregătit pentru joc?</div>
        <div class="card">
            <div class="card-title">Joci cu</div>
            <div class="tog-row">
                <button class="tog active-w" id="tog-w" onclick="setSide('w')">Albele</button>
                <button class="tog" id="tog-b" onclick="setSide('b')">Negrele</button>
            </div>
        </div>
        <div class="card">
            <div class="card-title">Nivel Robot</div>
            <div class="level-grid" id="level-grid"></div>
        </div>
        <div class="card">
            <div class="card-title">Timp Partidă</div>
            <div class="tog-row">
                <button class="tog active-w" onclick="setInitialTime(0, this)">∞</button>
                <button class="tog" onclick="setInitialTime(60, this)">1m</button>
                <button class="tog" onclick="setInitialTime(180, this)">3m</button>
                <button class="tog" onclick="setInitialTime(300, this)">5m</button>
                <button class="tog" onclick="setInitialTime(600, this)">10m</button>
            </div>
            <div class="clock-row" id="clock-row" style="display:none">
                <div class="clk-box" id="clk-you"><div class="clk-val" id="val-human">00:00</div></div>
                <div class="clk-box" id="clk-bot"><div class="clk-val" id="val-robot">00:00</div></div>
            </div>
        </div>
        <div class="card">
            <div class="card-title">Analiză</div>
            <div id="move-list"></div>
            <div class="history-controls">
                <button class="h-btn" onclick="goToMove(0)">|&lt;</button>
                <button class="h-btn" onclick="stepMove(-1)">&lt;</button>
                <button class="h-btn" onclick="stepMove(1)">&gt;</button>
                <button class="h-btn" onclick="goToMove(fens.length-1)">&gt;|</button>
            </div>
        </div>
        <button class="btn btn-clear" onclick="clearBoard()">🧹 Curăță</button>
        <button class="btn btn-pos" onclick="resetToStart()">🏁 Poziție Start</button>
        <button class="btn btn-play" id="btn-play" onclick="startGame()">▶ JOACĂ!</button>
        <button class="btn btn-stop" id="btn-stop" onclick="stopGame()">⏹ OPREȘTE</button>
    </div>
</div>

<div id="promotion-dialog">
    <h3 style="font-family:'Baloo 2'; margin-bottom:10px;">Alege piesa:</h3>
    <div id="promotion-pieces">
        <img src="" style="width:60px; cursor:pointer;" onclick="selectPromotion('q')">
        <img src="" style="width:60px; cursor:pointer;" onclick="selectPromotion('r')">
        <img src="" style="width:60px; cursor:pointer;" onclick="selectPromotion('b')">
        <img src="" style="width:60px; cursor:pointer;" onclick="selectPromotion('n')">
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
<script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>

<script>
    const LEVELS = [{skill:0, t:100}, {skill:3, t:300}, {skill:6, t:600}, {skill:9, t:1000}, {skill:12, t:1500}, {skill:15, t:2500}, {skill:18, t:3500}, {skill:20, t:6000}];
    let board, chess, mode = 'edit', humanSide = 'w', currentLevel = 0, stockfish = null, gameOver = false, selectedPiece = null;
    
    const audio = {
        move: new Audio("Sounds/Move.mp3"),
        capture: new Audio("Sounds/Capture.mp3"),
        check: new Audio("Sounds/Move.mp3"), 
        mate: new Audio("Sounds/Mate.mp3")
    };

    let mainTime = 0, hTime = 0, rTime = 0, clockInterval = null;
    let fens = [], currentViewIndex = 0, preMove = null, clickFrom = null, pendingMove = null;

    $(document).ready(function() {
        board = Chessboard('board', { 
            position: 'start', draggable: true, dropOffBoard: 'trash', 
            pieceTheme: 'https://lichess1.org/assets/piece/caliente/{piece}.svg',
            onDragStart: (s, p) => mode === 'edit' || (!gameOver && p[0] === humanSide),
            onDrop: (s, t) => handleMove(s, t),
            onSnapEnd: () => { if(mode==='play') board.position(chess.fen()); }
        });
        chess = new Chess(); fens = [chess.fen()]; buildLevelGrid();
    });

    // Logică comună click/tap pe pătrat
    function handleSquareTap(sq) {
        if (!sq) return;
        if (mode === 'edit') {
            if (selectedPiece) { let p = board.position(); p[sq] = selectedPiece; board.position(p); }
            return;
        }
        if (!clickFrom) {
            let piece = chess.get(sq);
            if (piece && piece.color === humanSide) {
                clickFrom = sq;
                $(`.square-${sq}`).css('box-shadow', 'inset 0 0 3px 3px lightblue');
            }
        } else {
            handleMove(clickFrom, sq); $('.square').css('box-shadow', ''); clickFrom = null;
        }
    }

    // Click pe desktop (onDrop gestionează click-urile pe piese cu source=target)
    $(document).on('click', '#board [class^="square-"]', function() {
        handleSquareTap($(this).attr('data-square'));
    });

    // Touch pe mobil — overlay cu passive:false oprește scroll-ul
    (function() {
        const isTouch = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);
        if (!isTouch) return;

        const overlay = document.getElementById('touch-overlay');
        overlay.style.display = 'block';

        let tX0, tY0, tSq0;

        function sqAt(x, y) {
            overlay.style.pointerEvents = 'none';
            const el = document.elementFromPoint(x, y);
            overlay.style.pointerEvents = 'auto';
            const sqEl = el && el.closest('[data-square]');
            return sqEl ? sqEl.getAttribute('data-square') : null;
        }

        overlay.addEventListener('touchstart', function(e) {
            e.preventDefault();
            const t = e.touches[0];
            tX0 = t.clientX; tY0 = t.clientY;
            tSq0 = sqAt(t.clientX, t.clientY);
        }, { passive: false });

        overlay.addEventListener('touchmove', function(e) {
            e.preventDefault();
        }, { passive: false });

        overlay.addEventListener('touchend', function(e) {
            e.preventDefault();
            const t = e.changedTouches[0];
            const sq = sqAt(t.clientX, t.clientY);
            const dx = Math.abs(t.clientX - tX0);
            const dy = Math.abs(t.clientY - tY0);
            if (!sq) return;
            if (dx < 30 && dy < 30) {
                handleSquareTap(sq);
            } else if (tSq0 && sq !== tSq0 && mode === 'play') {
                // Swipe direct între 2 pătrate → mutare
                handleMove(tSq0, sq);
                $('.square').css('box-shadow', ''); clickFrom = null;
            }
        }, { passive: false });
    })();

    function handleMove(s, t) {
        if(mode === 'edit') return;
        const piece = chess.get(s);
        if (piece && piece.type === 'p' && (t[1] === '8' || t[1] === '1')) {
            pendingMove = { from: s, to: t };
            const color = piece.color;
            const pieces = ['Q', 'R', 'B', 'N'];
            $('#promotion-pieces img').each(function(idx) {
                $(this).attr('src', `https://lichess1.org/assets/piece/caliente/${color}${pieces[idx]}.svg`);
            });
            $('#promotion-dialog').show();
            return 'snapback'; 
        }
        let move = chess.move({from: s, to: t, promotion: 'q'});
        if(!move) return 'snapback'; 
        finalizeMove(move);
    }

    function selectPromotion(pieceType) {
        $('#promotion-dialog').hide();
        if (pendingMove) {
            let move = chess.move({ from: pendingMove.from, to: pendingMove.to, promotion: pieceType });
            finalizeMove(move);
            pendingMove = null;
        }
    }

    function finalizeMove(move) {
        playMoveSound(move); board.position(chess.fen());
        fens.push(chess.fen()); currentViewIndex = fens.length - 1;
        updateUI();
        if (checkGameOver()) return; 
        startClock('robot'); setTimeout(robotMove, 1000);
    }

    function robotMove() { 
        if(gameOver || !stockfish) return; 
        stockfish.postMessage(`position fen ${chess.fen()}`); 
        stockfish.postMessage(`go movetime ${LEVELS[currentLevel].t}`); 
    }

    function playMoveSound(move) {
        let s = audio.move; 
        if (chess.in_checkmate()) s = audio.mate;
        else if (chess.in_check()) s = audio.check;
        else if (move.captured || move.san.includes('x')) s = audio.capture;
        s.currentTime = 0; s.play().catch(()=>{});
    }

    function initSF() {
        if(stockfish) stockfish.terminate();
        const blob = new Blob(["importScripts('https://cdnjs.cloudflare.com/ajax/libs/stockfish.js/10.0.2/stockfish.js');"], {type:'application/javascript'});
        stockfish = new Worker(URL.createObjectURL(blob));
        stockfish.onmessage = (e) => {
            if(e.data.startsWith('bestmove')) {
                let m = e.data.split(' ')[1]; if(m === '(none)') return;
                let move = chess.move({from: m.slice(0,2), to: m.slice(2,4), promotion: 'q'});
                $(`.square-${m.slice(0,2)}, .square-${m.slice(2,4)}`).addClass('highlight-robot');
                setTimeout(()=>$('.highlight-robot').removeClass('highlight-robot'), 1200);
                playMoveSound(move); board.position(chess.fen()); fens.push(chess.fen()); currentViewIndex = fens.length - 1; updateUI();
                if(!checkGameOver()) startClock('human');
            }
        };
        stockfish.postMessage('uci'); stockfish.postMessage(`setoption name Skill Level value ${LEVELS[currentLevel].skill}`);
    }

    function startGame() {
        let pos = board.position(); let turn = (pos['e1']==='wK' || pos['d1']==='wK' || chess.turn()==='w') ? 'w' : 'b'; 
        let fen = Chessboard.objToFen(pos) + ` ${turn} KQkq - 0 1`;
        if(!chess.load(fen)) return alert("Poziție invalidă!");
        mode = 'play'; gameOver = false; hTime = rTime = mainTime; fens = [chess.fen()];
        initSF(); updateUI(); $('#game-msg').text("🎮 Joc în curs...");
        $('#btn-play').hide(); $('#btn-stop').show(); $('#black-pal, #white-pal').hide();
        if(chess.turn() !== humanSide) { startClock('robot'); setTimeout(robotMove, 1000); } else startClock('human');
    }

    function stopGame() { mode = 'edit'; clearInterval(clockInterval); $('#game-msg').text("Pregătit?"); $('#btn-play').show(); $('#btn-stop').hide(); $('#black-pal, #white-pal').show(); }
    function goToMove(idx) { if (idx < 0 || idx >= fens.length) return; currentViewIndex = idx; board.position(fens[idx]); }
    function stepMove(d) { goToMove(currentViewIndex + d); }
    function setInitialTime(s, b) { mainTime = s; hTime = rTime = s; $(b).parent().find('.tog').removeClass('active-w'); $(b).addClass('active-w'); $('#clock-row').toggle(s > 0); updateUI(); }
    
    function startClock(p) { 
        if(mainTime===0)return; clearInterval(clockInterval); $('.clk-box').removeClass('active'); $(`#clk-${p==='human'?'you':'bot'}`).addClass('active');
        clockInterval = setInterval(() => { 
            if(p==='human') hTime = Math.max(0, hTime - 1); else rTime = Math.max(0, rTime - 1); updateUI(); 
            if((hTime<=0 || rTime<=0) && mainTime > 0){ stopGame(); }
        }, 1000);
    }

    function updateUI() {
        const h = chess.history(); let html = '';
        for (let i = 0; i < h.length; i++) { if (i % 2 === 0) html += `<b>${Math.floor(i/2) + 1}.</b> `; html += `<span class="move-link" onclick="goToMove(${i+1})">${h[i]}</span> `; }
        $('#move-list').html(html);
        const f = (s) => { let m=Math.floor(s/60); let sec=s%60; return `${m.toString().padStart(2,'0')}:${sec.toString().padStart(2,'0')}`; };
        $('#val-human').text(f(hTime)); $('#val-robot').text(f(rTime));
    }

    function selPiece(c) { selectedPiece = (selectedPiece===c)?null:c; $('.strip-piece').removeClass('pal-active'); if(selectedPiece) $(`.strip-piece[data-piece="${c}"]`).addClass('pal-active'); }
    function clearBoard() { board.clear(); chess = new Chess(); fens = [chess.fen()]; }
    function resetToStart() { board.start(); chess = new Chess(); fens = [chess.fen()]; }
    function setSide(s) { humanSide = s; board.orientation(s==='w'?'white':'black'); }

    function checkGameOver() { 
        if(chess.in_checkmate()){ 
            $('#game-msg').text("🏆 ȘAH MAT!").css('color', '#27ae60'); 
            const turn = chess.turn(); const sq = board.getKingSquare(turn);
            if (sq) setTimeout(() => { $(`.square-${sq}`).addClass('danger-check'); }, 250);
            confetti(); gameOver=true; return true; 
        } 
        if(chess.in_draw()){ $('#game-msg').text("🤝 REMIZĂ!"); gameOver=true; return true; } 
        return false; 
    }

    function buildLevelGrid() { const grid = $('#level-grid'); grid.empty(); LEVELS.forEach((l, i) => grid.append($('<button>').addClass('lv'+(i===currentLevel?' active':'')).text(i+1).click(function(){ currentLevel=i; $('.lv').removeClass('active'); $(this).addClass('active'); }))); }
    function confetti() { const colors = ['#f5c842','#e6a817','#ffe680','#ff6b6b','#7de888','#80c8ff']; for (let i = 0; i < 80; i++) { setTimeout(() => { const el = document.createElement('div'); el.className = 'cf'; el.style.cssText = `left:${Math.random()*100}vw; top:-10px; width:${6+Math.random()*9}px; height:${6+Math.random()*9}px; background:${colors[Math.floor(Math.random()*colors.length)]}; --dx:${(Math.random()-.5)*400}px; --dy:${280+Math.random()*520}px; --rot:${Math.random()*720}deg; --dur:${1.3+Math.random()*1.8}s;`; document.body.appendChild(el); setTimeout(() => el.remove(), 3300); }, i * 35); } }

    board.getKingSquare = function(color) {
        const rows = chess.fen().split(' ')[0].split('/');
        let rank = 8;
        for (let i = 0; i < 8; i++) {
            let file = 'a';
            for (let char of rows[i]) {
                if (isNaN(char)) { 
                    if (char === (color === 'w' ? 'K' : 'k')) return file + rank; 
                    file = String.fromCharCode(file.charCodeAt(0) + 1);
                } else { file = String.fromCharCode(file.charCodeAt(0) + parseInt(char)); }
            }
            rank--;
        }
        return null; 
    };
</script>
</body>
</html>
