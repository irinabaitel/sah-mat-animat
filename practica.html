<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Practică Liberă — Cufărul cu Șah</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@700;900&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
    background: #F5A96E;
    font-family: 'Nunito', sans-serif;
    color: #1a1a2e;
    min-height: 100vh;
    padding: 20px 16px 40px;
}

h1 {
    font-family: 'Baloo 2', cursive;
    font-size: 1.8em;
    color: #1a3a6b;
    text-align: center;
    margin-bottom: 6px;
    letter-spacing: 0.03em;
    text-shadow: 2px 2px 0 rgba(255,255,255,0.3);
}
.subtitle {
    text-align: center;
    color: rgba(26,26,46,0.6);
    font-size: 0.88em;
    margin-bottom: 22px;
}

/* LAYOUT */
.page {
    max-width: 980px;
    margin: 0 auto;
    display: flex;
    gap: 22px;
    align-items: flex-start;
    flex-wrap: wrap;
    justify-content: center;
}

/* TOP NAV */
#top-nav {
    position: sticky; top: 0;
    background: rgba(245,169,110,0.92);
    backdrop-filter: blur(8px);
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 20px; margin: -20px -16px 20px;
    z-index: 200;
    border-bottom: 2px solid rgba(255,255,255,0.4);
}
.tnav-btn {
    background: rgba(255,255,255,0.55); border: 2px solid rgba(255,255,255,0.8);
    border-radius: 50px; padding: 6px 16px;
    font-family: 'Baloo 2', cursive; font-size: 0.88em; font-weight: 700;
    color: #1a3a6b; text-decoration: none; transition: background 0.2s;
}
.tnav-btn:hover { background: rgba(255,255,255,0.85); }
.tnav-title { font-family: 'Baloo 2', cursive; font-size: 0.9em; color: #1a3a6b; }
.tnav-badge {
    background: #1a3a6b; color: white;
    font-family: 'Baloo 2', cursive; font-size: 0.75em;
    padding: 3px 12px; border-radius: 20px; text-decoration: none;
}

/* BOARD COLUMN */
.board-col { flex: 0 0 auto; }

#board-wrap {
    width: min(480px, calc(100vw - 32px));
    position: relative;
}
#board { width: 100%; }

/* PROMOTION POPUP */
#promo-popup {
    display: none;
    position: absolute;
    z-index: 30;
    background: #fff;
    border: 2px solid #1a3a6b;
    border-radius: 8px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.35);
    overflow: hidden;
}
.pp-piece {
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    padding: 4px;
    transition: background 0.15s;
}
.pp-piece:hover { background: rgba(26,58,107,0.15); }
.pp-piece img { width: 44px; height: 44px; display: block; }

/* Spare pieces styling */
.board-wrap-outer {
    position: relative;
    display: inline-block;
}


/* PANEL */
.panel {
    flex: 0 0 260px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    min-width: 220px;
}

.card {
    background: rgba(255,255,255,0.45);
    border: 1px solid rgba(255,255,255,0.6);
    border-radius: 14px;
    padding: 14px 16px;
}
.card-title {
    font-family: 'Baloo 2', cursive;
    font-size: 0.8em;
    color: rgba(26,58,107,0.7);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 10px;
}

/* TOGGLE BUTTONS */
.toggle-row {
    display: flex;
    gap: 8px;
}
.tog {
    flex: 1;
    padding: 8px 6px;
    border-radius: 8px;
    border: 1px solid rgba(26,58,107,0.2);
    background: rgba(255,255,255,0.4);
    color: #1a3a6b;
    font-family: 'Nunito', sans-serif;
    font-size: 0.88em;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
}
.tog:hover { background: rgba(255,255,255,0.65); }
.tog.active-w { background: white; color: #1a1a2e; border-color: #1a3a6b; box-shadow: 0 2px 8px rgba(26,58,107,0.2); }
.tog.active-b { background: #1a1a2e; color: #f0f0f0; border-color: #1a1a2e; box-shadow: 0 2px 8px rgba(0,0,0,0.3); }

/* LEVEL SELECTOR */
.level-grid {
    display: grid;
    grid-template-columns: repeat(8, 1fr);
    gap: 4px;
    margin-top: 4px;
}
.lv {
    aspect-ratio: 1;
    border-radius: 6px;
    border: 1px solid rgba(26,58,107,0.2);
    background: rgba(255,255,255,0.4);
    color: rgba(26,58,107,0.6);
    font-family: 'Baloo 2', cursive;
    font-size: 0.85em;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.15s;
    display: flex; align-items: center; justify-content: center;
}
.lv:hover { background: rgba(26,58,107,0.15); color: #1a3a6b; }
.lv.active { background: #1a3a6b; color: white; border-color: #1a3a6b; }

.level-label {
    font-size: 0.78em;
    color: rgba(26,26,46,0.55);
    text-align: center;
    margin-top: 6px;
}

/* STATUS BOX */
#status-box {
    padding: 10px 12px;
    border-radius: 10px;
    font-size: 0.88em;
    line-height: 1.55;
    background: rgba(255,255,255,0.5);
    border: 1px solid rgba(255,255,255,0.7);
    border-left: 4px solid #1a3a6b;
    min-height: 48px;
    color: #1a1a2e;
}
#status-box.ok  { background:rgba(220,255,230,0.75); border-left-color:#27ae60; color:#1a5c35; }
#status-box.err { background:rgba(255,220,220,0.75); border-left-color:#c0392b; color:#7a1a1a; }
#status-box.inf { background:rgba(210,230,255,0.75); border-left-color:#1a3a6b; color:#1a3a6b; }

/* MOVE LIST */
#move-list {
    background: rgba(255,255,255,0.45);
    border: 1px solid rgba(255,255,255,0.6);
    border-radius: 8px;
    padding: 8px 10px;
    font-size: 0.82em;
    line-height: 1.9;
    max-height: 160px;
    overflow-y: auto;
    color: #1a1a2e;
    display: none;
}
#move-list .mn { color: rgba(26,58,107,0.45); font-weight:700; margin-right:3px; }
#move-list .mw { color: #1a3a6b; font-weight:700; margin-right:5px; }
#move-list .mb { color: #333; margin-right:10px; }

/* PIECE STRIP (beside board) */
.board-row { display: flex; align-items: stretch; gap: 4px; }
#piece-strip {
    display: flex;
    flex-direction: column;
    gap: 1px;
    width: 38px;
    flex-shrink: 0;
}
.strip-piece {
    flex: 1;
    width: 100%;
    min-height: 0;
    object-fit: contain;
    cursor: pointer;
    border-radius: 4px;
    border: 2px solid transparent;
    transition: all 0.15s;
    box-sizing: border-box;
}
.strip-piece:hover { background: rgba(26,58,107,0.1); border-color: rgba(26,58,107,0.3); }
.strip-piece.pal-active { border-color: #1a3a6b; background: rgba(26,58,107,0.18); box-shadow: 0 0 0 2px rgba(26,58,107,0.25); }
.pal-cursor #board-wrap { cursor: cell; }

/* CLOCK */
.clock-row { display: flex; gap: 8px; margin-top: 8px; }
.clk-box {
    flex: 1; text-align: center;
    background: rgba(255,255,255,0.4);
    border-radius: 10px; padding: 6px 4px;
    border: 2px solid transparent;
    transition: border-color 0.2s, background 0.2s;
}
.clk-box.active { border-color: #1a3a6b; background: rgba(255,255,255,0.75); }
.clk-lbl { font-size: 0.68em; font-weight: 700; text-transform: uppercase; color: rgba(26,58,107,0.55); margin-bottom: 2px; }
.clk-val { font-family: 'Baloo 2', cursive; font-size: 1.4em; color: #1a3a6b; letter-spacing: 1px; }
.clk-box.active .clk-val { color: #e67e22; }
.time-btns { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 4px; }
.tbtn {
    flex: 1; min-width: 36px;
    padding: 5px 4px; border-radius: 8px;
    border: 1px solid rgba(26,58,107,0.2);
    background: rgba(255,255,255,0.4);
    color: #1a3a6b; font-family: 'Nunito', sans-serif;
    font-size: 0.82em; font-weight: 700;
    cursor: pointer; transition: all 0.15s; text-align: center;
}
.tbtn:hover { background: rgba(255,255,255,0.7); }
.tbtn.active { background: #1a3a6b; color: white; border-color: #1a3a6b; }

/* ACTION BUTTONS */
.btn {
    display: block; width: 100%;
    padding: 10px;
    border: none; border-radius: 10px;
    font-family: 'Baloo 2', cursive;
    font-size: 0.95em; font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    margin-bottom: 6px;
}
.btn:last-child { margin-bottom: 0; }

.btn-edit-action {
    background: rgba(255,255,255,0.5);
    border: 1px solid rgba(26,58,107,0.2);
    color: #1a3a6b;
}
.btn-edit-action:hover { background: rgba(255,255,255,0.75); }

.btn-play {
    background: #1a3a6b;
    color: white;
    box-shadow: 0 3px 16px rgba(26,58,107,0.4);
}
.btn-play:hover { background: #2a5aab; transform:translateY(-2px); box-shadow:0 5px 24px rgba(26,58,107,0.5); }
.btn-play:disabled { opacity:0.4; cursor:default; transform:none; box-shadow:none; }

.btn-stop {
    background: rgba(192,57,43,0.15);
    border: 1px solid rgba(192,57,43,0.35);
    color: #7a1a1a;
    display: none;
}
.btn-stop:hover { background: rgba(192,57,43,0.25); }

/* CONFETTI */
@keyframes cf { 0%{opacity:1;transform:translate(0,0)rotate(0deg);}100%{opacity:0;transform:translate(var(--dx),var(--dy))rotate(var(--rot));} }
.cf{position:fixed;pointer-events:none;z-index:9999;border-radius:2px;animation:cf var(--dur) ease-in forwards;}

@media (max-width:640px){
    .panel { width: calc(100vw - 32px); }
    #board-wrap { width: calc(100vw - 32px); }
}
</style>
</head>
<body>

<nav id="top-nav">
    <a href="index.html" class="tnav-btn">&#9776; Cuprins</a>
    <div class="tnav-title">Practic&#259; Liber&#259;</div>
    <a href="index.html" class="tnav-badge">Acas&#259;</a>
</nav>

<h1>🎯 Practică Liberă</h1>
<p class="subtitle">Aşează piesele cum vrei, alege nivelul robotului și joacă!</p>

<div class="page">

    <!-- BOARD -->
    <div class="board-col">
        <div class="board-row">
            <!-- Piece strip -->
            <div id="piece-strip">
                <img class="strip-piece" data-piece="wK" src="https://lichess1.org/assets/piece/caliente/wK.svg" title="Rege alb"      onclick="selectPiece('wK')">
                <img class="strip-piece" data-piece="wQ" src="https://lichess1.org/assets/piece/caliente/wQ.svg" title="Dam&#259; alb&#259;" onclick="selectPiece('wQ')">
                <img class="strip-piece" data-piece="wR" src="https://lichess1.org/assets/piece/caliente/wR.svg" title="Turn alb"      onclick="selectPiece('wR')">
                <img class="strip-piece" data-piece="wB" src="https://lichess1.org/assets/piece/caliente/wB.svg" title="Nebun alb"     onclick="selectPiece('wB')">
                <img class="strip-piece" data-piece="wN" src="https://lichess1.org/assets/piece/caliente/wN.svg" title="Cal alb"       onclick="selectPiece('wN')">
                <img class="strip-piece" data-piece="wP" src="https://lichess1.org/assets/piece/caliente/wP.svg" title="Pion alb"      onclick="selectPiece('wP')">
                <img class="strip-piece" data-piece="bK" src="https://lichess1.org/assets/piece/caliente/bK.svg" title="Rege negru"    onclick="selectPiece('bK')">
                <img class="strip-piece" data-piece="bQ" src="https://lichess1.org/assets/piece/caliente/bQ.svg" title="Dam&#259; neagr&#259;" onclick="selectPiece('bQ')">
                <img class="strip-piece" data-piece="bR" src="https://lichess1.org/assets/piece/caliente/bR.svg" title="Turn negru"    onclick="selectPiece('bR')">
                <img class="strip-piece" data-piece="bB" src="https://lichess1.org/assets/piece/caliente/bB.svg" title="Nebun negru"   onclick="selectPiece('bB')">
                <img class="strip-piece" data-piece="bN" src="https://lichess1.org/assets/piece/caliente/bN.svg" title="Cal negru"     onclick="selectPiece('bN')">
                <img class="strip-piece" data-piece="bP" src="https://lichess1.org/assets/piece/caliente/bP.svg" title="Pion negru"    onclick="selectPiece('bP')">
            </div>
            <!-- Board -->
            <div id="board-wrap">
                <div id="board"></div>
                <div id="promo-popup"></div>
            </div>
        </div>
    </div>

    <!-- PANEL -->
    <div class="panel">

        <!-- STATUS -->
        <div id="status-box" class="inf">
            Trage piesele pe tablă, apoi apasă <strong>Joacă!</strong>
        </div>

        <!-- CINE MUTA -->
        <div class="card" id="card-turn">
            <div class="card-title">Cine mută primul?</div>
            <div class="toggle-row">
                <button class="tog active-w" id="tog-w" onclick="setTurn('w')">♔ Albele</button>
                <button class="tog"          id="tog-b" onclick="setTurn('b')">♚ Negrele</button>
            </div>
        </div>

        <!-- JOCI CU -->
        <div class="card" id="card-side">
            <div class="card-title">Tu joci cu</div>
            <div class="toggle-row">
                <button class="tog active-w" id="side-w" onclick="setSide('w')">♔ Albele</button>
                <button class="tog"          id="side-b" onclick="setSide('b')">♚ Negrele</button>
            </div>
        </div>

        <!-- NIVEL -->
        <div class="card">
            <div class="card-title">Forța robotului</div>
            <div class="level-grid" id="level-grid"></div>
            <div class="level-label" id="level-label">Nivel 4 — Jucător</div>
        </div>

        <!-- CLOCK CARD -->
        <div class="card" id="card-clock">
            <div class="card-title">Ceas</div>
            <div class="time-btns" id="time-btns">
                <button class="tbtn active" onclick="setTimeControl(0,this)">&#8734;</button>
                <button class="tbtn" onclick="setTimeControl(60000,this)">1 min</button>
                <button class="tbtn" onclick="setTimeControl(180000,this)">3 min</button>
                <button class="tbtn" onclick="setTimeControl(300000,this)">5 min</button>
                <button class="tbtn" onclick="setTimeControl(600000,this)">10 min</button>
            </div>
            <div class="clock-row" id="clock-displays" style="display:none">
                <div class="clk-box" id="clk-you">
                    <div class="clk-lbl">Tu</div>
                    <div class="clk-val" id="clk-you-val">--:--</div>
                </div>
                <div class="clk-box" id="clk-bot">
                    <div class="clk-lbl">Robot</div>
                    <div class="clk-val" id="clk-bot-val">--:--</div>
                </div>
            </div>
        </div>

        <!-- EDIT BUTTONS -->
        <div id="edit-btns">
            <button class="btn btn-edit-action" onclick="resetToStart()">&#9823; Pozi&#539;ie ini&#539;ial&#259;</button>
            <button class="btn btn-edit-action" onclick="flipBoard()">&#8635; Inverseaz&#259; tabla</button>
            <button class="btn btn-play" id="btn-play" onclick="startGame()">&#9654; Joac&#259;!</button>
        </div>

        <!-- MOVE LIST (shown during game) -->
        <div id="move-list"><em style="color:rgba(232,224,208,0.3)">Nicio mutare încă.</em></div>

        <!-- STOP BUTTON -->
        <button class="btn btn-stop" id="btn-stop" onclick="stopGame()">⏹ Oprește jocul</button>

    </div>
</div>

<script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
<script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
<script>
/* =====================================================
   LEVEL CONFIG  (8 niveluri ca pe Lichess)
===================================================== */
const LEVELS = [
    { label:'Pui de găină',  skill:1,  movetime:80   },
    { label:'Începător',     skill:3,  movetime:150  },
    { label:'Elev',          skill:5,  movetime:300  },
    { label:'Jucător',       skill:7,  movetime:500  },
    { label:'Experimentat',  skill:10, movetime:900  },
    { label:'Avansat',       skill:14, movetime:1500 },
    { label:'Expert',        skill:17, movetime:2500 },
    { label:'Maestru',       skill:20, movetime:4000 },
];

/* =====================================================
   STATE
===================================================== */
let board, chess;
let mode         = 'edit';  // 'edit' | 'play'
let turnFirst    = 'w';     // who moves first in custom position
let humanSide    = 'w';     // which side human controls
let currentLevel = 3;       // 0-indexed → level 4 default
let stockfish    = null;
let sfReady      = false;
let gameOver     = false;
let moveHistory  = [];      // { white: san, black: san }
let pendingPromo = null;    // { from, to } when awaiting promotion choice
let selectedPiece = null;   // piece code selected from palette, e.g. 'wQ'

function selectPiece(code) {
    selectedPiece = code;
    document.querySelectorAll('.strip-piece').forEach(function(el) {
        el.classList.toggle('pal-active', el.dataset.piece === code);
    });
    document.getElementById('board-wrap').closest('.board-row').parentElement
        .classList.toggle('pal-cursor', !!code);
}

/* =====================================================
   CLOCK
===================================================== */
let initialTime = 0;  // ms; 0 = unlimited (count-up)
let youTime = 0, botTime = 0;
let clockSide = null, clockInterval = null, clockLastTick = null;

function setTimeControl(ms, btn) {
    initialTime = ms;
    document.querySelectorAll('.tbtn').forEach(function(b) { b.classList.remove('active'); });
    btn.classList.add('active');
}

function formatTime(ms) {
    const s = Math.floor(Math.abs(ms) / 1000);
    return String(Math.floor(s/60)).padStart(2,'0') + ':' + String(s%60).padStart(2,'0');
}

function updateClockDisplay() {
    document.getElementById('clk-you-val').textContent = formatTime(youTime);
    document.getElementById('clk-bot-val').textContent = formatTime(botTime);
}

function applyClockDelta(side, delta) {
    if (initialTime > 0) {
        if (side === 'you') { youTime = Math.max(0, youTime - delta); }
        else                { botTime = Math.max(0, botTime - delta); }
    } else {
        if (side === 'you') youTime += delta;
        else                botTime += delta;
    }
}

function startClock(side) {
    if (clockInterval) clearInterval(clockInterval);
    if (clockLastTick && clockSide) applyClockDelta(clockSide, Date.now() - clockLastTick);
    clockSide = side;
    clockLastTick = Date.now();
    clockInterval = setInterval(function() {
        const now = Date.now();
        const delta = now - clockLastTick;
        clockLastTick = now;
        applyClockDelta(clockSide, delta);
        updateClockDisplay();
        if (initialTime > 0) {
            if (clockSide === 'you' && youTime <= 0) { onFlag('you'); return; }
            if (clockSide === 'bot' && botTime <= 0)  { onFlag('bot'); return; }
        }
        const youEl = document.getElementById('clk-you');
        const botEl = document.getElementById('clk-bot');
        youEl.classList.toggle('active', clockSide === 'you');
        botEl.classList.toggle('active', clockSide === 'bot');
    }, 100);
    document.getElementById('clk-you').classList.toggle('active', side === 'you');
    document.getElementById('clk-bot').classList.toggle('active', side === 'bot');
}

function stopClock() {
    if (clockInterval) { clearInterval(clockInterval); clockInterval = null; }
    if (clockLastTick && clockSide) applyClockDelta(clockSide, Date.now() - clockLastTick);
    clockSide = null; clockLastTick = null;
    document.getElementById('clk-you').classList.remove('active');
    document.getElementById('clk-bot').classList.remove('active');
    updateClockDisplay();
}

function resetClock() {
    stopClock();
    youTime = initialTime; botTime = initialTime;
    updateClockDisplay();
}

function onFlag(who) {
    stopClock();
    gameOver = true;
    if (who === 'you') {
        setStatus('&#9200; Timp epuizat! Ai r&#259;mas f&#259;r&#259; timp.', 'err');
    } else {
        setStatus('&#9200; Robotul a r&#259;mas f&#259;r&#259; timp! Ai c&#226;&#351;tigat!', 'ok');
        confetti();
    }
}

/* Compute castling rights from a board position object */
function buildCastlingRights(pos) {
    let r = '';
    if (pos['e1'] === 'wK' && pos['h1'] === 'wR') r += 'K';
    if (pos['e1'] === 'wK' && pos['a1'] === 'wR') r += 'Q';
    if (pos['e8'] === 'bK' && pos['h8'] === 'bR') r += 'k';
    if (pos['e8'] === 'bK' && pos['a8'] === 'bR') r += 'q';
    return r || '-';
}

/* =====================================================
   LEVEL UI
===================================================== */
(function buildLevelGrid() {
    const grid = document.getElementById('level-grid');
    LEVELS.forEach((lv, i) => {
        const btn = document.createElement('button');
        btn.className = 'lv' + (i === currentLevel ? ' active' : '');
        btn.textContent = i + 1;
        btn.title = lv.label;
        btn.onclick = () => selectLevel(i);
        grid.appendChild(btn);
    });
})();

function selectLevel(i) {
    currentLevel = i;
    document.querySelectorAll('.lv').forEach((el, idx) => {
        el.classList.toggle('active', idx === i);
    });
    document.getElementById('level-label').textContent =
        `Nivel ${i+1} — ${LEVELS[i].label}`;
}

/* =====================================================
   TURN & SIDE TOGGLES
===================================================== */
function setTurn(t) {
    turnFirst = t;
    document.getElementById('tog-w').className = 'tog' + (t==='w' ? ' active-w' : '');
    document.getElementById('tog-b').className = 'tog' + (t==='b' ? ' active-b' : '');
}
function setSide(s) {
    humanSide = s;
    document.getElementById('side-w').className = 'tog' + (s==='w' ? ' active-w' : '');
    document.getElementById('side-b').className = 'tog' + (s==='b' ? ' active-b' : '');
    board.orientation(s === 'w' ? 'white' : 'black');
}

/* =====================================================
   BOARD — EDIT MODE
===================================================== */
board = Chessboard('board', {
    position:     'start',
    draggable:    true,
    dropOffBoard: 'trash',
    pieceTheme:   'https://lichess1.org/assets/piece/caliente/{piece}.svg',
    onDragStart:  onDragStart,
    onDrop:       onDrop,
    onSnapEnd:    onSnapEnd,
});

/* Click on board square to place selected piece */
document.getElementById('board').addEventListener('click', function(e) {
    if (mode !== 'edit' || !selectedPiece) return;
    const squareEl = e.target.closest('[data-square]');
    if (!squareEl) return;
    const sq = squareEl.getAttribute('data-square');
    const pos = board.position();
    if (pos[sq] === selectedPiece) {
        delete pos[sq]; // click same piece again → remove
    } else {
        pos[sq] = selectedPiece;
    }
    board.position(pos, false);
});

function onDragStart(source, piece) {
    if (mode === 'edit') return true;
    /* Play mode: only human's pieces, only when not game over */
    if (gameOver) return false;
    if (chess.turn() !== humanSide) return false;
    if (humanSide === 'w' && piece[0] === 'b') return false;
    if (humanSide === 'b' && piece[0] === 'w') return false;
    return true;
}

function onDrop(source, target, piece, newPos, oldPos) {
    if (mode === 'edit') {
        /* Let chessboard.js handle position freely */
        return;
    }
    /* ---- PLAY MODE ---- */
    if (gameOver || chess.turn() !== humanSide) return 'snapback';

    /* Check for promotion */
    const isPromo = (piece === 'wP' && target[1] === '8') || (piece === 'bP' && target[1] === '1');
    if (isPromo) {
        /* Validate move first */
        const tmp = new Chess(chess.fen());
        if (!tmp.move({ from: source, to: target, promotion: 'q' })) return 'snapback';
        pendingPromo = { from: source, to: target, color: piece[0].toLowerCase() };
        showPromoPopup();
        return 'snapback';
    }

    const move = chess.move({ from: source, to: target, promotion: 'q' });
    if (!move) return 'snapback';
    if (initialTime > 0) startClock('bot');
    recordMove(move);
    checkEndGame();
    if (!gameOver) setTimeout(stockfishMove, 300);
}

function showPromoPopup() {
    if (!pendingPromo) return;
    const { from: src, to: tgt, color } = pendingPromo;
    const popup = document.getElementById('promo-popup');
    const boardEl = document.getElementById('board');
    const boardSize = boardEl.offsetWidth;
    const sqSize = boardSize / 8;

    const col = tgt.charCodeAt(0) - 97; // 0-7
    const rank = tgt[1];
    const isWhiteOri = board.orientation() === 'white';
    let colFromLeft = isWhiteOri ? col : (7 - col);
    let leftPx = colFromLeft * sqSize;
    const popupW = sqSize * 4;
    if (leftPx + popupW > boardSize) leftPx = boardSize - popupW;
    if (leftPx < 0) leftPx = 0;

    const atTop = (rank === '8' && isWhiteOri) || (rank === '1' && !isWhiteOri);
    popup.style.left = leftPx + 'px';
    popup.style.width = popupW + 'px';
    if (atTop) { popup.style.top = '0'; popup.style.bottom = 'auto'; }
    else        { popup.style.bottom = '0'; popup.style.top = 'auto'; }

    const pieces = ['q','r','b','n'];
    popup.innerHTML = pieces.map(p => {
        const pc = (color === 'w' ? 'w' : 'b') + p.toUpperCase();
        return `<div class="pp-piece" style="flex:1" onclick="selectPromo('${p}')">` +
               `<img src="https://lichess1.org/assets/piece/caliente/${pc}.svg" alt="${p}"></div>`;
    }).join('');
    popup.style.display = 'flex';
}

function hidePromoPopup() {
    document.getElementById('promo-popup').style.display = 'none';
    pendingPromo = null;
}

function selectPromo(piece) {
    if (!pendingPromo) return;
    const { from, to } = pendingPromo;
    hidePromoPopup();
    const move = chess.move({ from, to, promotion: piece });
    if (!move) return;
    board.position(chess.fen(), false);
    if (initialTime > 0) startClock('bot');
    recordMove(move);
    checkEndGame();
    if (!gameOver) setTimeout(stockfishMove, 300);
}

function onSnapEnd() {
    if (mode === 'play') board.position(chess.fen(), false);
}

/* =====================================================
   BOARD ACTIONS (edit mode)
===================================================== */
function clearBoard()   { board.position('empty'); }
function resetToStart() { board.position('start'); }
function flipBoard()    {
    board.flip();
    humanSide = board.orientation() === 'white' ? 'w' : 'b';
    document.getElementById('side-w').className = 'tog' + (humanSide==='w' ? ' active-w' : '');
    document.getElementById('side-b').className = 'tog' + (humanSide==='b' ? ' active-b' : '');
}

/* =====================================================
   START GAME
===================================================== */
function startGame() {
    /* Build FEN from current board position */
    const pos = board.position();
    const fenPos = Chessboard.objToFen(pos);
    const castling = buildCastlingRights(pos);
    const fen = `${fenPos} ${turnFirst} ${castling} - 0 1`;

    /* Validate */
    const tempChess = new Chess();
    if (!tempChess.load(fen)) {
        setStatus('❌ Poziție invalidă! Verifică să existe câte un Rege pe fiecare parte.', 'err');
        return;
    }

    /* Switch to play mode */
    mode      = 'play';
    gameOver  = false;
    moveHistory = [];
    chess     = new Chess(fen);

    /* Update UI */
    document.getElementById('edit-btns').style.display = 'none';
    document.getElementById('piece-strip').style.display = 'none';
    document.getElementById('btn-stop').style.display  = 'block';
    if (initialTime > 0) {
        document.getElementById('clock-displays').style.display = 'flex';
        resetClock();
    }
    selectPiece(null);
    document.getElementById('move-list').style.display = 'block';
    document.getElementById('move-list').innerHTML = '<em style="color:rgba(232,224,208,0.3)">Nicio mutare încă.</em>';
    document.getElementById('card-turn').style.opacity = '0.4';
    document.getElementById('card-side').style.opacity = '0.4';

    /* Re-init board (hide spare pieces) */
    board.destroy && board.destroy();
    board = Chessboard('board', {
        position:   fen,
        draggable:  true,
        orientation: humanSide === 'w' ? 'white' : 'black',
        pieceTheme: 'https://lichess1.org/assets/piece/caliente/{piece}.svg',
        onDragStart, onDrop, onSnapEnd,
    });

    initStockfish();

    /* If computer moves first */
    if (chess.turn() !== humanSide) {
        setStatus('🤖 Robotul gândește...', 'inf');
        if (initialTime > 0) startClock('bot');
        setTimeout(stockfishMove, 600);
    } else {
        setStatus(`♟ Mutarea ta! Joci cu ${humanSide==='w'?'Albele ♔':'Negrele ♚'}`, '');
        if (initialTime > 0) startClock('you');
    }
}

/* =====================================================
   STOP GAME
===================================================== */
function stopGame() {
    mode = 'edit';
    gameOver = false;
    if (stockfish) { stockfish.terminate(); stockfish = null; sfReady = false; }

    /* Re-init board with spare pieces */
    const pos = chess ? chess.fen() : 'start';
    board.destroy && board.destroy();
    board = Chessboard('board', {
        position:     pos,
        draggable:    true,
        dropOffBoard: 'trash',
        orientation:  humanSide === 'w' ? 'white' : 'black',
        pieceTheme:   'https://lichess1.org/assets/piece/caliente/{piece}.svg',
        onDragStart, onDrop, onSnapEnd,
    });

    stopClock();
    document.getElementById('edit-btns').style.display    = 'block';
    document.getElementById('piece-strip').style.display  = '';
    document.getElementById('clock-displays').style.display = 'none';
    document.getElementById('btn-stop').style.display    = 'none';
    document.getElementById('move-list').style.display = 'none';
    document.getElementById('card-turn').style.opacity = '1';
    document.getElementById('card-side').style.opacity = '1';
    setStatus('Trage piesele pe tablă, apoi apasă <strong>Joacă!</strong>', 'inf');
}

/* =====================================================
   STOCKFISH
===================================================== */
function initStockfish() {
    try {
        const code = `importScripts('https://cdnjs.cloudflare.com/ajax/libs/stockfish.js/10.0.2/stockfish.js')`;
        const blob = new Blob([code], { type:'application/javascript' });
        stockfish  = new Worker(URL.createObjectURL(blob));
    } catch(e) {
        try { stockfish = new Worker('stockfish.js'); } catch(e2) { stockfish = null; }
    }
    if (!stockfish) return;

    stockfish.onmessage = function(e) {
        const msg = e.data;
        if (msg === 'uciok') {
            stockfish.postMessage(`setoption name Skill Level value ${LEVELS[currentLevel].skill}`);
            stockfish.postMessage('isready');
        }
        if (msg === 'readyok') { sfReady = true; }
        if (msg.startsWith('bestmove') && !gameOver) {
            const parts = msg.split(' ');
            const mv    = parts[1];
            if (!mv || mv === '(none)') return;
            const move  = chess.move({ from:mv.slice(0,2), to:mv.slice(2,4), promotion: mv[4] || 'q' });
            if (!move) return;
            board.position(chess.fen(), false);
            if (initialTime > 0) startClock('you');
            recordMove(move);
            checkEndGame();
            if (!gameOver) setStatus(`♟ Mutarea ta! Joci cu ${humanSide==='w'?'Albele ♔':'Negrele ♚'}`, '');
        }
    };
    stockfish.postMessage('uci');
}

function stockfishMove() {
    if (!stockfish || gameOver) return;
    setStatus('🤖 Robotul gândește...', 'inf');

    const ask = () => {
        stockfish.postMessage(`setoption name Skill Level value ${LEVELS[currentLevel].skill}`);
        stockfish.postMessage(`position fen ${chess.fen()}`);
        stockfish.postMessage(`go movetime ${LEVELS[currentLevel].movetime}`);
    };

    if (sfReady) ask();
    else setTimeout(ask, 400);
}

/* =====================================================
   MOVE LIST & END GAME
===================================================== */
function recordMove(move) {
    const ml = document.getElementById('move-list');
    const moveNum = Math.ceil(chess.history().length / 2);

    if (chess.history().length % 2 === 1) {
        /* White just moved */
        const row = document.createElement('span');
        row.id    = `mn-${moveNum}`;
        row.innerHTML = `<span class="mn">${moveNum}.</span><span class="mw">${move.san}</span><span class="mb" id="mb-${moveNum}"></span> `;
        if (ml.querySelector('em')) ml.innerHTML = '';
        ml.appendChild(row);
    } else {
        /* Black just moved */
        const bSpan = document.getElementById(`mb-${moveNum}`);
        if (bSpan) bSpan.textContent = move.san;
    }
    ml.scrollTop = ml.scrollHeight;
}

function checkEndGame() {
    if (chess.in_checkmate()) {
        gameOver = true;
        stopClock();
        const humanWon = (chess.turn() !== humanSide);
        if (humanWon) {
            setStatus(`🎉 Șah-mat! Ai câștigat! Felicitări!`, 'ok');
            confetti();
        } else {
            setStatus(`🤖 Șah-mat! Robotul a câștigat. Mai încearcă!`, 'err');
        }
    } else if (chess.in_draw()) {
        gameOver = true;
        stopClock();
        const reason = chess.in_stalemate() ? 'Pat!' :
                       chess.in_threefold_repetition() ? 'Remiză prin repetiție' :
                       chess.insufficient_material() ? 'Material insuficient' : 'Remiză';
        setStatus(`🤝 ${reason}`, 'inf');
    } else if (chess.in_check()) {
        setStatus(`⚠️ Șah! Protejează Regele!`, '');
    }
}

/* =====================================================
   HELPERS
===================================================== */
function setStatus(html, cls) {
    const el = document.getElementById('status-box');
    el.innerHTML = html;
    el.className = cls ? cls : '';
}

function confetti() {
    const colors = ['#f5c842','#e6a817','#ffe680','#ff6b6b','#7de888','#80c8ff'];
    for (let i = 0; i < 80; i++) {
        setTimeout(() => {
            const el = document.createElement('div');
            el.className = 'cf';
            el.style.cssText = `
                left:${Math.random()*100}vw; top:-10px;
                width:${6+Math.random()*9}px; height:${6+Math.random()*9}px;
                background:${colors[Math.floor(Math.random()*colors.length)]};
                --dx:${(Math.random()-.5)*400}px;
                --dy:${280+Math.random()*520}px;
                --rot:${Math.random()*720}deg;
                --dur:${1.3+Math.random()*1.8}s;
            `;
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 3300);
        }, i * 35);
    }
}
