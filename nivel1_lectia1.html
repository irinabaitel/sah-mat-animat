<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Lecția 1 — Tabla de Șah</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@700;900&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
<link rel="stylesheet" href="master-template.css">
<style>

  /* ── LESSON BADGE ─────────────────────────────── */
  .lesson-badge {
    background: var(--c-navy); color: white;
    font-family: var(--font-display); font-size: var(--fs-sm); font-weight: var(--fw-bold);
    padding: 3px 14px; border-radius: var(--radius-sm); white-space: nowrap;
  }

  /* ── SLIDE NAV ────────────────────────────────── */
  .slide-nav {
    display: flex; align-items: center; gap: 8px;
    flex-shrink: 0; padding: 4px 0;
  }
  .slide-nav-btn {
    width: 38px; height: 38px; border-radius: 50%;
    border: 2px solid rgba(26,58,107,0.3);
    background: rgba(255,255,255,0.6);
    font-family: var(--font-display); font-size: 1rem;
    color: var(--c-navy); cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: background .15s;
  }
  .slide-nav-btn:hover:not(:disabled) { background: rgba(26,58,107,0.15); }
  .slide-nav-btn:disabled { opacity: 0.3; cursor: default; }

  /* ── DOTS ─────────────────────────────────────── */
  .slide-dots {
    display: flex; gap: 7px; align-items: center;
    flex-wrap: wrap; justify-content: center; flex: 1;
  }
  .slide-dot {
    width: 9px; height: 9px; border-radius: 50%;
    background: rgba(26,58,107,0.15);
    cursor: pointer; transition: all .2s;
  }
  .slide-dot.done  { background: rgba(26,58,107,0.38); }
  .slide-dot.active {
    background: var(--c-navy); transform: scale(1.3);
    box-shadow: 0 0 0 2px rgba(26,58,107,0.2);
  }

  /* ── PANEL TEXT ───────────────────────────────── */
  .slide-badge {
    display: inline-block;
    background: rgba(26,58,107,0.09);
    border: 1.5px solid rgba(26,58,107,0.2);
    border-radius: 20px; padding: 4px 18px;
    font-family: var(--font-display); font-size: 1.1rem; font-weight: 700;
    color: var(--c-navy); margin-bottom: 8px;
  }
  .slide-title {
    font-family: var(--font-display);
    font-size: 1.15rem; color: var(--c-navy);
    margin-bottom: 10px; line-height: 1.3;
  }
  .slide-text { font-size: 1.05rem; line-height: 1.75; color: #2a2a3e; }
  .slide-text p { margin-bottom: 8px; }
  .slide-text p:last-child { margin-bottom: 0; }
  .slide-text h3 {
    font-family: var(--font-display); font-size: 1.05rem;
    color: var(--c-navy); margin: 14px 0 6px;
  }
  .slide-text ul {
    list-style: none; padding-left: 4px; margin: 8px 0 10px;
  }
  .slide-text ul li {
    padding-left: 18px; position: relative;
    margin-bottom: 5px; font-size: 1.02rem; line-height: 1.65;
  }
  .slide-text ul li::before {
    content: "○"; position: absolute; left: 0;
    color: var(--c-navy); font-size: .85rem;
  }

  /* ── HIGHLIGHT BOX ────────────────────────────── */
  .h-box {
    background: rgba(26,58,107,0.08);
    border-left: 4px solid var(--c-navy);
    border-radius: 0 12px 12px 0;
    padding: 12px 16px; font-size: 1.02rem; line-height: 1.7;
    margin: 10px 0;
  }
  .h-box.gold {
    background: rgba(180,130,0,0.09); border-left-color: #b08000;
  }
  .h-box.gold strong { color: #705000; }

  /* ── TOGGLE BUTTONS ───────────────────────────── */
  .toggle-group {
    display: flex; flex-direction: column; gap: 6px;
    margin-top: 12px;
  }
  .tog-btn {
    padding: 8px 14px; border-radius: 10px; border: 2px solid;
    font-family: 'Nunito', sans-serif; font-size: 0.88em; font-weight: 700;
    cursor: pointer; transition: all 0.2s; text-align: left;
  }
  .tog-col     { border-color: rgba(80,160,255,0.6); background: rgba(80,160,255,0.15); color: #1a3a6b; }
  .tog-col:hover, .tog-col.on { background: rgba(80,160,255,0.4); }
  .tog-row     { border-color: rgba(80,200,100,0.6); background: rgba(80,200,100,0.15); color: #1a5c35; }
  .tog-row:hover, .tog-row.on { background: rgba(80,200,100,0.4); }
  .tog-cross   { border-color: rgba(255,80,50,0.6);  background: rgba(255,80,50,0.15);  color: #7a1a1a; }
  .tog-cross:hover, .tog-cross.on { background: rgba(255,80,50,0.4); }
  .tog-diag    { border-color: rgba(180,80,220,0.6); background: rgba(180,80,220,0.12); color: #5a1a7a; }
  .tog-diag:hover, .tog-diag.on { background: rgba(180,80,220,0.35); }
  .tog-center  { border-color: rgba(220,130,5,0.7);  background: rgba(255,155,10,0.18); color: #6b4200; }
  .tog-center:hover, .tog-center.on { background: rgba(255,155,10,0.45); }
  .tog-excenter{ border-color: rgba(200,160,10,0.55);background: rgba(255,185,15,0.12); color: #5a4800; }
  .tog-excenter:hover, .tog-excenter.on { background: rgba(255,185,15,0.38); }

  /* ── BOARD HIGHLIGHTS ─────────────────────────── */
  .sq-row     { background-image: linear-gradient(rgba(80,200,100,0.40), rgba(80,200,100,0.40)) !important; }
  .sq-col     { background-image: linear-gradient(rgba(80,160,255,0.40), rgba(80,160,255,0.40)) !important; }
  .sq-diag    { background-image: linear-gradient(rgba(180,80,220,0.40), rgba(180,80,220,0.40)) !important; }
  .sq-excenter{ background-image: linear-gradient(rgba(255,185,15,0.38), rgba(255,185,15,0.38)) !important; }
  .sq-center  { background-image: linear-gradient(rgba(255,155,10,0.52), rgba(255,155,10,0.52)) !important; }
  .sq-cross   { background-image: linear-gradient(rgba(255,80,50,0.55), rgba(255,80,50,0.55)) !important; }
</style>
</head>
<body>
<div class="page-wrapper">

  <!-- ── HEADER ──────────────────────────────────── -->
  <header class="page-header" role="banner">
    <span class="header-title">Tabla de Șah</span>
    <div class="header-progress">
      <span class="lesson-badge">Lecția 1</span>
    </div>
  </header>

  <!-- ── MAIN ────────────────────────────────────── -->
  <main class="page-main" role="main">

    <!-- Coloana tablă -->
    <div class="board-col">
      <div class="board-wrapper">
        <div id="board"></div>
      </div>
    </div>

    <!-- Coloana panel -->
    <div class="panel-col">

      <div class="panel-scroll" id="panelScroll" role="region" aria-label="Conținut lecție">
        <span class="slide-badge" id="slideBadge">Tabla de Șah</span>
        <div class="slide-title" id="slideTitle"></div>
        <div class="slide-text"  id="slideText"></div>
        <!-- Toggle buttons — vizibile doar pe slide-ul 2 -->
        <div id="toggleSection" style="display:none">
          <div class="toggle-group">
            <button class="tog-btn tog-col"      id="btn-col"      onclick="toggleHL('col')">🚫 Coloana e</button>
            <button class="tog-btn tog-row"      id="btn-row"      onclick="toggleHL('row')">🚫 Linia 4</button>
            <button class="tog-btn tog-diag"     id="btn-diag"     onclick="toggleHL('diag')">🚫 Diagonalele b1–h7 și h1–a8</button>
            <button class="tog-btn tog-center"   id="btn-center"   onclick="toggleHL('center')">🚫 Centrul mic</button>
            <button class="tog-btn tog-excenter" id="btn-excenter" onclick="toggleHL('excenter')">🚫 Centrul extins</button>
            <button class="tog-btn tog-cross"    id="btn-cross"    onclick="toggleHL('cross')">🚫 Pătrățelul e4</button>
          </div>
        </div>
      </div>

      <div class="slide-nav">
        <button class="slide-nav-btn" id="prevBtn" onclick="prevSlide()" disabled>◀</button>
        <div class="slide-dots" id="slideDots"></div>
        <button class="slide-nav-btn" id="nextBtn" onclick="nextSlide()">▶</button>
      </div>

    </div><!-- /.panel-col -->
  </main>

  <!-- ── FOOTER ──────────────────────────────────── -->
  <footer class="page-footer" role="navigation" aria-label="Navigare lecție">
    <a href="hub.html" class="nav-btn nav-btn--back">
      <span class="icon">&#8592;</span>
      <span class="label">Cuprins</span>
    </a>
    <a href="hub.html" class="nav-btn nav-btn--contents">
      <span class="icon">&#8862;</span>
      <span class="label">Cuprins</span>
    </a>
    <a href="nivel1_lectia2.html" class="nav-btn nav-btn--forward">
      <span class="icon">&#8594;</span>
      <span class="label">Lecția 2</span>
    </a>
  </footer>

</div><!-- /.page-wrapper -->

<script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
<script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
<script>

/* ── TABLA ──────────────────────────────────────── */
const board = Chessboard('board', {
  position: 'empty',
  showNotation: true,
  pieceTheme: 'https://lichess1.org/assets/piece/caliente/{piece}.svg',
});
$(window).resize(() => board.resize());

/* ── SLIDE DATA ─────────────────────────────────── */
const SLIDES = [
  {
    badge: 'Tabla de Șah',
    title: 'O aventură veche de 1400 de ani',
    html: `
      <p>Șahul este o aventură extraordinară care a început acum multă vreme, în jurul anului <strong>600 d.Hr.</strong> (adică acum mai bine de 1400 de ani!). Primul strămoș al șahului se numea <strong>Chaturanga</strong> și a apărut în îndepărtata Indie.</p>
      <p>Imaginați-vă că sunteți <strong>comandantul unei armate curajoase</strong>. De partea cealaltă a mesei, un alt prieten conduce o armată rivală. Scopul vostru? Să folosiți tactici inteligente pentru a-l <strong>încolți pe Regele adversarului</strong>.</p>
      <p>Dar, înainte de a trimite soldații la antrenament, trebuie să cunoaștem perfect <strong>terenul de luptă!</strong></p>
      <h3>Câmpul de Bătălie</h3>
      <p>Lumea noastră de joc este un <strong>pătrat mare, împărțit în 64 de pătrățele mici</strong>, albe și negre, așezate alternativ.</p>
      <div class="h-box">
        <strong>🚩 Regula de Aur — Cum așezăm tabla?</strong><br>
        Înainte de a spune „Start Joc!", verificăm dacă tabla este pusă corect.<br><br>
        <strong>Regula colțului:</strong> Fiecare jucător trebuie să aibă în <strong>colțul din dreapta</strong> lui un <strong>pătrățel alb</strong>. Dacă în dreapta ta e unul negru — întoarce tabla!
      </div>
    `,
    toggles: false,
  },
  {
    badge: 'Cum citim harta?',
    title: 'Linii, Coloane și Diagonale',
    html: `
      <p>Pentru ca generalii să poată da ordine clare, fiecare pătrățel are un <strong>nume unic</strong> — exact ca o adresă poștală.</p>
      <ul>
        <li><strong>Coloanele</strong> — drumuri drepte spre adversar, notate cu litere: <strong>a, b, c, d, e, f, g, h</strong></li>
        <li><strong>Liniile</strong> — rânduri de la stânga la dreapta, notate cu cifre: <strong>1, 2, 3... 8</strong></li>
        <li><strong>Diagonalele</strong> — poteci pieziș formate din câmpuri de aceeași culoare. Pe tablă sunt <strong>26 de diagonale</strong>.</li>
      </ul>
      <div class="h-box">
        <strong>📍 Adresa unui pătrățel</strong><br>
        <strong>litera coloanei</strong> + <strong>cifra liniei</strong>: coloana <strong>e</strong> + linia <strong>4</strong> = pătrățelul <strong style="color:#c0392b">e4</strong>!
      </div>
      <h3>Cel mai important loc: Centrul tablei</h3>
      <p>Nu toate pătrățelele sunt la fel de valoroase. Centrul tablei este ca un <strong>deal înalt</strong> — cine îl controlează vede tot câmpul de bătălie.</p>
      <div class="h-box gold">
        <strong>💡 De ce contează centrul?</strong><br>
        Un cal în centru atacă <strong>8 câmpuri</strong>, pe când un cal în colț atacă doar <strong>2</strong>!
      </div>
      <p style="margin-top:10px; font-size:0.95rem; color:rgba(26,26,46,0.65);">Apasă butoanele de mai jos ca să explorezi tabla!</p>
    `,
    toggles: true,
  },
];

/* ── SLIDE ENGINE ───────────────────────────────── */
let current = 0;

function renderDots() {
  const c = document.getElementById('slideDots');
  c.innerHTML = '';
  SLIDES.forEach((_, i) => {
    const d = document.createElement('div');
    d.className = 'slide-dot' + (i < current ? ' done' : '') + (i === current ? ' active' : '');
    d.onclick = () => goTo(i);
    c.appendChild(d);
  });
}

function goTo(idx) {
  current = idx;
  const s = SLIDES[idx];
  document.getElementById('slideBadge').textContent = s.badge;
  document.getElementById('slideTitle').textContent = s.title;
  document.getElementById('slideText').innerHTML = s.html;
  document.getElementById('toggleSection').style.display = s.toggles ? 'block' : 'none';
  document.getElementById('prevBtn').disabled = idx === 0;
  document.getElementById('nextBtn').disabled = idx === SLIDES.length - 1;
  document.getElementById('panelScroll').scrollTop = 0;
  renderDots();
  if (!s.toggles) { clearAllHL(); }
}

function prevSlide() { if (current > 0) goTo(current - 1); }
function nextSlide() { if (current < SLIDES.length - 1) goTo(current + 1); }

/* ── HIGHLIGHTS ─────────────────────────────────── */
const COLS = ['a','b','c','d','e','f','g','h'];
const ROWS = ['1','2','3','4','5','6','7','8'];
const DIAG_E4     = ['a8','b7','c6','d5','e4','f3','g2','h1','h7','g6','f5','d3','c2','b1'];
const CENTER_SQ   = ['d4','e4','d5','e5'];
const EXCENTER_SQ = ['c3','c4','c5','c6','d3','d6','e3','e6','f3','f4','f5','f6'];
const ALL_HL = 'sq-col sq-row sq-diag sq-excenter sq-center sq-cross';
const hlState = { col:false, row:false, diag:false, excenter:false, center:false, cross:false };

function applyHL() {
  const b = $('#board');
  COLS.forEach(c => ROWS.forEach(r => b.find(`.square-${c}${r}`).removeClass(ALL_HL)));
  if (hlState.row)      COLS.forEach(c => b.find(`.square-${c}4`).addClass('sq-row'));
  if (hlState.col)      ROWS.forEach(r => b.find(`.square-e${r}`).addClass('sq-col'));
  if (hlState.diag)     DIAG_E4.forEach(sq => b.find(`.square-${sq}`).addClass('sq-diag'));
  if (hlState.excenter) EXCENTER_SQ.forEach(sq => b.find(`.square-${sq}`).addClass('sq-excenter'));
  if (hlState.center)   CENTER_SQ.forEach(sq => b.find(`.square-${sq}`).addClass('sq-center'));
  if (hlState.cross)    b.find('.square-e4').addClass('sq-cross');
}

function clearAllHL() {
  Object.keys(hlState).forEach(k => hlState[k] = false);
  const b = $('#board');
  COLS.forEach(c => ROWS.forEach(r => b.find(`.square-${c}${r}`).removeClass(ALL_HL)));
}

function toggleHL(type) {
  hlState[type] = !hlState[type];
  const btn = document.getElementById('btn-' + type);
  btn.classList.toggle('on', hlState[type]);
  btn.textContent = (hlState[type] ? '👁 ' : '🚫 ') + btn.textContent.slice(2);
  applyHL();
}

/* ── INIT ───────────────────────────────────────── */
goTo(0);
</script>
</body>
</html>
