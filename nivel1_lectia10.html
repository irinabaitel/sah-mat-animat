/* ══════════════════════════════════════════════════════════════
   BOARD + STATE
══════════════════════════════════════════════════════════════ */
let board       = null;
let positions   = [];   // FEN at each step
let currentStep = 0;
let currentPuzzleIdx = -1;

function computePositions(puzzle) {
    const chess = new Chess(puzzle.startFen);
    const fens  = [chess.fen()];
    for (const mv of puzzle.sanMoves) {
        const result = chess.move(mv);
        if (!result) {
            console.error('Mutare invalid\u0103:', mv, 'in puzzle', puzzle.title);
            break;
        }
        fens.push(chess.fen());
    }
    return fens;
}

/* ── highlight last move ── */
function clearHighlights() {
    document.querySelectorAll('#board .sq-last-from, #board .sq-last-to')
        .forEach(function(el) {
            el.classList.remove('sq-last-from');
            el.classList.remove('sq-last-to');
        });
}
function highlightMove(puzzle, step) {
    clearHighlights();
    if (step < 1) return;
    const chess = new Chess(puzzle.startFen);
    for (let i = 0; i < step - 1; i++) chess.move(puzzle.sanMoves[i]);
    const mv = chess.move(puzzle.sanMoves[step - 1]);
    if (!mv) return;
    var fromEl = document.querySelector('#board .square-' + mv.from);
    var toEl   = document.querySelector('#board .square-' + mv.to);
    if (fromEl) fromEl.classList.add('sq-last-from');
    if (toEl)   toEl.classList.add('sq-last-to');
}

/* ── move list ── */
function toRo(san) {
    return san
        .replace(/K/g,'\u265a').replace(/Q/g,'D').replace(/R/g,'T')
        .replace(/B/g,'N').replace(/N/g,'C')
        .replace('O-O-O','\u265a\u265c\u265c').replace('O-O','\u265a\u265c');
}
function buildMovesList(puzzle) {
    const ml = document.getElementById('movesList');
    if (!puzzle.sanMoves.length) { ml.innerHTML = ''; return; }
    let html = '';
    let moveNum = 1;
    const whiteFirst = puzzle.startFen.split(' ')[1] === 'w';
    puzzle.sanMoves.forEach(function(mv, i) {
        const isWhite = whiteFirst ? (i % 2 === 0) : (i % 2 !== 0);
        if (isWhite) {
            if (i > 0 && !whiteFirst) html += ' ';
            html += '<span class="mn">' + moveNum + '.</span>';
        }
        const cls = 'move-item' + (i + 1 === currentStep ? ' cur' : '');
        html += '<span class="' + cls + ' ' + (isWhite ? 'mw' : 'mb') + '">' + toRo(mv) + '</span>';
        if (!isWhite || i === puzzle.sanMoves.length - 1) {
            if (isWhite) moveNum++;
        } else {
            moveNum++;
        }
    });
    ml.innerHTML = html;
}

function updateMovesList(puzzle) {
    const items = document.querySelectorAll('#movesList .move-item');
    items.forEach(function(el, i) {
        el.classList.toggle('cur', i + 1 === currentStep);
    });
}

/* ── navigation ── */
function goToStep(step) {
    if (!positions.length) return;
    step = Math.max(0, Math.min(step, positions.length - 1));
    currentStep = step;

    board.position(positions[step], step > 0);
    highlightMove(puzzles[currentPuzzleIdx], step);
    updateMovesList(puzzles[currentPuzzleIdx]);

    const total = positions.length - 1;
    document.getElementById('moveCounter').textContent =
        step === 0 ? 'Start' : ('Mutarea ' + step + ' / ' + total);

    document.getElementById('annotationBox').innerHTML =
        puzzles[currentPuzzleIdx].annotations[step] || '';

    const isPat = (step === total) && total > 0;
    document.getElementById('patBadge').style.display = isPat ? '' : 'none';

    document.getElementById('btnFirst').disabled = (step === 0);
    document.getElementById('btnPrev').disabled  = (step === 0);
    document.getElementById('btnNext').disabled  = (step === total);
    document.getElementById('btnLast').disabled  = (step === total);
}

function goFirst() { goToStep(0); }
function goPrev()  { goToStep(currentStep - 1); }
function goNext()  { goToStep(currentStep + 1); }
function goLast()  { goToStep(positions.length - 1); }

/* ── load puzzle ── */
function loadPuzzle(idx) {
    currentPuzzleIdx = idx;
    const puzzle = puzzles[idx];

    /* update tabs */
    document.querySelectorAll('.tab-btn').forEach(function(btn, i) {
        btn.classList.toggle('active', i === idx);
    });

    document.getElementById('chapterTitle').textContent   = puzzle.title;
    document.getElementById('chapterSubtitle').textContent = puzzle.subtitle;

    positions = computePositions(puzzle);
    currentStep = 0;

    if (!board) {
        board = Chessboard('board', {
            position:   positions[0],
            pieceTheme: 'https://lichess1.org/assets/piece/caliente/{piece}.svg',
            showNotation: true
        });
        window.addEventListener('resize', function() { board.resize(); });
    } else {
        board.position(positions[0], false);
    }

    clearHighlights();
    buildMovesList(puzzle);
    document.getElementById('annotationBox').innerHTML = puzzle.annotations[0] || '';
    document.getElementById('patBadge').style.display  = 'none';
    document.getElementById('moveCounter').textContent = 'Start';

    document.getElementById('btnFirst').disabled = true;
    document.getElementById('btnPrev').disabled  = true;
    document.getElementById('btnNext').disabled  = (positions.length <= 1);
    document.getElementById('btnLast').disabled  = (positions.length <= 1);
}

/* ── keyboard navigation ── */
document.addEventListener('keydown', function(e) {
    if (e.key === 'ArrowRight' || e.key === 'ArrowDown')  goNext();
    if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')    goPrev();
    if (e.key === 'Home') goFirst();
    if (e.key === 'End')  goLast();
});

/* ── build tabs and init ── */
(function() {
    const row = document.getElementById('tabRow');
    puzzles.forEach(function(p, i) {
        const btn = document.createElement('button');
        btn.className = 'tab-btn' + (i === 0 ? ' active' : '');
        btn.textContent = (i + 1).toString();
        btn.title = p.title;
        btn.onclick = function() { loadPuzzle(i); };
        row.appendChild(btn);
    });
    loadPuzzle(0);
}());

</script>
</body>
</html>
