<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Padati (pedestru) - soldat mic cu coif și scut -->
  <g stroke="#3a1f10" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round" fill="#f4e5c0">
    <!-- vârf coif -->
    <path d="M48 22 L50 14 L52 22 Z" fill="#3a1f10" stroke="none"/>
    <circle cx="50" cy="13" r="1.5"/>
    <!-- coif rotund -->
    <path d="M38 38 Q38 22 50 22 Q62 22 62 38 Z"/>
    <!-- viziera coifului -->
    <line x1="38" y1="36" x2="62" y2="36" stroke-width="2"/>
    <!-- cap (sub coif, parțial vizibil) -->
    <path d="M44 38 Q44 45 50 45 Q56 45 56 38 Z"/>
    <!-- corp/scut central rotund -->
    <ellipse cx="50" cy="64" rx="18" ry="18"/>
    <!-- bumb central scut -->
    <circle cx="50" cy="64" r="3" fill="#3a1f10" stroke="none"/>
    <!-- cruce pe scut (X subtil) -->
    <path d="M38 56 L62 72 M62 56 L38 72" fill="none" stroke-width="1.5"/>
    <!-- bază -->
    <ellipse cx="50" cy="88" rx="24" ry="4.5"/>
  </g>
</svg>
