<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Raja (rege) - silueta indiană cu mukut (coroană cu 3 vârfuri) -->
  <g stroke="#3a1f10" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round" fill="#f4e5c0">
    <!-- coroană trishula: 3 vârfuri -->
    <path d="M28 26 L33 8 L42 18 L50 5 L58 18 L67 8 L72 26 Z"/>
    <!-- bumb central pe coroană -->
    <circle cx="50" cy="11" r="2.5" fill="#3a1f10"/>
    <!-- banda coroanei -->
    <rect x="26" y="26" width="48" height="5" rx="1"/>
    <!-- cap -->
    <circle cx="50" cy="40" r="8.5"/>
    <!-- corp/robă -->
    <path d="M27 50 Q23 56 22 64 L19 82 L81 82 L78 64 Q77 56 73 50 Q62 53 50 53 Q38 53 27 50 Z"/>
    <!-- talie/cingătoare -->
    <path d="M22 64 Q50 70 78 64" fill="none" stroke-width="2"/>
    <!-- detaliu central robă (pendant) -->
    <path d="M50 53 L47 80 L53 80 Z" fill="#3a1f10" stroke="none"/>
    <!-- baza/platforma -->
    <ellipse cx="50" cy="88" rx="33" ry="5.5"/>
  </g>
</svg>
