<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Ratha (car de luptă) - roată mare cu spițe + cabină -->
  <g stroke="#3a1f10" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round" fill="#f4e5c0">
    <!-- steag pe vârf -->
    <path d="M50 8 L50 18 L60 14 Z" fill="#3a1f10" stroke="none"/>
    <line x1="50" y1="8" x2="50" y2="28" stroke-width="2"/>
    <!-- cabină car (formă trapezoidală) -->
    <path d="M28 28 L72 28 L68 48 L32 48 Z"/>
    <!-- detaliu cabină (uși/ferestre) -->
    <rect x="44" y="34" width="12" height="12" fill="#3a1f10" stroke="none" rx="1"/>
    <!-- roată mare -->
    <circle cx="50" cy="65" r="20"/>
    <circle cx="50" cy="65" r="4" fill="#3a1f10" stroke="none"/>
    <!-- spițe roată (8 spițe) -->
    <g stroke-width="2">
      <line x1="50" y1="45" x2="50" y2="85"/>
      <line x1="30" y1="65" x2="70" y2="65"/>
      <line x1="36" y1="51" x2="64" y2="79"/>
      <line x1="64" y1="51" x2="36" y2="79"/>
    </g>
    <!-- bază -->
    <ellipse cx="50" cy="90" rx="30" ry="4"/>
  </g>
</svg>
