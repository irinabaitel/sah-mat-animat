<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Gaja (elefant) - profil cu trompă curbată, colți, howdah -->
  <g stroke="#3a1f10" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round" fill="#f4e5c0">
    <!-- howdah (cabina pe spate) -->
    <path d="M44 12 L56 12 L58 22 L42 22 Z"/>
    <!-- vârful howdah -->
    <path d="M50 7 L50 12" stroke-width="2"/>
    <circle cx="50" cy="6" r="2" fill="#3a1f10" stroke="none"/>
    <!-- corp elefant -->
    <ellipse cx="50" cy="50" rx="28" ry="18"/>
    <!-- cap -->
    <ellipse cx="73" cy="48" rx="11" ry="13"/>
    <!-- ureche -->
    <path d="M67 38 Q60 32 56 38 Q60 46 67 45 Z"/>
    <!-- ochi -->
    <circle cx="75" cy="44" r="1.5" fill="#3a1f10" stroke="none"/>
    <!-- trompă curbată în jos și înapoi -->
    <path d="M78 56 Q85 65 80 72 Q72 75 70 70" fill="#f4e5c0"/>
    <!-- colț -->
    <path d="M76 62 L82 66 L79 60 Z" fill="#f4e5c0"/>
    <!-- picioare (4 picioare scurte) -->
    <rect x="28" y="65" width="7" height="18" rx="2"/>
    <rect x="40" y="65" width="7" height="18" rx="2"/>
    <rect x="54" y="65" width="7" height="18" rx="2"/>
    <rect x="65" y="65" width="7" height="18" rx="2"/>
    <!-- bază -->
    <ellipse cx="50" cy="88" rx="30" ry="4"/>
  </g>
</svg>
