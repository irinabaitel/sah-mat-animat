<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Mantri (sfetnic) - figură mai mică, cu turban rotund -->
  <g stroke="#3a1f10" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round" fill="#f4e5c0">
    <!-- vârf de turban -->
    <path d="M48 12 L50 7 L52 12 Z" fill="#3a1f10" stroke="none"/>
    <circle cx="50" cy="14" r="2"/>
    <!-- turban (formă bombată) -->
    <path d="M34 32 Q34 18 50 18 Q66 18 66 32 Z"/>
    <!-- bijuterie centrală pe turban -->
    <circle cx="50" cy="26" r="2.5" fill="#3a1f10" stroke="none"/>
    <!-- cap -->
    <circle cx="50" cy="40" r="7.5"/>
    <!-- corp/robă (mai îngust decât regele) -->
    <path d="M30 50 Q26 56 25 64 L23 82 L77 82 L75 64 Q74 56 70 50 Q60 52 50 52 Q40 52 30 50 Z"/>
    <!-- talie -->
    <path d="M25 64 Q50 69 75 64" fill="none" stroke-width="2"/>
    <!-- pliuri rochie -->
    <path d="M38 55 L36 80 M50 55 L50 80 M62 55 L64 80" fill="none" stroke-width="1.5"/>
    <!-- bază -->
    <ellipse cx="50" cy="87" rx="29" ry="5"/>
  </g>
</svg>
