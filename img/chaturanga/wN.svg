<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Ashva (cal) - cap și gât în profil, decorat -->
  <g stroke="#3a1f10" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round" fill="#f4e5c0">
    <!-- urechi -->
    <path d="M48 15 L46 5 L51 12 Z"/>
    <path d="M53 12 L52 4 L57 10 Z"/>
    <!-- cap + gât (profil orientat spre dreapta) -->
    <path d="M50 12
             Q42 16 38 26
             Q34 36 36 46
             L30 52
             Q24 60 25 70
             L25 80
             L75 80
             L75 70
             Q74 56 66 48
             Q68 36 64 26
             Q60 16 50 12 Z"/>
    <!-- coamă (linie curbată cu zigzag pe gât) -->
    <path d="M55 16 Q60 22 58 30 Q62 35 60 42 Q66 46 64 52"
          fill="none" stroke-width="2"/>
    <!-- ochi -->
    <circle cx="44" cy="28" r="1.8" fill="#3a1f10" stroke="none"/>
    <!-- nări -->
    <path d="M38 30 Q40 33 39 35" fill="none" stroke-width="1.5"/>
    <!-- frâu/bridă (linie peste bot) -->
    <path d="M37 32 L42 36" stroke-width="2"/>
    <!-- ornament frunte -->
    <circle cx="48" cy="22" r="2" fill="#3a1f10" stroke="none"/>
    <!-- bază -->
    <ellipse cx="50" cy="88" rx="30" ry="4"/>
  </g>
</svg>
