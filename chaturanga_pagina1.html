<style>
/* ── Tabla statică de chaturanga ───────────────────────── */
/* Container query: aflăm dimensiunile board-wrapper-ului */
.board-wrapper {
  container-type: size;
  container-name: bw;
}

.chaturanga-board {
  /* Tabla = un pătrat cu latura = MINIMUL dintre lățimea și înălțimea containerului.
     Așa, indiferent dacă containerul iese dreptunghi, tabla rămâne pătrată. */
  width:  min(100cqw, 100cqh);
  height: min(100cqw, 100cqh);
  margin: auto;
  display: grid;
  grid-template-columns: repeat(8, 1fr);
  grid-template-rows:    repeat(8, 1fr);
  background: #5a3a1c;
}
.csq {
  aspect-ratio: 1 / 1;
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
}
/* Tabla MONOCROMĂ — toate căsuțele aceeași culoare (lemn deschis).
   Original chaturanga: tabla ashtapada NU avea pătrate alternative
   alb-negru — modelul bicolor a apărut abia în Europa, sec. XI. */
.csq.light, .csq.dark { background: #e8d4a0; }

/* Linii subtile de delimitare între căsuțe, ca pe o tablă desenată */
.csq {
  box-shadow:
    inset -1px 0 0 rgba(90, 58, 28, .35),
    inset 0 -1px 0 rgba(90, 58, 28, .35);
}

/* X-ul — pictat pe fundalul căsuței, sub piesă.
   Foarte șters intenționat: în chaturanga X-urile nu mai au funcție,
   sunt doar o amintire grafică de la jocul de zaruri anterior. */
.csq.xmark::before {
  content: "";
  position: absolute;
  inset: 18%;
  background:
    linear-gradient(45deg,  transparent 47%, rgba(58,31,16,.18) 47%, rgba(58,31,16,.18) 53%, transparent 53%),
    linear-gradient(-45deg, transparent 47%, rgba(58,31,16,.18) 47%, rgba(58,31,16,.18) 53%, transparent 53%);
  pointer-events: none;
  z-index: 1;
}

/* Piesa stă DEASUPRA X-ului — acoperă marcajul cu corpul ei.
   object-fit: contain păstrează proporțiile PNG-ului și încadrează în pătrat. */
.csq img {
  position: relative;
  z-index: 2;
  object-fit: contain;
  pointer-events: none;
  /* dimensiune implicită — suprascrisă de clasele de mai jos */
  width: 78%;
  height: 78%;
}
/* Ierarhie vizuală — piesele „importante" sunt mai mari pe tablă */
.csq img.p-raja   { width: 96%; height: 96%; }
.csq img.p-mantri { width: 90%; height: 90%; }
.csq img.p-ratha  { width: 86%; height: 86%; }
.csq img.p-gaja   { width: 84%; height: 84%; }
.csq img.p-ashva  { width: 82%; height: 82%; }
.csq img.p-padati { width: 72%; height: 72%; }

/* ── Sertare (accordion) ─────────────────────────────── */

/* Lista cu piesele reale lângă nume — pentru identificare rapidă */

<script>
/* ── Construiește tabla statică ───────────────────────────
   În chaturanga clasică (Murray), raja și mantri NU sunt simetrici pe
   ambele rânduri. Albul: mantri pe d1, raja pe e1. Negrul: raja pe d8,
   mantri pe e8. Așa regii nu sunt vis-à-vis, ci pe diagonală. */
const back_w = ['ratha','ashva','gaja','mantri','raja','gaja','ashva','ratha'];
const back_b = ['ratha','ashva','gaja','raja','mantri','gaja','ashva','ratha'];
const xSet = new Set(['a1','a4','a5','a8','d1','d4','d5','d8','e1','e4','e5','e8','h1','h4','h5','h8']);
const cols = ['a','b','c','d','e','f','g','h'];
const board = document.getElementById('chBoard');
for (let r = 8; r >= 1; r--) {
  for (let c = 0; c < 8; c++) {
    const sq = cols[c] + r;
    const isLight = (c + r) % 2 === 1;
    const div = document.createElement('div');
    div.className = 'csq ' + (isLight ? 'light' : 'dark') + (xSet.has(sq) ? ' xmark' : '');
    let piece = null;
    if      (r === 1) piece = back_w[c] + '_w';
    else if (r === 2) piece = 'padati_w';
    else if (r === 7) piece = 'padati_b';
    else if (r === 8) piece = back_b[c] + '_b';
    if (piece) {
      const img = document.createElement('img');
      img.src = 'img/chaturanga/' + piece + '.png?t=' + Date.now();
      img.alt = piece.replace('_',' ');
      img.className = 'p-' + piece.split('_')[0];
      div.appendChild(img);
    }
    board.appendChild(div);
  }
}

    title: 'Povestea jocului',
    bodyHTML: `
<p>Cu mai bine de <strong>1400 de ani în urmă</strong>, departe în <strong>India</strong>, într-o vreme în care regii încă mergeau la luptă pe spinarea elefanților, s-a născut un joc. Nu avea încă numele de „șah". I se spunea <strong>chaturanga</strong>.</p>

<p>În limba veche a Indiei — sanscrita — <em>chatur</em> înseamnă <strong>patru</strong>, iar <em>anga</em> înseamnă <strong>părți</strong> sau <strong>brațe</strong>. Așadar, <strong>chaturanga = „cele patru părți"</strong>.</p>

<p>De ce patru? Pentru că armata regelui indian avea, pe atunci, <strong>patru feluri de luptători</strong>:</p>

  <li>🛞 <strong>carele de luptă</strong> — trase de cai, repezi ca vântul</li>

<p>Cineva isteț — nu știm cine, și nici exact când — s-a gândit: <em>„Dacă am așeza armata asta pe o tablă, am putea purta o bătălie întreagă… stând la masă!"</em></p>

<p>Și așa a apărut chaturanga. Cele patru feluri de luptători au devenit <strong>piesele jocului</strong>, iar tabla a devenit câmpul lor de luptă.</p>

<p>Se pare că la început unii jucau chiar cu <strong>zaruri</strong>: aruncai zarul și cifra de pe el îți spunea care piesă trebuie mutată. Mai târziu, jucătorii au renunțat la zaruri și au început să aleagă singuri ce piesă mută — așa cum facem și noi azi la șah.</p>

<p>Mai exista și o variantă pentru <strong>patru jucători</strong>, jucată în colțurile tablei. Se numea <strong>chaturaji</strong>, adică <em>„cei patru regi"</em>. Despre ea ne-a povestit un savant persan, al-Biruni, care a călătorit în India acum aproape o mie de ani.</p>

<p>Cu timpul, chaturanga a călătorit din India în Persia, de acolo la arabi, apoi tocmai până la noi în Europa. Pe drum și-a schimbat numele și câteva reguli — dar <strong>inima lui a rămas aceeași</strong>.</p>

<p>Elefanții au devenit <strong>nebuni</strong>, carele de luptă au devenit <strong>turnuri</strong>, călăreții au rămas <strong>cai</strong>, iar pedestrașii — <strong>pionii</strong> noștri de azi.</p>

<p>Așa s-a născut, dintr-o armată indiană, <strong>bunicul șahului</strong>. 👑</p>
`

<p>Tabla de chaturanga are <strong>8 rânduri și 8 coloane</strong> — exact ca tabla de șah de azi. În sanscrită i se spune <strong>ashtapada</strong>, adică <em>„cele opt câmpuri"</em> (<em>ashta</em> = opt, <em>pada</em> = câmp).</p>

<p>Dacă te uiți cu atenție, vei vedea că pe unele căsuțe sunt desenate niște <strong>cruci mici, ca niște X-uri</strong>. Te-ai întreba: la ce folosesc?</p>

  { num: '4.', title: 'Cine câștigă și cum', bodyHTML: `
<p>La chaturanga, scopul nu e doar să ataci frumos — trebuie <strong>să-l prinzi pe raja adversarului</strong>. Există trei feluri în care poți câștiga:</p>

<p>🏆 <strong>1. Prinzi raja</strong></p>
<p>Dacă raja adversarului nu mai are unde să fugă și e atacat — partida s-a încheiat, ai câștigat! Asta seamănă cu <em>șah-mat</em>-ul de azi. Diferența: la chaturanga, dacă cineva uită să-și apere raja și îl pierde la o tură, partida tot se termină — nu există „revenire".</p>

<p>🏆 <strong>2. Lași adversarul singur cu raja lui</strong></p>
<p>Dacă reușești să capturezi <strong>toate piesele</strong> adversarului și el rămâne <strong>doar cu raja</strong> pe tablă — câștigi! Asta se numește <em>„rajă goală"</em> (în engleză <em>bare king</em>). E o regulă specifică chaturangăi: nu poți să te ascunzi la nesfârșit doar cu regele.</p>

<p style="font-size:.86em; opacity:.72; margin-top:8px;"><em>(Regula după H. J. R. Murray, „A History of Chess", Oxford, 1913 — care a îndreptat o greșeală mai veche a lui Forbes — și confirmată de tratatul lui al-Adli, sec. IX, și de Cazaux &amp; Knowlton, „A World of Chess", 2017.)</em></p>

  { num: '5.', title: 'Tactici',             bodyHTML: `
<p>La chaturanga, piesele sunt mai slabe ca la șahul modern — mantri face un pas diagonal, gaja sare doar 2 pătrate. Asta schimbă tacticile! Iată trei trucuri pe care le poți încerca:</p>

  { num: '6.', title: 'Călătorie în timp: Legenda completă pentru cititori pasionați', bodyHTML: `
<p style="opacity:.85;"><em>Pentru tine, cel care vrea să știe tot. Pune-ți centura: călătorim în timp cu o mie patru sute de ani în urmă. Numerele mici, ca <sup>[1]</sup>, sunt indicii — le găsești explicate în sertarul „Pentru Detectivi".</em></p>

<p><strong>📜 Capitolul I — O tablă pentru o mamă îndurerată</strong></p>
<p>Cea mai veche poveste despre cum s-a născut chaturanga ne-a păstrat-o un poet persan, Firdausi, într-o carte uriașă scrisă acum o mie de ani <sup>[2]</sup>. Se spune că în India trăiau doi frați vitregi, doi prinți: <strong>Gav</strong> și <strong>Talhand</strong>. Amândoi voiau tronul, și s-au înfruntat în luptă. În toiul bătăliei, tânărul Talhand a murit — dar fără nicio rană, doborât de sete și de oboseală.</p>
<p>Regina-mamă n-a vrut să creadă. <em>„Voi i-ați ucis fratele!"</em>, striga ea. Atunci înțelepții curții s-au gândit la ceva nemaivăzut: au luat o tablă cu pătrate, au făcut din lemn doi regi, sfetnicii lor, elefanți, cai, care de luptă și pedestrași — și au <strong>refăcut bătălia, mutare cu mutare</strong>, ca să-i arate mamei, să vadă cu ochii ei, cum a căzut fiul ei fără ca nimeni să-l fi lovit. Așa, spune legenda, s-a inventat chaturanga: nu ca să distreze, ci ca să <strong>explice</strong> ceva ce cuvintele nu puteau <sup>[2]</sup><sup>[1]</sup>.</p>

<p><strong>⚔️ Capitolul II — Cele patru brațe</strong></p>
<p>Numele jocului spune totul. În sanscrită, <em>chatur</em> = patru, <em>anga</em> = brațe. <strong>Chaturanga = „cele patru brațe ale armatei"</strong>: pedestrașii — padati, călăreții pe cai — ashva, elefanții de luptă — gaja și carele trase de cai — ratha <sup>[1]</sup>. Deasupra tuturor, regele — <strong>raja</strong> — și sfetnicul lui cel mai apropiat, <strong>mantri</strong>. Toate erau personaje reale dintr-o armată indiană adevărată; jocul era o oglindă mică a unui război mare <sup>[4]</sup>.</p>

<p><strong>🎲 Capitolul III — Jocul cu zaruri și „cei patru regi"</strong></p>
<p>La început nu alegeai singur ce muți: <strong>aruncai un zar</strong>, iar fața zarului îți spunea ce piesă are voie să se miște. Mai exista și o variantă pentru <strong>patru jucători</strong>, câte unul în fiecare colț, numită <strong>chaturaji</strong> — „cei patru regi". Despre ea ne-a povestit, în jurul anului 1030, un savant care a străbătut India, <strong>al-Biruni</strong>, în cartea lui despre tot ce văzuse acolo <sup>[3]</sup>. Mai târziu, oamenii au lăsat zarurile deoparte și au început să gândească fiecare mutare — așa cum faci tu acum.</p>

<p><strong>🌾 Capitolul IV — Bobul de grâu care a păcălit un rege</strong></p>
<p>O altă legendă veche — pe care arabii și persanii au repovestit-o mai târziu despre <em>shatranj</em>, dar care vorbește despre <strong>nașterea jocului în India</strong>, pe tabla de 64 de pătrate — a fost strânsă și cercetată de Murray printre zecile de povești despre originea jocului <sup>[1]</sup>. Ea spune că un înțelept i-a arătat regelui jocul, iar regele, încântat, i-a zis: <em>„Cere-mi orice!"</em> Înțeleptul a cerut, smerit, doar grâu: <strong>un bob pe primul pătrat, două pe al doilea, patru pe al treilea</strong>… dublând mereu, până la al 64-lea. Regele a râs — ce cerere măruntă! Dar socotitorii au pălit: nu exista atâta grâu în toată lumea. Pe ultimul pătrat ar fi trebuit peste <strong>nouă trilioane de trilioane de boabe</strong> (adică peste 9 miliarde de miliarde). Așa a învățat un rege, dintr-un joc, cât de uriaș poate crește un număr care se tot dublează.</p>

<p><strong>🧭 Capitolul V — Drumul lung spre apus</strong></p>
<p>Chaturanga nu a stat pe loc. A trecut munții în <strong>Persia</strong>, unde i s-a spus <em>chatrang</em>; de la persani a ajuns la <strong>arabi</strong>, devenind <em>shatranj</em>; iar de acolo, prin Spania și Italia, a intrat în toată <strong>Europa</strong> <sup>[1]</sup><sup>[4]</sup>. Pe drum, piesele s-au prefăcut: elefantul (gaja) a devenit nebunul, carul (ratha) a devenit turnul, sfetnicul (mantri) s-a transformat, după multe veacuri, în cea mai puternică piesă de azi — regina <sup>[5]</sup>. Dar inima jocului a rămas aceeași: doi regi, o tablă, și mintea ta.</p>

<p><strong>🔍 Capitolul VI — De unde știm toate astea?</strong></p>
<p>Nu dintr-o singură carte. Cel mai de încredere ghid e un istoric englez, <strong>H. J. R. Murray</strong>. Lucrul uimitor: el nu era campion de șah, ci un profesor de matematică, fiul omului care a făcut marele dicționar al limbii engleze. De dragul acestui joc a <strong>învățat singur araba</strong>, ca să poată citi manuscrisele în original. A scris, în 1913, <em>A History of Chess</em> — o carte atât de temeinic documentată încât, după mai bine de <strong>o sută de ani</strong>, istoricii din toată lumea încă o numesc „biblia istoriei șahului" și se bazează pe ea <sup>[1]</sup>. El a și descoperit că un cercetător de dinaintea lui, Forbes, greșise unele reguli — exact ca un detectiv care descoperă o eroare în dosar. Vrei să vezi „dosarul" complet? Deschide sertarul următor. 👇</p>
