    .btn-vol:hover { background: rgba(26,58,107,0.10); }

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
<script src="board-utils.js"></script>
<script>

/* ====== SOUNDS ====== */
var sndMove    = new Audio('Sounds/Move.mp3');
var sndCapture = new Audio('Sounds/Capture.mp3');
var sndMate    = new Audio('Sounds/Mate.mp3');
var soundMuted = false;

function playSound(snd) {
    if (soundMuted) return;
    snd.currentTime = 0;
    snd.play().catch(function(){});
}
function playSoundForMove(mv) {
    if (!mv) return;
    if (chess.in_checkmate()) { playSound(sndMate); return; }
    if (mv.flags && mv.flags.indexOf('c') !== -1) playSound(sndCapture);
    else playSound(sndMove);
}
function toggleMute() {
    soundMuted = !soundMuted;
    document.getElementById('muteBtn').textContent = soundMuted ? '🔇' : '🔊';
}

/* ====== STATE ====== */
var chess = new Chess();
var board  = null;
var playerColor = 'w';   // 'w' or 'b'
var selectedSkill = 1;
var gameOver = false;
var stockfish = null;
var pendingPromoMove = null;
var clockMax = 0;
var clock = {w: 0, b: 0};
var clockTick = null;

function selectTime(btn) {
    document.querySelectorAll('.time-opt').forEach(function(b){ b.classList.remove('active'); });
    btn.classList.add('active');
}
function fmtClock(s) { var m=Math.floor(s/60),ss=s%60; return m+':'+(ss<10?'0':'')+ss; }
function updateClocks() {
    var cwEl=document.getElementById('cwTime'), cbEl=document.getElementById('cbTime');
    var wBox=document.getElementById('clockW'), bBox=document.getElementById('clockB');
    if (!cwEl) return;
    var t = gameOver ? '' : chess.turn();
    if (clockMax===0) {
        cwEl.textContent='∞'; cbEl.textContent='∞';
        wBox.className='clock-box'+(t==='w'?' active':'');
        bBox.className='clock-box'+(t==='b'?' active':'');
        return;
    }
    cwEl.textContent=fmtClock(clock.w); cbEl.textContent=fmtClock(clock.b);
    var wLow=clock.w<=15, bLow=clock.b<=15;
    wBox.className='clock-box'+(t==='w'?(wLow?' low':' active'):'');
    bBox.className='clock-box'+(t==='b'?(bLow?' low':' active'):'');
}
function startClock() {
    if (clockMax===0) return;
    stopClock();
    clockTick=setInterval(function(){
        if (gameOver){stopClock();return;}
        var c=chess.turn();
        clock[c]--;
        updateClocks();
        if (clock[c]<=0){
            stopClock();
            gameOver=true;
            var lost=(c===playerColor);
            setStatus(lost?'Timp expirat! Calculatorul c&#226;&#351;tig&#259;! &#129302;':'Timp expirat! Ai c&#226;&#351;tigat! &#127942;', lost?'danger':'success');
        }
    },1000);
}
function stopClock(){if(clockTick){clearInterval(clockTick);clockTick=null;}}

var PIECE_CDN = 'https://lichess1.org/assets/piece/caliente/';
var PIECE_MAP = {
    wK:'wK', wQ:'wQ', wR:'wR', wB:'wB', wN:'wN', wP:'wP',
    bK:'bK', bQ:'bQ', bR:'bR', bB:'bB', bN:'bN', bP:'bP'
};

/* ====== PIECE IMAGES ====== */
function pieceImg(code) {
    return PIECE_CDN + code + '.svg';
}

/* ====== DIFFICULTY ====== */
function selectAnimal(btn) {
    document.querySelectorAll('.animal-btn').forEach(function(b){ b.classList.remove('active'); });
    btn.classList.add('active');
    selectedSkill = parseInt(btn.dataset.skill);
}

function selectColor(btn) {
    document.querySelectorAll('.color-opt').forEach(function(b){ b.classList.remove('active'); });
    btn.classList.add('active');
}

function getSelectedColor() {
    var active = document.querySelector('.color-opt.active');
    if (!active) return 'w';
    var c = active.dataset.color;
    if (c === 'random') return Math.random() < 0.5 ? 'w' : 'b';
    return c === 'black' ? 'b' : 'w';
}

/* ====== STOCKFISH ====== */
var SF_CDN = 'https://cdnjs.cloudflare.com/ajax/libs/stockfish.js/10.0.2/stockfish.js';

function initStockfish() {
    if (stockfish) { stockfish.terminate(); stockfish = null; }
    // fetch + blob URL ocolește restricția CORS pentru Web Workers
    fetch(SF_CDN)
        .then(function(r) { return r.blob(); })
        .then(function(blob) {
            var url = URL.createObjectURL(blob);
            stockfish = new Worker(url);
            URL.revokeObjectURL(url);
            stockfish.onmessage = function(e) { handleStockfishMsg(e.data); };
            stockfish.postMessage('uci');
            stockfish.postMessage('setoption name Skill Level value ' + selectedSkill);
            stockfish.postMessage('isready');
        })
        .catch(function(err) { console.warn('Stockfish load error:', err); });
}

function askStockfish() {
    if (!stockfish || gameOver) return;
    setStatus('&#129302; Calculatorul se gândește...', 'thinking');
    stockfish.postMessage('position fen ' + chess.fen());
    var thinkMs = 300 + selectedSkill * 40;
    stockfish.postMessage('go movetime ' + thinkMs);
}

function handleStockfishMsg(msg) {
    if (typeof msg !== 'string') return;
    if (msg.indexOf('bestmove') === 0) {
        var parts = msg.split(' ');
        var move  = parts[1];
        if (!move || move === '(none)') return;
        var from = move.substring(0,2);
        var to   = move.substring(2,4);
        var promo = move.length > 4 ? move[4] : undefined;
        var mv = chess.move({ from: from, to: to, promotion: promo || 'q' });
        if (!mv) return;
        board.position(chess.fen());
        playSoundForMove(mv);
        addMoveToList(mv);
        updateClocks();
        checkGameOver();
        if (!gameOver) setStatus(turnStatus(), '');
    }
}

/* ====== BOARD SETUP ====== */
var START_FEN = '4k3/pppppppp/8/8/8/8/PPPPPPPP/4K3 w - - 0 1';

/* ====== HIGHLIGHTS (click-to-move) ====== */
var selSq = null;
function clearHL() { $('#board .sq-sel, #board .sq-mv').removeClass('sq-sel sq-mv'); }
function showHL(sq) {
    clearHL();
    $('#board .square-' + sq).addClass('sq-sel');
    chess.moves({ square: sq, verbose: true }).forEach(function(m) {
        $('#board .square-' + m.to).addClass('sq-mv');
    });
}

/* ====== DOM READY ====== */
$(function() {
    board = Chessboard('board', {
        draggable: true,
        position: START_FEN,
        pieceTheme: function(piece) { return pieceImg(piece); },
        onDragStart: onDragStart,
        onDrop: onDrop,
        onSnapEnd: onSnapEnd
    });

    $(document).on('click', '#board .square-55d63', function() {
        if (!board || gameOver || chess.turn() !== playerColor) return;
        var sq = $(this).data('square');
        if (!sq) return;
        var piece = chess.get(sq);
        if (selSq) {
            var prev = selSq;
            clearHL(); selSq = null;
            if (sq === prev) return;
            if (piece && piece.color === playerColor) { selSq = sq; showHL(sq); return; }
            if (tryMove(prev, sq)) board.position(chess.fen());
        } else {
            if (piece && piece.color === playerColor) { selSq = sq; showHL(sq); }
        }
    });

    window.addEventListener('resize', function() { if (board) board.resize(); });
});

function startGame() {
    chess.load(START_FEN);
    gameOver = false;
    playerColor = getSelectedColor();
    clearHL(); selSq = null;
    document.getElementById('moveList').innerHTML = '';
    var orientation = playerColor === 'w' ? 'white' : 'black';
    board.orientation(orientation);
    board.position(START_FEN, false);
    document.getElementById('setupPanel').style.display = 'none';
    document.getElementById('gamePanel').style.display = 'block';
    var activeAnimal = document.querySelector('.animal-btn.active');
    var animalName = activeAnimal ? activeAnimal.querySelector('.name').textContent : '';
    document.getElementById('diffDisplay').textContent = 'Adversar: ' + animalName;
    var tb = document.querySelector('.time-opt.active');
    clockMax = tb ? parseInt(tb.dataset.secs) : 0;
    clock = {w: clockMax, b: clockMax};
    stopClock();
    updateClocks();
    if (clockMax > 0) startClock();
    initStockfish();
    setStatus(turnStatus(), '');
    if (playerColor === 'b') { setTimeout(askStockfish, 500); }
}

function backToSetup() {
    stopClock();
    if (stockfish) { stockfish.terminate(); stockfish = null; }
    gameOver = false; clearHL(); selSq = null;
    chess.reset();
    board.position(START_FEN, false);
    board.orientation('white');
    document.getElementById('setupPanel').style.display = 'block';
    document.getElementById('gamePanel').style.display = 'none';
}

/* ====== MOVE EXECUTION (shared by drag & click) ====== */
function tryMove(from, to) {
    var piece = chess.get(from);
    if (piece && piece.type === 'p') {
        var rank = to[1];
        if ((piece.color === 'w' && rank === '8') || (piece.color === 'b' && rank === '1')) {
            pendingPromoMove = { from: from, to: to };
            showPromoDialog(piece.color);
            return false;
        }
    }
    var mv = chess.move({ from: from, to: to });
    if (!mv) return false;
    playSoundForMove(mv);
    addMoveToList(mv);
    updateClocks();
    if (checkGameOver()) return true;
    setStatus('', 'thinking');
    setTimeout(askStockfish, 150);
    return true;
}

/* ====== DRAG & DROP ====== */
function onDragStart(source, piece) {
    clearHL(); selSq = null;
    if (gameOver) return false;
    if (chess.turn() !== playerColor) return false;
    if (playerColor === 'w' && piece[0] === 'b') return false;
    if (playerColor === 'b' && piece[0] === 'w') return false;
    return true;
}

function onDrop(source, target) {
    if (source === target) return 'snapback';
    if (!tryMove(source, target)) return 'snapback';
}

function onSnapEnd() {
    board.position(chess.fen());
}

/* ====== PROMOTION ====== */
function showPromoDialog(color) {
    var overlay = document.getElementById('promo-overlay');
    var container = document.getElementById('promoPieces');
    container.innerHTML = '';
    var pieces = ['q','r','b','n'];
    pieces.forEach(function(p) {
        var code = (color === 'w' ? 'w' : 'b') + p.toUpperCase();
        var img = document.createElement('img');
        img.src = pieceImg(code);
        img.className = 'promo-piece';
        img.title = p;
        img.onclick = function() { doPromotion(p); };
        container.appendChild(img);
    });
    overlay.classList.add('visible');
}

function doPromotion(piece) {
    document.getElementById('promo-overlay').classList.remove('visible');
    if (!pendingPromoMove) return;
    var mv = chess.move({ from: pendingPromoMove.from, to: pendingPromoMove.to, promotion: piece });
    pendingPromoMove = null;
    if (!mv) return;
    board.position(chess.fen());
    playSoundForMove(mv);
    addMoveToList(mv);
    updateClocks();
    if (checkGameOver()) return;
    setStatus('', 'thinking');
    setTimeout(askStockfish, 150);
}

/* ====== GAME STATE ====== */
function checkGameOver() {
    if (chess.in_checkmate()) {
        var winner = chess.turn() !== playerColor ? 'Tu ai câștigat! &#127942;' : 'Calculatorul a câștigat! &#129302;';
        setStatus(winner, chess.turn() !== playerColor ? 'success' : 'danger');
        gameOver = true; stopClock();
        return true;
    }
    if (chess.in_stalemate()) {
        setStatus('Pat — remiză! &#9878;', 'draw');
        gameOver = true; stopClock();
        return true;
    }
    if (chess.in_draw()) {
        var why = '';
        if (chess.insufficient_material()) why = ' (material insuficient)';
        else why = ' (50 mutări / repetare)';
        setStatus('Remiză!' + why + ' &#9878;', 'draw');
        gameOver = true; stopClock();
        return true;
    }
    return false;
}

function turnStatus() {
    var t = chess.turn() === 'w' ? 'Albele' : 'Negrele';
    var you = chess.turn() === playerColor;
    if (chess.in_check()) return (you ? '&#9888; Ești în șah! ' : '&#9888; ' + t + ' în șah! ') + 'Mută!';
    return you ? '&#9654; Rândul tău!' : '&#9832; Adversarul mută...';
}

function setStatus(txt, cls) {
    var el = document.getElementById('status');
    el.innerHTML = txt || turnStatus();
    el.className = 'status-box' + (cls ? ' ' + cls : '');
}

/* ====== MOVE LIST ====== */
var lastMoveNr = 0;
var lastMoveEl = null;

function addMoveToList(mv) {
    var list = document.getElementById('moveList');
    var moveNr = Math.ceil(chess.history().length / 2);

    if (chess.history().length % 2 === 1) {
        // white move — new pair
        lastMoveNr = moveNr;
        var pair = document.createElement('div');
        pair.className = 'move-pair';
        pair.id = 'mp' + moveNr;
        pair.innerHTML = '<span class="move-nr">' + moveNr + '.</span>' +
                         '<span class="mv-w" id="mw' + moveNr + '">' + mv.san + '</span>' +
                         '<span class="mv-b" id="mb' + moveNr + '"></span>';
        list.appendChild(pair);
    } else {
        // black move
        var el = document.getElementById('mb' + lastMoveNr);
        if (el) el.textContent = mv.san;
    }
    list.scrollTop = list.scrollHeight;
}

/* ====== ACTIONS ====== */
function undoMove() {
    if (gameOver) { gameOver = false; }
    // undo both computer and player moves
    chess.undo(); chess.undo();
    board.position(chess.fen());
    // rebuild move list
    var list = document.getElementById('moveList');
    list.innerHTML = '';
    chess.history({ verbose: true }).forEach(function(mv) { addMoveToList(mv); });
    setStatus(turnStatus(), '');
}

function resignGame() {
    if (gameOver) return;
    gameOver = true;
    setStatus('Ai abandonat. &#9873; Calculator câștigă!', 'danger');
}

</script>
