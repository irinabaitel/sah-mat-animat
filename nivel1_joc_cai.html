<style>
  .game-badge {
    background: var(--c-navy); color: white;
    font-family: var(--font-display); font-size: var(--fs-sm); font-weight: var(--fw-bold);
    padding: 3px 14px; border-radius: var(--radius-sm); white-space: nowrap;
  }

  /* HIGHLIGHTS */
  .sq-selected { background: rgba(26,120,255,0.50) !important; }
  .sq-valid    { background: rgba(40,200,80,0.45)  !important; }
  .sq-capture  { background: rgba(255,160,20,0.70) !important; }
  .sq-ai       { background: rgba(160,60,200,0.40) !important; }

  /* LEVEL TOGGLE */
  .level-toggle { display: flex; gap: 8px; margin-bottom: 10px; }
  .lvl-btn {
    padding: 5px 14px; border-radius: 50px;
    border: 2px solid rgba(26,58,107,0.3);
    background: rgba(255,255,255,0.5);
    font-family: var(--font-display); font-size: 0.82em; color: var(--c-navy);
    cursor: pointer; transition: all 0.2s;
  }
  .lvl-btn.active { background: var(--c-navy); color: white; border-color: var(--c-navy); }

  /* RULES */
  .rules-list { list-style: none; display: flex; flex-direction: column; gap: 3px; margin-bottom: 10px; }
  .rules-list li {
    font-size: 0.84em; color: var(--c-text); padding-left: 16px;
    position: relative; line-height: 1.6;
  }
  .rules-list li::before { content: '→'; position: absolute; left: 0; color: var(--c-navy); font-weight: 700; }

  /* PLAYER PANELS */
  .player-panel {
    background: rgba(255,255,255,0.5); border: 2px solid rgba(255,255,255,0.8);
    border-radius: 12px; padding: 10px 12px; margin-bottom: 8px;
  }
  .player-panel.active { border-color: var(--c-navy); background: rgba(26,58,107,0.1); }
  .player-panel.winner { border-color: rgba(40,180,80,0.6); background: rgba(40,180,80,0.1); }
  .pp-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 5px; }
  .pp-name { font-family: var(--font-display); font-size: 0.88em; color: #1a1a2e; }
  .pp-score {
    font-family: var(--font-display); font-size: 1.3em; color: var(--c-navy);
    background: rgba(255,255,255,0.7); border-radius: 8px; padding: 0 8px; line-height: 1.5;
  }
  .pp-trophy { font-size: 1.2em; display: none; }
  .pp-trophy.show { display: inline; }
  .pp-bar-wrap { background: rgba(0,0,0,0.1); border-radius: 5px; height: 7px; overflow: hidden; }
  .pp-bar { height: 100%; border-radius: 5px; transition: width 0.4s; width: 0%; }
  .bar-w { background: linear-gradient(90deg,#4a90e2,#1a3a6b); }
  .bar-b { background: linear-gradient(90deg,#5a3a8a,#2a1a4a); }
  .pp-label { font-size: 0.68em; color: rgba(26,26,46,0.5); margin-top: 2px; }

  /* STATUS */
  #status-box {
    background: rgba(26,58,107,0.09); border: 2px solid rgba(26,58,107,0.2);
    border-radius: 12px; padding: 9px 12px;
    font-size: 0.86em; line-height: 1.6; color: #1a1a2e;
    min-height: 46px; transition: all 0.3s; margin-bottom: 8px;
  }
  #status-box.ok   { border-color: rgba(40,180,80,0.5);  background: rgba(40,180,80,0.15); }
  #status-box.draw { border-color: rgba(200,150,10,0.5); background: rgba(200,150,10,0.12); }

  /* BUTTONS */
  .btn-game {
    display: block; width: 100%; padding: 8px;
    border-radius: 10px; border: 2px solid rgba(255,255,255,0.8);
    background: rgba(255,255,255,0.55); font-family: var(--font-display);
    font-size: 0.85em; color: var(--c-navy); cursor: pointer;
    transition: background 0.2s; margin-bottom: 6px;
  }
  .btn-game:hover { background: rgba(255,255,255,0.85); }
  #btn-next {
    display: none; width: 100%; padding: 9px; border-radius: 10px; border: none;
    background: #1a6b4a; color: white; font-family: var(--font-display);
    font-size: 0.88em; font-weight: 700; cursor: pointer;
    box-shadow: 0 2px 8px rgba(26,107,74,0.35); transition: background 0.2s;
  }
  #btn-next:hover { background: #27ae60; }
</style>
</head>
<body>
<div class="page-wrapper">

  <header class="page-header" role="banner">
    <span class="header-title">♞ Jocul Cailor — Pioni la Masă!</span>
    <div class="header-progress">
      <span class="game-badge">Joc</span>
    </div>
  </header>

  <main class="page-main" role="main">

    <div class="board-col">
      <div class="board-wrapper">
        <div id="board"></div>
      </div>
    </div>

    <div class="panel-col">
      <div class="panel-scroll">

        <div class="level-toggle">
          <button class="lvl-btn active" id="lvl1" onclick="setLevel(1)">Nivel 1 — Un Cal</button>
          <button class="lvl-btn"        id="lvl2" onclick="setLevel(2)">Doi Cai</button>
        </div>

        <ul class="rules-list">
          <li>Fiecare cal vânează <strong>pionii adversarului</strong>.</li>
          <li>Caii <strong>nu se pot captura între ei</strong>.</li>
          <li>Câștigă cel cu <strong>mai mulți pioni</strong> capturați!</li>
        </ul>

        <div class="player-panel active" id="pp-w">
          <div class="pp-row">
            <span class="pp-name">♘ Alb (Tu)</span>
            <span class="pp-score" id="score-w">0</span>
            <span class="pp-trophy" id="trophy-w">🏆</span>
          </div>
          <div class="pp-bar-wrap"><div class="pp-bar bar-w" id="bar-w"></div></div>
          <div class="pp-label">pioni capturați / 8</div>
        </div>

        <div class="player-panel" id="pp-b">
          <div class="pp-row">
            <span class="pp-name">♞ Negru — 🤖</span>
            <span class="pp-score" id="score-b">0</span>
            <span class="pp-trophy" id="trophy-b">🏆</span>
          </div>
          <div class="pp-bar-wrap"><div class="pp-bar bar-b" id="bar-b"></div></div>
          <div class="pp-label">pioni capturați / 8</div>
        </div>

        <div id="status-box">♘ Mută Albul — apasă pe Cal!</div>

        <button class="btn-game" onclick="restartGame()">↺ Restart</button>
        <button id="btn-next" onclick="location.href='nivel1_joc_cursa.html'">♖ Jocul următor ▶</button>

      </div><!-- /.panel-scroll -->
      <div class="feedback-bar" id="feedbackBar"></div>
    </div><!-- /.panel-col -->

  </main>

  <footer class="page-footer" role="navigation">
    <a href="nivel1_lectia2.html" class="nav-btn nav-btn--back">
      <span class="icon">&#8592;</span>
      <span class="label">Lecția 2</span>
    </a>
    <a href="hub.html" class="nav-btn nav-btn--contents">
      <span class="icon">&#8862;</span>
      <span class="label">Cuprins</span>
    </a>
    <a href="nivel1_joc_cursa.html" class="nav-btn nav-btn--forward">
      <span class="icon">&#8594;</span>
      <span class="label">Cursa</span>
    </a>
  </footer>

</div>

<script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
<script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
<script>
/* =====================================================
   JOCUL CAILOR — Negru = AI, Alb = Tu
   ===================================================== */

const COLS = 'abcdefgh';
const KM = [[-2,-1],[-2,1],[-1,-2],[-1,2],[1,-2],[1,2],[2,-1],[2,1]];

const BLACK_PAWNS_INIT = ['a5','c5','e5','g5','b4','d4','f4','h4'];
const WHITE_PAWNS_INIT = ['b5','d5','f5','h5','a4','c4','e4','g4'];

const START = {
    1: { w: ['g1'], b: ['g8'] },
    2: { w: ['b1','g1'], b: ['b8','g8'] }
};

let level = 1;
let wKnights, bKnights, wPawns, bPawns;
let wCaptured, bCaptured;
let wFinished, bFinished;
let turn, selSq, validMvs, gameOver;
let moveCount;
let board;

function knightBFS(from, obstacles) {
    const dist = {[from]: 0};
    const step = {};
    const q = [from];
    while (q.length) {
        const cur = q.shift();
        const c = COLS.indexOf(cur[0]), r = parseInt(cur[1]);
        for (const [dc,dr] of KM) {
            const nc=c+dc, nr=r+dr;
            if (nc<0||nc>7||nr<1||nr>8) continue;
            const nsq = COLS[nc]+nr;
            if (nsq in dist || obstacles.has(nsq)) continue;
            dist[nsq] = dist[cur]+1;
            step[nsq] = step[cur] || nsq;
            q.push(nsq);
        }
    }
    return {dist, step};
}

function knightDestsWhite(sq) {
    const c=COLS.indexOf(sq[0]), r=parseInt(sq[1]);
    const res=[];
    for (const [dc,dr] of KM) {
        const nc=c+dc, nr=r+dr;
        if (nc<0||nc>7||nr<1||nr>8) continue;
        const nsq=COLS[nc]+nr;
        if (wKnights.includes(nsq)) continue;
        if (wPawns.has(nsq)) continue;
        if (bKnights.includes(nsq)) continue;
        res.push({sq:nsq, capture:bPawns.has(nsq)});
    }
    return res;
}

function heldKarpCost(startSq, pawns, obs) {
    const n = pawns.length;
    if (n === 0) return 0;
    const positions = [startSq, ...pawns];
    const D = positions.map(from => {
        const {dist} = knightBFS(from, obs || new Set());
        return positions.map(p => dist[p] ?? 999);
    });
    const INF = 99999;
    const dp = Array(1 << n).fill(null).map(() => new Array(n).fill(INF));
    for (let i = 0; i < n; i++) dp[1 << i][i] = D[0][i + 1];
    for (let mask = 1; mask < (1 << n); mask++) {
        for (let i = 0; i < n; i++) {
            if (!(mask & (1 << i)) || dp[mask][i] === INF) continue;
            for (let j = 0; j < n; j++) {
                if (mask & (1 << j)) continue;
                const cost = dp[mask][i] + D[i + 1][j + 1];
                const nm = mask | (1 << j);
                if (cost < dp[nm][j]) dp[nm][j] = cost;
            }
        }
    }
    const full = (1 << n) - 1;
    return Math.min(...dp[full]);
}

function aiPickMove() {
    const targets = [...wPawns];
    if (!targets.length) return null;
    let bestMove = null, bestScore = Infinity;
    bKnights.forEach((knight, idx) => {
        const others = bKnights.filter((_, j) => j !== idx);
        const moveObs = new Set([...bPawns, ...others]);
        const c = COLS.indexOf(knight[0]), r = parseInt(knight[1]);
        for (const [dc, dr] of KM) {
            const nc = c + dc, nr = r + dr;
            if (nc < 0 || nc > 7 || nr < 1 || nr > 8) continue;
            const dest = COLS[nc] + nr;
            if (moveObs.has(dest) || wKnights.includes(dest)) continue;
            const newKnights = [...bKnights]; newKnights[idx] = dest;
            const captured = wPawns.has(dest);
            const newTargets = captured ? targets.filter(t => t !== dest) : targets;
            const hkObs = new Set([...bPawns, ...others]);
            let score;
            if (newKnights.length === 1) {
                score = heldKarpCost(dest, newTargets, hkObs);
            } else {
                const nt = newTargets.length;
                let partCost = Infinity;
                for (let m = 0; m < (1 << nt); m++) {
                    const t0 = newTargets.filter((_, i) => m & (1 << i));
                    const t1 = newTargets.filter((_, i) => !(m & (1 << i)));
                    const obs0 = new Set([...bPawns, newKnights[1]]);
                    const obs1 = new Set([...bPawns, newKnights[0]]);
                    const c2 = heldKarpCost(newKnights[0], t0, obs0) + heldKarpCost(newKnights[1], t1, obs1);
                    if (c2 < partCost) partCost = c2;
                }
                score = partCost;
            }
            if (score < bestScore) { bestScore = score; bestMove = {knightIdx: idx, dest}; }
        }
    });
    return bestMove;
}

function buildPos() {
    const pos={};
    wKnights.forEach(s => { pos[s]='wN'; });
    bKnights.forEach(s => { pos[s]='bN'; });
    wPawns.forEach(s => { pos[s]='wP'; });
    bPawns.forEach(s => { pos[s]='bP'; });
    return pos;
}

function clearHL() {
    COLS.split('').forEach(c => {
        for (let r=1;r<=8;r++) $(`.square-${c}${r}`).removeClass('sq-selected sq-valid sq-capture sq-ai');
    });
}
function highlight(sq, mvs) {
    clearHL();
    $(`.square-${sq}`).addClass('sq-selected');
    mvs.forEach(m => $(`.square-${m.sq}`).addClass(m.capture?'sq-capture':'sq-valid'));
}

function setStatus(msg, cls) {
    const el=document.getElementById('status-box');
    el.textContent=msg; el.className=cls||'';
}
function updateUI() {
    document.getElementById('score-w').textContent=wCaptured;
    document.getElementById('score-b').textContent=bCaptured;
    document.getElementById('bar-w').style.width=Math.round(wCaptured/8*100)+'%';
    document.getElementById('bar-b').style.width=Math.round(bCaptured/8*100)+'%';
    document.getElementById('pp-w').className='player-panel'+(turn==='w'&&!gameOver?' active':'');
    document.getElementById('pp-b').className='player-panel'+(turn==='b'&&!gameOver?' active':'');
}

function endGame(result) {
    gameOver=true; clearHL();
    let msg, cls;
    if (result==='draw') {
        msg=`🤝 Egalitate! Amândoi în ${moveCount} mutări!`; cls='draw';
        document.getElementById('trophy-w').classList.add('show');
        document.getElementById('trophy-b').classList.add('show');
        document.getElementById('pp-w').className='player-panel winner';
        document.getElementById('pp-b').className='player-panel winner';
    } else if (result==='white') {
        msg=`🏆 Ai câștigat în ${moveCount} mutări!`; cls='ok';
        document.getElementById('trophy-w').classList.add('show');
        document.getElementById('pp-w').className='player-panel winner';
    } else {
        msg=`🏆 Calculatorul câștigă în ${moveCount} mutări!`; cls='ok';
        document.getElementById('trophy-b').classList.add('show');
        document.getElementById('pp-b').className='player-panel winner';
    }
    setStatus(msg, cls);
    document.getElementById('btn-next').style.display='block';
    updateUI();
}

function aiBlackTurn() {
    setStatus('🤖 Calculatorul gândește…','');
    document.getElementById('pp-b').className='player-panel active';
    document.getElementById('pp-w').className='player-panel';
    setTimeout(() => {
        const mv = aiPickMove();
        if (mv) {
            const {knightIdx, dest} = mv;
            $(`.square-${bKnights[knightIdx]}`).addClass('sq-ai');
            setTimeout(() => {
                clearHL();
                bKnights[knightIdx] = dest;
                if (wPawns.has(dest)) { wPawns.delete(dest); bCaptured++; }
                board.position(buildPos(), false);
                if (wPawns.size===0) bFinished=true;
                moveCount++;
                updateUI();
                if (wFinished || bFinished) {
                    if (wFinished && bFinished) endGame('draw');
                    else if (wFinished)         endGame('white');
                    else                        endGame('black');
                } else {
                    turn='w';
                    setStatus('♘ Mută Albul!','');
                    document.getElementById('pp-w').className='player-panel active';
                    document.getElementById('pp-b').className='player-panel';
                }
            }, 400);
        }
    }, 650);
}

$(document).on('click', function(e) {
    if (gameOver || turn !== 'w') return;
    const el=$(e.target).closest('[class*="square-"]');
    if (!el.length) return;
    const match=(el.attr('class')||'').match(/square-([a-h][1-8])/);
    if (!match) return;
    const sq=match[1];
    if (!selSq) {
        if (wKnights.includes(sq)) {
            selSq=sq;
            validMvs=knightDestsWhite(sq);
            clearHL(); $(`.square-${sq}`).addClass('sq-selected');
            if (!validMvs.length) {
                setStatus('⚠️ Calul nu are unde merge! Selectează altul.','');
                selSq=null;
            }
        }
    } else {
        const mv=validMvs.find(m=>m.sq===sq);
        if (mv) {
            wKnights=wKnights.map(s=>s===selSq?sq:s);
            if (mv.capture) { bPawns.delete(sq); wCaptured++; }
            board.position(buildPos(),false);
            clearHL(); selSq=null; validMvs=[];
            if (bPawns.size===0) wFinished=true;
            updateUI();
            turn='b';
            aiBlackTurn();
        } else if (wKnights.includes(sq)) {
            selSq=sq;
            validMvs=knightDestsWhite(sq);
            clearHL(); $(`.square-${sq}`).addClass('sq-selected');
        } else {
            selSq=null; validMvs=[]; clearHL();
        }
    }
});

function setLevel(lvl) {
    level=lvl;
    document.getElementById('lvl1').className='lvl-btn'+(lvl===1?' active':'');
    document.getElementById('lvl2').className='lvl-btn'+(lvl===2?' active':'');
    restartGame();
}

function restartGame() {
    wKnights=[...START[level].w];
    bKnights=[...START[level].b];
    wPawns=new Set(WHITE_PAWNS_INIT);
    bPawns=new Set(BLACK_PAWNS_INIT);
    wCaptured=0; bCaptured=0;
    wFinished=false; bFinished=false;
    moveCount=0;
    turn='w'; selSq=null; validMvs=[]; gameOver=false;
    board.position(buildPos(),false);
    clearHL();
    ['trophy-w','trophy-b'].forEach(id=>document.getElementById(id).classList.remove('show'));
    setStatus('♘ Mută Albul — apasă pe Cal!','');
    document.getElementById('score-w').textContent='0';
    document.getElementById('score-b').textContent='0';
    document.getElementById('bar-w').style.width='0%';
    document.getElementById('bar-b').style.width='0%';
    document.getElementById('pp-w').className='player-panel active';
    document.getElementById('pp-b').className='player-panel';
    document.getElementById('btn-next').style.display='none';
}

board = Chessboard('board', {
    position: 'empty',
    pieceTheme: 'https://lichess1.org/assets/piece/caliente/{piece}.svg',
    draggable: true,
    showNotation: true,
    onDragStart: function(source) {
        if (gameOver || turn !== 'w') return false;
        if (!wKnights.includes(source)) return false;
        /* evidențiază mutările posibile la începutul drag-ului */
        selSq = source;
        validMvs = knightDestsWhite(source);
        clearHL(); $(`.square-${source}`).addClass('sq-selected');
    },
    onDrop: function(source, target) {
        if (target === 'offboard') { clearHL(); selSq = null; validMvs = []; return 'snapback'; }
        const mvs = knightDestsWhite(source);
        const mv  = mvs.find(m => m.sq === target);
        if (!mv) { clearHL(); selSq = null; validMvs = []; return 'snapback'; }
        wKnights = wKnights.map(s => s === source ? target : s);
        if (mv.capture) { bPawns.delete(target); wCaptured++; }
        clearHL(); selSq = null; validMvs = [];
        if (bPawns.size === 0) wFinished = true;
        updateUI();
        turn = 'b';
        aiBlackTurn();
    },
    onSnapEnd: function() {
        board.position(buildPos(), false);
    },
});
$(window).resize(() => board.resize());
restartGame();
</script>
</body>
