<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sah Mat Animat - Exerseaza: Alta Echipa de Soc</title>
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@700;900&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: #F5A96E;
            font-family: 'Nunito', sans-serif;
            padding: 24px 16px;
            min-height: 100vh;
        }

        .page {
            max-width: 1000px;
            margin: 0 auto;
            padding: 40px 44px 50px;
            position: relative;
        }

        h1 {
            font-family: 'Baloo 2', cursive;
            font-size: 2em;
            color: #1a3a6b;
            text-transform: uppercase;
            margin-bottom: 14px;
            margin-top: 10px;
            text-shadow: 2px 2px 0px rgba(255,255,255,0.4);
            text-align: center;
            line-height: 1.25;
        }

        .intro {
            font-size: 1.05em;
            line-height: 1.7;
            color: #1a1a1a;
            margin-bottom: 22px;
            text-align: center;
            max-width: 700px;
            margin-left: auto;
            margin-right: auto;
        }

        /* ===== LAYOUT ===== */
        .main-content {
            display: flex;
            gap: 16px;
            align-items: flex-start;
            flex-wrap: wrap;
        }

        /* ===== CHARACTER IMAGES ===== */
        .left-col {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 6px;
            min-width: 80px;
            padding-top: 20px;
        }

        .left-col img {
            height: 90px;
            width: auto;
            mix-blend-mode: multiply;
            transform-origin: 50% 95%;
            transition: filter 0.2s;
        }

        @keyframes piece-bounce {
            0%,100% { transform: translateY(0) scale(1); }
            25%     { transform: translateY(-16px) scaleX(0.92) scaleY(1.1); }
            60%     { transform: translateY(-6px) scale(1); }
            80%     { transform: translateY(-2px); }
        }
        .anim-bounce-piece {
            animation: piece-bounce 0.65s ease-in-out;
        }

        /* ===== BOARD ===== */
        .board-section { flex: 0 0 auto; }

        #board-wrap {
            position: relative;
            display: inline-block;
            width: min(340px, calc(100vw - 220px));
            height: min(340px, calc(100vw - 220px));
        }
        #board { width: 100%; }

        /* ===== INFO ===== */
        .info-section {
            flex: 1;
            min-width: 200px;
        }

        .status-box {
            background: rgba(255,255,255,0.5);
            border-radius: 12px;
            padding: 14px 16px;
            font-size: 1em;
            line-height: 1.6;
            color: #333;
            min-height: 70px;
            border-left: 4px solid #1a3a6b;
        }
        .status-box.success {
            border-left-color: #27ae60;
            background: rgba(220,255,230,0.75);
        }
        .status-box.warning {
            border-left-color: #e67e22;
            background: rgba(255,240,210,0.8);
        }
        .status-box.danger {
            border-left-color: #c0392b;
            background: rgba(255,220,220,0.8);
        }

        .restart-btn {
            background: #1a3a6b;
            color: white;
            border: none;
            border-radius: 50px;
            font-family: 'Baloo 2', cursive;
            font-size: 1em;
            padding: 9px 26px;
            cursor: pointer;
            margin-top: 10px;
            transition: background 0.2s;
            display: block;
        }
        .restart-btn:hover { background: #2a5aab; }

        .hint-text {
            font-size: 0.82em;
            color: rgba(26,58,107,0.6);
            margin-top: 10px;
            line-height: 1.5;
        }

        /* ===== CONFETTI ===== */
        @keyframes confetti-fall {
            0%   { opacity: 1; transform: translate(0,0) rotate(0deg); }
            80%  { opacity: 1; }
            100% { opacity: 0; transform: translate(var(--dx),var(--dy)) rotate(var(--rot)); }
        }
        .confetti-page {
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            border-radius: 3px;
            animation: confetti-fall var(--dur, 2s) ease-in forwards;
        }

        /* ===== THINKING DOTS ===== */
        @keyframes dots { 0%{content:'.';} 33%{content:'..';} 66%{content:'...';} 100%{content:'';} }
        .dots::after { content: ''; animation: dots 1.2s steps(3,end) infinite; }

        /* ===== NAV ===== */
        .nav-buttons { display: flex; justify-content: space-between; gap: 20px; margin-top: 28px; }
        .nav-btn {
            display: inline-block;
            background: #1a3a6b;
            color: white;
            font-family: 'Baloo 2', cursive;
            font-size: 1.3em;
            padding: 13px 40px;
            border-radius: 50px;
            text-decoration: none;
            transition: all 0.2s;
            box-shadow: 0 5px 20px rgba(26,58,107,0.4);
        }
        .nav-btn:hover { background: #2a5aab; transform: translateY(-3px); }
        .nav-btn.back { background: rgba(26,58,107,0.5); }

        @media (max-width: 640px) {
            body { padding: 8px 4px; }
            .page { padding: 12px 10px 28px; }
            h1 { font-size: 1.5em; margin-top: 0; }
            .main-content { flex-direction: column; align-items: center; }
            .left-col { flex-direction: row; padding-top: 0; }
            #board-wrap { width: min(340px, calc(100vw - 40px)); height: min(340px, calc(100vw - 40px)); }
        }
    </style>
</head>
<body>

<div class="page">
    <div style="position:absolute;top:0;left:0;display:flex;gap:2px;align-items:flex-end;">
        <img src="piese_sah/turn 1.png" style="height:110px;width:auto;mix-blend-mode:multiply;" alt="">
        <img src="piese_sah/rega 1.jpg" style="height:95px;width:auto;mix-blend-mode:multiply;" alt="">
    </div>
    <img src="piese_sah/rege 2.png" style="position:absolute;top:0;right:0;height:105px;width:auto;mix-blend-mode:multiply;" alt="">

    <h1>Exerseaz&#259;: Alt&#259; Echip&#259; de &#350;oc</h1>

    <p class="intro">
        Este momentul s&#259; verifici c&#226;t de bine ai &#238;n&#539;eles cum lucreaz&#259; Echipa de &#350;oc Rege + Turn!
        <strong>Regele negru joac&#259; singur cele mai bune mut&#259;ri!</strong>
    </p>

    <div class="main-content">

        <!-- Character images on left -->
        <div class="left-col">
            <img id="char-rook" src="piese_sah/turn 1.png" alt="Turn alb">
            <img id="char-king" src="piese_sah/rega 1.jpg" alt="Rege alb">
        </div>

        <!-- Board -->
        <div class="board-section">
            <div id="board-wrap">
                <div id="board"></div>
            </div>
        </div>

        <!-- Info -->
        <div class="info-section">
            <div class="status-box" id="statusBox">
                Mutarea ta! Alb &#238;ncepe. Restr&#226;nge Regele negru spre margine!
            </div>
            <button class="restart-btn" onclick="restartGame()">&#8635; Reia Jocul</button>
        </div>

    </div><!-- end main-content -->

    <div class="nav-buttons">
        <a href="pagina32.html" class="nav-btn back">&#9664; &#206;napoi</a>
        <a href="pagina34.html" class="nav-btn" style="opacity:0.4;pointer-events:none;">&#206;nainte &#9654;</a>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
<script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>

<script>
const startFen = '8/8/8/4k3/8/8/8/R3K3 w - - 0 1';
const chess    = new Chess(startFen);
const statusBox = document.getElementById('statusBox');

/* ===== STOCKFISH ===== */
let stockfish       = null;
let sfCallback      = null;
let sfBestForWhite  = null;
let sfReady         = false;

function initStockfish() {
    try {
        const code = `importScripts('https://cdnjs.cloudflare.com/ajax/libs/stockfish.js/10.0.2/stockfish.js')`;
        const blob = new Blob([code], { type: 'application/javascript' });
        stockfish = new Worker(URL.createObjectURL(blob));
    } catch(e) {
        try { stockfish = new Worker('stockfish.js'); } catch(e2) { stockfish = null; }
    }
    if (!stockfish) return;

    stockfish.onmessage = function(e) {
        const msg = e.data;
        if (msg === 'uciok') {
            stockfish.postMessage('setoption name Skill Level value 20');
            stockfish.postMessage('isready');
        }
        if (msg === 'readyok') {
            sfReady = true;
            prepareWhiteBest();
        }
        if (typeof msg === 'string' && msg.startsWith('bestmove')) {
            const mv = msg.split(' ')[1];
            if (sfCallback) { const cb = sfCallback; sfCallback = null; cb(mv); }
        }
    };
    stockfish.postMessage('uci');
}

function askStockfish(fen, depth, callback) {
    if (!stockfish || !sfReady) { callback(null); return; }
    sfCallback = callback;
    stockfish.postMessage('stop');
    stockfish.postMessage('position fen ' + fen);
    stockfish.postMessage('go depth ' + depth);
}

/* Ask Stockfish for the best WHITE move (call before user plays) */
function prepareWhiteBest() {
    if (chess.turn() !== 'w' || chess.game_over()) return;
    sfBestForWhite = null;
    askStockfish(chess.fen(), 14, function(mv) {
        sfBestForWhite = mv; // UCI format e.g. 'e1e2'
    });
}

/* ===== BOUNCE ANIMATION ===== */
function bounceChars() {
    ['char-rook', 'char-king'].forEach(function(id) {
        const el = document.getElementById(id);
        el.classList.remove('anim-bounce-piece');
        void el.offsetWidth;
        el.classList.add('anim-bounce-piece');
        setTimeout(function() { el.classList.remove('anim-bounce-piece'); }, 700);
    });
}

/* ===== CONFETTI ===== */
function spawnPageConfetti(duration) {
    const colors = ['#ff3333','#ff8800','#ffee00','#33cc55','#4499ff','#cc44ff','#ff66bb','#ff99cc','#ffffff'];
    const endTime = Date.now() + duration;
    function batch() {
        if (Date.now() >= endTime) return;
        for (let i = 0; i < 12; i++) {
            const p = document.createElement('div');
            p.className = 'confetti-page';
            const w = 7 + Math.random() * 7;
            const h = w * (0.35 + Math.random() * 0.7);
            p.style.width  = w + 'px';
            p.style.height = h + 'px';
            p.style.background = colors[Math.floor(Math.random() * colors.length)];
            p.style.left = (Math.random() * 100) + 'vw';
            p.style.top  = '-14px';
            const fallDist = window.innerHeight * (0.65 + Math.random() * 0.45);
            p.style.setProperty('--dx',  ((Math.random() - 0.5) * 180) + 'px');
            p.style.setProperty('--dy',  fallDist + 'px');
            p.style.setProperty('--rot', (Math.random() * 900 - 450) + 'deg');
            const dur = 1.8 + Math.random() * 2.4;
            p.style.setProperty('--dur', dur + 's');
            document.body.appendChild(p);
            setTimeout(function() { p.remove(); }, dur * 1000 + 200);
        }
        setTimeout(batch, 110);
    }
    batch();
}

/* ===== BOARD CALLBACKS ===== */
function onDragStart(source, piece) {
    if (chess.game_over()) return false;
    if (chess.turn() !== 'w') return false;
    if (piece.startsWith('b')) return false;
    return true;
}

function onDrop(source, target) {
    if (chess.turn() !== 'w') return 'snapback';

    const uciMove = source + target;
    const move = chess.move({ from: source, to: target, promotion: 'q' });
    if (!move) return 'snapback';

    /* Stalemate check right after white moves */
    if (chess.in_stalemate()) {
        statusBox.innerHTML = '&#9888;&#65039; <strong>Pat!</strong> Regele negru nu mai are mutări &mdash; e remiză! &#206;ncearcă altă mutare.';
        statusBox.className = 'status-box warning';
        chess.undo();
        board.position(chess.fen());
        prepareWhiteBest();
        return 'snapback';
    }

    /* Checkmate right after white moves */
    if (chess.in_checkmate()) {
        statusBox.innerHTML = '&#127942; <strong>&#350;ah mat!</strong> Ai câștigat! Felicit&#259;ri!';
        statusBox.className = 'status-box success';
        bounceChars();
        spawnPageConfetti(5000);
        return;
    }

    /* Good move detection */
    const isGood = sfBestForWhite && uciMove === sfBestForWhite;

    if (isGood) {
        bounceChars();
        statusBox.innerHTML = '&#9989; Mutare excelent&#259;! Acum r&#259;spunde Regele negru<span class="dots"></span>';
        statusBox.className = 'status-box success';
    } else {
        statusBox.innerHTML = 'Regele negru r&#259;spunde<span class="dots"></span>';
        statusBox.className = 'status-box';
    }

    /* Stockfish plays black */
    setTimeout(function() {
        askStockfish(chess.fen(), 15, function(mv) {
            if (!mv || mv === '(none)') {
                statusBox.innerHTML = 'E r&#226;ndul t&#259;u!';
                statusBox.className = 'status-box';
                prepareWhiteBest();
                return;
            }

            chess.move({ from: mv.slice(0,2), to: mv.slice(2,4) });
            board.position(chess.fen());

            if (chess.in_checkmate()) {
                statusBox.innerHTML = '&#10060; &#350;ah mat! Regele negru a câștigat. Mai &#238;ncearcă!';
                statusBox.className = 'status-box danger';
                return;
            }

            if (chess.in_stalemate() || chess.in_draw()) {
                statusBox.innerHTML = '&#9888;&#65039; Remiză! Mai &#238;ncearcă.';
                statusBox.className = 'status-box warning';
                return;
            }

            statusBox.innerHTML = isGood
                ? '&#9989; Mutare excelent&#259;! Acum e r&#226;ndul t&#259;u.'
                : 'E r&#226;ndul t&#259;u. G&#226;nde&#351;te-te cum s&#259; restr&#226;ngi Regele negru spre margine!';
            statusBox.className = isGood ? 'status-box success' : 'status-box';

            prepareWhiteBest();
        });
    }, 350);
}

function onSnapEnd() {
    board.position(chess.fen());
}

/* ===== BOARD INIT ===== */
const board = Chessboard('board', {
    position: startFen,
    pieceTheme: 'pieces/{piece}.svg',
    draggable: true,
    onDragStart: onDragStart,
    onDrop: onDrop,
    onSnapEnd: onSnapEnd
});

window.addEventListener('resize', function() { board.resize(); });

/* ===== RESTART ===== */
function restartGame() {
    chess.load(startFen);
    board.position(startFen, false);
    sfBestForWhite = null;
    statusBox.innerHTML = 'Mutarea ta! Alb &#238;ncepe. Restr&#226;nge Regele negru spre margine!';
    statusBox.className = 'status-box';
    prepareWhiteBest();
}

/* ===== START ===== */
initStockfish();
</script>

    padding: 8px 18px; border-radius: 50px;
    text-decoration: none; box-shadow: 0 3px 12px rgba(26,58,107,.4);
    z-index: 100; transition: background .2s;

.hub-btn:hover { background: #2a5aab; }
